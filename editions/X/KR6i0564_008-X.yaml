body:
  text: 辨音菩薩章四明聰講師曰淨名云三轉法輪於大千其輪本來常清淨天人得道此為證三寶於是現世間又云佛以一音演說法眾生隨類各得解佛不出世梵音自何而聞既無聞以何法修既無脩如何有證證者可出三界火宅之苦辨音已離苦人若不度生非菩薩心也是以吾佛示勸證三轉法輪雖一音舉暢其間隨類各解不同辨音且於圓覺門問幾種修習勞吾大覺括盡生死結根修證病源將三種妙藥互換湯事總二十五種若無心人則二十五皆屬剩法既未離膏肓聖賢欲垂救藥故有此章進問也於是辨音菩薩在大眾中即從坐起頂禮佛足右遶三匝長跨叉手而白佛言西蜀復菴暉禪師曰我佛以一音逗於萬類其所說法者說一乘法而眾生心地差別之故逐見佛所說之法各各不同如娑竭龍王一念降雨於一切處所見不同若大海中見雨清淨水名為無斷絕他化天雨簫笛及種種音樂名為美妙化樂天雨大摩尼珠名為放大光明兜率天雨大莊嚴具名為垂髻夜摩天雨眾妙香名為悅意四天王雨天寶衣名為覆蓋龍王宮雨赤直珠名為涌出光明阿脩羅宮雨諸兵伏名為降伏怨敵北鬱單越雨種種華名為開敷以龍王一味之雨各隨諸天所感不同今佛亦然但說一乘之法若聲聞在座之時其所聽者乃是四諦法若緣覺在座之時其所聽者乃十二因緣法若菩薩在座之時其所聽者乃六度萬行法然諸文但說一心法門隨眾生所聞時有差別今前門雖統明三觀而隨機單複不同故二十五輪各有證入此菩薩善能辨別隨類圓音故當其問也大悲世尊如是法門甚為希有西蜀復菴暉禪師曰此指前三觀法門甚是希奇少有也世尊此諸方便如是法門及諸方便皆謂奢摩他三摩鉢提禪那也一切菩薩於圓覺門有幾修習修證圓覺觀門共有幾種修習西蜀復庵暉禪師曰此請法也此諸方便者即指前三觀於圓覺者指前所依了悟覺性之行本也有幾修習者謂前威德章中蒙佛開示三觀行相分明並已知了尚未審諸菩薩所修為復是一人具修三觀為復是三人各修一觀為前修為後修為同時修為不同時修為依次第為超次第故云有幾修習也意問威德章中三觀如何而修矣願為大眾及末世眾生方便開示令悟實相圓覺空性無一切相故曰實相作是語已五體投地如是三請終而復始爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大眾及末世眾生問於如來如是修習汝今諦聽當為汝說時辨音菩薩奉教歡喜及諸大眾默然而聽西蜀復庵暉禪師曰無相之相故曰實相出體即圓覺也善男子一切如來圓覺清淨本無修習及修習者諸佛本性圓覺清淨實無可修之法亦無能修之人一切菩薩及末世眾生依於未覺幻力修習因未覺悟之故以諸幻力修習圓覺爾時便有二十五種清淨定輪二十五輪者即奢摩他三摩鉢提禪那之三觀或單修或濟修或先修或終修或複修或圓修共有二十五種名也曰清淨定輪者蓋覺性無染能轉萬法及摧輾諸幻故也西蜀復庵暉禪師曰此答文舉意標數也一切如來者即指三世諸佛與十方諸佛廣大靈明圓覺清淨體上本無所修之法亦無能修之人既然無修無證因甚諸教所說一切菩薩及末代眾生又有修有證耶良由於本覺上一念不覺迷真背湛喪本受輪以諸佛所說者但依本覺故說有幻力修習遂有修有證此之修習以被機之故便有二十五種清淨定輪輪有摧碾義謂能摧惑障令正智轉故名為輪言二十五輪者且初三觀單修次三七二十一輪交絡複修後一輪圓修三觀慤法師疏中於二十五觀約喻各立一名而圭峯疏中全用之以管經文令行相顯著四明聰講師曰於是辨音菩薩至終而復始者辨音因聞威德問三觀義且只就三種根性釋尊開示亦是隨所問而言之若論機有淺深根有利鈍何止於三故得辨音再問幾種修習爾時世尊至清淨定輪者若論覺性本自圓融一切如來修顯清淨圓極之理無高下無修習及修習者能所俱絕佛不度生大聖慈悲隆重觀眾生心具如來藏性泊沒時長故特開方便門示圓覺性故尼犍經云王名嚴熾有大菩薩遮來入其國王出遠迎乃為王說大王當知依煩惱身觀如來身何以故此身即是如來藏故一切煩惱諸垢藏中佛性滿足如石中玉木中火地中水乳中酪麻中油子中禾藏中金模中像孕中胎雲中日是故我言煩惱之中有如來藏今佛方便欲示眾生種種藏性廣開無量今處中且示二十五種單修複修具足修但事不過三不出只是三止三觀三諦三境根有利鈍觀有淺深或一或二或三諸輪綺互若天主三目如梵伊三點今先出三止三觀異同後皆易曉一止有二種大止小止小三止者一止息止從破惑得名二停止止從能定得名三不止止從諦理得名此出小乘經大三止者此是天台智者影傍三觀立此三名一軆真止破見思惑證真諦理二方便隨緣止破塵沙惑證俗諦理三息二邊分別止破無明惑證中道理奢摩他即軆真止凝其心安其理即畢竟空也三摩鉢提即方便隨緣止雖名為定體屬於慧法菩薩出假化物用觀法亦翻觀亦翻慧義亦歸於止也禪那息二邊分別止禪那翻靜慮靜即止空也屬即觀假也空假不二而修名中道也三觀者即空假中揚肇自於如來妙悟近推於智者於一心中宛有三用空者破一切法彰其蕩相也假者立一切法彰不壞諸法也中者妙一切法彰世間之相常住荊溪云一念無相謂之空無法不備謂之假不一不異謂之中如瓔珞經敬首菩薩問三觀法界諸佛自性清淨道一切菩薩所修三觀法門中觀論云因緣所生法我說即是空亦名為假名亦名中道義皆一心三觀之明文今二十五輪正為修圓覺者皆依頓教大乘覺性而修也若諸菩薩惟取極靜由靜力故永斷煩惱究竟成就唯取奢摩他至靜一法永斷無明終得成就不起于座便入涅槃即就座處便證寂滅言其不待別法修習也此菩薩者名單修奢摩他此乃專修靜觀西蜀復菴暉禪師曰若諸菩薩等此下二十五輪皆有標列結亦應一一標云悟淨圓覺以為起行所依之本今為前觀既標列有了今恐文繁故略不載又此三觀行相前已具釋了今但要分成二十五數被二五種機并顯單複之相故略去不存今此澄渾息用觀也此觀譬如濁水先且澄令清潔清潔後則可於中以見於物今修此靜觀亦復如是謂行人自從無量劫來只用此無明煩惱一切業障妄想顛倒攀緣分別之心未曾暫歇今既入此觀當以定力止息調伏勿令再起如人執杖視牛勿令犯人苗稼唯取極靜者此明一味靜念更不依倚形色不依倚地水火風及見聞覺知良靜念沉慮之力遂覺身心悉皆空寂至於瞥示之念尚無煩惱如何得有既煩惱不起即全是覺心故云究竟成就不起于座便入涅槃者謂不起當體法空之座便入諸佛寂滅涅槃真如理也四明聰講師曰一單修空觀從三觀後七觀用空觀在前止觀云為昏與散翳動定明不可隨不可畏隨之將人向惡道畏之則妨修正行此修圓覺者先取極靜專用止止即定也無明本是法性以迷故覆理成無明如寒結水為氷如眵變心起夢今用至靜體無明即是法性起是性起滅是性滅不復更論倒惑起滅以法性繫法性以法性念法性常是此性無非性時體達既成不得其真亦不得妄還源返本法界俱寂是為止又觀無明等於法性本來皆空乃至一切法無不即空譬如劫盡之時上至初禪無非是火洞然又虗空藏所現皆空又海慧所現一切皆水介爾念起所念念者無不即空空亦不可得法界洞朗咸皆大明是名為觀觀即止止即觀無二無別然心神冥昧迅利或時止之愈馳愈散或時觀之愈昏愈昧敵強力弱鷸蚌相持進退莫可當方便消遣若起決定心強軟降魔寂照自然深證故云永斷煩惱究竟成就從此便入登圓初住入涅槃不生滅地分身作佛豈小補哉單修奢摩他者則是單修空觀亦乃單修體真止也故結云名單修奢摩他若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行觀一切法皆如幻化故變化作用起三摩鉢提之妙行於陀羅尼不失寂念及諸淨慧在圓覺總持法中不失禪那之寂念不失奢摩他之靜慧也此菩薩者名單修三摩鉢提此乃專修幻觀西蜀復菴暉禪師曰此庖丁恣刃觀也本出莊子養生萹彼文乃寓言一屠者姓庖名丁為文惠君解牛三秊之前所見無非是牛三年之後不見有全牛其殺之刀十九年更不曾少損有若新刃初發於硎石之上也夫牛之百體有離有合有曲有直有竅有穴至於毫毛之末莫不各有法界而況解於細骨之間獨無條理乎且離處因而離之合處因而合之曲處橫而理之直處從而通之有竅則行無竅則止若夫解牛至此則猶上解也始動而百已判矣尚何用力於其間哉若然則牛已不傷而刀復如故蓋牛譬於物也譬於生也善解牛者所解之牛雖眾而刀初不少損善遇物者所遇之物雖繁而生無不傷也十乃陰數九乃陽數此見其年歲之往已久也三秊之前見牛者此不見道而見物也三秊之後不見有全牛者此見道而不見物也夫以吾之一生而處於無窮事變之間苟非順性命之情以頤養之則殘生傷性伐德損壽與死為隣其能久而精神不耗魂魄不勞乎據莊子之意以牛喻世上高名厚利及榮華富貴酒色財氣種種虗幻不實之物以刀喻吾之一身以一身順萬物凡事付之以自然不越性分之理者則能保養一身遠乎患難終乎天年盡其壽考不夭斤斧處於中道今經之意即不然以牛喻萬行以刀喻靈明觀智喻如菩薩入此觀時利益眾生廣修萬行應緣入俗種種施為於自己靈明觀智之上常明明常歷歷全超獨露初無虧缺一念不在家之時便是損己之智刃故以庖丁恣刃譬之也經言佛力即覺悟之力備行菩薩清淨妙行者即戒廣度群品備學法門不失寂念者即定也及諸靜慧者慧也四明聰講師曰二單修假觀唯觀如幻幻即假法也先證涅槃空達空法界建立眾生深觀幻性即萬象森羅達森羅性皆入幻假為之變化世界皆由自證覺性謂之佛力非是果佛加被之力為之佛力此是自覺性覺即佛也自己佛力種種作用應遍無窮出假化導不住大悲行菩薩行雖出假化利不失寂念即用方便隨緣止及諸靜慧者慧即是假觀止觀雙行名單修三摩鉢提也若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡便證實相唯欲滅除諸幻不取三摩鉢提之作用獨以禪那寂觀斷諸無明即證圓覺無相之相也此菩薩者名單修禪那此乃專修寂觀西蜀復庵暉禪師曰呈音出礙觀此前寂觀云如器中鍠聲出于外殻法師疏云如萬鈞之鏞星樓受礙搖杵一聲聲振寰區自體兼他不能留礙豈有樓拘鐘相使響不通形礙管聲令音不透者也唯滅諸幻不取作用者以諸幻境無邊難可窮究故直云滅滅者絕念也作用絕為又妨禪寂故云不取獨斷煩惱者獨者不假諸行也此正是絕待之義便證實相此明但與靈心本覺相應煩惱自無所有所斷既空無所有處即便自證悟此上靜幻寂三觀乃是單修然靜與寂何以異耶由靜是二乘境寂是佛境又靜是禪定寂是涅槃故不同也次二十一輪分為三類類各有七輪也第一先用靜觀為首幻觀與寂觀兼修乃是先修後修有二輪先修中修後修有二輪先修齊修後修有三輪共成七輪第二却用幻觀為首靜寂兼修亦是先修後修有二輪先修中修後修二輪先修齊修後修有三輪共成七輪第三却用寂觀為首靜幻兼修如前次第也故共成三七二十一輪今當第一靜觀為首也四明聰講師曰三單修中觀此聖人入聖流先滅諸幻未說出假度生此唯用獨存之智圓照法界一相無生可度故云先滅諸幻不取作用如龍王行雨渠自不動作用自成中道既息二邊空假歸中便證實相名單修禪那若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提先取奢摩他之至靜故云先修後取三摩鉢提之妙行故云後修西蜀復庵暉禪師曰一運舟兼濟觀禪謂此菩薩修定以出塵即運舟發慧以化物即兼濟也先取至靜者標首由至虗極守靜篤也故此標靜觀為首以靜慧心從靜躡迹起行以者運也靜慧心者即舟也照諸幻者便於是中起菩薩行者此兼修幻觀若無靜則自居幻化何能照幻者而度脫之如舟自沉焉能救溺此菩薩者名先修奢摩他後修三摩鉢提即結名此是先修并後修第一輪也四明聰講師曰四雙修先空後假此先用止云先取至靜止也照諸幻者用假觀照即觀也空假二藥自行化他故云起菩薩行若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那先以奢摩他之靜慧取證故云先修後以禪那斷煩惱而出生死故云後修西蜀復庵暉禪師曰二湛海澄空觀湛海則波瀾不動先靜觀以反流澄空則水性清明後寂觀以顯性若諸菩薩以靜慧故靜也證至靜性性即寂也躡靜而兼修寂矣便斷煩惱永出生死二觀功用斷煩惱是因亡出生死是果喪此菩薩者名先修奢摩他後修禪那此結名是先修及後修第二輪也四明聰講師曰五雙修先空後中只將靜慧兩字分止觀靜者止也慧者觀也止觀愈進斷煩惱出生死若諸菩薩以寂靜慧復現幻力種種變化度諸眾生後斷煩惱而入寂滅此菩薩者名先修奢摩他中修三摩鉢提後修禪那先有奢摩他之靜慧故云先修中現三摩鉢提之幻力故云中修後入禪那寂滅故云後修西蜀復菴暉禪師曰三首羅三目觀也此三觀俱修如摩醯首羅面上三目若諸菩薩以寂靜慧靜也復現幻力種種變化度諸眾生幻也復斷煩惱而入寂滅寂也此菩薩者名先修奢摩他中修三摩鉢提後修禪那結名此是先修中修後修一輪四明聰講師曰六具足修先空中假後中此聖先以空觀治其內病復用假觀利物度生後斷煩惱證寂滅中觀也若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸眾生此菩薩者名先修奢摩他中修禪那後修三摩鉢提先有奢摩他之靜力故云先修中以禪那斷盡煩惱故云中修後起三摩鉢提之妙行故云後修西蜀復庵暉禪師曰四三點齊修觀也三點者梵書伊字也慤疏曰一人具修三觀即名齊非是同時若諸菩薩以至靜力靜也斷煩惱已寂也後起菩薩清淨妙行度諸眾生幻也煩惱既盡愛見已亡故所起行無不淨妙可解他縛此菩薩者是先修中修後修第二輪也四明聰講師曰七具足修先空中中後假此聖空觀體真止猛勇力強頓斷煩惱即生死結根斷已復用中假二觀度生即隨緣息二邊分別二止共成佛界若諸菩薩以至靜力心斷煩惱復度眾生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那先有奢摩之靜力故云先修於禪那斷滅煩惱時就起三摩鉢提之幻行建立世界故云齊修西蜀復菴暉禪師曰五品字單雙觀也上單靜觀如上一口後雙明寂幻如下兩口故云單雙若諸菩薩以至靜力靜也心斷煩惱復度眾生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那此乃齊兼幻寂也初句是靜後二句是幻寂也此是先修齊後第一輪也四明聰講師曰八具足修先修空齊修假中此聖空觀力強以圓覺妙心頓斷煩惱於一念中普度有情一吹大千世界即成功用如是故云建立境界也若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那先以奢摩他之靜力助發三摩鉢提之變化故云齊修後以禪那斷除煩惱故云後修西蜀復庵暉禪師曰六雙頭獨足觀也白澤圖中有山精頭如皷有兩面前後俱見此喻靜幻雙照二利齊運如雙頭也單寂觀如獨足也若諸菩薩以至靜力資發變化齊標靜幻以至靜力資助䇿發變化之力以度眾生也後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那者此寂也前二利備故入中道此段與前段經文異前則靜獨為初後始單修於寂也此則靜與幻齊為初後始兼修幻寂也欲易見者前則上單下雙此則上雙下單此是齊修後修第二輪也四明聰講師曰九具足修齊修空假後修中以至靜體真止亦云空觀力強復兼假觀方便隨緣故云資發變化以中為體復修禪那破無明惑若諸菩薩以至靜力用資寂滅後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提先以奢摩他之靜力資助禪那之寂滅故云齊修後起三摩鉢提之作用變化世界故云後修西蜀復庵暉禪師曰七菓落花敷觀既以靜定之樹結寂滅中道果後花敷者復以幻觀入有情界度諸眾生同令獲得涅槃之果若諸菩薩以至靜力用資寂滅齊滅也後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提兼幻也此是齊修第三輪也四明聰講師曰十具足修齊修空中後修假以至靜體真止亦云空觀力強以中觀潤之用資寂滅後以假觀變化現前世者世有方位界者界有界分且如釋迦於娑婆有緣來此隨方度生若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他先以三摩鉢提之幻力隨順故云先修後取奢摩他之至靜故云後修西蜀復庵暉禪師曰今初先武後文觀也謂武王先興兵收伐紂王之後倒載干戈歸馬於華山之陽放牛於桃林之野鑄戈戟為農器偃武修文也喻此菩薩先變化種種隨順度脫眾生已後入靜觀若諸菩薩以變化力種種隨順此標幻而取至靜此菩薩者名先修三摩鉢提後修奢摩他靜也此是先後第一輪也四明聰講師曰十一雙修先假後空從此後七觀用假在前此先用變力度生隨所度處觀空入滅若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那先有三摩鉢提之幻力故云先修後取禪那之寂滅故云後修西蜀復庵暉禪師曰二功成退職觀也此喻如秀才及第之後於朝廷立大功成大名至於功成名遂身退拂衣歸閒依前只是舊時秀才也喻菩薩發惠利物度生畢即是功成習寂內修名為退職若諸菩薩以變化力種種境界此幻也而取寂滅此菩薩者名先修三摩鉢提後修禪那兼寂也此是先後第二輪也四明聰講師曰十二雙修先假後中此先用假觀出建立假故曰種種境界然後入真空涅槃故曰而寂滅居中道觀若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那先以三摩鉢提之幻力而作佛事故云先修中則安住奢摩他之寂靜故云中修後以禪那寂滅之道斷除煩惱故云後修西蜀復庵暉禪師曰三幻師解術觀謂先起變化作術法後歸靜體寂故曰解術幻靜此是先中後一輪也四明聰講師曰十三具足修先假中空後中以變化力而作佛事者此聖流出假化物如傅大士示迹於婺州雙林有妻有子種田作世間事若以俗眼觀之而自愧以道眼觀之無非佛事安住寂靜者彌勒兜率內院常說妙法身在人間而內院不動古云顛狂彌勒到明州布袋橫桃柱杖頭饒汝化身千百億一身還有一身愁若諸菩薩以變化力無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他先以三摩鉢提之幻力無礙作用故云先修中以禪那寂滅之道斷除煩惱故云中修後則安住於奢摩他之至靜故云後修西蜀復庵暉禪師曰四神龍隱海觀謂起幻化生如神龍布雲也歸體入靜如隱海也此先中後第二輪也四明聰講師曰十四具足修先假中中後空此菩薩先用假化度眾生皆以變化無礙作用如持地菩薩常居渡船處入水與人搬擔種種作務唯取一錢豈不至靜而取佛道若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那先以三摩鉢提之幻力方便作用故云先修後則奢他之至靜及禪那之寂滅悉皆隨順修習故云齊修西蜀復庵暉復禪師曰五龍樹通真觀也謂先起幻後歸寂如龍樹初行幻術廣化邪途後習真乘自階聖果其名龍樹者傳鐙云西印度城北有大樹蔭覆五百大龍其樹王名龍樹常為眾說法初入佛道之時九十日念盡如來一代時教遂高聲唱言孰謂如來言教廣博遂入龍宮誦出下本華嚴十萬餘偈今現傳於世者也此先齊第一輪也四明聰講師曰十五具足修先修假齊修空中以變化力并方便正是止名方便隨緣止即假觀假觀為先鋒空中為中軍故云至靜寂滅空中觀即體真息二邊為止二俱隨順也若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那先以三摩鉢提之幻力種種起用資於奢摩他之至靜故云齊修後以禪那寂滅之道斷除煩惱故云後修西蜀復菴暉禪師曰六商那示相觀也商那和修即優波毱多之師也先以神力示相降伏毱多弟子慢心後乃入定歸寂此是齊後第二輪也四明聰講師曰十六具足修齊修假空後修中先假觀空觀二觀皆依中道而起種種變化至靜空也若諸菩薩以變化力資於寂滅後住清淨無作靜慮此菩薩者名齊修三摩鉢提禪那後修奢摩他先以三摩鉢提之幻力資於禪那之寂滅故云齊修後以奢摩他安住清淨不起靜念故云後修西蜀暉禪師曰七大通宴默觀也大通如來即佛也先用利物後則歸寂此齊後第三輪也後七輪一一標寂為首次兼餘二四明聰講師曰十七具足修齊修假中後修空變化用假觀資於寂滅中觀也無作靜慮空觀也假中即是體用也復入空復入靜慮可謂坐籌惟幄有決勝千里之功若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他先有禪那寂滅之力故云先修後起奢摩他之至靜住於清淨故云後修西蜀復庵暉禪師曰今初寶明空海觀也佛頂經云同入如來寶明空海今靈心觀即本覺明如寶明也後靜觀如空海也又寶明即慧空海即修此是先後第一輪也四明聰講師曰十八雙修先中後空此去七觀用中在前此聖用中道即圓覺一性也此性不守發而為靜為空破一切相蕩一切法凡起修以此觀照之立一切法無法不足若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提先有禪那寂滅之力故云先修後起三摩鉢提之作用隨順一切故云後修西蜀復庵暉禪師曰二虗空妙用觀也謂靈心之體如虗空起化即妙用此先後第二輪也四明聰講師曰十九雙修先中後假此聖用中道寂滅理上而用假故云而起作用於一切境用中道照之故云寂用隨順辦一切事無事不辦若諸菩薩以寂滅力種種自性安於靜慮即起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提先以禪那寂滅之力故云先修中則種種自性安於奢摩他之靜慮故云中修後則起三摩鉢提之變化故云後修西蜀復庵暉禪師曰三舜若呈神觀也出楞嚴經舜若即虗空神遇日光映之暫現如修此觀先寂次靜後幻此先中後第一輪也四明聰講師曰二十具足修先中中空後假此從中道第一義諦起種種自性差別亦用空觀發用如火得空則明水得空則瑩變化萬端攝化一切即假觀之力若諸菩薩以寂滅力無作自性起於作用清淨境界歸於靜慮此菩薩者名先修禪那中修三摩鉢提後修奢摩他先有禪那寂滅之力故云先修中則不動自性起三摩鉢提之作用故云中修後則清淨境界歸於奢摩他之靜慮故云後修西蜀復庵暉禪師曰四飲光歸定觀也即大迦葉亦云大龜氏昔為金師善明金性使其柔伏以金塗佛感得金色此觀先證神通後乃歸定也此先中後第二輪也四明聰講師曰二十一具足修先中中假後空此聖用中觀絕待為義妙一切法無越於中只常智無緣無緣而緣無緣大悲謂之無作自性雖起作用終歸於空作用假也如鍾在架扣之則鳴鍾者中道觀也鍾內中空空觀也扣之鳴假觀中空假三觀發用也如此若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提先有禪那寂滅之力故云先修彼則住於奢摩他之靜慮而起三摩鉢提之變化故云齊修西蜀復菴暉禪師曰五多寶呈通觀也以多寶佛先成道證真如體後於塔中發起出法華經中如靜幻無礙此是先齊第一輪也四明聰講師曰二十二具足修先中齊修空假先修中觀即秘藏包容種種諸法於諸法中常照而寂亦寂而照故云起於變化名不虗得若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提先以禪那寂滅之力資於奢摩他之至靜故云齊修後起三摩鉢提之變化故云後修西蜀復庵暉禪師曰六下方騰化觀也此下方騰化觀者出法華六萬恒沙菩薩從下方現此是齊後第二輪也四明聰講師曰二十三具足修齊修中空後修假此聖用中道寂滅力資於至靜中道如水至靜如清而起變化如水上波波亦無窮浪亦無盡其假也如是若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修禪那三摩鉢提後修奢摩他先以禪那寂滅之力資於三摩鉢提之變化故云齊修後起奢摩他之至靜故云後修清明境慧者至靜之中境智俱淨也西蜀復庵暉禪師曰七帝青含變觀也出華嚴偈云譬如帝青寶照物皆同色眾生見佛時同佛菩提色此寶含諸物像對即變應應而還空如靈心觀成包含德用應緣起幻而復安靜此是齊後第三輪也後一輪圓修三觀四明聰講師曰二十四具足修齊修中假後修空此聖流中道有力并假觀熏動資於變化至靜空觀如太清天清而且明安致是中左右逢原若諸菩薩以圓覺慧圓合一切以圓覺性中之智慧圓攝一切法也於諸性相無離覺性既是圓合一切則於種種性相皆不離圓覺妙性此菩薩者名為圓修三種自性清淨隨順觀齊修是名圓覺西蜀復庵暉禪師曰此名如意圓修觀有如如意寶珠四方俱照大智頓覺三觀齊修然如意珠世人得者一切所欲皆如其意應心所求無不皆現今圓修此亦復如是於諸法中舉體相即無不同具於諸性者即靜觀相字即幻觀覺性即中道寂滅觀以圓覺慧圓合一切者此是從體起用於諸性相無離覺性者此是會歸體也謂若菩薩用廣大靈明圓覺之慧圓融和合一切或理或事或性或相或真或妄或色或空或本或末種種諸法舉體全真以何義故良由以覺合理理即非理故全即事又由以覺合事事即非事故全即理到此境界全理全事全性全相全真全妄全色全空全本全末全得全失全彼全此雙遮雙照體用無二寂照同時是為圓融無上妙覺此菩薩者下皆結名也四明聰講師曰二十五圓修三觀三止此菩薩圓修三觀三止以圓覺慧圓合一切者圓覺即中道第一義諦亦名常住真心亦云性淨明體亦云本覺亦云空如來藏亦是法華經藏修而顯之具一切名通一切法在迷為惡為愚為癡為三毒為婬怒癡性為殺為盜為邪見為魔為諸阿顛迦為昏鈍性障為性惡具無量名為之性惡法門也今言為佛為圓覺就修顯立名為真諦為俗諦為真俗不二為中道為真諦者即凡聖色聲因果等法皆無自性謂之性空亦非研究而空乃本來空也是名空觀也俗諦者於性空中具足諸法無所不遍自佗無礙毫剎含容亦即假觀本來具也然此真俗不二無二也混而為一而未甞為一離而為二未甞二也當知即中道觀也此二諦觀即圓覺性寂而照照而寂圓合一切於諸性相者性真諦也相俗諦也亦向真俗二諦二諦即一豈離覺性以覺性遍在一切眾生心中生即是佛也以眾生心中覺性在佛佛即眾生生即是佛佛即是生生佛平等覺性在地獄地獄即佛佛即地獄其鬼畜生人天何莫由斯於一切法上用三觀照之了之於身心脫之見解非今始悟由本不迷佛也生也一而已善男子是名菩薩二十五輪一切菩薩修行如是菩薩修行不出此二十五輪唐僧惟慤以此二十五輪為二十五觀第一名澄渾息用觀第二庖丁恣刃觀三呈音出礙觀四運舟兼濟觀五湛海澄空觀六首羅三目觀七三點齊修觀八品字單双觀九獨足双頭觀十菓落花敷觀十一先武後文觀十二功成退職觀十三幻師解術觀十四神龍隱海觀十五龍樹通真觀十六商那示相觀十七大通宴默觀十八寶明空海觀十九虗空妙用觀二十舜若呈神觀二十一飲光歸定觀二十二多寶呈通觀二十三下方騰化觀二十四帝青含變觀二十五如意圓修觀四明聰講師曰此二十五輪本被機修證若論機緣入道若權若實若偏若圓有利有鈍何止二十五經中自云若論菩薩於一輪中有若諸關涉多少故不能窮理盡情也今括出二十五輪于后御註中具出一單修奢摩他專修靜觀二單修三摩鉢提專修幻觀三單修禪那專修寂觀四先修奢摩他至靜後修三摩鉢提妙行五先修奢摩他靜慧後修禪那斷煩惱出生死六先修奢摩他靜慧中修三摩鉢提幻力後修禪那寂滅七先修奢摩他靜力中修禪那斷盡煩惱後修三摩鉢提妙行八先修奢摩他靜力齊修三摩鉢提幻行禪那斷滅煩惱九齊修奢摩他靜力三摩鉢提變化後修禪那斷除煩惱十齊修奢摩他靜力禪那寂滅後修三摩鉢提作用變化世界十一先修三摩鉢提幻力後修奢摩他至靜十二先修三摩鉢提幻力後修禪那寂滅十三先修三摩鉢提幻力中修奢摩他寂靜後修禪那寂滅十四先修三摩鉢提幻力中修禪那寂滅後修奢摩他至靜十五先修三摩鉢提幻力齊修奢摩他至靜禪那寂滅十六齊修三摩鉢提幻力奢摩他至靜後修禪那寂滅十七齊修三摩鉢提幻力禪那寂滅後修奢摩他安住清淨十八先修禪那寂滅後修奢摩他至靜十九先修禪那寂滅後修三摩鉢提作用隨順一切二十先修禪那寂滅中修奢摩他靜慮後修三摩鉢提變化二十一先修禪那寂滅中修三摩鉢提作用後修奢摩他靜慮二十二先修禪那寂滅齊修奢摩他靜慮三摩鉢提變化二十三齊修禪那寂滅奢摩他至靜後修三摩鉢提變化二十四齊修禪那寂滅三摩鉢提變化後修奢摩他至靜二十五圓修三種自性清淨隨順若諸菩薩及末世眾生依此輪者當持梵行寂靜思惟持梵行者持佛戒行也寂靜者自澄其心也思惟者審察邪正也求哀懺悔經三七日恐為業力障蔽淨心故求哀懺悔以二十一日為期也於二十五輪各安標記至心求哀隨手結取如探籌然不可揀擇依結開示便知頓漸結得前單修三輪及圓修一輪即是頓門結得餘二十一輪即是漸門一念疑悔即不成就苟有疑悔之心觀行終不成就西蜀復庵暉禪師曰此總示修習梵行淨也此即戒學寂靜者此即定學思惟即慧學此是三無漏學也大凡學道之人莫不皆因三學而從凡入聖有如莊子云泰字定發乎天光與此同旨謂修此二十五輪之時於事相中威儀法式及用心方便必須持戒防非止惡入定對治動亂發慧辨別邪正是非真妄等法如是修習必定成佛倘若觀中有礙宜須於三七日中求告哀投十方諸佛懺露先罪改往修來書寫二十五輪名字文句安置道場之中禮念虔誠精祈一行若是於三觀之中已的樂修一觀者即便隨意修習更不必求若心於猶豫不決勝劣難分即當憑仗聖力以卜之不宜揀擇但依所捻結開而看之而頓漸自知休貪別觀若更懷疑則失前功不可等閑輕於事相也四明聰講師曰此示菩薩末世眾生須依教修之若不依輪次終成虗設梵行者即不婬慾淨身業也寂靜淨口業也思惟淨意業也三業清淨隨智慧行為之求哀懺悔經三七日者尅期也二十一日中精進謂之尅時破障域意修真二十五輪各安標記至心求哀此言凡夫淺識觀力未著須依事相如假船過渡用筏到岸書二十五名於籤上於佛前誠心禱之乞求冥力加被勿起少疑心祈禱懺悔已至於三七日誠心深固為之即非造次然後信手抽籤不宜揀擇依結開示或頓或漸依教修行若自的樂一門隨便修習既勝劣難分不能自決故憑聖力以卜應修當即依結以修無得復貪餘觀若單修一輪并圓修三觀者此名為頓若兼修互修者此名為漸此漸非漸教之漸此則同以圓覺發觀之始同緣實相同以上品寂先為觀體但根有利鈍證有先後為之漸也不問遲鈍聰利但心懷疑悔即不成就也爾時世尊欲重宣此義而說偈言辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生所謂奢摩他三摩提禪那三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順一切諸菩薩及末世眾生常當持此輪隨順勤修習依佛大悲力不久證涅槃西蜀復庵暉禪師曰偈中二偈標意及觀綱也次一偈結因後二偈揀示云唯除頓覺人并法不隨順此二句長行既無此偈即顯謂獨除却上根圓頓悟解之人并及於一切定相之法不隨順者則不必依二十五輪及道場探結等法不隨順者不取相也既不隨相即隨真覺此乃頓入圓明觸目合道遇緣即宗本自無傷不可加之以繩索也是知前普賢章知幻即離不作方便等類故揀之矣又下文云隨順勤修習者此指下根人前不隨即不隨倒法此不隨即不隨正法若下根之人其可不隨正法乎後六句總示也四明聰講師曰偈與長行無異義也有唯除頓覺人并法不隨順二句不免重釋圭峰云唯除上根圓頓悟解之人并及於一切定相之法不隨順者則不必具依二十五輪及道場探結等不隨順法者不取相也既不隨相即隨真覺此乃頓入圓明觸目合道不可加之以繩索無瘡自疣也是前知幻即離不作方便等類故云唯除之矣釋迦老子性顛蹶蜘蛛網撈水底月辨音不解拈金彈斷貫索繫天邊鴈二十五輪更互修得便宜處便垂鈎錦鱗不在𮈔輪上莫向烟波深處求唐圭峰定慧禪師宗密頌辨音菩薩章曰辨音又問幾般輪幾種脩持可證真單複圓門雖有異靜幻寂觀要區分各安標記欲探結先莫求哀悔罪根二十五輪依幻覺無修習處示修因辨音菩薩章終八
