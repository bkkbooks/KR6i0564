body:
  text: 四明聰講師曰金剛藏菩薩因文殊問如來本起因地覺心要與常住果位名目相應謂菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智等因地之覺果位藏性相容相通無明法性本來不二故得金剛藏以迷難悟以事難理以因難果以生難佛是以來意若斯於是金剛藏菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰此徵釋迷悟始終金剛者從喻得名金剛不取青黃大小貴賤等唯取其金剛體上有堅義利義金剛之體堅一切物不能壞金剛之用利能壞一切萬物今此菩薩之智亦然此之智體堅一切煩惱不能侵一切魔境不能動此之智用利能斷疑能遣障能證體能起用藏者有含攝義能斷疑盡即具一切無量功德故曰藏良由行人於普眼章中入觀觀中遂起三重難難佛互相發揚以消末世之疑故當此菩薩請問大悲世尊善為一切諸菩薩眾宣揚如來圓覺清淨大陀羅尼因地法行漸次方便與諸眾生開發蒙昧在會法眾承佛慈誨幻翳朗然慧目清淨此菩薩讚佛於前三章善說因地法行漸次方便西蜀復庵暉禪師曰此乃慶悟也因地者躡文殊章問本起因地此是一切行位之根本後必躡前也蒙昧者蒙則蒙蔽昧則昏昧楊氏曰天降生民倥侗顓蒙恣子情性聦明不開承者受也幻翳者幻喻生死之相翳喻無明之執慧目者即根本智此智達理照一切法無不清淨四明聰講師曰於是金剛藏菩薩至慧目清淨者啟發之初爭得不敘由來蹊逕請法式儀例如前釋世尊若諸眾生本來成佛何故復有一切無明此是設第一問也若諸無明眾生本有何因緣故如來復說本來成佛此是設第二問也十方異生本成佛道後起無明一切如來何時復生一切煩惱此是設第三問也十方異生者十方世界異類眾生也西蜀復庵暉禪師曰此金剛藏起三疑難問佛一疑真能生妄二疑說妄為真三牒而縱之責無窮過也世尊若諸眾生本來成佛者此是躡前普眼章中聞世尊云始知眾生本來成佛二句也何故復有一切無明者此二句是疑真能生妄也若諸無明眾生本有何因緣故如來復說本來成佛者此五句是疑說妄為真也謂世尊既說一切眾生本來自成佛了以何義故如今現見一切眾生妄認四大為自身相六塵緣影為自心相於一切處一切時觸境對事依前却有無明煩惱耶莫是真能生妄否若謂一切無明煩惱眾生本性上本來自有之時便說作佛不得又以何義故世尊却說一切眾生本來自成佛了何故如此自語相違友復不定耶莫是說妄為真否第三牒世尊說縱起無明便舉十方如來已成佛了不知幾時却生煩惱如是責難於世尊也十方異生本成佛道二句是牒也後起無明一句是縱也一切如來何時復生一切煩惱者此六句責無窮之過十方異生者即十法界中眾異類生也謂且說十法界中異類眾生人人具足箇箇圓成先成佛了後方起一念貪瞋癡無明煩惱之時此說且置一邊只如三世諸佛十方如來如今都已成佛了又不知從此去幾時再起無明煩惱耶且十方諸佛已成聖人豈有復為凡夫乎下文佛答非為正問也然剛藏非真有此疑蓋為後代之人起疑生正信也四明聰講師曰此之三疑乃因聞普眼章始知眾生本來成佛慈室云成佛者佛即覺也一切無明者無明不覺也覺與不覺不可並立眾生既本是佛佛即覺也何故云復成不覺此第一疑又無明若本來是有無明是不覺又如何復云眾生本來成佛佛即覺也又云本來是佛又云本來無明無明與佛言不並出此第二疑此且指一人有覺有不覺下疑十法界眾生十方即十界若十法界異生始自諸佛下至地獄本來已成佛了何故後來復起無明一切如來何時復生一切煩惱此第三疑今別出楞嚴經中富樓那亦有此問大同此意彼經云世尊若復世間一切根塵陰處等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始富樓那亦云滿慈子再問言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相無狀即無故也如來今得妙空明覺山河大地諸有為相何當復生若此妙覺本妙覺明與如來藏心不增不減金剛藏云十方異生本成佛道是同又云後起無明富樓那云無狀忽生山河大地等是同金剛藏云如來何時復生一切煩惱富樓那云如來今得妙空明覺等是同但金剛藏所問唯屬因富樓那所問兼因果有此之異惟願不捨無遮大慈為諸菩薩開秘密藏開秘密藏者開說秘密佛語也其妙義廣大無盡故名曰藏及為末世一切眾生得聞如是脩多羅教了義法門正謂圓覺了義一經永斷疑悔永無疑惑退悔之心作是語已五體投地如是三請終而復始西蜀復庵暉禪師曰秘密藏者有秘藏有密藏秘藏者如不開櫃密藏者說一切法中含一切法今文不簡末世眾生則是開秘藏顯了而說則是開密藏疑則於真諦理中生二心猶豫也然此疑有三種一疑自二疑師三疑法譬如有病之人疑自疑醫疑藥若如此者則所患之病終不能愈今剛藏之疑乃疑法也悔是不定之辭悔善則惡悔惡則善今是悔惡也爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來甚深秘密究竟方便是諸菩薩最上教誨了義大乘能使十方脩學菩薩及諸末世一切眾生得決定信永斷疑悔汝今諦聽當為汝說時金剛藏菩薩奉教歡喜及諸大眾默然而聽善男子一切世界始終生滅前後有無聚散起止圓覺大疏曰創變為始極證為終新新而起曰生念念落謝曰滅過去名前未來名後現在住劫名有空劫名無成劫名聚壞劫名散現行為起調伏為止念念相續循環往復種種取捨皆是輪迴不斷始終生滅等念雖能取真捨妄取淨捨塵亦皆是輪迴之見西蜀復庵暉禪師曰答中總標輪迴之所以一切世界者此世界通舉有情世界并器世界有情者即眾生器世界即山河國土何以知之此世界二字通指情器如金剛經十三分所說三千大千世界所有微塵天親論以世界為器世界無著論以世界為眾生受想行識四蘊之心以微塵為眾生一蘊之色以此證之是知今經世界二字通舉有情與器二世界也始終生滅者此二對屬情世界并器世界也前後有無聚散者此三對唯屬器世界也起止者此一對唯屬有情世界也始謂創變謂一切眾生於本覺上一念不覺動心便成業相轉相現相此迷真逐妄也終謂極證謂一切眾生因遇佛教如說脩行斷疑遣障地位滿足捨微細煩惱成等正覺生謂新新不住滅謂念念落謝前謂過去後謂未來有謂住劫無謂空劫聚謂成劫散謂壞劫起謂現行之念如金剛說現行疑同止謂端坐調身調息捺伏其心上說有情無情世界皆因一念妄心分別相續不斷而有便見器世界成了復壞壞了復成有情世界生了復死死了復生所有一切眾生或業襲習報應輪轉改形易質受種種苦塵沙劫波莫之遏絕其間或取我身或厭離我身或捨麤障或取淨妙或厭生死或取涅槃或厭捨娑婆或樂生淨土或捨有或取無種種生心動念此之妄念便結云皆是眾生顛倒輪迴繫縛不能出三界之心也問極證則出輪迴何以總結云皆是輪迴耶答此六對皆是所計之幻境能計之心是輪迴故所計之境亦流轉也未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處在輪迴中辨別圓覺其圓覺性亦屬輪迴若更起念欲免輪迴則妄上增妄了無是處西蜀復庵暉禪師曰此真隨妄轉謂若用前始終生滅前後聚散起止種種取捨不出輪迴三界之心明辨如來廣大圓覺之時便妄見如來圓覺之性亦同妄心有始有終有生有滅有前有後有有有無有聚散起止動轉流散然而圓覺之性本不會流散動轉但是不合將妄心湊泊妄見耳譬如世人將筯攪水中之月一般正當攪時却見水中之月百雜千碎隨手中筯流轉而本月何曾動靜今行人若將妄心湊泊圓覺真性欲起夢幻出輪迴如此用心一時錯了豈有是處此上經就法說之也四明聰講師曰金剛藏問因上文眾生本來成佛之語遂出三疑佛今答之且從近事故云始終生滅前後有無聚散起止此言器世界下至風輪風馳水水馳火火馳金遂立世界若有情世界即世人之色身四大五蘊六根塵入等上至佛下至地獄皆是有情世界此二世界有情無情亦謂之依正二報有始有終有生滅有前後有無聚散有起止如是六雙生滅之境念念相續種種取捨究理言之總是眾生無始無明業識無明未破順業輪迴趣生趣死無有休息若將此無休息之心欲辨圓覺則此圓覺隨眾生心轉加不休息譬如動目能搖湛水妄念不停迷惑本性如動目之能搖湛水也又如定眼猶迴轉火性為妄念所惑如定目之見火輪安得不隨而轉也雲駛月運舟行岸移亦復如是雲舟諭妄念月岸諭本性妄念未息本性似乎不定西蜀復庵暉禪師曰次就喻眼轉火者即以手搓火成輪此蓋眼識遲鈍妄見成輪駛者奔流急走之義此四克取親所見之物為喻然水成波火成輪但是眼目定動喻於圓覺見凡見聖但是流轉妄心岸移月運但是雲駛舟汙亦同此意亦復如是一句總結四喻合前法也此四喻亦如行人將未出輪迴妄心而明辨圓覺便妄見圓覺之性亦同流轉然此四喻不必配法但用眼前可見之物譬之令其易曉四明聰講師曰動目定眼雲駛舟行此四譬妄動也水火月岸此四喻真性也真即圓覺妄即無明無明業識未斷圓覺隨妄轉為迷作眾生者破此無明業識為之悟則無明不覺轉為覺皆是無明業識次第相番入海筭沙若非直截何時得了善男子諸旋未息彼物先住尚不可得諸旋者眼目雲舟也彼物者水火月岸也謂眼目雲舟其動未息則水火月岸安能先住何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復西蜀復庵暉禪師曰此一段文先合喻次合法諸旋未息彼物先住尚不可得者此合喻也諸旋者指喻中眼目雲舟彼物者指水火月岸也眼目雲舟喻前始終生滅等生死垢心水火月岸喻圓覺世尊告金剛藏云且如世間之人不肯住自只要湛水不搖動尚不能得又如定却眼睛只要搓火不成輪尚不能得又如天上雲奔流急走不肯住只要月不運行尚不能得又如江河水上之人不肎住船只要兩岸先住尚不能得此皆是世間容易麤淺不難之法尚自千難萬難要他先住尚不可得又豈況凡夫之人直將無量劫來始終生滅前後有無聚散起止種種取捨分別計度輪迴生死垢污之心求見十方諸佛廣大不可思議清淨圓覺境界如何得不妄見佛之圓覺不隨汝等妄心旋復流轉耶是故汝等便生三惑未能淨染污之心復圓覺之性前之三惑安得不生三惑者金剛藏之三問是也西蜀復庵暉禪師曰此結指前疑以是上來所說因由之故剛藏等便生三疑一疑真能生妄二疑說妄為真三疑先真後妄上來之文且是佛先為剛藏等標舉建立答問之義使令息如上之念即前疑自亡也下文將空花一喻通答三疑金鑛一喻別答第三疑牒而縱之責無窮過也四明聰講師曰善男子至便生三惑彼物先住者諸家釋意不盡此說小乘生死涅槃且二乘住真諦理此真如鍮非真金也又是無明未盡菩薩直到等覺隣真亞聖尚用入重玄之門倒脩凡事如布袋豐干寒山拾得皆是倒脩凡事若以四十二品無明節節破之彼物亦可節節先住真既未滿故喻尚不可得況凡夫眾生所見思惑未斷纖毫常居迷悶無明業識如大石壓草要顯圓覺今之善知識者脚未蹈實地得少知見便生上慢訶佛罵祖可謂自作孽也似此之輩如稻麻竹葦彼物先住者又是解心虗通未入品位亦是菩薩為解礙如西竺有一羅漢遊俗姓家見教子不利打罵不已尊者大笑彼云比丘慈悲為念見我打子反貽笑耶問曰汝為何打子曰教讀聲明論不利曰論是誰造曰古仙人造仙人在否曰不在既不在打之何益尊者曰即汝此子便是仙人是他所造曰何以教之不利曰虗妄心上發少聰明都屬虗妄如人居暗室未獲燈光滿室皆暗忽獲燈光室內蹔明油盡燈滅其暗復存汝豈不聞昔南海邊有枯木五百蝙蝠穴居其中忽五六人疲宿樹下時遇冬寒拾柴向火中有一人念阿毗達磨翻無比法梵音深遠五百蝙蝠諦聽樂聞忽樹梢煙焰發生五百蝙蝠為火閉死其神生一國土為五百男子出家證阿羅漢造大毗婆沙論者即彼五百蝙蝠貧道預其一也學不達性不破無明仍落生死入無明鄉昔佛在世四禪比丘得四禪定謂證四果以自誑故墮阿鼻獄學圓覺者須要深細求善友決擇不可自任善男子譬如幻翳妄見空華幻翳若除不可說言此翳已滅何時更起一切諸翳幻翳既滅不可說言何時更起者正答金剛藏所問如來何時復生煩惱之說何以故翳華二法非相待故翳非待華而有華非待翳而生西蜀復庵暉禪師曰幻之一字若據圭峰疏云謂不知華因翳有妄執華從空生推此之意謂譬如世人眼纔有翳便見空中有華法上心若有妄便見輪迴所謂一翳在眼千華亂空一妄在心河沙生滅謂眵有患翳使見空中有華眵翳若差空華即滅既滅之後又不可更說此眼翳已除不知此去幾時眼中更生翳耶譬如人睡起夢覺又更云何妨明夜再夢今此翳差華亡眾生即佛人罕能知又徵云以何義故不可說此翳更起耶却為眼中翳纔差而空中便無華此之二法同時而起同時而滅非是一箇先去一箇尚在此相等待決無此理翳喻無明華喻生死如眾生若有無明執心便見有生死此心若除便見無生死豈可此無明去後又有生死者也所以圭峰云眾生本自不生空華畢竟不起莫將翳待莫以迷求此之謂也亦如空華滅於空時不可說言虗空何時更起空華空華既滅不可謂何時更起者正如妄念既空不可謂何時更有也何以故空本無華非起滅故空華本無安有起滅西蜀復庵暉禪師曰前說翳不再起此說華不再生乃是通答前剛藏三疑謂又如空華在虗空中滅了汝等又不可更作此見解以謂空中此去幾時更再起華徵云以何因由所以之故不得言空華再起耶為虗空中本自無華既本不曾有華必無華起華滅之理今法上亦然十方諸佛成等正覺之後豈更再作凡夫圭峰云空華既不再起果位何得再迷生死涅槃同於起滅彼空中華實無起滅生死涅槃亦復如是妙覺圓照離於華翳證圓覺者心境兩空如彼淨目了無華翳西蜀復庵暉禪師曰此將法合喻云但是眾生迷時見有生死如空華起悟時見有涅槃如空華滅但是見有凡夫見有聖人並是生心動念即乖法體失正念故殊不知十方諸佛不思議妙覺圓照之體本無眼翳之無明本無空華之生死所以楞嚴經云真淨界中云何更容他物憚宗云去他家無如是事四明聰講師曰善男子一切諸翳金剛藏以因難果以迷難悟眾生在因也若本來成佛是果也眾生在因若便是佛如花即是果故有花果同時之疑若本是佛何故復有一切無明既成佛了復作眾生莫是顛倒又難眾生無明既是本有何因緣故如來復說本來成佛却見眾生即佛愈加其惑本只二疑為迷真重者解黏去縛種種取喻所疑只是幻翳與空華二物楞嚴云猶如狂華非從空來非從目出若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅若目出者既從目出還從目入即此華性從目出故當合有見若有見者出既華空旋合見眼若無見者出既翳空旋當翳眼究論相狀無物為空無物為華空華本無亦非今有為之空華乃眼病見有欲除空華須去眼翳翳既去已空華自亡喻意見生佛者都是眼翳眼翳若去無佛無生何以故翳華二法至離於華翳者此明翳自眼生華自空有此二各不相知若二物相對謂之相待此二非相待而有何以故華自空生翳在我眼即非相待又復虗空元本無華亦非待翳而生只可於翳上尋華不可於空中而取蓋空本來不曾生花但愚者迷自翳之華取空中華相如渴鹿見陽焰謂是水奔之終非水也又只如華滅不識翳消復更於華滅處云此華滅後何時更生向本是愚今愚復甚故云何時更起空華此翳在眼但除眼翳不須問華但破無明業盡佛道現前圓覺自顯亦不須問今已成佛何時再作眾生再起無明華生華滅自翳中有不在虗空虗空本無華相亦非起滅當知凡夫生死二乘涅槃此二同於華翳若大乘菩薩脩圓頓行以性奪脩名無作行皆是性惡法門直指華翳生死涅槃本如來藏即大圓覺可謂熱𨫼不留故蚋足紅爐豈容片雪存斯之謂歟善男子當知虗空非是暫有亦非蹔無況復如來圓覺隨順而為虗空平等本性虗空歷劫不變非乍有乍無也況圓覺本性與虗空一等湛然真常豈有變易西蜀復菴暉禪師曰列子云天地乃是有形中之最巨者空中之細物此謂萬物雖有形狀不如天地之形最大若以萬物觀之則天地為大若以無邊虗空觀之則天地未足為大乃是虗空中之細物爾何也謂虗空又包却天地據他道道教所談止此而已今我佛於楞嚴中說則又不然經云空生大覺中如海一漚發謂虛豁無知無覺頑空生在十方諸佛廣大靈明圓覺妙性之中如大海中一浮漚或沉或浮相似大海即喻妙覺一漚即喻虛空是知此說又過於列子之說故殻法師云首楞嚴嘆虛空之水圓覺嗟法性之寬比之常談海形牛迹若以尋常列子之說比於世尊之說世尊之說如海之形廣大深遠無窮無盡列子之說如牛迹之狹其淺有限謂汝等須知外面頑空乃是世間麤淺之法尚不同空花蹔起蹔滅蹔去蹔來何況諸佛廣大真實常住隨順圓覺之性而能與虛空混同一體無二無別平等之性豈有同凡之迷同二乘之悟如空花起滅耶此意明覺性無迷無悟無染無淨無去無來無生無滅湛然常住廓爾無私裏許無一絲毫許是生滅法永嘉云火千世界海中漚一切賢聖如電拂四明聰講師曰此言圓覺之性無起滅無去來非新非故非迷非悟非虗非實亘古今而不遷不變雖比虗空取虗空無邊際義無窮盡義即非覺性與虗空等楞嚴云十方虗空生汝心中猶如片雲點太清裏我心者圓覺妙心也含裹十方虗空在圓覺妙心內豈可言蹔有蹔無耶凡夫生死曰有二乘涅槃曰無大圓覺性非有非無非虗非實所以不入凡夫生死不居二乘涅槃楞嚴又云淨極光通達寂照含虗空與此大同故云況復如來圓覺平等本性而為虗空要見圓覺之虗空非今之虗空今之虗空屬顯色非是真空也善男子如銷金鑛金非銷有鑛本是金因銷而現非因銷而有性本是佛因脩而悟非因脩而得既已成金不重為鑛經無窮時金性不壞不應說言本非成就如來圓覺亦復如是鑛已成金永不變壞不可謂鑛本非真金也性已覺悟永無迷惑不可謂性本非圓覺也西蜀復庵暉禪師曰此再舉喻也如人以鑪冶銷去其鑛鎔出真金金在鑛中須假鎔出金既出後金性之體本自有之又不是因銷而後有若是因銷方有金者試將瓦礫土石等銷之又不見有金是知此之金性本自有之既然成金之後豈更有再作鑛之理假使經無窮之時此金性應無改變損壞楞嚴云又如金鑛雜於精金其金一純更不成雜到此謂之病去藥除鑛銷金見若如此之時不當說言此之金性本不成就上就喻說也如來圓覺亦復如是此二句就法合也意謂十方諸佛已於三祇脩鍊得成正覺更不再為凡夫也然剛藏前起三疑世尊遂以前段空華一喻通答三疑又以此段金鑛一喻別答第三疑牒而縱之責無窮過所以須將金鑛一喻別答第三疑者蓋第三疑疑諸佛成等正覺之後却再作凡夫此疑過患甚深所以別答之此兩喻如兩服藥相似脩行人皆要服之若世尊但用前空華一喻即令後代眾生闡提撥無因果迷悟之相便成邪見若但用金鑛一喻即令一切眾生本覺性上有染不清淨滯在脩習以謂自是凡夫未曾脩行如何是佛失真常理亦成邪見又前空華一喻對治太即病不即不離方處乎中道故也四明聰講師曰鑛中之金喻迷中有佛性也銷成之金喻悟中佛體也此二佛性體雖二而不二在迷此性不迷在悟此性亦非悟蓋此性本來不曾迷悟故在迷不迷在悟非悟故云眾生本來成佛眾生雖有佛性如鑛中金待銷鑛了出鑪後方復本來真佛性也眾生本佛法喻甚齊但眾生是理成未是事成欠緣了二因莊嚴脩證在諸佛已成如入鑪煅成之金有脩有證稱法界成始覺本覺一合無復分張如出鑪金故云不重為鑛也眾生理雖具如鑛中金尚在迷中謂之在纏如來藏佛是離鑛之金謂之出纏如來藏二如來藏體性不殊但分迷悟也眾生在鑛佛已成金又喻氷如鑛中金金喻氷中水如湯消氷氷還成水不應說言本非成就花能成果若不開花何由生果未有不花之果不果之花今取果義莫究花因既成果不重花如來圓覺亦復如是善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛圓覺性中萬法空寂菩提涅槃等皆是假名無妄輪迴及非輪迴妄入輪迴及出輪迴圓覺性中都無此事西蜀復庵暉禪師曰妙則染而不染圓者離相覺者不空心者常住真實之心何謂染而不染此圓覺性若在佛界之時即全同諸佛而圓覺之性不是佛若在菩薩界時即全同菩薩而圓覺之性不是菩薩乃至若是聲聞緣覺天人地獄餓鬼畜生即全同天人餓鬼畜生等而此圓覺性非聲聞畜生等此謂染而不染何謂之圓者離相謂此圓覺體上非青黃赤白陰陽高下長短方圓邪正等相此之謂離相何謂之覺者不空謂此圓覺性不是無知無覺虗豁斷滅頑空而裏許有大智慧光明義徧照法界義真實識知義清淨不變義常樂我淨義具足如是過於河沙無量無邊功德一時滿足此謂之不空也心者無像無名無依無住細入無間之中而不可言其小大包乾象之外亦不可語其寬處聖稱真在凡號俗如金作器隨器得名在指曰鐶飾臂曰釧不可以智知不可以識識此謂之心也此是先標十方如來圓覺妙心為宗下方拂迹也本無菩提及與涅槃者謂因地轉煩惱果上證菩提因地轉生死果上證涅槃此是二轉依號此名皆是因妄而得而圓覺中本無此事又成佛不成佛輪迴非輪迴兩對四隻皆是對待之法而覺性之中亦都無此若存少見則迷圓覺華嚴云於法若有見此則未為見若無有見者如是乃見佛圭峯云靈靈自覺元無物擾擾他緣盡是空四明聰講師曰楞嚴中富樓那以生滅難如來藏云清淨本然云何忽生山河大地與此金剛藏疑眾生本來成佛何故復有無明一同如來答云一切世界始終生滅若常住真心自所證法則無生無滅故彼經云我以妙明不生不滅含如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毫端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性而如來藏本妙圓心不生不滅即斯之義今云本無菩提及與涅槃義理一貫岳師云當知用雖萬變體實無渝是由天動星迴辰極鎮居其所璇璣輪轉衡軸常執其中能知此者則知本無菩提涅槃成與不成輪迴及非輪迴皆歸如來大圓覺海善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃聲聞者聞聲教而悟者也所圓境界者所悟境界也以彼所悟境界雖灰身滅智亦不能造佛寂滅之妙西蜀復庵暉禪師曰聲聞之人皆於鹿野苑請佛三轉法輪聞聲悟道故曰聲聞三轉法輪者初曰示轉二曰勸轉三曰證轉初示轉者佛告云此是苦此是集此是滅此是道次勸轉者此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應脩次證轉者此是苦我已知此是集我已斷此是滅我已證此是道我已脩此謂之三轉法輪也此聲聞之人於音聲中而得開解聞佛宣說苦集滅道四諦法門於是悟道今且將此比較謂聲聞圓脩有餘涅槃并無餘涅槃之境界不執四大五蘊妄身并六塵緣影妄心一切所有為言句皆悉斷滅無執著之心一向沉空滯寂灰身滅智如此脩行尚不能造到聲聞親證所現有餘涅槃并無餘涅槃也有一種聲聞人作如是言我梵行已立所作已辦不受後有已出三界已無生死不妨留此身飛行自在與一切眾生供養此謂之證有餘涅槃所以肇云餘緣不盡餘迹不泯業報猶魂聖智尚存又有一種聲聞人作如是言我梵行已立所作已辦不受後有已出三界已無生死安用此身於是自放三昧火焚之歸無此謂之證無餘涅槃所以肇云夫聖人灰身滅智掃形絕慮內無機照之勤外息大患之本超然與群有永分渾爾與太虗同體冥冥長往莫知所之問既是聲聞人身心語言皆悉斷滅何故楞嚴經云如何三有眾生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見耶答二經意同但語別爾蓋二乘人於今經中斷滅所知之心尚不能證自己之道豈況楞嚴經中許有所知用世語言入佛知見愈不許也何況能以有思惟心測度如來圓覺境界西蜀復庵暉禪師曰前證我空之理及證我空之智是聲聞小乘人如此加功練行忘情泯迹脩行尚未能到豈況凡夫之人直用前始終生滅前後有無聚散起止種種取捨未出輪迴思惟分別計度識心便要擬測度量十方諸佛廣大圓覺清淨不思議界中湛然常住廓爾無私亘古亘今不生不滅豈可以凡心測度也若根身器界種子許第八識緣若有漏無漏二法及四我許第七識緣若三性通內外一切差別之法許第六識緣若色聲香味觸許前五識緣此圓覺不可思議若以思惟心學法者譬如幻刀斫石若霧染空相似終不能得所以圭峯云百僚尚畏宰相百姓豈親天子百僚者喻聲聞宰相者喻所現涅槃百姓者喻凡夫思惟妄心天子者喻如來圓覺也古云自古上聖猶未到造次凡流那得知此二段文謂之舉聲聞之勝彰凡夫之劣凡事莫不勝從劣顯順由逆彰也四明聰講師曰善男子但諸聲聞至圓覺境界此一節經意只緣金剛藏本論圓覺妙心大圓鏡智本無生滅前後有無因聞上文眾生本來成佛興起問端以生滅心法難圓覺不生滅法吾佛欲打成一片生滅及不生滅凡夫諸佛生死涅槃地獄天堂皆歸第一義諦空如來藏於非相上滿足菩提空澄雲淨花咲鳥啼盡是正法眼藏涅槃妙心如是則金剛之所疑富樓那之所惑亦並不離見色聞聲若以色見我以音聲求我則行邪道只為聲色乃口齒之間無非生滅如何可極如來圓覺境界圓覺雖不屬見聞覺如亦不離見聞覺知故云不可以有思惟心而測度之亦不可以無思惟心而得之故今文斥聲聞緣覺所圓境界只局在身心經言不出斷滅之見肇云小聖灰身滅智掃形絕慮內無機照之勤外息大患之本超然與羣有永別渾爾與太虗同體冥冥長往莫知所之楞經云三有眾生及聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見如取螢火燒須彌山終不能著灰身滅智莫造佛地況以妄心測度佛境譬如須彌至高至大豈可以螢火燒之乎以輪迴心生輪迴見入於如來大寂滅海終不能至以此妄心生此妄見入佛寂滅終不能到寂滅之義廣大深妙故以海喻西蜀復庵暉禪師曰螢火即凡夫思惟妄心須彌山亦云妙高峯此喻圓覺然此山出水八萬四千逾繕那入水八萬四千逾繕那又安可用不真之火而擬燎者哉經云如人聚集於螢火欲燒四寶大峯巒縱使勤勞經累劫豈能損著一毛端楞嚴經云阿難汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空祇益自勞虗空云何隨汝執捉次文法合可見但寂滅喻圓覺境界也是故我說一切菩薩及末世眾生先斷無始輪迴根本佛謂妄念為輪迴本一切眾生當先斷念西蜀復庵暉禪師曰此勸止息思惟妄心根即舉喻喻如樹根也本即舉法愛為本也古云伐樹不盡根數數更生樹斷愛愛不盡數數得生苦四明聰講師曰螢火譬小聖之智聲聞緣覺約惑斷見思初證真諦理小乘涅槃所見佛只丈六之身窮盡八萬大劫若望極聖之智不啻螢火況螢光非火是光尚不能照身又安能燒物須彌之大螢光之小難能可知也小聖雖斷分段生死更有變易生死亦是輪迴心以生滅輪迴心終不能至如來寂滅海等覺後心四十二品無明斷盡入妙覺位如十五夜月更無斜光大覺之智智極於斯無始輪迴根本者始必對終無明終者終盡也至此妙覺根本無明盡矣永無生死遍法界證一切清淨故云三賢十聖住果報唯佛一人居淨土善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辯於佛境猶如空華復結空果展轉妄想無有是處六塵者色聲香味觸法也緣氣者虗妄色心從緣而現者也此心已如空華本不曾有況以此心辨別圓覺何異望空華之結實也西蜀復庵暉禪師曰有作思惟者即再顯前始終生滅前後有無聚散起止種種取捨思惟計度之心此心從第六意識上起問何故有此識心耶答為因有色聲香味觸法六塵之法遂牽引起中間能攀緣分別之心此心乃是真心上起一分緣慮影像妄心如水上之泡如鏡中像如空中之華此心常與真心氣分契合所以楞嚴會上慶喜執心而無據直得七處茫然此並不是真實之心體一似空中之華且空中華是實是虗耶只此自是一重妄想而脩行之者又不知覺悟却用此思惟妄心要求辨別明了十方諸佛廣大圓覺不思議境界却是兩重妄想如見空華已是不是又見結果又是一重妄想如此展轉相依一時錯了有甚是處所以楞嚴經云汝等皆是迷中倍人又云觀相無妄無可指陳猶邀空華復結空果誠哉是言得不銘心者哉四明聰講師曰法華云是法非思量分別之所能解有思惟心即是分別心也分別心即六塵緣影阿難認之為心佛咄叱之此非汝心此是法塵分別影事如此心病只在一有字不合存有心便落思惟若無心即無思惟行法云觀心無心法不住法又云我心自空罪福無主起信云離念相者等虗空界無所不徧法界一相即是如來平等法身空得盡處方曰離念非如木石之無心頑然之無性須知現前心識更不須改變別有新識心為離念但於日用中無我無人無眾生無壽者四見既無五蘊消落四大不拘將誰緣六塵影凡有一毫之相皆是虗妄若見非相即見如來非相者非凡夫生死相非聲聞涅槃相非有非無相是名實相到此魔界如佛界如一如無二如如此空華空果皆歸佛果有性無性齊成佛道古人云江谷春風吹不起鷓鴣啼在深花裏三級浪高魚化龍癡人猶戽野塘水善男子虗妄浮心多諸巧見不能成就圓覺方便妄心巧見障圓覺故西蜀復庵暉禪師曰此指金剛藏前三疑皆是無量劫來熏習顛倒病想分別虗浮不實特地生出巧偽之見終不得斷障遣疑證入成就十方諸佛廣大圓覺方便之法門也如是分別非為正問前之三問佛始曰善哉者美其起教終曰非正者顯其實理西蜀復庵暉禪師曰此結三疑謂於佛法中不是真正當理之問也四明聰講師曰即今見前日用念起者此是虗妄浮心此念不實為之浮心橫生是非為之巧見一念嗔心起百萬障門開一念菩提心佛道即可成十善菩薩發大心長別三界苦輪海龍女一念善心相應心純是法女便為男凡即成聖往南方成佛善里惡心謗佛見生身陷地獄古之所謂天堂地獄門相對只在人心一念中若起顛倒心生於巧見終不能成圓覺盖圓覺如美玉瑕不能染圓覺清淨穢不能入圓覺真實虗妄不入又須知圓覺之性即三千具德之生亦包藏一切善惡楞嚴云即如來藏元明心妙即心即空即地即水即風即大即眼即耳鼻舌身意即色聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅如是乃至即常即樂即我即淨以是俱即世出世間即如來藏妙明心元離即離非是即非即如何以所知心測度如來無上菩提用世間語言入佛知見譬如琴瑟箜篌琵琶雖有妙音若非妙指終不能發汝與眾生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵寂先起不能成就圓覺方便者說著圓覺亦是方便一大藏教皆方便門所以法華經謂之開方便門示真實相且道如何是諸法實相古人誦法華偈至諸法從本來常自寂滅相忽然發悟有云春暖百花紅鷓鴣啼柳上非為正問正是結斥爾時世尊欲重宣此義而說偈言金剛藏當知如來寂滅性未曾有終始若以輪迴心思惟即旋復但至輪迴際不能入佛海譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛生死與涅槃凡夫及諸佛同為空華相思惟猶幻化何況詰虗妄若能了此心然後求圓覺西蜀復庵暉禪師曰偈云譬如銷金鑛金非銷故有此二句說本有之法對治有脩執雖復本來金終以銷成就此二句對治無脩執思惟猶幻化此頌長行中有作思惟從有心起至已如空華何況詰虗妄此頌用此思惟辨於佛境謂前思惟之心自是虗妄幻化豈況又將此虗妄之心詰辨分別圓覺境界如是分別展轉不是者也四明聰講師曰長行中已是窮理盡性至重頌如析竹皆迎刃而解不復雪上加霜且夫金剛藏是夢中人釋迦老子又於夢中說夢忽被無心道人一時驚破其夢元來總是如幻三昧夢中佛事唐圭峰定慧禪師宗密頌金剛藏菩薩章曰金剛執難聖凡身本悟緣何有妄因三問連環分別見諸門開喻性元真空華起滅元由妄金鑛銷融水絕塵若要測量圓覺海入思惟地倍沉淪金剛藏菩薩章終四
