body:
  text: 彌勒菩薩章四明講師曰至論諸法本元清淨絕名離相尚非是一何況有諸眾生未了常在輪迴聖人哀之無名相中假名相說於不二中而辨其二是故慈氏究輪迴根殷勤啟問於是彌勒菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰此深究輪迴之根也彌勒此云慈氏乃是其姓也良由此門深究愛根蕩除細惑窮其展轉根元推其差別五種之性彌勒是等覺菩薩一生補處表除細惑大凡教中說等覺位方斷四事四事者一劣無漏二微細習氣三分段生死及變易生死四內外轉依斷此四事方入妙覺故當彌勒請問大悲世尊廣為菩薩開秘密藏令諸大眾深悟輪迴菩薩讚佛於前章開說秘密深妙之義如動目湛水等諭及說種種取捨皆是輪迴也分別邪正能施末世一切眾生無畏道眼此讚佛於前章辨說種種邪正令諸眾生道眼清淨不畏魔惱於大涅槃生決定信無復重隨輪轉境界起循環見大涅槃者不生不滅廣大法門也決定信者信受此法絕無疑悔也其信心如是堅固又豈復入妄境起諸妄見循環見者即前章所謂念念相續循環往復者是也西蜀復菴暉禪師曰深悟輪迴即慧眼分別邪正即法眼然慧眼證真法眼達事又慧眼即根本智法眼即後得智然天台以根本智為拙智謂只證得自己之性以後得智謂能鑒機逗教分別邪正說法度生言道眼即具上二眼也決定信者即能信之智大涅槃者即所信之法無復重隨輪轉者即指前雲駛月運等也四明聰講師曰彌勒補處大士今居兜率內院常說妙法今預斯會請究生死根本輪迴始末如鐘在架非扣之則不鳴世尊若諸菩薩及末世眾生欲遊如來大寂滅海涅槃之道廣大深妙故以海喻云何當斷輪迴根本前章佛說先斷無始輪迴根本故菩薩於此問修斷之因於諸輪迴有幾種性諸輪迴者四生六道諸輪迴也輪迴之相甚多未審有幾種性西蜀復菴暉禪師曰此舉法以請先斷輪迴也大則絕對待之大性本自靜曰寂相本自寂曰滅海是喻喻如大海體深用廣具河沙功德遊者不住即指無住處大涅槃也當斷輪迴根本者由前金剛藏章聞佛說末世眾生先斷無始輪迴根本今請問未審是那箇根本如何斷絕并諸輪迴六趣之中有幾般種性之人也修佛菩提幾等差別修證圓覺之法共有幾等差別迴入塵勞當設幾種教化方便度諸眾生佛化身復入塵勞中當設幾種教法普度眾生西蜀復菴暉禪師曰此請悲智也修佛菩提幾等差別此當大智迴入塵勞當設幾種教化方便度諸眾生者此當大悲又初則從假入空觀次則從空入假觀又初當無邊法門誓願學次當無邊眾生誓願度上文說云何當斷輪迴根本者此當無邊煩惱誓願斷然諸佛有無量無邊法門亦要學之何謂之無邊法門只如一代時教修行法門以至禪門諸方尊宿接人差別之智各自不同既知諸法之門便須依文解義悟理見性之後此方是自行邊事然後却要行利他之行何故却要行利他之行耶緣為根本智只了得自己邊事謂之理孤事寡終不圓通隻翼單輪豈能飛運譬如一水無以和其味一木無以成大廈一衣無以稱眾體一藥無以療殊疾一綵無以為紋綉一聲無以諧琴瑟一言無以勸眾善一戒無以防多失只如華嚴會上大海龍王置十千之問普慧菩薩申二百之疑若遇斯機當如之何所以釋迦老子有後得之智遂為龍王開八萬塵勞之門答普慧大士二千樂說之辨今欲鑒機說法行利他行者亦復如是直須要會於無言說中假以言說於無方便中假立方便於無譬喻中假立譬喻念念慈念念悲行無緣慈作不請友廣開方便饒益有情利樂群品以此推之後得智者真巧智也所以禪宗道大凡參玄之士須具二眼一己眼明宗二智眼辨惑序云佛稱種智修假多聞又壽禪師云百川雖潤何妨大海廣含五岳自高不礙太陽普照也四明聰講師曰大寂滅海者行法云般涅槃海涅言不生槃言不滅即不生不滅也今言寂者即彼之不生今言滅者即彼之不滅也海即無涯佛以圓覺為性海若入圓覺而不能了生死者則佛海中死屍花林中腐鼠也豈不自警哉輪迴根本者法界次第云生死根本即名色為始以初受一期妄報歌羅邏時但有名色二法當知名色即是一切世間出世間之根本能生一切法普攝一切法智度論云一切世間中但有名與色智者云一名者心也但名字故曰名是心及相應數法雖有能緣之用而無質礙可尋既異於色而有心意識及諸數法種種之別也二色者有形質礙之法謂之色是十界及一入少分皆是質礙之法並無知覺之用說異心意識法故指為色有幾種性者曰心曰意曰識曰色受想行識曰六根曰六塵曰六識十八界也曰身三曰口四曰意三曰見思曰塵沙曰無明皆是輪迴種性其實八萬四千塵勞恒河沙數煩惱皆屬幾種內不可用心思不可以數極既總是輪迴根本只合為一問也修佛菩提者佛名曰覺覺有情也菩提翻道即大道心成就眾生也眾生旅泊三界無由出於火宅只為迷菩薩之路情著不覺大聖啟大道心出三界獄令諸眾生遊寂滅海到菩薩岸俵何法門修行幾等如迷方人無指路者終無出時智者云如來未興於世爾時雖有十善法之化是為舊善未有三寶之可歸大聖初成正覺先為提謂長者開授三歸以為入道之根本進行之初首也三歸正破三邪濟三途接三乘出三有況百千三昧無量行門非止一路故云差別迴入塵勞設化度生者圭峯云眾生無邊誓願度即從空入假或大悲濟物惑病既多方藥非一若無方便有如少湯添水恐落愛見大悲故須問也惟願不捨救世大悲令諸修行一切菩薩及末世眾生慧目肅清照耀心鏡清淨之智照了諸相故曰慧目心如鏡明廓然瑩徹故曰心鏡圓悟如來無上知見圓悟者圓滿具足無所不悟也無上者佛之知見最尊最勝也作是語已五體投地如是三請終而復始西蜀復菴暉禪師曰慧目即能照也肅清則塵緣影像一切境界皆不能雜壞也照耀即所照也心是舉法鏡是舉喻謂欲使末世脩行之人若於十二時中能照之智及所照之境如鏡對像互不相瞞於中不受不拒物來斯照物去斯忘應變無窮卷舒自在若能如是即圓滿證悟十方如來無上知見也圓悟即無能所世間之法莫能先之故曰無上然無上知見者謂見聞覺知也此舉初後攝中間耳何謂之無上知見古云有所知有所不知無所知無所不知有所見有所不見無所見無所不見且有所見有所不見者如夜秉燭相似有所照有所不照也無所見無所不見者如日輪昇空天下洞然也且行時若見有行時底則不見住時底坐時若見有坐時底則不見有臥時底唯是行時不見行住時不見住以至坐臥時不見坐臥底乃至見聞覺知於一切處一切時不妨行住坐臥見聞覺知千差萬別一時坐斷觸目對境無非是登解脫清淨法殿無非是證大圓覺妙莊嚴域這箇喚作無上知見豈有世間虗幻之法而過得此法也如是會者方始有大利益所以古云無心則十方諸佛千里同風有知則十方諸佛對面胡越又老子得此道理乃曰不出戶知天下不窺牖見天道若約教家配者無上知見即涅槃性菩提即涅槃法也四明聰講師曰惟願不捨救世大悲至無上知見者慈室云慧目即如如智也心鏡即如如境也智如於境境如於智即文殊章圓照覺相也若非圓覺寂照之功此知見永失亦是贊請之辭作是語已至終而復始者聖智慜物為物作則故慇懃三請爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧秘密微妙之義令諸菩薩潔清慧目及今一切末世眾生永斷輪迴心悟實相具無生忍實相者無相之相也金剛經曰是實相者即是非相是故如來說名實相者是也無生忍者於無生中堅忍不動也般若經曰無生法忍能令煩惱不生諸法不起者是也汝今諦聽當為汝說時彌勒菩薩奉教歡喜及諸大眾默然而聽西蜀復菴暉禪師曰心悟實相具無生忍者實相於一切法上不動乃無相之相若出其體即圓覺也忍者有五若資粮位謂之伏忍見道位初地謂之信忍修道位二地至六地謂之順忍通達位七地至九地謂之無生忍無學位十地至妙覺謂之寂滅忍當五忍中無生忍也謂前章說一切眾生未悟輪迴妄見生滅今既悟實相了妄心不生心既不生輪迴永絕如是即可名無生忍也四明聰講師曰爾時世尊至當為汝說者無生忍非易可階忍有多種有生忍有法忍唯無生忍圓位初住菩薩證之一品無明既破一分三德分顯證無生忍凡遇難緣如割水吹光分身百界救苦眾生何啻挾泰山以超北海也時彌勒菩薩至默然而聽者如犢思乳如蜂依蜜爭得不聽善男子一切眾生從無始際由有種種恩愛貪欲故有輪迴佛名經云有愛則生愛盡則滅故知生死貪愛為本又法華云諸苦所因貪欲為本西蜀復菴暉禪師曰答中別釋愛本中約欲以標指此指四生九類種種者或天屬之恩如父母等或感事之恩或任運生愛或因敬成愛因恩成愛恩之與愛種種不一今貪欲者的指婬欲也四明聰講師曰佛頂云流愛為種納想為胎交媾發生吸引同業以是因緣故有生死又經云汝愛我心我憐汝色故有生死五欲貪嗔皆曰種種若極其漏源平等性中無生佛名亦無輪迴及不輪迴生死交謝寒暑迭遷因於妄動至有物遷變今且略陳元始四明云良由眾生性具染惡不可變異其性圓明名之為佛性染性惡全體起作修染修惡更無別體全脩是性故得迷逆之事無非理佛即以此理起惑造業輪迴生死而全不知事全是理長劫用理長劫不知不由不知便非理佛以全是故名理即佛今欲窮源從真起妄初既是真如何以變之為妄此理難明須知無明法性同體平等性內具為善惡但性善其性則柔性惡其性則剛其剛柔在平等性內如天地天性剛而能柔如霜雪霧露等地性本柔亦能剛如金銀銅鐵等皆從地生在平等性中未分生佛如水如氷未分氷水只為妄動惡性力強真如內熏其性惡隨善緣起起作淨用若極淨則為佛也成佛了惡與妄無明業性還在性善中不斷纖毫先君子為小人所化暫為小人今遇善人所化仍為君子即本來人也肇云梵志出家白首而歸隣人見之曰昔人尚在乎梵志云吾猶昔人非昔人也惡煩惱性轉為性善亦名性善亦云理毒害煩惱本不動纖毫為之本來面目四明指要云除無明有差別此性中之惡與凡夫見行之惡如何分別如水與氷眾生情執執氷不知是水即氷故云情生智隔想變體殊終日用水只作氷想故有天堂地獄之異淨穢國之殊今且要窮今身從何處來極輪迴本楞嚴云皆由不知二種根本錯亂脩習猶如煑沙欲成嘉饌縱經塵劫秪名熱沙一者無始生死根本則汝今者與諸眾生用攀緣心為自性者即有為生滅心此心攬妄塵為體緣會而生緣散而滅二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸眾生遺此本明雖終日行而不覺枉入諸趣識精者廼即今虗妄浮心也元明者即如來藏性也不合隨染緣則成九法界隨淨緣成佛界故曰能生諸緣雖染淨俱緣而得失兩異淨緣得真性染緣失真性今別指染緣故曰緣所遺者云枉入諸趣涅槃經云亦有二種根本一者無始無明二者現在愛欲意同此經若諸世界一切種性卵生胎生濕生化生皆因婬欲而正性命一切種性者諸種類性也卵生則從卵殻中生胎生即從胞胎中生濕生即由濕氣而生化生則因變化而生如此種類之性皆由染著婬欲有此性命也圓覺疏曰但是情染總得名婬縱使化生亦因業染故總曰皆因婬欲也當知輪迴愛為根本一切輪迴皆是愛起西蜀復菴暉禪師曰二約受生即欲界六天及六趣雜居之中正者受也古云愛不重不生娑婆念不一不生淨土娑婆者皆因愛欲之心重也止如忉利天以交抱為行欲兜率天以執手為行欲化樂天以戲笑為行欲他化自在天以相視為行欲以至鴉以觜傳氣鵲以枝傳繞此皆因婬欲受身命也凡世間之人臨命終時若一生作十善法之人先從下冷上至齋自腰以上煖氣後盡者即生人道若至頭面熱後盡者此人即生天道也若一生造十惡者與此相返從上至腰熱後盡者墮於鬼趣中從腰至膝熱氣後盡者墮於畜生中從膝已下乃至脚熱氣後盡者墮地獄中無學之人入涅槃者或在心煖或在頂煖又死之後若一生善法功德多者即生善道若惡業重者即墮惡趣若善惡相半未定者遂於暗昧之處謂之中有身須四十九日自定之如秤秤物相似若善業稍勝即先受善趣若惡業稍勝即先受惡報後受善報滿足之後隨還受生臨受生時所有託生之處雖遠由業力故見在目前有福之者或聞大眾歌舞聲鐘鈴羅鼓聲兼寂靜美妙種種可意之聲無福之者或聞風雨雷電聲江河泛漲聲及紛亂種種不可意之聲是時或妄見自身入臺觀宮殿之中或見身入荊棘叢林蘆葦之中若變成男者於母胎中即起男人欲心背外而面向內在其左脇若變成女者即於父身上起女人欲心背內而面向外在其右脇是時父精母血和合已靈即生歡喜乃托彼生矣在母腹中生臟之下熟臟之上母噉一盃熱食之時其體如在鑊湯母飲一盃冷水之時其體猶如寒氷切身母飽之時迫窄體痛不可具言母飢之時腹中亦似倒懸其苦無量前說卵胎受生若濕化二生者則又不然濕生但染香故若至生處此香或淨或不淨隨其宿業所感也若化生者但愛樂所依之處或好或惡亦隨宿業所感俱捨去顛倒處欲境濕化染香處凡在胎中三十八箇七日方得出生一七如生酪二七如凝酥三七如藥杵四七如溫石五七體形漸現六七現肘膝七七生手足八七現二十指九七生眼耳等十七如浮囊十一七身孔通十二七生腹胃十三七生飢渴想十四七生筋十五七生諸脉十六七諸孔出氣十七七眼鼻等明淨十八七諸根長十九七具三根二十七生諸骨二十一七生肉二十二七生血二十三七生皮二十四七生膚二十五七生肉增長二十六七生髮毛爪甲二十七七各隨善惡業若想一一覺智二十八七生顛倒想二十九七現形色三十七毛爪增長三十一七至三十三七人相具足三十六七生厭離想三十七七生五種惡想三十八七欲生之時母腹風起或上或下轉其兒身令倒懸頭向於產門猶如兩石夾山其有福者時心自念言我投浴池水中遊戲如墮高床花香之處其無福者時心自念言吾從高山墮落懸崖溝坑溷中或如地獄羅網荊棘之上及曠野石㵎劍戟之中愁憂無量又如欲生之時母危兒怖生墮草上身體細軟風草觸身如履刀劍之上忽然失聲大呌其痛苦亦無量出生之後一七日內身中方生八萬戶虫以此推之四生九類莫不皆因婬欲中而受其身以至竛竮五趣匍匐四生無由解脫者皆為愛欲為根本根是舉喻本是舉法何以知之伐樹不盡根數數更生樹斷愛不盡本數數得生苦良可為證四明聰講師曰受生別者且言六道輪迴最初一念於大覺性熏起迷妄無明宿業順六道性處處受生因風火二大馳我神識酬其宿債作福相似來生我家皆由起自貪欲貪屬愛愛欲為因愛命為果遂攬父母遺棄成五蘊色身故有胎卵濕化四生之始殻中生曰卵胞胎生曰胎濕潤而生曰濕無而倐有曰化天道地獄純是化生修羅具四生人亦具四生鬼道胎化生畜生具四生人有卵生者昔西土毗舍佉母生三十二卵為三十二子濕生人者如柰女於柰樹上生一池水水中生一女既無父母以柰為姓故曰柰女值佛證果亦云菴提遮女後瓶沙王得之生一男曰耆婆天醫也淫是躭染愛著但是情染總名為淫縱是化生亦初依業有如斯之類皆由心染氣傳受性稟命既性命由淫淫復由愛故云愛為根本也由有諸欲助發愛性是故能令生死相續因有一切可欲之境助發一切貪愛之心彼此染著隨業受報所以生死不息西蜀復菴暉禪師曰欲助成因也由者因也諸欲即境也愛性即無量劫來種子由外塵境牽起愛心種子所以十二時中愛繩萬結情網千重因此愛心貪欲故造業造業故受報由此生死不斷因緣相牽譬如磁石吸針針乃北方銕北屬陰石乃南方之物南屬陽由陰陽相感耳楞嚴云我愛汝色汝憐我心以是因緣百劫千生常在繩縛肇云眾生所以久流轉者皆由著欲故也若欲止於心無復生死也四明聰講師曰眾生欲心在內若未見境欲心未起以由境故牽起欲心所以佛頂云爾愛我心我憐汝色以是因緣生死不斷如膏助火寧不轉熾欲助愛心造業受報肇云眾生所以久流轉者皆由著欲故也若欲止於心則無生死潛神玄默與虗空合其德是名涅槃遺教云多欲之人多求利故苦惱亦多是以鑊湯雖沸不煑無欲之人如佛弟難陀著其妻故佛引之游天宮見一宮天女勝妙而獨無夫難陀遂問天女天女答曰佛弟難陀持戒生此為我丈夫難陀為欲持戒要生天上佛又引之遊大地獄忽一獄空陀亦問佛佛云爾自問獄卒卒曰佛弟難陀為欲持戒報盡來生此獄以斯念之五欲無常如花上露見陽則晞若知而不戒則遺教所謂老象溺深泥者是也欲因愛生一切欲心皆從愛起命因欲有眾生身命因欲而有眾生愛命還依欲本眾生愛命念念不捨是謂復依婬欲之本愛欲為因愛命為果始愛欲而受生故為因也始愛命而受報故為果也西蜀復菴暉禪師曰此明因欲故因果展轉更相依倚不斷欲謂貪婬命謂身命若無愛欲則不生此身當知一切眾生欲從能愛之心上有既於過去因有婬欲生得此身今生又就此身之上又生愛惜保護貪著之心由愛此身所以之故又依傍此身作來生婬欲之因因此又感來生生死果報如是展轉相續無窮故云愛為因果四明聰講師曰光明云是身虗偽猶如空聚良由眾生最初攬陰成身陰者五陰和合假名為身如攬五指故有拳名凡夫不了執此假名而為我等廣有十六我人知見今諸經略云五陰我者聚陰等法於中若即若離計我我所之實人者亦於五陰妄計我是行人眾生相者於五陰中此五共生故曰眾生壽者亦於五陰妄計我受一期報壽命者亦於陰法中妄計我命根連持不斷以執此故計有我身故名身見今於十六中具出四見皆是妄想並無實事男托胎時見母為所取境見父為所競境於母起貪於父起嗔父流為是己有乘茲妄念故得托胎女人反此委在涅槃經男女之名由是妄想而為始也此身幻質名為假名既由妄想及從精血以驗此身名為虗偽如上二空境中是生空境也欲謂貪婬命謂身命若無愛欲諸緣不生身亦不有當知欲因愛身身因欲生既有此身還生於愛由愛身故還為欲因復感未來生死果報如是展轉相續無有窮也由於欲境起諸違順因彼可欲之境有違我者有順我者故違順之境雜然而起也境背愛心而生憎嫉造種種業所見之境或違我之愛心則心生憎嫉小則罵辱大則殺害種種惡業從此而有是故復生地獄餓鬼既有惡業即受惡報隨業受生墮於惡道西蜀復菴暉禪師曰此惡業招苦報也違者不可意順者可意由愛彼境境不順心便生熱惱憎嫉起嗔之故或殺或害或打罵凌辱種種惡業若境順愛心而生染著婬盜飲啖侵奪綺妄種種惡業若於十二時中如此用心者遂感三途之報若起嗔心感地獄之報若起癡心感畜生之報若起貪心感餓鬼之報不言畜生者有二義故一欲成文二舉初後攝中間也四明聰講師曰欲境者則色聲香味觸五欲境也眾生見此五境起違順相且如色境順則成喜逆則成嗔或不相從謂之境背背愛心便生憎嫉即嗔心生便有打罵殺害種種惡業因色而起餘四欲境亦復如是順逆者色若順心而乃躭著淫盜飲啖侵凌綺語亦造眾多惡業以此逆順二業招惡強報先墮地獄次作畜生後作餓鬼受三惡報次生人間貧窮下賤復與宿昔冤債始相酬對廣如楞嚴經文此經文雖無畜生報意亦含攝之矣當知色欲能生於火燒諸世間如西竺述伽婆市魚為業一見貴公主出忽生愛樂因而久病其母問其故說如上事母由是常供貴人之魚公主問其供魚之意欲何所求母乃言子愛欲事公主設計相期於自在天庿尅日而至漁者先到其神以睡魔著之令彼熟寐貴人左右求之無有忽看紙錢堆中見彼睡著不醒用物遺之而去覺來聞異香見物知貴人來忽然思念身上欲火發生先燃其紙錢次燒及天廟故云欲火燒天廟將繩繫子咽出龍樹大論下明善業樂報知欲可厭知欲是惡因深可厭離也愛厭業道愛彼厭離惡業之道也圓覺疏亦曰於離惡法門深生愛樂捨惡樂善復現天人捨諸惡業樂修善業善業既熟即現天人之果天人者天道人道也西蜀復菴暉禪師曰此造善招樂報也謂前文說眾生則不知不覺起惑造業隨於惡道今已知覺悟前來起貪欲之心非是善道深可厭捨念念只是愛厭於三途惡業之道遂捨去能造十惡之心却起樂十善法功德之心脩信進念定慧得十善之法若於十二時如此用心遂感人間及六欲天福報雖然如是亦未為善何也為人間有八苦天上有五衰八苦者一生苦二老苦三病苦四死苦五愛別離苦六怨憎會苦七求不得苦八五陰熾盛苦五衰者一衣垢染二花鬘萎顇三兩腋汗流四體便臭穢五不樂本座廣說五衰八苦見文殊章四明聰講師曰欲者五欲唯色最切人畏之焉若論欲性本菩提性如帶刀入陣不獨衛身亦獲名利菩薩用色觀色法界離五欲境別無佛性今且論厭欲樂善如大論云有須陀洹在人間住亦有妻正斷欲界九品思斷思盡即超欲而於欲境倍勝常情妻不喜每憂之忽有一聖人至言及此事彼云吾教汝但云須陀洹果法應如是妻如其言語於其夫夫欲心頓斷如湯消氷灰飛烟滅隣人不知其故和之夫取一畫瓶出五彩裝成甚是可愛云若與吾翫此畫瓶妻貪此瓶常不釋手夫忽討此畫瓶妻度與夫夫閃此瓶墮地破碎臭穢流出夫云與吾拾此畫瓶來妻云畫瓶打破夫云以吾翫汝猶如畫瓶復說偈曰猛者入定觀身心所與塵見已生穢惡猶如彩畫瓶豈非知欲可厭也又如佛在世時一婦人生三四子悉皆死亡其母以憶子心狂披髮裸形而走忽一日直至祇園寺徑造佛前佛威神故忽然猛省無禮蹲地佛令阿難取袈裟與之披後歸去同夫來見佛皆證阿羅漢若是厭惡樂善極則止生人天若於欲深省者可登聖階人天五戒三歸五戒為首種種福利皆天人果報也上來通言人天之善向下四禪天初禪梵王二禪少光等三禪少淨四禪無雲福生廣果等此四禪天皆因脩禪定得生又知諸愛可厭惡故棄愛樂捨還滋愛本既知種種愛心可厭可惡乃棄諸愛專樂捨法不知此心亦生於愛故曰還滋愛本便現有為增上善果既有棄愛樂捨之因即現聲聞緣覺之果因脩而得在諸善果之上故曰有為增上西蜀復菴暉禪師曰此感色界不動業也依報謂又不知其前來愛造惡及愛造善之心俱未免苦輪遂棄彼愛心及樂修善心一時皆捨去又不知此之捨心與彼愛心一般依前潤起愛心之本如此用心乃是有為之心感得色界漸漸增上無色界正報及依報俱舍論云梵王天人身長十由旬無色界之人身長三十六由旬不動業者謂因不動果不動也因則不被下欲界境之動果則不被四禪心定之所動也如初禪不被欲界境之所動二禪又不被初禪境界所動三禪又不被二禪境界之所動如是漸增至四空處天也皆輪迴故不成聖道謂惡果善果及有為增上善果皆屬輪迴不成佛道西蜀復菴暉禪師曰此總結也以是上來所說愛欲之心不斷受三途之報捨心不斷受上二界之報此皆三界輪迴不成佛道也四明聰講師曰入道之門先須伏愛欲前云捨惡樂善者在人間脩三歸五戒孝養父母行世仁慈修橋布路寫經造佛掃塔塗地種種善利得生天上初是四天王天二忉利天極至六欲天或生人間富貴故云復見天人今云又知諸愛可厭惡故棄愛樂音落捨禪是棄者棄前欲界欲樂麤強此人厭棄生梵天若加修四無量心為王愛者二禪天此天有四支禪內淨支喜支樂支一心支既存喜樂故曰愛禪樂者三禪天此禪第一快樂勝前二禪亦有五支禪怡悅之心名之為樂捨者四禪天此天有四支禪斷苦樂故滅憂喜故不苦不樂行捨念淨行者欲離前三禪時種種呵責於樂樂既謝滅則不動之定與捨俱發離樂不悔此心名捨如上棄愛樂捨此四反生禪味著於定心藥反為病還滋愛本此上色無色界非可易登因離欲故脩增上善得生此天雖然仍是輪迴不成聖道若望脩圓覺者霄壤之殊故云不成聖道是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴生死輪迴貪愛為本欲免此苦先斷貪愛渴者謂眾生愛心如渴故也西蜀復菴暉禪師曰此勸斷根本以此之故一切眾生欲脫三界生死出六道輪迴者必先依佛說斷除貪婬之心及能起愛渴之心愛心喻渴求水之謂報應云事起必由其心報應必由其事是故自報以觀事而事可變舉事以責心而心可反譬如世人欲要流軋先須竭其水源欲要湯不沸先須除其火所以古云擁其流者未若杜其源揚其湯者未若撲其火由源出於水源未杜而水無窮火沸於湯火未撲而湯誰息故有杜源之客不擁流而自乾撲火之賓不揚湯而自止類斯而談可得詳矣厭其果者未若絕其因怖其苦者未若懲於惡因滋於果因未絕而果未窮惡生於苦惡未懲而苦詎息故使絕因之士不厭果而自亡懲惡之賢不怖苦而自離凡百君子書而誡歟所以道一切眾生輪迴根本只是貪欲及愛三字也前文殊章無明為生死根本此即發業也今彌勒章以貪愛為輪迴根本此即潤業也諸經或說發業未若此經文簡而具備矣四明聰講師曰貪欲愛渴此二輪迴根本不得不除貪是三毒之首愛因此起乃著物之端因愛故攬五陰為體如鱗集仰流此貪愛大凡皆有但輕重之殊殺戮重者即地獄輕者鬼畜報愛亦有輕重勝則生天劣則人界貪愛體是無始無明修圓覺者能觀貪愛皆是佛性中道終日貪愛不礙菩提文殊自云我是貪欲師利此如抱虎弄虵不達性則為物所傷善達性者不獨入佛亦能入魔善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死菩薩示現受生非本於愛也盖起慈悲心攝化眾生令捨諸愛故假借婬欲之事入於生死海中與之同事而化之爾非實有貪欲心也西蜀復菴暉禪師曰此通妨慈能與樂悲能苦恐有此疑害其觀智只如龐居士豈是真箇縈妻育男養女貪著世間之事耶又如猪頭和尚等皆菩薩化現但是示現受生同於凡夫為欲利益調伏攝受教化一切眾生故也四明聰講師曰如傅大士布袋和尚和須密多女如觀音為馬郎婦猪頭稠樹皆以欲法化人雲門南泉德山等皆用魔法入佛菩薩慈悲利物若純用善其間惡逆重者善化不受示惡入惡於惡達惡為性惡法門以攝惡者皆是菩提蓋麤惡重者從惡入易從善入者不傷物如把線放縱未成佛不失人天也若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟無一切念即免輪迴淨圓覺心豁然開悟西蜀復菴暉禪師曰此顯覺也一切眾生能捨諸欲及除憎愛永斷輪迴者此一段文約禪宗說之乃是熟處放教生其次勤求如來圓覺境界於清淨心便得開悟者乃是生處放教熟約教家說者先是出鑛後方成金已上經文總答彌勒前問欲遊如來大寂滅海云何當斷輪迴根本今告云愛欲二字也四明聰講師曰欲愛大小乘俱斷未盡聲聞尚有習氣如迦葉聞琴起舞云吾於三界五欲吾已斷竟此是界外勝妙五欲吾聞之不能自安界外五欲亦云法愛亦云法塵今且就末世眾生修圓覺人先降心治性愛心習盡如氷清玉潔不牽輪迴心純是法與法相應更念茲在茲求圓覺速得開悟圓覺即止觀散即止昏則即憎愛自然消落如印印泥印壞文成善男子一切眾生由本貪欲發揮無明顯出五性差別不等因本來貪欲之心發揚一切妄幻遂顯出五種差別不同之性圓覺疏文論五性一曰二乘性二曰菩薩性三曰不定性四曰外道性五曰無性依二種障而現深淺理障在心故曰深事障在境故曰淺西蜀復菴暉禪師曰二明種性中總標因依發則顯發揮則揮散無明即根本煩惱謂一切眾生因背覺合塵貪欲之故遂發顯揮散根本無明是時便顯出聲聞性緣覺性菩薩性外道性不定性各各差別不同何故如此為始初若遇著邪師教者則於人法二我上堅執不捨此障對於二乘為深若遇著二乘之教說人空理雖已知人空其於法執未忘對前邪師為淺若遇著菩薩之教對二乘又為淺也然此眾生覺性之上本無淺深之障但隨其所熏習耳四明聰講師曰本貪欲者即根本無明具十法界善惡之性發揮無明枝末無明也此無明隨染淨緣成凡成聖凡夫雖迷而其迷中假實依正未始離性須知染緣熏於性染方成染法淨緣熏淨方成淨用性染性淨其體本融全體而起隨染緣則染淨俱染隨淨緣則染淨俱淨不二門云三千在理同名無明三千果成咸稱常樂今此無明具染淨緣發揮顯出五性差別不等五性者永嘉云一闡提性枝末無明二決定性三不定性四菩薩性根本無明也五佛性別教果佛也一障全在信不具者名闡提性二破事障見思之惑名決定性取滅度想者也三破見思已不取滅度想者如方等會有密求耻小者名不定性四菩薩性者破理障者破障理無明也佛性者就當教究竟破也此非是被機立五性教亦非為聲聞緣覺立此教名但佛點出迷圓覺之人成五差別亦是惑有厚薄證有淺深答彌勒生死根本之問也云何二障一者理障礙正知見修證之理一有所執正知正見曷能明了二者事障續諸生死一切有為皆名事障隨業受報生死相續西蜀復菴暉禪師曰此所依二障也凡夫有我執即前妄認四大為自身相故曰事障所以竛竮四生匍匐六道二乘有法執故曰理障所以有智無悲考此二障若在起信論謂之我執法執蓋起信說初於本覺上一念不覺動心為業相有所見為轉相境界現為現相起分別心為智相此心不斷為相續相此五者皆為之法執起取著之心為取著相於取著處計度其名字為計名字相此二相屬我執若在唯識謂之煩惱障及所知障為煩惱障障心心不解脫所知障障慧慧不解脫若在此經謂之理障事障若二障之體在起信論二障之義在唯識論二鄣之名在今經也又天台教煩惱曰界內見思所知曰界外見思注云我執即一蘊之色法執即四蘊之心在參同契謂之執事猶是迷契理亦非悟故楞嚴經云初伏客塵煩惱又云永斷根本無明大意皆同四明聰講師曰一名理障者即根本無明也能覆出世間真明之慧而能增長生死礙正知見屬菩薩斷二名事障者起信論謂之六麤亦從見愛而起初受一期妄報歌羅邏時四大五蘊根塵等此惑謂之見思屬聲聞緣覺所斷若不斷者生死相續輪迴不息云何五性已解在前茲不重述西蜀復菴暉禪師曰此徵問也性字從心從生謂從心而生謂之性善男子若此二障未得斷滅名未成佛既為事理所障安得成就佛果西蜀復菴暉禪師曰此簡未熏之者正當楞伽經中無性此經本以發心修證約二障故成五性此一種人都未曾聞佛教求熏修性二障未曾斷故不當其五性中之數也四明聰講師曰此文諸說不同圭峰云本以發心修證約斷二障故成五性此都不斷故非五數慈室云此總勸非指根性於通途敦勗又一說云未曾斷惑不當五教與圭峰同意又與楞伽五性中無性同圭峰亦云若據楞伽文即當第五無性也諸說不同在人取捨今觀此文諸經中有闡提性未破見思無明即今云未破二障此種性本是佛法中外人亦有佛性又有經文貶之為無佛性人若不是一種性如何云善男子此二障未斷滅等驗此是闡提性也涅槃云佛告純陀若有比丘比丘尼優婆塞優婆夷發麤惡言誹謗正法無慚愧不改悔名為趣向一闡提道又梵行品云一闡提者不信因果無有慚愧不信業報不親善友不隨諸佛教戒名一闡提也若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界於事雖不攀緣於理尚有所執但能悟入聲聞緣覺之道未能顯然安住菩薩境界也傳心法要曰因聲教而悟者名聲聞觀因緣而悟者名緣覺西蜀復菴暉禪師曰五性中此當第一聲聞性第二緣覺性此之聲聞緣覺皆是二乘之數於中聲聞乃聞佛三緣四諦法門而悟道當二乘中鈍根之人所以華嚴經云隨他語解故號聲聞辟支伽此云緣覺此人出無佛世但觀四時遷變代謝而悟道更不假師繩所以道春觀百華開秋見黃葉落此當二乘中利根者也此二乘之性不先求了悟覺性但知生死苦遂止息攀緣先除事障已除我執尚有法執理障未除雖云超出三界於台教四土之中約居方便土未到菩薩境界此人一向厭下苦麤障欣上淨妙離也四明聰講師曰聲聞修四諦緣覺修十二因緣息諸攀緣斷見思惑為聲聞更侵息氣名為緣覺緣覺亦多種不同有部行部黨而行如今時社會有稟十二因緣先觀無明至于老死盡此是依教修行人又一種獨覺春觀百花競秀秋觀萬卉咸衰覩外境榮枯類內心起滅謂之獨覺也圭峰云雖至長者之家猶在後園除糞止宿草菴法華云雇汝除糞正二乘也善男子若諸末世一切眾生欲汎如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界二障已伏者謂理事已平不作障礙也止能悟入菩薩境界者二障雖平尚未能盡滅故也若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃二障俱空即成正覺西蜀復菴暉禪師曰此第三菩薩性先當發願者似令修證不是分別五性此譯人之訛今文只要分別出五性差別不同當云唯先發願又悟入者當作順入此中亦只先願斷障不先了心未覺了真性而二障又已伏之不行此當地前菩薩雙伏自然潛同菩薩故云順入永斷者此約地上果位蓋地上方雙斷也大涅槃者即無住處大涅槃也四明聰講師曰此菩薩修圓覺者獨圓之教不無於別發大心修大行先當發願即四弘誓也自未得度先度於人要心懃斷二障無明業識已伏若石壓草入品非遙具煩惱性能知如來秘密之藏居此位已伏無明即能悟入菩薩境界若二障斷名銅輪位即十信菩薩既斷見思謂之事障也若斷理障即登圓初住菩薩破一品無明證一分三德分身百世界作佛龍女成佛即此位也故云二障永斷永斷之言該四十二位住行向地等覺并後心方無明永盡破阿梨耶無明業識最後一品如貼體汗衫著時最先脫時最後亦云天剛水際入妙覺位如十五夜月更無斜光古云昨夜一輪滿清光何處無故云即入如來微妙圓覺滿足菩提及大涅槃也善男子一切眾生皆證圓覺圓覺妙性眾生本有逢善知識依彼所作因地法行爾時修習便有頓漸利根之人便能頓悟鈍根之士須假漸修若遇如來無上菩提正修行路根無大小皆成佛果大根者頓悟小根者漸悟若遇圓覺法門不拘根器大小皆得成佛西蜀復菴暉禪師曰此第四不定性問既是四生九類已皆證入十方如來圓覺了何故更要依倚善知識所教示修習因地法門耶若據圭峰注以謂譯師訛之當云證諸眾生皆有圓覺謂吾佛大聖人普為一切眾生保任作證人人具有此廣大靈明圓覺之性此之性上本無菩提可求下無眾生可度中無萬行可修所以道人人壁立千仞箇箇常光現前一道恩光何人無分人人平肩佛祖各各鼻孔遼天本來具足本來無欠但以妄想執著而不證得於是有褁粮負笈撥草瞻風尋師訪道之事或逢箇知真識妄知病識藥底善知識之教因修心地法門行稱性法行也若遇頓師教之則成頓證若遇漸師教之則成漸證然彼眾生覺性之體與佛一般初無頓漸若遇如來之教並許成佛良由此不定性之人遇善則善遇惡則惡如一張白帋相似褁香則香褁臭則臭孟子所謂人之性其猶於水決諸東則東流决諸西則西流論語所謂中人已上可以語上也可以語下也老子謂中士聞道若存若亡也又如大智論云昔王不立廐於寺者謂此王有象可敵諸國每有爭戰莊嚴器仗令象前戰無不克勝而諸國皆懼久而無敵遂立廐養僧寺之久聞僧眾持念之聲其象遂乃心善後有敵國兵眾相侵依前以象前敵其象皆不肯戰其王憂愁慮國衰敗有智之臣白於王前此象久處僧舍見聞善事與之俱化矣今可移處屠坊令常見殺往未經久其象惡心還起畜生尚爾況復於人近善不善近惡不惡耶故儒典亦常令學者擇其所習可不信哉四明聰講師曰圭峰云皆證圓覺者譯師訛也應云證諸眾生皆有圓覺可謂聰明人前有三尺暗豈不聞上文云始知眾生本來成佛成豈非證耶法華云一百八十劫空過無有佛既無佛出世證明眾生應無圓覺耶見今眾生有不遇佛後五百歲眾生應無圓覺也又須知圓覺之性常自現前只未遇緣如兩木相因方能生火修圓覺者逢善知識依彼因地法行修妙奢摩他深觀也觀力有淺深修證有漸次此漸根性利鈍遲速之漸也若遇真正導師訓以正修行路以如如智照如如境境智融融如入鑪鞴念念化成無上知覺若入此煅銅銕鍮鉐化為真金故云根無大小皆成佛果若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎唯信邪師不明自性是名外道種性外道種性者非佛性也此乃邪師薰習之過非眾生之過也西蜀復菴暉禪師曰此第五外道性此有二義故若約事則西天有九十六種外道若約理則心遊理外便謂之外道不必六師也邪師過謬者謂眾生覺性不同諸佛正覺之體但是遇著邪師熏成雜種謂之外道此非眾生之過乃邪師妄謬之過所以道我眼本正因師故邪故仁王經云天王國有一太子名班足登位時有一外道名善施與王灌頂乃令班足取千王頭以祀家間摩訶迦羅大黑天神班足自登位已得九百九十九王唯少一王地行萬里見一王名普明班足欲取之普明乃曰願聽一日禮敬三寶飯食沙門班足許之普明遂敷百高座請百法師一日二時講說般若班足聞已即證空定遂告諸王言我為外道邪師所誤非汝等咎因以國付弟出家得果是知修行之人創初發意持心宜須揀擇邪正也四明聰講師曰人之學道最初須擇師選友若不別邪正雖勞苦行非涅槃因迦葉尊者尚云未聞涅槃皆名邪見何況去聖遙遠邪師充滿世間龍樹初學隱身術幾乎喪命後遇十三祖捨邪歸正佛世有二人一人犯婬一人犯殺求優波離懺罪反為結罪後求淨名懺悔居士云汝將罪來我與懺悔二人覔罪相不可得淨名云我與汝懺罪竟永嘉云有二比丘犯婬殺波離螢光增罪結維摩大士頓除疑猶如赫日消霜雪又西土天親菩薩先學小乘廣造眾論毀大乘教後遇無著始知大乘欲截舌懺悔無著云汝以舌毀今復以舌讚何須截舌今之邪正且指兩教二乘三教菩薩都屬邪至法華開顯涅槃談常方名曰正若是九十五種外道都是邪法師徒弟子總是邪見即非論修圓覺者若是正修行人須求真善知識具擇法眼具擇法眼者佛世五品滅後四依昔有一蛇頭尾相爭大小頭云我是大我有眼能見有耳可聞有舌可甞尾云我是大我有尾若我不隨你你終去求食不得其尾一日待頭將欲求食以尾綰著樹根其頭果然去不得終日受飢事無奈何許尾做大尾在前行忽遇溪坑不知險阻墮坑喪命無有慧眼不擇良友正知見者亦復然也古云親慕善友如霧露中行雖不濕衣時時有潤是名眾生五性差別圓覺鈔曰習近聲聞則成聲聞性習近緣覺則成緣覺性習近菩薩則成菩薩性習近三乘則成不定性都不習近則成無性此即眾生五性差別也西蜀復菴暉禪師曰此結答彌勒前問世尊云於諸輪迴有幾種性今答有五種差別不同也四明聰講師曰差別者荊溪云遇熏自異非由性殊五種人與圓覺不異於不異中過熏自異仲尼有云與善人居如入芝蘭之室與不善人居如入鮑魚之肆如今之世魔強法弱正廢邪興一木安能支泰山之頹乎善男子菩薩唯以大悲方便入諸世間開發未悟菩薩以大慈悲心方便化身入諸塵勞開發一切未悟眾生也乃至示現種種形相菩薩變化示現種種形相隨機接化如觀音之示現三十二身是也逆順境界與其同事化令成佛所惡之境曰逆所愛之境曰順佛化身於此二境中與眾生同在塵勞而攝化之令證佛果皆依無始清淨願力菩薩接化眾生皆乘無始劫來清淨願力清淨者於一切法無所染著也願力者誓願深固魔不能壞也西蜀復菴暉禪師曰此答前問修大悲心又問云回入塵勞當設幾種教化方便度諸眾生今答大凡菩薩之人亦現世間之時此乃是獨用昔日修行發大悲拔苦願力遂作方法便宜入四生六道之中種種說法教化開示發覺未明心地之人使其達真本有了妄本空捨權就實棄小從大所謂或現天人身或現比丘身乃至三十二應入諸國土如楞嚴經典法華經說逆順境界者如華嚴說婆須蜜女起貪婬心此乃示現諸順境又如無厭足王以起嗔心此乃示現逆境其間或為眷屬或為親友或為冤家或喜或怒與一切眾生同行同坐同住同臥以至士農工商莫不皆同之然後漸漸陳善閉邪令一切眾生歡喜生善破惡入理於四攝中當同事攝也四攝者一布施攝二愛語攝三利行攝四同事攝也如南華經人間世云孔子教顏回往衛國化衛君子告云彼且為嬰兒與之為嬰兒彼且為町畦亦與之為町畦彼且為無涯與之為無涯達之入無瘕今菩薩示現世間度脫眾生者皆不忘因地修行之時發無邊眾生誓願度之願也清淨者謂凡為眾生說法不染著名利又非希望恩報即是無漏菩提之心與本覺相應故曰清淨所以高僧傳云夫說法者應如履劒不貪利養不憚劬勞方可為一切人剪萬古之槃根破百年之暗室四明聰講師曰菩薩從涅槃空出建立假破塵沙惑有五事可出假一者大悲二者方便三者精進四者忍辱五者智慧今此經具二大悲方便也大悲者悲能拔苦慈能與樂如觀音七難二求皆拔苦與樂三十二應皆為眾生作則釋迦因地化為魚山肉采唐世民荒人取螺蚌為食次年歲豐人亦取食忽得一蚌長二三尺打破擘開眾皆不能遂乃送往水處放之臨水忽然自開內有一身佛像唐文宗皇帝好喫蛤蜊唇御厨盈盤而進忽一擘不開者帝乃異之燔香禱祝忽亦自開一身菩薩形相可敬如楞嚴云佛滅度後勑諸菩薩及阿羅漢末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至婬女寡婦奸倫屠販與其同事稱讚佛乘令其身心入三摩地法華云我本立誓願欲令一切眾如我等無異凡此皆依宿昔願力現同事攝以設化也若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願修證圓覺起增進向上之心當發清淨廣大誓願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘菩薩發願時當曰願我今日安住圓覺最上乘法親近大善知識以為師友永不遭值一切外道邪師及聲聞緣覺二乘也依願修行漸斷諸障依清淨願修行圓覺漸次斷除一切障礙障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域諸障既除本願圓滿一切處解脫清淨故曰法殿一切處圓覺光明故曰妙莊嚴域西蜀復菴暉禪師曰此答前問修佛菩薩幾等差別今答云一切眾生於十方諸佛廣大圓覺性中發起決定起向殊勝增上心更當發菩薩清淨大願願我修起圓覺求知真識妄知病識藥之人誓願決定不隨前五性中外道及小乘之人依發願之力修行問今經屬頓教何云漸斷障耶答若據理則頓悟乘悟併銷事非頓除因次第盡所以漸斷諸障障盡則行住坐臥一切時中觸向無非大解脫門故以法殿說之願滿則觸目對境一切諸法無非是大圓覺故以莊嚴域喻之問法殿與妙莊嚴域何異耶答殿者乃王者之所居處今借用心然法王宮殿有二若受法樂即涅槃若令他同己即處慈悲宮殿今障盡常在解脫故喻如殿如華嚴第一卷中初以宮殿喻於涅槃涅槃者即解脫故解脫曰殿莊嚴者此未證真法之時但空但假然圓覺超絕空假逈然獨立不名涅槃今願滿全證一境三諦一心三觀觀諦無二故諸法無非圓覺而圓覺性中具此無量無數一切諸法是莊嚴覺性也域者如國界王都三京觸目皆是圓覺彊界境域然解脫是一向超絕之義非莊嚴之流類圓覺與諸法本末相攝離於諸法無別所在無可住處故與宮殿亦非流類以此二事各喻一法可見也問前彌勒請問者先問大智即修佛菩提幾等差別文次問大悲即回入塵勞文今佛何故先答悲而後答智耶答悲智相即故若智不即悲者為小乘觀智之所寂遂見三界無安猶如火宅希求出離如教頭燃如獐獨跳不顧後群若悲不即智者在在處處不能離相起貪愛心即落凡夫愛見如楞嚴云我愛汝色汝怜我心以是因緣百劫千生常在纏縛若智即悲者不為小乘觀智之所寂不妨在生死界中度脫眾生饒益群品若悲即智者不為凡夫愛見之所動終日度生而不見有眾生可度也如金剛經前三紙經文教示行人悲智相即同此意彼文從一切眾生之類至而滅度之此正發大悲心又從如是滅度至得滅度者此兼發大智心此乃是悲即智又從復次須菩提菩薩至不住於相此不住色與不住相皆正發大智心布施二字兼發大悲心此乃智即悲然對彼經文可解今意也四明聰講師曰後五百歲魔強法弱非同佛世人純道真故今之時世紅紫亂朱附佛法外道熾盛世間無力量者隨染其化以盲引盲所以吾佛付囑起增上心須青白眼甄別邪正楞嚴中阿難讚佛偈云願今得果成寶王還度如是恒沙眾又云舜若多性可銷亡爍迦羅心無動轉若遇修圓覺人用寂照止其昏散昏散既去心鏡自明惡人邪法自不入心用正觀觀察心緣大極目注玄虗一念法界含褁十方佛之與魔相去幾何邪之與正有何欠剩其間云莫值外道及二乘者此被願力不深人迷真重者無擇法眼人也增上心者修圓觀也不思議境境觀融融二障銷落行住坐臥無非解脫觸目對境無非圓覺如登清淨殿入莊嚴域矣爾時世尊欲重宣此義而說偈言彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死若能斷憎愛及與貪瞋癡不因差別性皆得成佛道二障永消滅求師得正悟隨順菩薩願依止大涅槃十方諸菩薩皆以大悲願示現入生死現在修行者及末世眾生勤斷諸愛見便歸大圓覺唐圭峰定慧禪師宗密彌勒菩薩章曰彌勒推究輪迴本若斷貪愛生死盡愛欲為因過既深愛命為果緣難泯二障就於五性分四生遂成六道蘊若親善友愛見亡自然悟入無生忍彌勒菩薩章終五
