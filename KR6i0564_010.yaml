body:
  text: 普覺菩薩章四明聰講師曰禪本無病病者非禪病是自病非病是禪淨名疏云禪者佛心智鑑圓明又翻棄惡如來純淨之智本不有惡惡即病也聖人以禪為藥治衆生病豈可以病治人之病今普覺快説禪病者蓋禪能治病故云禪病法華云善知識者是大因緣所以化導令得成佛今求善知識者言為人師範人今末世中己見不明一盲引盲瞎人眼目説邪為正自誑誑人吾佛懸鑒將來急説救病之方略言四病其實病則無量然此四病本自身生身從心有病根在心禪無異路但人心多端悲智不同遂成四病若也覔病於心何心是病何心非病作止任滅方之可知於是普覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰行人前有我相未可施功到此前諸過已離四相既除方堪修習於修習用意中復有是非既有是非覺猶未普故此令依師免溺四病四病既除覺性無瑕覺方普矣又云普覺本末普覺粗細普覺淺深故當請問也大悲世尊快説禪病讚佛於前章善説四相也令諸大衆得未曾有心意蕩然獲大安穩使諸法衆聞所未聞心意豁然獲大利益西蜀復庵暉禪師曰禪病即前説四相乃是行人入禪觀中之病也蕩然者如水之蕩蕩深遠之貌大安穩者對二乘與菩薩分證分斷分覺此乃小安穩也唯佛滿證般若為大安穩耳世尊末世衆生去佛漸遠賢聖隱伏邪法增熾使諸衆生求何等人依何等法行何等行除去何病云何發心令彼羣盲不墮邪見菩薩起此五問請佛開示不羣迷作是語已五體投地如是三請終而復始西蜀復庵暉禪師曰此明請問之意如人有子病者偏憂菩薩大悲先哀末世賢聖隱沒正法將沉而外道邪法攘臂於其間如火熾然盛行於世正當佛種纍卵危時及夭傷之際未審使一切衆生求何等人前云求善知識故今問也二依何等法三行何等行四除去何病使末世羣盲無目衆生依此諸法不墮六師邪見然羣盲者但是不見道之人皆謂之羣盲如瞽却兩眼不見一切縱有談説亦非真實涅槃經云譬如有王告大臣言汝牽一象以示盲者時大臣受勑乃集衆盲以象示之時彼衆盲各以手觸觸已而大臣即還而白王言臣以其象示群盲竟大王即喚衆盲各各問言汝見象耶衆盲各言我已得見王言象是何類其觸牙者即言象形如蘆蔔根其觸耳者言象如箕其觸頭者言象如石其觸鼻者言象如杵其觸腳者言象如木臼其觸脊者言象如床其觸腹者言象如甕其觸尾者言象如繩所謂羣盲摸象各説異端若使羣盲開眼分明照境驗象真體終不説其尾牙等也今經舉羣盲即此類矣問前云發心與此發心何異答云前發信心此發住心故不同也四明聰講師曰禪體靜觀體朗禪則止心不散觀則照心不昏大乘入道以止觀為籌幄用定慧為先鋒破陳壞魔良由於此今云快説禪病者為去佛既遠聖賢隱伏邪法熾盛魔強法弱金鍮不辨涇渭不分説病為藥以邪為正周璞鄭璞名同體異若無正見徒勞苦行故云求何等人而乃正之法亦多種邪法正法惡法善法以何等法而作規模行亦多種有正有邪九十六種皆是邪行因採花婆羅門見比丘身生瘡癢以火炙之外道見之以火炙身為道故有五熱炙身比丘不得命斷遂乃投崖外道效之故有投崖赴火等至有裸形持雞犬等戒皆是邪法今云依何等行修之病亦多種見思病塵沙病無明病身病心病二乘人不識真病往於貧里止宿草菴皆是佛法中病當以何法去此二病發心亦有多種今求圓覺者如何發菩提心於是深識不思議境如善財參五十三善知識皆云我已先發阿耨多羅心未知仁者如何發心如斯五事並在末世龍亡虎逝正廢邪興普覺如擊石火善逝如谷答響爾時世尊告普覺菩薩言善哉善哉善男子汝等乃能咨問如來如是修行能施末世一切衆生無畏道眼能使衆生道眼清淨不畏魔惱令彼衆生得成聖道汝今諦聽當為汝説時普覺菩薩奉教歡喜及諸大衆默然而聽四明聰講師曰發心修行先求正知見人決擇善男子末世衆生將發大心求善知識欲修行者當求一切正知見人西蜀復庵暉禪師曰發無量廣大之心親近大善知識欲修圓覺者富擇正知見之人一切正知見者種種知見悉無染著者是也四明聰講師曰大心者菩提心也修圓覺者非大道為心孰能成就大志發大心者多成佛者少經云魚子庵摩花菩薩初發心三事因中多及期結果少魚雖生子多成魚者少為風濤浪擊損多成少菴摩花開花多成果者少菩薩發心亦復如是百人發心未必一人成佛如佛與阿難過去空王佛時同發道心阿難樂多聞釋迦勤精進釋尊已成佛慶喜為侍者安世高與一人同修行此人雖修行嗔心多世高云汝與我相似不在我下汝不戒嗔將恐淪溺死後在閧亭湖作大蟒蛇有千里威風能分風送舟受人牲靈祭享後遇世高現身相見具説上事盡將廟中所積金帛與世高造寺後生天界所以守戒在心人之難能今發心修圓覺用寂照觀心亦須求正知見人次擇用心最初一步若邪終身為魔眷屬求正知見者有云用佛眼見在心曰知只可六學佛知見然後用佛知見接化衆生非是唯獨在佛善知識通該凡聖凡師人師也佛世四信滅後五品普覺善用知見者正問今時人菽麥不辨遇人先入者為主宰避邪師如避蛇虎如入蠱毒之鄉滴水不可濡唇古云寧破戒如須彌山不可被邪師熏一念流入藏識中永劫取不得心不住相正知見人心不著相不著聲聞緣覺境界正知見人心不執著二乘境界傳心法要曰因聲教而悟者名聲聞觀因緣而悟者名緣覺雖現塵勞心恆清淨正知見人雖化身於塵勞之中其心未嘗有所染著示有諸過正知見人示諸過患者欲與衆生同事而攝化之也維摩詰經曰示行貪欲離諸染著示諸煩惱心常清淨者是也讚歎梵行不令衆生入不律儀雖示現種種過患亦常讚歎真梵行不使衆生入於不依戒律之儀式中也求如是人即得成就阿耨多羅三藐三菩提發心修行者求此正知正見之人以為師友方得成就無上正等覺也藏經曰阿者無也耨多羅者上也三藐者正也三者等也菩提者覺也西蜀復庵暉禪師曰此答指示明師令伏事之人也將發大心者揀二乘之人發小心也此屬正因求善知識者此屬正緣然因親緣踈譬如種子即因水土等即緣因在內緣在外而種子雖自有之若不假水土則不發生水土雖能發生若無種子之時而水土亦不能使有今行人學法亦然雖內有佛性若不假師教開導則佛性亦不能發顯如土木瓦礫等本無佛性則為師之者亦不能使之有是知因親緣疏今此行人內既發大心外求善知識者乃是因緣具備因緣既備佛道方成何以知之華嚴中文殊告善財云親近供養諸善知識是具一切智最初因緣故光贊般若經云欲學六度波羅者當與真善知識相隨常當承事正知見人也當求一切正知見人者謂善解深法空無相無作無生無滅了達一切諸法從本已來離言説相離心緣相離能所相究竟平等不可破壞無業無報無因無果性相如如住於實際然後於畢竟空中不妨熾然建立一切諸法此名正知見人也心不住相者此離凡夫煩惱境界也不著聲聞緣覺境界者此離二乘滯寂境界也經云寧在地獄經百千劫終不發二乘之心法華云若以小乘化我則墮慳貪此事為不可謂此正知見人於十二時中心常遠離凡夫及二乘境界雖然示現貪嗔癡在三界塵勞染境之中而心不曾染著也亦同華嚴説婆須密女愛水而不溺無厭足王瞋火而不燒勝熱婆羅門癡邪而不惑又云菩薩在家與妻子俱未曾捨離菩提之心示有諸過讚嘆梵行謂此正知見人以無量劫來願力欲度有過衆生之故遂假以同事相攝愛令其心不相疑等與相親近心既相親方堪受教可以教之當告之曰若起淫怒癡等者此是過當墮三塗若修戒定慧者此是超夢幻出輪回真實清淨之行如是種種贊嘆梵行常常使一切衆生入佛法律儀軌則中來不使他從魔邪外道凡夫無律儀軌則中去大抵有軌則者謂之佛法無軌則者是外道法問今佛法未審有何軌則耶答有真空軌則之法此之軌則之法能令行人斷障破疑證體起用若求如此正知見人受教者即便克獲成就無上正覺也四明聰講師曰心不住相至入不律儀者具大道心人必不住相不著有無不醉聲色金剛經云不著色聲香味觸此人心如虗空如鳥飛空不住於空若住相之心乃是凡心二乘心頑境偏小妄心並是小徑乃燕所遊之道若大道心是佛境界是菩薩境界如大象所往蹊徑故云十善菩薩發大心長別三界苦輪海聲聞止斷見思惑緣覺更侵習氣無慈悲心不度衆生如麞獨跳不顧後群也正知見人如良玉居山石間混在人世或現塵勞粗惡境界非是虎其皮羊其質如取魚垂鉤不免香餌無餌魚不吞鉤知識用香餌為佛事網羅法界衆生之魚如傅大士有妻子眷屬作世間事梁武帝豈不識人龐居士十萬家財載沉湘江豈是摶財臨死云但願空諸所見慎勿實諸所無此二大士摶財妻子仍讚修圓覺者教令斷欲惑為在俗者教不罹欲皆是方便仍入律儀淨名云示受於五欲亦復見行禪又云示有妻子常樂遠離此皆示現過患也求如是人即得成就阿耨多羅三藐三菩提者如是人者即四依道眼端正阿耨等九字翻無上正等正覺善知識以正觀示人以律儀戒法防非此人即得正心行處即無上等依此發菩提心皆入薩婆若海末世衆生見如是人應當供養不惜身命見此正知正見之人須當供養參問其法不可顧惜身命也古人立雪齊腰斷臂求法者正是此意西蜀復庵暉禪師曰此舉內財之難捨尚當捨之謂若決擇真實正見之人便當捨自己泡幻之軀以資金剛不壞之質如將瓦器以換金瓶即雪山童子是也涅槃經云我念過去作婆羅門在雪山中修菩薩行時無佛亦無經法時天帝釋觀見即下試之以變身作羅剎像甚可怖畏住菩薩前口説半偈已菩薩聞偈心生歡喜即從座起以手舉髮四向顧視唯是菩薩即便往問云大士何處得是半偈義乃是三世諸佛正道羅剎言汝不須問我不食來已經多日飢渴苦惱心亂謬語非我本心之所知也菩薩曰若能為我説是偈竟我當終身為汝弟子剎言汝智太過但自憂身都不見念我今飢逼實不能説菩薩曰汝食何食答曰我所食者唯人暖肉熱血菩薩曰但為我具足説是偈竟我當以身奉施剎言誰信汝為八字故棄所愛身菩薩曰我今釋梵四王為我作證剎即許之遂脫皮衣為敷法座白言和南願坐此座善為我説剎即説云生滅滅已寂滅為樂説是偈已菩薩深思然後於處處石壁遂書寫此偈竟即上高樹投身而下未至地頃時空中出種種聲時剎復帝釋身接取菩薩安置平地懺悔頂禮而去彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢善知識行住坐臥四威儀中常現清淨之行忽然現出一切過患則學者之心不可便生憍慢西蜀復菴暉禪師曰四威儀者即行住坐臥也常現清淨者即前順行也種種過惡者即前逆行也所以永嘉云或是或非人不識逆行順行天莫測疏云夫菩薩化現權道難測但依法門莫疑其迹不以順行即效虔誠或覩逆行便生憍慢禪家亦云但摘取果莫問其樹故智度論云於諸師尊如世尊想若有開釋深義解散疑結者於我有益則當盡心敬之不念餘惡如弊囊盛寶不得以囊惡故不取其寶又如夜行險道弊人執炬不得以人惡故不取其照菩薩亦復如是於師得智慧光明亦不計其惡然為師之難為徒不易勿因此戒錯敬粗人欲驗真虗如前揀擇依此遵承又此藥治徒師勿錯服服之增病無藥可治只如經云剃頭著袈裟持戒及毀戒天人常供養常令無所乏如是供養彼名為供養我又云破戒諸比丘猶勝精進諸外道此乃俗徒所服之藥佛弟子不得服之服之即入地獄又云破戒之人五百大鬼常遮其前掃其腳迹不得於國王地上行不得飲國王水寧以鐵槌碎身如塵及熱鐵纏身種種諸苦破戒身口不得受信心檀越衣服飲食臥具此乃比丘所服之藥俗徒不得服之服之亦入地獄後代緇白切宜善解佛語也四明聰講師曰釋迦昔為國王捨位求阿私仙學法一千歲中捨身為床座仙人起坐於其上又採薪汲水千年道心不退今得成佛此豈非是不惜身命又昔有野狐為師子所逐逃命墜坑無緣可出此狐於深坑底思惟自説偈可惜此身不飼獅子若飼獅子亦自獲福我今抂死空喪此身無益於事天帝釋遙聞狐説偈下來見之於坑上問狐言汝不惜身命有正知見吾今欲聞汝法可以説之狐曰豈法師在下弟子在上便説法要耶帝釋以神力出之出已亦未肯説以衣疊之為座請説是佛因地如此之類皆是規鑒末世衆生求圓覺者豈任𮌎臆薩多波淪敲骨取髓以求般若豈存過患憍慢之心乎況復摶財妻子眷屬求法之人尚不可顧惜身命況摶聚財寶妻子眷屬身外之物耶西蜀復庵暉禪師曰此例外財之易捨也此摶字圭峰注云此譯人之訛略古來西天不使匙筯以手摶而食之謂之摶食後唐時義淨三藏以謂此摶收法不盡只如水漿濕物且摶之不得遂改摶字作段字謂如此方一分一段之食楞嚴亦用此段字今經用摶者乃是訛略也當更添一食字云況復段食此方不訛略也今只有摶字是略也食有四種一段食二觸食三思食四識食然段食以變化為相觸食以觸境為相思識以希望為相識食以增勝為相不離前三食也財即錢財匹帛也妻子即最親眷屬即僕從等意謂若遇前之知真識虗知病識藥正知見人者而自己一身難捨之物尚自能捨而供養之豈況身外分段之食及錢財匹帛妻子僕從易捨之物而不布施者哉若善男子於彼善友不起惡念即能究竟成就正覺一切疑心皆名惡念學者於善知識不起此等惡念方能成就佛果心華發明照十方剎心光發現照諸剎土西蜀復庵暉禪師曰此顯親近善友有大利益謂若於善友處或逆或順不得憍慢之心若起惡念便生障覆自心於法不能得入自古為師不等間受法非容易法句經云若善知識諸有所作不應起於毛髮疑心不得正受甚深法句莊子漁父篇尚云遇長不敬失禮也見賢不尊非仁也彼非至人不能下人下人不精不得其真故長傷身惜哉不仁之於人也禍莫大焉既無惡念障覆則得善友歡喜誘諭無上妙道依彼之教究竟法門克獲成就十方諸佛無上正覺此之正覺不離一心覺心既明慧光開發觸處無染朗然明白如百花開敷盡十方世界中無所不照無所不燭從此反本還源超凡入聖一得求常盡未來際受用無盡是知親近善友豈小補哉四明聰講師曰況復摶財至照十方剎世人只知用事不知用理事即是淫怒癡性不善法善即用理者即淫怒癡即大解脫門佛為凡夫二乘人説離淫怒癡為菩薩説即淫怒癡皆是佛法如華嚴和須密多以淫法接人鳴者啐者皆獲三昧鴦掘摩羅怒佛持劍殺佛喝佛云瞿曇儞住儞住佛云儞不住反教我住鴦掘於一言悟性放下劒證阿羅漢善用惡法入道者謂之入魔魔如佛如一如無二如也給孤長者鋪金布地買園造寺豈以聚財之故而害其為善知識也佛弟難陀在俗愛妻不相捨離佛去乞食其弟難陀將一鉢飯送佛其妻將一點唾抹夫鼻上莫令唾乾了歸引到祗園強令剃髮佛令把袈裟角遊天宮難陀見天女好問天女曰儞何無夫天女答曰佛弟難陀持戒來此為丈夫難陀遂乃持戒後成阿羅漢授記作佛豈可以著色之心欺之不成聖證仙預大王殺五百婆羅門仙預生天五百皆墮地獄如此經論皆以迷逆為佛事可謂蓮出汙泥不生陸地若迷中實相即冰是水惡具一切善法性惡法門亦理毒害此如醫者善知諸病若是善病用人參茯苓亦可療病別有熱病須以黃龍湯治之即愈黃龍糞清也以瘥病故不嫌藥穢思之可知心華才朗十方佛國自然現前潭清月朗也善男子彼善知識所證妙法應離四病云何四病修證圓覺不可起作止任滅之心有此四心即為四病西蜀復庵暉禪師曰此下分別四病令除四病者一者作病二者止病三者任病四者滅病此且先總標起云彼善知識所證妙法此法是所依之體上脫離作止任滅四病然心病無邊要唯此四隨有其一即不堪為師又徵起云如何是四病下文答之一一辨示其相也四明聰講師曰法華云善知識者是大因緣所謂化導令得見佛禪經云衆緣雖具足開導由良師於善知識為觀者大品云佛菩薩是善知識法性實際是善知識淨名云道品善知識由是成正覺華嚴云有善知識魔三昧魔菩提心魔魔能使人捨善從惡又能化人墮二乘地魔經云除諸法實相外餘皆魔事如此等安得不辨若也不識正知見人堪為依棲則水濁珠昏何暇息心何暇修觀故云是大因緣今云應離四病此是為人師者自己之病有四即非其徒有四病也今為人師者自言所得深妙非汝等境界此真魔王所説若真知識所證境界如鳥飛空不住空亦自度空度無所度衆生斷無所斷煩惱學無所學法門成無所成佛道一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病作種種行者修一切有為之行也圓覺妙性非因有為而得悟故曰非作得故圓覺疏亦曰既是造作生情豈合無為寂照西蜀復庵暉禪師曰疏云謂或思惟揣度計校籌量興心運為擬作行相造塔造寺供佛供僧持呪持經僧講俗講端然宴坐種種施為止息深山遊歷世界勤憂衣食謂是道緣故受飢寒將為功德觀空觀有愛身厭身於多行門隨執其一託此一行欲契覺心既是造作生情豈合無為寂照之理此病從前幻觀中來彼云一切菩薩從此起行至諸輪中皆云度生起行今失彼文意成此作病也四明聰講師曰智者説止觀正為衆生治此諸病彼云近多附佛法外道又云此人依法起見如是所得亦復無邊若不精詳是非難辨舛謬邪正錯雜差之毫𨤲失之億兆真實之法辨之不出玉石不分自誤誤他二俱墮落況外人所見亦謂説妙外人視相亦作佛形相如鎮頭迦加羅迦二果顏色一般一能殺人一能活人鎮頭迦如柿則善加羅迦則惡不識者誤服為害之甚縱依師教恐墮二乘外道魔王神我全是縛法非自在我互相是非以小所證為涅槃方沉生死愛處生愛嗔處生嗔雖有慈悲只成愛見雖俲塗割終為強忍雖具一切智不出推度雖是神通皆是漏化所學四韋陀典非總持之力雖斷鈍使如屈步蟲世醫之治差已更發八十八使集海浩然二十五有苦網無際如斯之類豈可認為真法且如諸佛説空法為度著有者若有著空者諸佛所不化作病者作是造作作以身作此身虗偽假名為身縱爾能現佛身亦不可認為真佛愛之即錯便隨邪徒如毱多尊者化一外道外道能現佛三十二相與佛無殊至狐有通天狐能現佛身若造作作生作佛作人作天神作魔王善須甄別我於本心作種種行此心虗妄浮心多諸巧見豈可信此虗妄便取圓覺況圓覺不屬虗妄亦非造作而得故云非作得故若依真圓者即實相實相即善法也通名為法亦名法身若法身實相依而修修時亦有見實相法身亦無我能修圓覺他不能修不生我所相亦須知能修之心本性空寂我心自空罪福無主雖不求作圓覺圓覺自至如鏡中像但得鏡上垢盡鏡中像何所慮哉二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故説名為病謂如不斷輪回不求寂滅不起諸念亦不滅念隨緣任性欲證圓覺不知圓覺妙性非因此任心而能悟故曰非任有故圓覺疏亦曰設令善惡不拘即名無記之性西蜀復庵暉禪師曰疏曰前則驅馳覔佛此乃放縱身心也意謂生死是空更何所斷涅槃本寂何假修求不厭不欣無作止念但於一切法上任真自然如天高地厚火熱水濕風搖土靜松直棘曲鵠白烏玄各各差別之類此是其性自然今時有一般人云妄從他妄真任他真各稱其心何必改作作必任作好間任間逢飢即餐遇衣即著好事惡事一切不知任運而行信緣而活困來即臥興來即行東西南北何定去住謂言間即契道殊不知是病所以騰騰和尚云不用廣學多聞不要辨才聰俊不知月之大小不管歲之餘閏人來問我若為不能共伊談論寅朝用粥充飢齋時更餐一頓今日任運騰騰明日騰騰任運此病因前辨音章文云圓覺清淨本無修習及修習者失彼文意自謂已覺何必作幻故成任病也四明聰講師曰此四者皆云病者病是見病愛佛愛外道都屬見病此任為病此云任見之病此病難醫若云不斷生死此是凡夫妄見妄病不斷生死生死自至墮地獄輪回六道二十五有並是生死不求出離生死無際豈非病耶涅槃二乘所證不求涅槃不出三界愛涅槃亦是見病圓覺不在小乘涅槃中若爾所見生死涅槃不是佛性若著二邊求者尚且是病何呪都不求者此病尤甚生死涅槃此二法墮落二邊永不成佛故説為病今時學佛學空法要見性殊不知空是第一病空病難醫只聞空能壞一切法不見一切法能壞其空火得空故燒壞一切水得空故蕩散一切地得空故生育一切風得空故成一切法壞一切法何況人心著空不為病耶不是空不可用只為用不得法如人有病眼藥治病藥反為病只為衆生不識本性空寂不達性空至以有失性空本來空不是作為成空若不斷生死不求涅槃則落二邊見病若要離二邊病須依中道第一義諦若依而行之則修種種功德修無作行言語道斷心行處滅破諸顛倒心心寂滅任運流入薩婆若海故説任心以之為病三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故説名為病謂如永止諸念得種種性寂然不動平等無二求證圓覺不知圓覺妙性非止心之所能合圓覺疏亦曰性本無止止亦違性西蜀復菴暉禪師曰疏云前則生心恐非次則隨情慮失今但止息其妄妄盡則自然平等平等即真何須別照由息念故離相離相故得性此性是諸法無性之性非即覺性也此病從前靜觀中來迷彼取靜為行及澄諸念之言因成此止病也四明聰講師曰止病者妄心若散當止止之其散即止是好良藥誰不服之十方如來皆依奢摩他止之今説為病者是汝不善用止故説為病凡夫用止其散雖息不能用為四禪天為魔王為二乘為偏菩薩為坑為穽如淨名經中魔王領諸魔女來惑持世菩薩魔謂菩薩言正士受是萬二千天女可備灑掃菩薩不識彼為魔也乃云憍尸迦帝釋天主無以此非法之物要我沙門釋子此非我宜所言未訖淨名在前云此非帝釋是為魔來繞圍汝爾時魔波旬念維摩不為所撓欲隱形去而不能盡其神力亦不能去聞空中聲曰以女與之乃可得去魔以畏故俯仰而與維摩云諸姊魔以汝等與我汝等皆當發阿耨多羅三藐三菩提又為諸女説諸離欲之法諸女得未曾有魔復來白淨名言居士一切捨者是為菩薩我欲與諸女俱還天宮淨名云我已捨矣汝便將去諸女言我於居士處有法樂自娛不復樂五欲樂也我今隨魔還宮居士以何法教我止於魔宮居士云有無盡燈法汝等當學無盡燈者樂常敬佛樂供養衆樂堅持戒樂廣行施夫一菩薩開導百千衆生發阿耨多羅三藐三菩提心譬如一燈燃百千燈明終不盡當以此法住止魔宮將來佛道成就也若以無盡燈為止者燈能破暗在暗止之即明在散止之即定在吝止之則捨在凡止之即聖但善用不為病不能用止外道也用止變九十五種皆是邪聲聞緣覺用止只有餘涅槃偏菩薩用之如雲外月出水花皆是止病今修圓覺用以中道佛性諸法實相如如之理為觀為境為憑仗行亦禪坐亦禪語言動靜息二邊生死涅槃凡聖聲色因果依正名利富貴種種諸法皆是二邊不著二邊亦不著中道法愛如遊大海不假舟楫不加櫓棹自然到岸不如是學是名為病若中道妙奢摩他空一切相破一切惑謂之體真止此止是觀境觀如如直至金剛後心不為病也四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故説名為病謂如永斷諸幻身心本空六根六塵等悉皆寂滅永證圓覺不知圓覺妙性非滅相之所能證圓覺疏亦曰住寂之心何能契合西蜀復菴暉禪師曰疏云前則但止息心念令寂此則計於身心根塵本來空寂又前不妨見有根塵但不隨念愛染故云止息此則根塵亦無堅持空寂之相由見空無故云除滅竟云煩惱之本即是身心若執身心煩惱何斷故標斷煩惱釋以身空又斷煩惱空却身心身心尚空根塵何有身等本空故名永寂諸相既泯寂相現前擬將此心求證圓覺夫覺體靈明不唯寂滅惑空住寂豈得相應況圓覺體非動非靜雙融動靜恆沙妙用無礙難思住寂之心何能契合言即似近理即全乖與理相違故成滅病此病從前寂觀中來彼諸輪中皆云寂滅及斷煩惱迷彼成此此之四病皆緣不以聖教為繩墨不以師友為指南但自舉心作如是意所以經首皆云若復有人作如是言也四明聰講師曰滅為病者皆由不達空性取空像貌而行善惡住空理者此空蓋有四人取之不同小乘聲聞觀滅諦為折盡為滅緣覺觀十二因緣無明滅行滅為至理得緣覺證菩薩用六度為至寂理為滅小乘之滅不至圓覺通人以幻為滅別人以一理隨緣為滅如是三人皆不中理盡是住寂理中為滅故今説之為病不達滅性本如來藏第一義諦猶住門外止宿草庵今明滅者滅而不滅生死涅槃不滅衆生不滅佛也不滅六凡四聖不滅色心不滅依正二報不滅天堂地獄不滅煩惱無明不滅見愛不滅八萬塵勞不滅一切陀羅尼門不滅水火不滅魔邪不滅盡世出世間法佛法衆生法都不滅為之世間相常住為俗諦為森羅萬象為空如來藏為不空如來藏為常住真心為性淨明體為毗盧遮那皆顯圓覺一切法是圓覺體萬竅怒號是圓覺用圓覺在衆生生死中在聲聞涅槃中亦在諸日用中終日圓覺未嘗圓覺如人説火不能燒口楞嚴云如我按指海印發光汝暫舉心塵勞先起會用生滅滅本不滅不能用之生滅即滅令言不達滅性住生滅中指滅為滅坑穽為滅如破塊落空谷今取大圓覺性本來無滅何須論滅本來滅是本來空何須更空以性奪修直指十二因緣苦集滅道生死無明皆本不滅故經云不斷結使而淨諸根又云不住使海父母所生眼悉見三千界龐居士云難難百碩油麻樹上攤龐婆應聲云易易百草頭邊祖師意靈照云也不難也不易飢來喫飯困打睡今云難非難易非易飢來喫飯困來不打睡作止任滅滿世間究竟皆歸第一義離四病者則知清淨無作止任滅之心方本性清淨作是觀者名為正觀若他觀者名為邪觀清淨無染即名正見別生見解即墮於邪西蜀復庵暉禪師曰此總結前四病真偽也離四病者則知清淨者疏云但將前四行自驗其心隨落一門則知是病故言離者則知清淨然其四門皆是諸經勸讚況前三觀具有斯文今此以為病者有其二意一者四門中皆無觀慧二者但以率心偏住一行不窮善友圓意不究佛教圓文才悟一門之義便不能久事明師才見一經妙文便不能廣窮聖意但貪單省執一為圓是以經文總呵為病也作是觀者離四病也故名正觀若他觀者取四病也故名邪觀外典有曰適堯舜之道者正道也非堯舜之道者他道也與此同意然此四門但除其病不除其法若未見道之時此四皆成執病若見道之後此四皆可入道自然終日作而未嘗作終日止而未嘗止終日滅而未嘗滅禪宗喚作不改舊時人只改舊時行履處只如昔時釋迦在於僧中演無上道與僧不異維摩在俗説解脫果與俗無殊勝鬘女説大乘法與女人形不改善星比丘行闡提行僧相不移又如世間仕宦之人為遷職改官高官豈即貌別據此話説但去內之執心何關色身男女相貌衣服好醜等事耶若言形隨證改貌逐悟遷是聖人者則瞿曇改形方成釋迦維摩遷相乃成金粟若不達此理縱是腳蹈蓮華亦同魔作問此之四病為説揀師師離四病耶為學人自離四病耶若説師病者何以問中別舉并又結云作是觀者名為正觀若説學人病者云何標中云彼善知識所證妙法應離四病答二皆不異既聞經識病須求離病之師既事此師即修離病之行若師若徒病無別相也四明聰講師曰有心曰邪無心曰正行法云觀心無心法不住法滅諦寂靜永嘉云心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙亡性即真正觀邪觀打成一片若要降龍伏虎莫學弄蛇手段金剛經云法尚應捨何況非法安得不捨善男子末世衆生欲修行者應當盡命供養善友事善知識欲修圓覺者若遇真善友真善知識當須不惜身命承事供養彼善知識欲來親近應斷憍慢見善知識有相親之意不得生憍慠慢易之心若復遠離應斷瞋恨見善知識有遠我之意不得生瞋怒怨恨之心現逆順境猶如虗空凡善知識現違我順我之境而我視之猶如虗空了無憎愛了知身心畢竟平等與諸衆生同體無異如是修行方入圓覺了知自己身心與彼虗空平等無二與諸衆生同一真體方能悟入圓覺西蜀復庵暉禪師曰此辨事師之心答前問行何等行何以知之後結如是修行方入圓覺然法句經説善知識有二十一種譬喻一如父母二眼目三腳足四梯橙五飲食六寶衣七橋梁八財寶九日月十身命等乃結善知識者有如是無量功德是故教汝親近大衆聞已舉聲號哭自念曠劫已來常為善知識之所陶鑄守護保庇攝受種種恩德言欲來親近者此現順也若復遠離者此現逆也夫善友種種方便俯就物機相親相近愚者無識憍慠怠慢之心便生或遇異緣相去相離便生瞋恨云疏我親彼説愛説憎既一念才瞋百萬障起非唯失道亦墮三塗也勝鬘經云應攝受者而攝受之應折伏者而折伏之則佛法久住也意謂末世衆生希求樂欲修圓覺妙行者合當盡其身命恭敬供養承事善友知識若彼善友知識或來親近或有遠離此乃是現逆順之境相試不得起憍慢及瞋恨之心況諸佛用心或慈或威或定或慧救拔衆生得大自在此時用心猶如虗空湛然常住廓爾無私更無改變當以觀智了達彼善知識身心之中具廣大靈明佛性此之性上有如此竪通有如此橫遍有如此真常有如此絶迹有如此不變有如此隨緣有如此普天匝地有如此逼塞虗空非唯善友身心之中如是且自己與一切衆生身心中亦有如此竪通如此橫遍如此真常如此絶迹如此不變如此隨緣如此普天匝地如此填溝塞壑自他不二彼我無差同體平等更無有別此謂之發同體大悲心故華嚴云若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙脫或不然則難知菩提之道世間所尊可進可求而不能折伏我慢不能屈節事師雖知薩埵衆生可悲而不能忘軀弘道故所以世尊於此痛言教示之若能依此教示修此所説之行方許證入圓覺反明若不如是修行則不能入圓覺也四明聰講師曰衆生用情立分別心諸佛用理無分別念經云於一切人猶如佛想戒經云一切男子是我父一切女人是我母我生生無不受生學佛者用慈悲不立人我故云末世修行應當盡命供養善友事善知識善友有琢磨之功知識有指迷之德親近知識更須斷除憍慢來親近者不得憍為人師者不得慢示弟子或有親疏勿起瞋恨凡見如此逆順境觀想猶如虗空空無分別既無親疏無憍慢無瞋恨若身若心自然平等此圓覺性與一切衆生皆有之皆同體汝亦圓覺我亦圓覺只一圓覺無二圓覺心佛衆生三無差別以此清淨心平等心無礙心入圓覺如在羲和中行圓覺私隱也善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫無始劫來於自則愛於他則憎此一等心能發生一切憎愛故名曰種子既有此等種子安得解脫也西蜀復庵暉禪師曰此明除病之行也自他憎愛者前已頻明今復説者是種子故即入道之微細病也謂捨此取彼憎妄愛真蓋現行粗而易覺種子細而難明故偏指之夫四之與三而衆狙妄生喜怒非之與是而世人競起愛憎悲夫若復有人觀彼怨家如己父母心無有二即除諸病視冤如親即無一切憎愛西蜀復庵暉禪師曰此等自己之心親一切之人若將上怨同上親觀之者即得無上法樂也於諸法中自他憎愛亦復如是心既平等則一切法中種種愛己憎他之心亦復如是西蜀復庵暉禪師曰此等自己之心觀涅槃之法前既云怨家父母無二例此觀法應云涅槃生死不殊不殊則無自他憎愛故知諸病只由愛真憎妄見自見他故不肯久事宗師但自生情起行今既斷斯種子則諸病自除所以前云即除諸病此文亦復如是由與能觀人除病之意一同也四明聰講師曰善男子末世衆生至亦復如是此經已除無明業識為極説有無明生我見即我執有我執便有嗔愛喜怒若能斷我執憎愛不生既無憎愛即無怨家若見怨家如父母想不應於父母起逆害心於我自除憎愛他亦於我亦無憎愛故云自他憎愛亦復如是平等慈悲不求圓覺自至何況以此妙心求於圓覺如錦上鋪花豈不順哉善男子末世衆生欲求圓覺應當發心作如是言西蜀復菴暉禪師曰此下經文答顯發心深廣答前問云何發心也謂十方諸佛本地因地皆發此四心依此願修行方成正覺若無願力䇿發則所修之行亦不成就四心者一廣大心二第一心三常心四不顛倒心彌勒頌云廣大第一常其心不顛倒此之四心與金剛經發四心同也故下依頌節釋也盡於虗空一切衆生西蜀復庵暉禪師曰此發廣大心也金剛經云所有一切衆生之類若卵生若胎生若濕生若化生至若非無想此是三界四生九類今經云盡於虗空一切衆生與彼同也我皆令入究竟圓覺初修行時即當發此廣大誓願西蜀復菴暉禪師曰此發第一心也金剛經云我皆令入無餘涅槃而滅度之謂三界四生九類菩薩之人不擇怨親發第一心皆以真如寂滅之理而普使修行同證入十方諸佛不生不滅涅槃之理若不如此即與二乘無異今此經云我皆令入究竟圓覺者各隨其經宗旨以舉法也於圓覺中無取覺者圓覺光中明明不昧未嘗起心取證圓覺西蜀復庵暉禪師曰此發常心也金剛經云如是滅度無量無數無邊衆生實無衆生得滅度者謂此真如寂滅之理普度三界四生九類了不見有能度之人亦不見有所度衆生能所俱忘若見有能度所度即不平等既不平等豈能常常運如是心耶常之一字即平等之義今經云於圓覺中無取覺者疏云我入覺時我即圓覺衆生亦爾意謂我證圓覺即以此圓覺度脫一切衆生皆入圓覺衆生既入圓覺我即不見一切衆生因我度之而入圓覺若見有衆生因我度之而入圓覺者乃是取著相即非平等之心也除彼我人一切諸相不著我相人相衆生相壽命相如是發心不墮邪見一無自他憎愛二願衆生成佛三不取證圓覺四不執著諸相發此四心方為正見西蜀復庵暉禪師曰此發不顛倒心也金剛經云何以故須菩提若菩薩有我相人相衆生相即非菩薩謂設或見有能度之人所度之者又有何因由所以之故便妨於道耶由若見有能度與所度者須菩提此菩薩之人即著我人衆生壽者四相即不是菩薩用心乃是凡夫用顛倒之心反明不見有能度與所度者須菩提此菩薩之人方無我人衆生壽者四相此乃是菩薩用不顛倒之心今經云除彼我人一切諸相者謂若不見有衆生因我入圓覺者方除我人衆生壽者四相并一切能所之相若離四相即是菩薩不顛倒心前發五問今垂五答一問求何等人答云當求一切正知見善知識二問依何等法答云當依倚圓覺妙法三問行何等行答云應當盡命供養善友辦事師之心不見逆順境界不得憍慢及起瞋恨如是修行四問除云何病答云當除去自他憎愛一切種子五問云何發心答云當如前發廣大心第一心常心不顛倒心其次序來歷對文一一可見四明聰講師曰善男子至不墮邪見一切衆生我皆令入究竟圓覺者四弘誓中第一云衆生無邊誓願度菩薩發心度如虗空之衆生舉一願而三願相從又云無取覺者不云我是能覺他不能覺彼能覺我不能覺到此無彼我心不取覺不取不覺度與不度斷與不斷覺與不覺無彼我相如是心是平等心法界心虗空心是圓覺寂照心是衆生心如是發心不隨邪見聖人如是丁寧讚圓覺以此照我自心與此合否合者與修多羅合若不合者名為妄想人而不為吾未如之何也矣爾時世尊欲重宣此義而説偈言普覺汝當如末世諸衆生欲求善知識應當求正見心遠二乘者法中除四病謂作止任滅親近無憍慢遠離無瞋恨見種種境界心當生希有還如佛出世不犯非律儀戒根永清淨度一切衆生究竟入圓覺無彼我人相當依正智慧便得超邪見證覺般涅槃西蜀復庵暉禪師曰戒根永清淨者此頌前能治也以所治憎愛是犯戒因故云未得解脫證覺般涅槃者般者梵語此云入證覺者即唐言也涅槃即梵語此云滅度即唐梵互舉也四明聰講師曰四病才出體心華自發明昨夜三更月畢竟為誰清唐圭峯定慧禪師宗密頌普覺菩薩章曰普覺離病託師親當依端正知見人行住坐臥迹莫計作止任滅病非因自他除病不除法供事捨財及捨身憎愛直須無種子始於圓覺可修真普覺菩薩章終十
