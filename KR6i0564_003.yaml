body:
  text: 西蜀復菴暉禪師曰經起普眼菩薩章自下廣明行相有九章經初四乃通明觀行上根修證令普眼一章乃開示觀門同佛也言普眼者由此法門令觀身心無體根識塵境世及出世自身他身一切清淨遍滿法界普同諸佛觀行成就頓見如此境界是真普眼也此含悲智謂普見諸法清淨是大智普眼普見衆生成佛是大悲普眼此章依文殊文解及普賢之行入二空觀并倣修法界觀然則科謂之通明觀行者通指三根之人別明觀行者上中下三根各各不同根有上中下不同機即是頓機也然疏中謂此諸章前前不假後後後後必躡前前也四明聰講師曰蓋聞菩提之為極神妙寂通圓智湛然道絶形識之封理畢生滅之境衆生無始之病起自四大五蘊六根喻如人之兩足有足則能行無足則不能動是以聖人有以見動足以喪志舉足以失方於是止而觀之靜而明之便其動而能靜靜而能明普眼觀衆生動而未靜欲息空花之病足廣談如幻之法門故有此章之來意也於是普眼菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言大悲世尊願為此會諸菩薩衆及為末世一切衆生演說菩薩修行漸次云何思惟如何思惟方為正念云何住持如何住持方得無失衆生未悟作何方便普令開悟亦同法華欲令衆生開示悟入修何方便世尊若彼衆生無正方便正思惟般若經以不墮無為為正方便以斷妄想為正思惟今曰無正方便者是墮於無為也無正思惟者是不斷妄想也聞佛如來說此三昧心生迷悶即於圓覺不能悟入願興慈悲為我等輩及末世衆生假說方便前章說知幻即離不作方便衆生未悟故普眼請佛假說方便作是語已五體投地如是三請終而復始爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來修行漸次思惟住持乃至假說種種方便汝今諦聽當為汝說時普眼菩薩奉教歡喜及諸大衆默然而聽西蜀復菴暉禪師曰請問之內先標請修行漸次者良由前章普賢所問幽微深遠世尊之答又稱理而告先使消除心病然後萬行齊修又恐前問世尊知幻即離不作方便亦無漸次便謂但知之則已何必更修今普眼欲使教門圓足故此請問思惟即思慧住持即修慧佇聽等即聞慧此乃從凡入聖反妄歸真必假三慧故楞嚴云從聞思修入三摩地今問云於彼衆生無正方便及正思惟聞佛如來說此三昧心生迷悶即於圓覺不能悟入意云必由方便等得入故疏云反顯請也此指文殊章及普賢章開解行之人此三昧即普賢章離幻法門迷則不悟悶則不入若據悟入二字深淺不同豁然明了曰悟修行契證曰入所以道大開曲示始悟終入也牒請等科例前可解四明聰講師曰於是普眼菩薩至而白佛言者請法式儀例如前釋大悲世尊至修行漸次者此位菩薩因聞幻化空花如幻三昧雖聞未知如何思惟雖思未知如何修行雖修未知如何取證故特啓問如來思惟修證之法依經本有六問攝六歸二且存二問經曰云何思惟云何住持立二云何是止是二問諸宗立說不同唯慈室云兩番云何顯是正請也但思惟必藉方便住持必攝開悟故今列二正問以兼修行漸次并假設方便開悟也云何思惟云何住持者十六觀經韋提希夫人請修淨業亦有二問與此大同彼云教我思惟教我正受正受住持名異體同但觀經云正受即三昧非令住院之住持此云住持即祕密藏住如幻三昧經云入理般若名為住今問思惟修習亦是正心行處也佛因韋提希問答以三種淨業即孝養父母行世仁慈受持三歸具足衆戒此經思惟修習豈越於此三業彼云教我正受佛答以十六妙觀觀即住三昧也經云諸佛如來以法界身入衆生心想中是心作佛是心是佛諸佛正遍知海從心想生今之云住持豈離法界身此經能證者雖作止任滅亦是觀經是心作佛是心是佛心作心是即與向下作止任滅義意不迷金剛亦云應云何住云何降伏其心今住即住理二乘住真諦菩薩住俗諦佛住中道第一義諦亦與諸佛住處名常寂光寂光即三德也豈非三德祕藏也又經云以大圓覺為伽藍安住平等性智豈作世間伽藍解會也衆生未悟作何方便普令開悟者未悟即是未開思修人未入三昧正心行處人更作方便曲巧善權此是再三勤懇之意世尊若彼衆生無正方便至默然而聽正方便法華謂之祕妙方便十六觀經有異方便即是如來善權誘引之辭通謂之方便蓋佛本無身無說亦無衆生亦無成佛不成佛一真法界實相理地秖謂衆生迷真逐妄之久不能覺悟剛強難化諸佛慈悲心切假說方便立圓覺名圓無自性人人本具此圓覺即佛知佛見法華謂之開佛知見可謂一潮以通百浦也善男子彼新學菩薩及末世衆生欲求如來淨圓覺心應當正念遠離諸幻正念者無念也無一切念諸幻自遠修圓覺者應當如是西蜀復菴暉禪師曰答文有四此第一起行方便也正念者即文殊開解遠離諸幻者即普賢章開行所以前云第三普眼菩薩依文殊之解普賢之行入觀乃指此文何謂正念即無念謂之正念有念是魔業無念是法印分別魔軍熾忘機佛道隆又云離念相者等虗空界謂一切諸法皆因妄念而有差別若離妄念即無一切境界是知無念為正念若考諸經皆各有方便且華嚴以修諸行門皆無所得而為方便金剛以無住為方便禪門以離念為方便此經以正念為方便良以外存一法則內起緣念內有緣念則外見有法遠離諸幻即普賢章四重遣遣之文也四明聰講師曰正念者即正心行處三昧也諸家解說不同多以無念為正念今謂未然若論本來無念何用正之只緣見今有念其念虗妄不正必須以正正之如世人屋屋若不邪何正之有正之必為邪也衆生無始妄心六塵緣影此妄邪念念念是病聖人假設法藥以正閧邪其邪必正如來淨圓覺心本無邪正只為不守正性為邪妄熏動正隨妄轉水逐波流假說方便為筏以八正為船渡難度者其念若正五蘊空華六根重病任運自離故云遠離諸幻但知離幻之方求知幻藥實用故後具出方藥先依如來奢摩他行此翻為止即定也圓覺疏曰奢摩他行者至靜為行堅持禁戒一切禁戒皆當堅持因戒入定故也安處徒衆我之徒衆皆令安處我心無惱可以辨道宴坐靜室西蜀復菴暉禪師曰二觀行也文有二節今先戒定也奢摩他此云止即定支靜何謂之止蓋止絶一切妄想觀諸法性空何以知之起信云若修止者住於靜處端坐正意不依氣息不依形色不依於空乃至不依地水火風不依見聞覺知一切諸想隨念皆除能除之心此謂之止也堅持禁戒者謂一向絶緣的不毀犯曰堅持防禁根門戒約身口曰禁戒戒則防非止惡獨標如來奢摩他行者以簡不是小乘及菩薩之定大抵學道之人莫不皆由三無漏學而成聖果此文已具謂奢摩他即定堅持禁戒即戒下二空觀即慧若持三歸五戒便出三途生在人天若修定者即超六欲若修慧者便出三界如二乘人是也古云戒出三途定超六欲慧出三界又云定慧等學明見佛性此就法說若就喻說者戒如捉賊定如縛賊慧如殺賊問諸經皆言戒定慧今經何言定戒慧耶答有二故一者行人若用亂心持戒不堪入此觀門故先言定後言戒二者此經教人先了悟覺性次修菩薩行所以持戒居定之後此屬行安處徒衆者即同見同聞同學論量佛法之衆宴者默也靜室喻圓覺意謂若行人欲入二空觀之時必先依倚十方諸佛之定及十方諸佛之戒約束禁制身口六根然易伏猛獸難降寸心學道之人初雖有悟門而無量劫來習氣種子尚在於十二時中當以諸佛清淨之戒守護無令犯人苗稼然後安處在於同學之中心地默默常如在靜室之中圭峯云坐為攝身身住則心安心間則境寂經云一切業障海皆從妄想生若欲懺悔者端坐念實相見𦘕跏趺坐魔王尚驚怖何況入道人端坐不傾動下經云無礙清淨慧皆因禪定生從定生慧其理必然四明聰講師曰先依如來奢摩他行者圓覺體寂因元靜乃稱止本覺虗照由常明故曰觀妄風俄動假妙奢摩他而止之心珠久昏須毗婆舍那而觀之散即止昏即朗非此法藥覺性何由可顯奢摩他此云止涅槃名為能滅能滅一切煩惱又云能調能調諸根惡不善故又云寂靜能令三業成寂靜故又云遠離離衆生五欲故又云能淨能清貪欲嗔恚愚癡三濁惡法故以是義故名止為定毗婆舍那此云觀涅槃名正見又名了見曰能見曰遍見曰次第見曰別見慧之總名也優畢叉此云止觀平等涅槃名為平等又名不諍永嘉云奢摩他曰寂而常照毗婆舍那曰照而常寂優畢叉非照非寂奢摩他名出楞嚴圓覺如前所引三名出涅槃也天台出時楞嚴圓覺未至後智者自影傍三觀立三止名體真止即奢摩他方便隨緣止即三摩鉢提息二邊分別止即禪那亦曰定此經為之二十五定輪今依如來因地法行須明深觀又觀耶是境天台云對觀名境對止名諦其實三止三觀名異體同如水與氷氷名為止水名為觀水性雖流觀也結而為氷止也今先依奢摩他行此用三止止其虗妄流動之心息其攀緣一念若止已即止即觀照此幻心自然消落幻心離念一切精神動靜不移憶忘如一因地修行想見其為人也堅持禁戒者夫持戒者精潔如氷壺玉井立志如節操嚴霜秋毫無犯方曰堅持戒品有三一曰毗尼又名毗奈耶此翻為律毗尼與律言不並立二名尸羅此翻為戒即六度中一也三名波羅提木叉此云處處解脫亦云別別解脫天台戒疏云戒乃運善之初章却惡之前陳亦謂之長生符不死藥據理先受三歸次受五戒此三歸五戒大小乘為發行之初修觀之始龍樹云念佛如醫王念法如服藥念僧如看病人念戒如藥禁忌故三歸之後方明諸戒也佛初出世未轉法輪先為白衣波離提謂二人受三歸次受五戒若在家佛弟子破此五戒者則非清信士女經云五戒者天下之大禁忌若犯五戒在天則違五星在地則違五嶽在方則違五帝在身則違五臟如是世間違犯無量若約出世間犯五戒者則破五分法身一切佛法所以者何五戒一切大小尸羅根本若犯此五戒則不得更受大小乘戒也此五通名戒者以防止為義能防惡律儀無作之非止三業所起之惡此出天台法界次第今時道俗雖云持戒豈知有大小乘律儀之殊今依大智律師資持事鈔出小乘僧尼所受五篇七聚名目五篇者一波羅夷義翻極惡三意一者退沒由犯此戒道果無分故二者不共住不得二種僧中共住故三者墮落捨此身已墮阿鼻故四分云譬如頭斷不可復起若犯此法非比丘也二僧伽婆尸沙善見律云僧伽為僧婆者為初謂僧前與覆藏羯磨也尸沙者云殘謂末後與出罪羯磨也若犯此罪僧作法除故又毗尼母云僧殘如人為他所斫殘唯有咽喉故名為殘理宜速救故三偷蘭遮善見云偷蘭名大遮障善隨後必墮惡道體是鄙穢從不善體立名四波逸提義翻為墮十誦律云墮在燒煮覆障地獄八熱為燒煮八寒黑暗為覆障貪慢心強制捨入僧故名為薩耆尼翻為盡薩耆為捨五波羅提提舍尼義翻向彼悔從對治境僧祗云此罪應發露也如上五篇更加六突吉羅為六聚突者惡也吉羅者作也四分云應當學胡僧翻守戒此罪微細持之極難故隨學隨守以立名若云七聚者分突吉羅為二聚身名惡作口名惡說分身口為二聚故云五篇七聚智論云禁戒為性剃髮染衣為相氷潔其心玉潤其德如前戒品僧尼所受之法不通俗人僧則二百五十尼則五百並五篇七聚持之無犯證阿羅漢後出大乘菩薩律儀通道俗七衆人受大乘三聚戒者一攝律儀戒二攝善法戒三攝衆生戒知則斷惡修善度生梵網云戒如明日月亦如纓絡珠微塵菩薩衆由是成正覺又云誦我本師戒甘露門則開當知修圓覺者先依如來奢摩他定其志攝其心次依毗尼軌則其心然後身開遮口容說默意行止觀遠離諸幻到清涼池也安處徒衆者道不孤運弘之由人聖人制法假緣進道如陶戶家輪作瓶瓦等先擇良處水草豐便始立作所欲結期限建置壇場必安處徒衆選擇良朋勝友互相策發為同行善知識如法華淨藏淨眼與淨德夫人化妙莊嚴王翻邪為正同見宿王華智佛此皆良友也所以云蓬生麻中不扶而直安處徒衆意在於斯宴坐靜室者天台依大藏教立四種三昧先二十五方便建立壇場楞嚴圓覺皆有期限制之一處今宴坐者安坐以攝身住身住則心安心間則境寂故攝身心者必須靜室要知道雖無在必假緣生故古之修道者多於山間林下阿蘭若閴寂之處剃草結茅木食㵎飲或依蕙嶂或友𤠔鶴或枯木身心或韜光晦跡或飛錫泉涌或翠峗晏寂如此聖流道高龍虎德重鬼神豈比今時纓情好爵者佛在世時有一沙門過失遣出外居絶無衣食適遇四王會下有一神鬼亦有過失遣下人間相會共言衣食鬼云吾雖有過神力尚在汝可上吾肩上遊行世間人見之謂是阿羅漢每日得食兩共歡喜忽一日四王遣神將收録此鬼鬼急走奔越肩上沙門墮地苦惱自當又如五扇提羅果報曾不畏哉思之古人或得志之後雲房岩屋長養聖胎或黃卷青燈亦不遺深志因念此世浪死虗生之徒偶言及此恆作是念我今此身四大和合安坐靜室於一切時中常自念云我今幻身乃地水火風和合而有爾所謂毛髮爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處自念四大各歸其源今之幻身當在何處西蜀復菴暉禪師曰二觀慧也又有二章今先二空觀自此已下先觀我空也世尊教示行人於行住坐臥中常作尋求伺察之正念觀我今一個形骸並是假借天地之中地水火風和合成形子細思量畢竟那個是汝真身所以莊子云百骸九竅五臟六腑骸而存焉吾誰與為親汝皆悅之乎其有私焉今此一段文亦然初云我今此身四大和合此是總舉其次所謂下文皆是別舉所謂二字評量之詞評量如今此身之上髮毛爪齒皮肉筋骨髓腦垢色都是質礙之物自當歸還於地大又髮毛爪齒皮肉筋骨髓腦乃是別垢色二字為總謂此髮毛等皆是垢皆是色也涕唾膿血津涎液沫痰淚精氣大小便利皆是潤濕之物自當歸還於水大身上所有暖氣自當歸還於火大於十二時中回轉上下折旋俯仰起居問訊自當歸還於風大然四大假合闕一不可若是唯有地大無水大者如握乾灰終不成團若唯有水大無地大者譬如油水無有堅實若唯有地大與水大無火大者譬如夏月陰處肉團無日光照即便壞爛若唯有地水火大無風大者則不能得增長何故為風能長萬物既然四大各各別有所屬之時今汝等一切衆生唯復地大是你水大是你火大是你風大是你若作此見之時地歸地水歸水火歸火風歸風四大各離離者空義則又不知前妄執之身當在何處此是捉敗四大殼漏子虗幻不被渠瞞方是正念正解正行也即知此身畢竟無體和合為相實同幻化四大散滅之後方知幻體本空假合成形實同幻化列子言偃師所造之倡善於歌舞及其剖之則革木所為爾正此謂也西蜀復菴暉禪師曰此乃因前入尋伺觀觀四大妄身皆令妄盡方見真如實理也智度論云佛在世時有一人遠行獨宿空舍夜中忽有一鬼搶一死人來放著其前復有一鬼逐來嗔罵云死人是我物汝何擔來先鬼言是我物我自擔來二鬼各捉一手一足爭之不已前鬼言此間有人可共問之後鬼問曰是死人是誰擔來是人思惟此二鬼力大若答之實與不實俱不免死不如實說乃曰是前鬼將來後鬼大怒捉其人手拔出著地前鬼憫之急取死人一臂附之即著如是兩臂兩腳兩手頭脅舉身皆易於是二鬼遂將所易人身對坐共喫却拭吻而去以此推之即知一切衆生之身畢竟無實體但是死人之尸權時補在此豈非幻化虗妄不實之物乎莊子云託異物以成體不其然乎四明聰講師曰恆作是念至和合為相實同幻化者此明生空境生空者常作此念即以空慧觀見此身從虗僞生最初一性與本覺同體忽為無明業熏不守自性隨業受報為風火持此識性入母胎中錯認遺棄如己舍宅生愛樂心以為己身生我所相攬此不淨聚成一塊為之色身是名色蘊領受此身生苦樂想是名受蘊思想苦樂是名想蘊目此造作是名行蘊識居其中是名識蘊如五指頭成一拳相是名身見又名人見又名衆生見攬此四大五蘊成此色身故名生空境推其根本是無明業識假四大生風火二大摶識來入母胎赤白二滴是名水大如水生泡聚而為身是名地大此四大並無實性錯認為身故名五陰實法此四大雖無實體假緣而生因緣和合而有故曰緣生緣是因緣於父母有少因緣來生我家若識去時息風隨去暖亦隨之地水二大既無火風所養是故地水自然散滅前世善業為因故名為生生者成也因業若謝則此色身為之果亡四大分散故名為死死者盡也魂識蕩散主宰既去因得盡矣髮毛者血之苗也爪齒者髓之苗也皮肉髮毛所依之地以血潤之則有增長筋骨者爪齒所依之地以髓潤之則有增長凡有三百六十骨節九萬九千毛孔八萬四千戶蟲已上總歸地大唾涕膿血便利水大也暖火大也動轉風大也父母合氣成身從生至長及以老死皆名垢色地水火風各自還源故曰各離四大既散妄身即滅死了燒了灰飛烟滅故云今者妄身當在何處結上文云即知此身畢竟無體和合為相實同幻化結生空境也四緣假合妄有六根四緣者四大也四大假合之後遂有眼耳鼻舌身意六根也六根四大中外合成中有四大外有六根中外假合成此幻身妄有緣氣於中積聚緣氣者虗妄色心從緣而現者也於中積聚者於幻身之中聚而不散也似有緣相假名為心緣氣積於中緣相形於外似有者非實有此相假名者非真有此心西蜀復菴暉禪師曰前則觀身無我此則觀心無我也四緣即地水火風六根為外四大為中緣氣者此即於六塵之上起能攀緣之心此心是真心上一分之氣與真心氣分契合意謂此之一身但是地水火風四緣假合而成既是於中妄有四大則外妄有六根既有六根必有六塵既有六塵則牽惹引起中間分別緣氣之妄心於四大六根之間積聚似有形相一般遂破云但是假合為心不是真實之心此乃勘破無量劫來顛倒妄想攀緣之心所以楞嚴會上慶喜執此心而無據七處茫然世尊告阿難云咄哉此非汝心此是前塵分別妄想顛倒非汝真心與此同意也四明聰講師曰四緣則四大此四假和合如水生泡名之為身此身具眼耳鼻舌身意為六根如眼緣色塵之類五根亦各有所緣空品云各各自緣諸塵境界中外合成者於中內六識積聚似有緣相假名為心錯認緣影為自心相又云虗妄浮心多諸巧見涅槃德王品云譬如有王以四毒蛇盛之一篋令人膽養若令一蛇生嗔恚我當准法戮之都市其人怖畏捨篋逃逝王遣五旃陀羅拔刀隨之一人藏刀詐為親友其人不信投一聚落欲自隱匿既入聚落中不見人物聞空中聲今夜當有六大賊來其人恐怖復捨而去路值一河其水漂急即取竹木為筏截流而過達彼岸已安穩無患菩薩亦爾聞涅槃經觀身如篋四大如蛇五旃羅如五陰詐為親友即貪愛空聚落六大賊即外六塵河即煩惱以道品之筏到於常樂涅槃彼岸向下經文結上根塵緣塵之心亦是結上法空境此與空品明生法二空境同先賢未知不作此釋善男子此虗妄心若無六塵則不能有一切妄心若無色聲香味觸法六種幻塵誘之於外則此心從何而起四大分解無塵可得四大壞時所染諸塵並無一塵可得而有於中緣塵各歸散滅畢竟無有緣心可見四緣六塵散滅之後所謂緣心了不可見西蜀暉禪師曰此妄心牒前緣氣之心此能分別妄心若外無色聲香味觸法之六塵則中便無能分別之心故傅大士云未有無心境曾無無境心若正觀之時四大分解各空無六塵可得於中四大及六塵各散歸空之後到底畢竟亦無能緣分別之心可見前章云妄認四大為自身相到此我空觀中經文從恆作是念至實同幻化處一時破之又妄認六塵緣影為自心相到此經文從四緣假合至無有緣心可見又一時破之故得妄身妄心皆同實相也四明聰講師曰須知在母胎未生時四大成身為之生空境出胎之後根攬外色緣六塵影名為六根六塵方名法空境以由六根六塵六識總為十八界謂之諸法故云法空境今文正結法空境根緣塵影認之為心故云此虗妄心若無六塵則不能有此結法空故云無有緣心可見善男子彼之衆生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻身既滅則幻心無所依止故散滅也幻心既滅則幻塵無染著者故亦散滅也幻塵滅故幻滅亦滅幻塵既滅諸幻悉空幻滅之跡亦復無有西蜀復菴暉禪師曰前則我空觀此則法空觀彼則指前開解起行衆生到此入我空觀之後則覺四大幻身皆空非唯身空中間緣氣幻心亦空幻心滅故者此一句牒上起下非唯幻心空則幻塵亦空此六塵萬法非唯法空幻滅亦滅此智亦空故心經云無眼耳鼻舌身意無色聲香味觸法乃至無智亦無得盤山云心月孤圓光吞萬像光非照境境亦非存光境俱亡復是何物幻滅滅故非幻不滅諸幻盡滅幻滅亦滅覺性非幻終不斷滅西蜀復菴暉禪師曰前皆破執此方顯二空真如理也文亦有二此舉法也行人前既修二空觀破我法二執執盡見除證覺三空真理故曰非幻不滅既不是前身心法智數重之幻豈可滅耶若謂可滅即落斷見古云心法雙亡性即真即斯旨也四明聰講師曰此明生空觀也觀必對境故曰生空境若四大和合成此色身名境復用幻觀觀此四大色身四大有散有滅故云幻身滅故幻心本依四大色身而住既身滅已無四大身此心無依止處故云幻心亦滅此幻心既滅已無取塵者故云幻塵亦滅滅塵之幻此幻亦自無體性本自空故云幻滅亦滅幻滅之智智還成障此智亦滅故云幻滅滅故如燃火杖亦復自燃以屑出屑屑亦頓出心身俱滅境觀雙亡始本一合無能合者故曰非幻不滅唯真如之智獨存也此智亦知鏡中像有像則現無像則虗全修是性全性成修性無所移修常宛爾譬如磨鏡垢盡明現鏡喻本性垢喻諸幻垢盡明現幻盡性明西蜀復菴暉禪師曰此舉喻也為上文法說恐人難明遂將世間可見之物譬喻垢喻我法二執磨喻尋伺觀現喻我法二執空明喻圓覺二空理顯磨鏡本是磨塵今取文順謂前說破我法二執執盡見除真理既現由如世人以藥揩塵鏡上塵垢既盡鏡裏光明發現大凡磨塵二字亦有多說謂或近善知識聽聞大乘懺除業障或對治煩惱或跏趺正受或心法一境或呵欲棄蓋皆是磨塵也上文皆二空觀向下經文乃法界觀四明聰講師曰此譬生空觀去四大色身之垢須假圓照觀力幻身方滅如鏡之昏須藥磨之垢去明現圓覺之性不待磨也更了垢即是明明即是垢無明法性二無二也氷水之喻可知也善男子當知身心皆為幻垢幻身幻心障我覺性譬如垢穢染汙淨物垢相永滅十方清淨身心垢相既已永滅於十方界清淨無染西蜀復菴暉禪師曰此乃印前顯後也當知身心皆為幻垢此印前也垢相永滅十方清淨此顯後也幻謂虗幻無有實體垢謂塵垢坌污為義佛告普眼菩薩言汝等當須覺知此之四大妄身及能覺分別緣影妄心皆是幻化不實之法譬如塵垢有坌污真身真心義既知是幻不執人法便是垢相永滅以何得知蓋人執曰垢相法執亦曰垢相既我空法寂何所不通便見十方世界都是本有離相無染妙覺所謂山河及大地全露法王身四明聰講師曰此明法空觀當知身心者身六根心即緣塵之影一心三智蕩一切相不出六根六塵六識此十八界而此根識與塵相偶用攀緣心以五愛根取五欲塵此五欲境如花上露見陽則晞非真如理觀垢相如何永滅當知圓覺寂照如紅爐一點雪豈容暫住十方即十界地獄轉即天堂穢轉即淨國依正不相妨色心無礙善男子譬如清淨摩尼寶珠映於五色隨方各現圓覺鈔云梵語摩尼珠者如意珠也珠體明淨映彼五方之色如圓覺心湛然清淨應現十方也諸愚癡者見彼摩尼實有五色愚人不知珠體明淨映現五色乃謂珠中實有五色正如衆生謂佛實有色相也西蜀復菴暉禪師曰此設喻也摩尼此云雨寶謂世間摩尼之珠其中圓明瑩潔本無形色隨方各現若將此珠頓在東方時彼珠中即現青色若頓在中央方時彼珠中即現黃色若頓在西方時彼珠中即現白色若頓在南方時彼珠中即現赤色若頓在北方時彼珠中即現黑色然彼珠中之體圓明瑩淨本無青黃赤白黑等色相但隨處發現耳然世有愚人東西不辨南北不分真謂摩尼珠中實有如是五色此乃就喻說若法說者五色喻五道青色喻餓鬼道黃色喻人道白色喻天道赤色喻畜生道黑色喻地獄道問鏡之與珠同耶別耶答云別也蓋前舉磨鏡者但喻修二空觀破二執顯二空之理今此舉摩尼珠者用作下三重法界之宗故不同也何以知之且珠之體本來圓明瑩淨了無絲毫物污謂之真空絶相觀而珠中所現諸像像不礙珠珠不礙像此謂之理事無礙觀不離諸像像像全珠此謂之事事無礙觀若以三性配之者摩尼喻圓成性即所顯二空之理也各現色者喻依他性即所說諸幻愚人執為實有也五色者喻遍計性即前所說塵垢也然世尊一日以珠問五方天王云此珠作何色時五方天王互說異色世尊遂藏珠於袖中却擡手云此珠作何色天王云佛手無珠何處有色世尊嘆曰汝何迷倒之甚吾將世珠示之便各強說青黃赤白吾將真珠示之便總不知時五方天王聞佛開示悉皆悟道然我等心珠還曾自見麼四明聰講師曰此文正譬五根取五欲塵珠喻圓覺一性也圓覺不守自性隨五欲根取五塵境如珠映色隨方顯現愚者見色凡夫自昧二乘自離如鬼虎龍蛇菩薩見色皆是圓覺色即法界佛見色非如非異永嘉云心是根法是塵兩種猶如鏡上痕痕垢盡除光好現心法雙亡性即真聖人區區假說方便如採花成蜜善男子圓覺淨性現於身心隨類各應圓覺淨性化現身心隨衆生類各各應現如觀音之三十二應是也彼愚癡者說淨圓覺實有如是身心自相亦復如是愚人見佛現諸身心乃謂淨圓覺中實有如是色相而自己色相亦復如是可謂真愚癡也西蜀復菴暉禪師曰前摩尼珠是就喻說此方就法上說合前喻文謂一切衆生若將此圓覺淨性頓在餓鬼道之時而此圓覺性中便現餓鬼形狀直得眼光似電咽孔如針不聞漿水之名不見飲食之面肢節一時火起動轉五百車聲若將圓覺性頓在人道之時而此圓覺性中便現人之相貌箇箇眉橫鼻直頭圓像天腳方似地其間若至尊至貴者食前方丈侍妾數百堂上一呼堂下百喏若至貧至賤者或居陋巷或處道塗衣不蓋形食不充口若將此圓覺性頓在畜生道者而此圓覺性中便現畜生形狀或背翼或戴角或分牙或布爪或仰飛或伏走若將此圓覺性頓在天道者而此圓覺性中便現天仙之相或身長五百丈或壽八千年以龍起龍眠而為春秋以蓮開蓮合而為晝夜天男天女天香天樂常相圍繞顧東忘西視南忘北快樂無窮若將此圓覺性頓在地獄道之時而此圓覺性中便現地獄之相便乃刀林聳目劒戟參天沸鑊騰波紅爐起焰鐵城晝掩銅柱夜燃煮魄烹魂舂頭搗腳受無量苦楚然此圓覺之性如是隨類各各應現五道之中而此圓覺本體之上本無天人地獄餓鬼畜生之相但是不曾明悟心地愚癡之人忘執為有此種種差別之相亦如愚人執珠中有五色故云亦復如是古云珠中無五方之色因光所映性中無五趣之身隨業而現迷珠者執珠中實色昧性者執性內虗身法喻皎然真儀可驗然此五道非唯一向就外取之若一身之上亦具十法界何以知之六祖云汝若思惡法此心即化為地獄思善法即化為天堂毒害化畜生貪嗔化為餓鬼修羅慈悲喜捨即化為諸佛菩薩是知萬行由心一心在我內虗外終不實外細內終不粗善因終值善緣惡行難逃惡境取禍招讎固非天之所出亦非地之所生觀斯之說修行之人若於十二時中安頓自己分上摩尼寶珠宜著好處勿使異日有噬臍之悔也四明聰講師曰此結法空觀圓覺隨緣作一切法在身則全覺性為四大地水火風覺性在心則眼結為色耳結為聲鼻結為香舌結為味身結為觸得非隨類各應也迷者為愚謂淨圓覺性實有身心之相認之為我生四見心執之為我妄見生滅故云亦復如是也由此不能遠於幻化衆生由此迷執之故不能遠離諸幻是故我說身心幻垢因彼迷執身心故佛說云幻垢對離幻垢說名菩薩對離幻垢者以覺除幻如對病與藥之謂也今對幻之覺能離幻垢佛說是人名為菩薩垢盡身心幻垢悉皆永滅對除對幻之覺亦復無有即無對垢無對幻者亦無幻垢及說名者說名菩薩亦是幻名今對垢兩空豈有此菩薩相也西蜀復菴暉禪師曰此拂迹入玄幻化指身心此一段有人有法有能有所人是三能法是三所人是三能者一衆生是能執也垢是所執也二菩薩是能離也垢是所離也三佛是能說也執垢離垢人法等皆是所說也意謂因衆生妄執淨圓覺性中實有如是四大六塵緣影不能遠離虗幻不實境界以此之故於是世尊不得已遂有王宮降誕雪嶺修行金剛座下悟道菩提樹下降魔出世四十九年說法三百餘會其說法者只說一切衆生不知此身此心皆是幻化垢污對執幻垢說法者使令如說修行斷障離垢且衆生未離垢之時即是凡夫若離垢之後便是菩薩雖然離得凡夫了而菩薩猶存凡夫如病菩薩如藥病雖除去藥尚猶存要須凡夫之垢盡後而對凡夫底菩薩亦須除去如病去藥亦除凡聖俱盡便無對與垢非唯無凡夫與菩薩并對機說離垢世尊之相亦無此是拂迹歸真圭峯云法身說法義在茲矣若據大鈔中經文到此有二種方便一者近方便二者遠方便謂前二空觀及摩尼珠乃是後三重法界觀之遠方便此拂迹入玄經文乃是法界觀近方便頓教門中用此二方便誘引行人直造入華嚴不思議門法界觀所以云此經正屬頓教分屬圓教且頓機若證二空觀了便自然任運直造華嚴境界便是圓機若約喻釋者頓教喻如門若開得門自然任運到得入也又今經頓教正以二空觀為正途所以有法界觀者即倣修也欲令行人倣效華嚴圓機修行何以知之後說周遍含容觀了經云當知菩薩不與法縛不求法脫不厭生死不愛涅槃不敬持戒不憎毀禁不重久習不輕初學何以故下若是修法界觀者合當云事事無礙故今既不云事事無礙而乃告云一切覺故者此是歸頓教宗旨凡學佛書者當曉其宗旨并其途轍也且法界二字論其體也無增無減語其用也遍在森羅一得永常盡未來際諸佛以此為師衆生以此為體萬像以此為源不可以形求不可以㒵識但是一心耳問既是一心何故又名法界答為一心之上有二義故一者軌持義故稱法二者性分義故稱界性是理法界分是事法界蓋性無分限事有千差然法之一字有隨緣義若在理為理法界若在事為事法界若在理事為理事無礙法界若在事事為事事無礙法界此之法界當以法義分之且一真法界屬法圭峰云未明理事不說有空直指本覺靈源故曰一真法界然後就此一真法界中分出理法界事法界理事無礙法界事事無礙法界此四重法界皆屬義昔者唐初有帝心和尚乃文殊應身用自己無盡之智見華嚴大經所說義理莫不一一是此四重法界於是束其所詮之義為三重觀門一曰真空絶相觀二曰理事無礙觀三曰周遍含容觀第一真空觀中有四句十門唯要揀去凡夫外道執斷空實色之情顯出一真法界之理雖然顯出一真法界中本來一真之理但得其體尚未明山河大地與自己是異是一遂用第二理事無礙觀發起妙用頓見理即事事即理如千波即水萬器同金此觀中於理上說有隨緣不變義而於事上說有成事體空義猶未造諸佛廣大不思議境界又要第三周遍含容觀中明一法遍在一切法中一切法全攝在一法內於一切事上一切境上說事事無礙如善財童子至毗盧遮那莊嚴大樓閣前白彌勒言唯願大聖開樓閣門令我得入於是彌勒彈指其門即開命善財入入已還閉遂見樓閣廣博無盡同於虗空又見其中有無量百千諸妙樓閣中皆有彌勒一一彌勒前皆有善財一一善財悉皆合掌見一善財之身入一切善財之身一切善財攝入一善財內一樓閣為主一切樓閣為伴諸法重重無盡所以清涼云諸佛與衆生交徹淨土與穢土融通法法皆彼此該收塵塵悉包容世界相即相入無礙圓融具十玄門重重無盡問二空觀破執與法界觀中第一真空絶相觀揀情是同是別耶若謂同世尊何故於二空觀後又說真空絶相觀若謂別豈有修二空觀證入了又却修真空觀方始揀去斷空實色之情執決無此理答二空觀中破執即是真空觀揀情彼中揀情此中破執破執彼此各有所宗言不併出文不頓書理不頓顯也但初於二空觀後顯理文云幻滅滅故非幻不滅一句說未盡者却於此處廣說六根六塵六識外內四大世出世間諸法及自他依報正報七段經文皆談清淨廣顯出法界中真空絶相之理又前二空破執及摩尼珠是遠方便并拂迹入玄是近方便此二方便不可不分色相空淨一科即當彼真空觀中第三空色無礙觀一句也此是解終趣行其次空色同如一科即當彼真空觀中第四泯絶無寄觀中一句也此正成行體即當彼法界中真空觀中會色歸空及明空即色二句也此是揀情顯解也四明聰講師曰此節經意即是總結上生法二空若境若觀衆生初中陰來受胎時只為迷於無明始無明緣行終至老死十二緣中初認無明錯用之始四大五蘊為生空六塵緣影為法空生法二空是衆生妄執之境今用奢摩他圓覺寂照名二空觀空此四大五蘊十二處十八界並無根元悟空華相幻化根塵轉為覺明此圓覺性性亦本空無明垢盡即無對垢垢既盡已六度行圓強名菩薩平等性中亦無生佛之名故云及說名者是諸法空相不生不滅不垢不淨亦無老死無老死盡無苦集滅道無四諦也無智無得方可名菩提薩埵善男子此菩薩及末世衆生證得諸幻滅影像故爾時便得無方清淨諸幻影像皆滅即得無方清淨無方者不拘方所也無邊虗空覺所顯發既得無方清淨則無邊際之虗空因覺而顯矣西蜀復菴暉禪師曰經文顯所引行人進入華嚴法界不思議境界承前二空境界所作功用由此功用之故所以得證入起於後文意謂如世尊告普眼云入二空觀菩薩并末世衆生因何得證入法界觀見十方清淨良由所修二空觀行成就悟得自心是幻化不實却又滅五蘊十二處十八界依他影像之法若執身心即有東西南北方所今既不執身心之時便見盡十方世界無量無邊虗空並是廣大靈明圓覺之性無不開發也顯謂空消覺現發謂妄盡心開所謂盡大地是沙門一隻眼若未悟時見彼虗空便作虗空會了若悟之後即彼虗空便是本覺更不見有虗空之相此謂之渾虗空為體性乘願行以彌綸故楞嚴云若有一人發真歸源十方虗空悉皆銷殞豈非此云無邊虗空覺所顯發乎四明聰講師曰此明當機之衆末世衆生遠及如來滅後後五百歲中如是修圓覺者觀行功成衆生在迷如古鏡未磨覺性不顯今用圓觀照於覺相境觀雙運如垢去鏡明百界三千一時顯現又須知心鑑本明性德三千本具但圓覺未顯蓋三惑塵垢所覆今既去塵影像俱滅如幻三昧現前全由性具到此一切諸法法法清淨有何方所故曰無方清淨佛頂云十方虗空生我心內故曰無邊虗空境智雙融故云覺所顯發覺者觀也所者境也顯發即感應道交指要云凡地三千無隔隨一念以俱圓佛地三千既融隨一應而盡具況生感心中之佛佛應心中之生感應之體尚同權實之益何別故云但化菩薩不為二乘其有聞法者無一不成佛以上觀成理顯向下經文復將所顯三千妙法一一歷於色心依正衆生諸佛百千三昧無量行門一一無非圓覺妙心如是則一切衆生皆毗盧體一切國土悉常寂光心佛衆生三無差別覺圓明故顯心清淨所證之覺既已圓明方顯自心本來清淨心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨欲有所見皆是塵念故曰見塵眼為見之本源故曰眼根眼能分別諸色故曰眼識識清淨故聞塵清淨聞清淨故耳根清淨根清淨故耳識清淨欲有所聞皆是塵念故曰聞塵耳為聞之本源故曰耳根耳能分別諸聲故曰耳識識清淨故覺塵清淨如是乃至鼻舌身意亦復如是心有所覺亦是塵念故曰覺塵鼻舌身意各有塵根識皆因自心清淨之故悉得清淨善男子根清淨故色塵清淨色清淨故聲塵清淨香味觸法亦復如是六根既已清淨則色聲香味觸法六種幻塵亦皆清淨西蜀復菴暉禪師曰明六根六塵六識清淨即色相空淨中一內身根識也至六根清淨下二外境六塵也根有生識之義塵有坌污之義識有了別之義且六塵中色之一字有三義一有見有對二無見有對三無見無對且有見有對者即眼所見之色也無見有對者即聲香味觸法雖然不可見然有對也無見無對者唯法處所攝色也然眼所見粗色中又有三一顯色即青黃赤白光影明暗等二形色即大小方圓粗細長短高下正不正等三表色即行住坐臥屈伸俯仰取捨分別好惡等聲有執受義不執受義執受不執受義香有好惡和合等味有變易生熟可意等觸有四大冷暖澀滑飽飢等法有意所知境除五塵外餘皆是法也四明聰講師曰覺圓明故至鼻舌身意亦復如是者始覺之智謂之覺圓明此之覺智與本覺合合起本覺妙明謂之圓覺圓覺即佛也既已成佛毗盧遮那遍一切處將此毗盧歷一切法即攝一切諸法歸己識心反觀諸法唯心所造今之歷法要顯心具具無別具盡是緣生生無別生盡是心具心生心具法法清淨故云顯心清淨華嚴云三界無別法唯是一心作心清淨見塵清淨諸經多云心見者只謂心與眼在先明之楞嚴七處徵心八還辨見此經亦云虗妄浮心多諸巧見見塵屬色色即法界塵清淨故則眼根清淨浮塵根即眼是也行法云眼漸漸見障外事豈非淨乎根既淨識又安得不淨故云識清淨此識乃七識亦云傳送識如世傳言送語也此則心見一雙故先明也聞塵即耳根根塵識三事清淨覺塵即身根亦塵識三事清淨鼻舌身意亦皆清淨故云亦復如是經中先言心後言意心意一也覺觸即身也此二並出佛慈鄭重如上歷六根竟善男子根清淨故至亦復如是者此六塵亦云六入屬識所遊涉故亦名六塵塵以染污為義以能染汙情識故通名為塵也在眼曰色在耳曰聲在鼻曰香在舌曰味在身曰觸在心曰法法即心緣想一切諸法也此六塵境大能引人入於惡道大修行人道俗須用防謹如家賊貪欲熾盛者且當恣其所向如輪釣魚魚強絲弱不可強牽但釣餌入口其近遠亦不久而獲於塵修觀亦復如是如佛在世在家之人皆得道果鴦崛摩羅彌殺彌慈末利夫人唯酒為戒和須蜜多淫而梵行提婆達多邪見即正當知惡不妨道須用之有方祖師云呵五欲者為障道故今經一一歷此六塵境皆是圓覺淫坊酒肆柳巷華街皆是覺性色本不迷人自迷之酒無醉人之心人自醉之聖人見之如毒蛇許由洗耳巢父飲牛先賢尚畏聲色吾何以獨不畏哉所以金剛經云不著色聲香味觸法者良哉其言矣善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是六塵既已清淨則地水火風四大妄緣亦皆清淨西蜀復菴暉禪師曰三內四大及外四大也然人之一身皆地水火風四大而成在生之時隨緣和合到死之後內外四大一切俱空也故云悉皆清淨四明聰講師曰此則言一人四大遍一切處如楞嚴中西竺人家牛時無火種將陽燧取火陽燧者火鏡也先將鏡在手中以艾安於鏡前朝於太陽須臾之間自然火出今窮四大之性亦復如是火從天降為役芟生為從鏡出若從天降空中須有一帶火路而來若從艾生艾是野徑之物在野不見生火若從鏡出未取火時鏡在臺上不見火生如是因緣和合而有鏡艾日三各居不和合時斷不生火緣者是緣生緣生中具火性鏡艾日三若差別時雖三各有性具緣不合時亦不生火以此例之若非圓覺觀力塵終不消用圓覺照之是為緣生因緣和合塵消覺圓生死情盡善男子四大清淨故十二處六根六塵合為十二處六根者眼耳鼻舌身意六塵者色聲香味觸法十八界般若經云六根六塵并六種分別之識是也二十五有清淨御注云二十五有清淨者莊椿録云欲界色界無色界中有二十五種之有名為四洲者東勝身洲西牛貨洲南瞻部洲北俱盧洲也六欲天者四天王忉利天夜摩天兜率天化樂天他化自在天四惡趣者地獄餓鬼畜生阿修羅也四禪天者初禪天二禪天三禪天四禪天也四空天者空無邊處天識無邊處天無所有處天非想非非想處天也又有一梵王天一無想天一淨居天總為二十五種之有總名為有者皆屬有漏故也今因自心清淨之故悉得清淨西蜀復菴暉禪師曰四世間法也十二處即六根六塵乃是心識生處十八界即六根六塵六識成十八也界以性分為義眼根與識為界識與色為界等問舉十二處又言十八界豈非重疊耶答此三科法初舉五蘊時即當六根次正舉六塵帶起六根謂之十二處後舉六識帶起六根六塵謂之十八界故非重也頌曰聚生門種族故說蘊處界五蘊者以色受想行識積聚為義十二處者是心識生處出入之門故或曰六入種族者眼與色為種族耳與聲為種族等二十五有者四洲四惡趣四禪天四空處無想天淨居天梵天六欲為二十五有謂皆是有各的實報非正智攝故四明聰講師曰此歷衆生法四大五陰十二處十八界二十五有者四洲四惡趣六欲天梵天四禪天四空處天無想天那含天各有界入根塵空品云其心在在常處諸根如鳥投網如佛世一比丘樹下坐禪經一十二年心緣六塵不能覺悟佛化一僧至晚同宿樹下河中忽一龜從河而出漸至路傍有野狗搏此龜其龜藏了六處狗不得便而去龜下水佛問比丘汝見否曰見見甚麼見龜藏六得活性命佛云汝十二年貪香味觸攀緣塵境不能入道反不如龜能藏達性反常比丘聞之證阿羅漢果彼清淨故十力般若經曰一是處非處如實力二知三世報業力三知諸禪解脫三昧力四知諸根上下力五知衆生種種欲力六知世間種種性力七知一切道至力八得宿命智力九得天眼能觀一切力十得漏盡智力四無所畏般若經曰一一切智無畏二漏盡無畏三說障道無畏四說苦盡道無畏四無礙智一義無礙智二法無礙智三詞無礙智四樂說無礙智寶積經說義無礙智者謂成就第一義智法無礙者謂於諸法如實了知詞無礙者謂以善言種種分別樂說無礙者謂隨機演說不作二相也佛十八不共法般若經曰一無誤失二無卒暴音三無忘失念四無不定心五無種種想六無不擇捨七志欲無退八精進無退九憶念無退十般若無退十一解脫無退十二智見無退十三若智若見於過去世無著無礙十四若智若見於見在世無著無礙十五若智若見於未來世無著無礙十六一切身業智為前導隨智而轉十七一切語業智為前導隨智而轉十八一切意業智為前導隨智而轉此即佛十八不共法也不共法者唯佛獨得不與二乘共也三十七助道品清淨般若經曰四念處四正勤四神足五根五力七覺支八聖道支總為三十七品也四念處者觀身不淨觀受是苦觀心無常觀法無我四正勤者精進根精進覺精進力正精進四神足者定根定覺定力正定五根者信根念根精進根定根慧根五力者信力念力精進力慧力定力七覺支者念覺擇法覺精進覺喜覺除覺定覺捨覺八聖道支者正語正業正命正思惟正方便正念正定正見如是乃至八萬四千陀羅尼門一切清淨藏經曰陀羅尼門者總持門也蓋衆生有八萬四千塵勞故有八萬四千法門今自心清淨逈脫塵勞故此法門悉皆清淨西蜀復菴暉禪師曰五出世諸法也言十力者能摧怨敵不可屈伏故就用分十種者一是處非處智力二者三世業智力三諸禪解脫三昧力四五根上中下力五種種欲樂智力六一切種智力七一切道智力八宿住智力九天眼智力十漏盡智力也四無所畏者一一切智無所畏二漏盡無所畏三說法障道無所畏四說盡苦道無所畏也四無礙智者一性無礙智二義無礙智三詞無礙智四樂說無礙智佛十八不共法者一身無失二口無失三念無失四無異想五無不定心六無不知已捨七欲八精進九念十慧十一解脫十二解脫知見十三十四十五即一切身口意三業隨智慧行十六十七十八以智慧知過未現在三世通達無礙也三十七助道品者助謂資助助正道故道即是因所謂止觀品即是類正因類故亦云菩提分分亦因義三十七者謂四念處四正勤四神足五根五力七菩提八正道然三十七助道品屬因餘皆如來所證之法屬果八萬四千總持門者若未悟明心地之者即八萬四千塵勞妄想悟了番染為淨為八萬四千陀羅尼總持門者也四明聰講師曰十力者一處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力四無畏者一智無所畏二漏盡無所畏三說障道無所畏四說盡苦道無所畏四無礙智者一義無礙智二法無礙智三辭無礙智四樂說無礙智十八不共法者一身無失二口無失三念無失四無異想五無不定心六無不記已捨七欲無減八精進無減九念無減十慧無減十一解脫無減十二解脫知見無減十三一切身業隨智慧行十四一切口業隨智慧行十五一切意業隨智慧行十六智慧知過去世無礙十七智慧知未來世無礙十八智慧知現在世無礙三十七助品者入道淺深之氣類也四念處一心念處二受念處三心念處四法念處四正勤一已生惡法為除斷勤精進二未生惡法不令生勤精進三未生善法為生勤精進四已生善法為增長勤精進四如意足一欲如意足二精進如意足三心如意足四思惟如意足五根一信根二精進根三念根四定根五慧根五力即前五根增長以能破邪信煩惱破懈怠破邪念破亂想遮見思惑故名為力七覺支一擇法覺支二精進覺支三喜覺支四除覺支五捨覺支六定覺支七念覺支八正道一正見二正思惟三正語四正業五正命六正精進七正念八正定陀羅尼門廣有八萬四千圭峯云塵勞既有八萬四千一一對翻即皆淨法故染與淨數無增減故處中說有五百略說有三種有旋陀羅尼有百千萬億旋陀羅尼有法音方便旋陀羅尼皆遮持義遮惡持善如完器水不漏如是法門入圓覺中一時清淨善男子一切實相性清淨故一身清淨前所說根塵四大及三十七品等性如實有相故曰實相性金剛經云是實相者即是非相是故如來說名實相者是也此等之性清淨無染故一真法身全體清淨也一身清淨故多身清淨一真法身既已清淨一切化身亦皆清淨如法華經說佛化身遍往河沙佛土皆是佛身者豈非一身清淨則多身清淨也多身清淨故如是乃至十方衆生圓覺清淨多身清淨之故遍觀十方衆生之性悉皆如此圓覺清淨圓覺疏亦曰此乃一人悟性知一切衆生本性清淨非謂一人修道多人成佛西蜀復菴暉禪師曰言實相者即無相也法性本虗假言實相一身等者此第六正報也即人等形質或肥或瘦血氣所聚心識了知之者也四明聰講師曰初是登圓初住菩薩破一品無明證一分三德三德即實相也此菩薩證實相已分身百世界作佛豈止一身多身乃至十方衆生悉入圓覺圓明清淨況四十二直至妙覺分身不可以心思此是佛正報正報正報身是也以身歷一切法也善男子一世界清淨故多世界清淨一世界中既已清淨衆多世界無不清淨如維摩詰經說佛土清淨如自在天宮及佛以足指按地則三千大千世界悉皆嚴淨者豈非一世界清淨則多世界清淨也多世界清淨故如是乃至盡於虗空圓裹三世一切平等清淨不動多世界清淨之故盡無量無邊世界悉皆一等清淨不動也圓裹三世者謂上下橫周虗空世界盡在其中非謂過現未來之三世也西蜀復菴暉禪師曰此第七依報也謂所住屋宇床榻臺觀園林一切受用之物屬依報圓則圓遍虗空裹則含裹三世此七段經總色相空淨一科當法界觀中第三空色無礙觀鈔云前七段文諸法即空淨更不待除去諸法故當第三句也法界觀注云雖有色空二字本意唯歸於空以色是虗名虗相無絲毫之體可得只要顯真空之理然迷時悟時悉皆相躡也四明聰講師曰初住菩薩分身百世界作佛何止圓裹三世此聖人力用三千大千火起一唾能滅三千大千蕩為虗空則一吹便成擲大千於方外吞萬象於胸中將一毛吞大海水不撓龍魚以芥子藏須彌山不傷樹木故曰清淨善男子虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動虗空四大及諸法門泯然一等了無動相當知覺性亦復如是西蜀復菴暉禪師曰虗空與四大陀羅尼門皆屬幻色覺性二字即真空此空色同如一科即當法界觀真空觀中第四泯絶無寄觀上文總當真空絶相觀也意顯諸法當體本寂平等不動四明聰講師曰圓頓極致本無位次約所證淺深而立其階降今且從圓初住中間四十一位觀成歷法攝一切諸法無遺不從心外生也虗空性與覺性平等不動者楞嚴云十方虗空生汝心中猶如片雲點太清裏十方佛國世界在虗空中虗空尚在我心佛國世界又安得不在我心我心不動虗空性亦不動虗空不動十方佛國亦不動身不動心不動依正二報俱不動不動即常住不遷不變法法如如謂之諸法寂滅相不可以言宣此不動性非造作令不動乃覺性天然不動本性空中自無動相四大不動不出依報當知覺性只圓覺之性非動非不動不動之動為之動此不動性攝八萬四千陀羅尼門皆歸不動性中不寬不窄常住湛然性自清淨即空如來藏第一義諦也善男子覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至陀羅尼門遍滿法界圓無際者覺性圓滿浩無邊際也此性遍滿法界則根塵四大等亦莫不然西蜀復菴暉禪師曰此理事無礙觀覺性即法界真理六根六塵四大陀羅尼門皆屬事法即理不礙事事不礙理互相融攝發起妙用所以理即事故無有智外如為智之所入事即理故無有如外智為智之所證六根遍滿法界者此謂之六根門頭各各動地放大光明照十方界佛果云若以眼見文殊橫身若以耳聞觀音彰用若以心知普賢當堂又高城云應眼時若千日萬像不能逃影質凡夫只是不曾觀何得自輕而退屈應耳時若幽谷大小音聲無不足十方擊鼓一時聞靈光逈然常相續楞嚴云一根反源六根解脫乃至離即離非無是非是真正俱融依正平等在法界觀理事無礙觀有乎十門今經正當第二事遍於理門兼餘門也前真空中但攝事歸理今則動靜一一周遍起用四明聰講師曰此是妙覺究竟世界果覺歷法故云遍滿且中間四十一位未圓故不言滿妙覺者如十五夜月輪郭既滿更無邪光諸佛所證證諸衆生根塵見聞覺知佛即是衆生衆生即是佛況陀羅尼門而不遍滿須知八萬四千塵勞即八萬四千法藏亦八萬四千相好依中現正正中現依一毫端上現寶王剎座微塵裏轉大法輪豈非是大聖歷一切法也或云不然者下文云彼妙覺性既指彼者即前經文果覺歷法也過茶無字金剛後心入妙覺位所證既極一切清淨法界含容本無色像有何更存往來故下文顯言妙覺善男子由彼妙覺性遍滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜圓覺妙性遍滿法界則根塵諸法之性皆如虗空不相染著故無所變壞亦無所混雜如百千燈光照一室其光遍滿無壞無雜燈光喻根塵等性一室喻無邊法界西蜀復菴暉禪師曰此周遍含容觀妙覺二字為下事事之因由下六根六塵皆就事上為宗如法界觀中第三觀十門前三門談理與事後七門皆不談理只說無礙今經妙覺二字亦是彼中前三門之意也到此事事無礙中喚作見山依前是山見水依前是水見拄杖依前是拄杖更不許移易一𮈔毫許雪竇云不得動著動著三十棒兜率悅云要真盡屬真立假全歸假平地上行船虗空裏走馬然室喻法界燈喻真空光喻事法只如自己分上人人有一碗燈如是光明如是普照互相顯燭不曾相礙不曾雜壞不然試窮究看若識得此理便許你入華嚴大樓閣之中親見善財彌勒故演義云凡聖不礙狀多鏡以納衆形彼此無妨若千燈而共一室又云理隨事變一多緣起以無邊事得理融千差涉入而無礙問法界之中有何義故而得諸法融通如此耶答大疏有十義故一唯心所現故二法無定相故三緣起相由故四諸法融通故五如幻夢故六如影像故七因無限故八佛證窮故九深定用故十神通解脫故十中隨舉其一即見諸法融通無礙也四明聰講師曰善男子由彼妙覺至無壞無雜者言妙覺即本覺也本覺即見前衆生一念性德此性即本覺性如氷與水無二此性圓融遍在衆生根塵內無壞無雜無壞者豈可壞了一根別取一根只為今人情生智隔不融見有生滅十信菩薩六根清淨不易生身即是法身如法華云父母所生眼悉見三千界父母所生耳聞三千大千世界聲龍女即此父母生身便往成佛智者大師悟法華經見靈鷲山儼然未散皆是肉眼可為不壞也無雜者且如人眼與耳不過一二寸各守界分眼只能見不能聞耳只能聞不能見鼻舌身意各各皆然於內雖通於外常隔可謂不雜松直棘曲烏黑鵠白亦不相雜雖不壞不雜又須知亦壞亦雜蓋佛法中以非相為相所以凡所有相者皆是虗妄也當知陀羅尼門即遮思持善今論善惡無壞無雜惡不壞如性惡性惡如水性善如氷若去性惡則諸佛普現色身從何而立若去其水即無其氷以是知性惡不斷陀羅尼雖云遮惡惡即是善何惡之有惡雖不斷善惡自分明亦無壞亦無雜春風無高下花枝自短長世間幻術尚能即無即有何況大聖所證真幻之術幻有則成一切法幻無則空一切相空而不空謂之空有而非有謂之有當知心生法生心滅法滅呂公尚能撮土為香況佛能融五嶽枯四海窮無量劫事豈可以凡心所測也如百千燈至無壞無雜者楞嚴制壇場以十鏡環繞中燃一燈燈體交參莫分向背況百千燈光照于一室雖百千燈其光歸一彼十鏡燈光亦歸一妙覺證性遍入根塵根性塵性皆是覺性覺性滿故根性塵性亦滿陀羅尼門無壞無雜故云亦復如是古云鏡燈燈鏡本無差大地山河眼裏花黃葉飄飄滿庭際不知砧杵落誰家人祗知佛性遍滿殊不知自性遍滿要知自性遍滿麼飢來喫飯困來眠莫向人間辨是非善男子覺成就故當知菩薩不與法縛不求法脫覺性圓明名為成就於一切法非縛非脫不厭生死不愛涅槃覺既成就則知生死涅槃皆如空華故無所厭亦無所愛不敬持戒不憎毀禁覺既成就則一切禁戒不持不犯故無所敬亦無所憎不重久習不輕初覺覺既成就則視諸覺者平等無二故不以宿習而加重不以新學而加忽如孔子於升堂之子路則抑而敬之喫已之童子則與而進之何以故一切覺故八者皆無憎愛蓋由一切是覺西蜀復菴暉禪師曰此是用心見境一一稱真頓同諸佛所見之境界也法縛即六凡以六凡被貪嗔癡之所縛也法脫即四聖法也生死即染法也涅槃即淨法也持戒即奉持戒律也對八境之上不起勝劣之心便與十方諸佛之心一同更無兩箇所以晦堂云不用愛聖聖是空名不用厭凡凡是妄立但得聖凡情盡自然體露真常又僧問南陽國師云如何是佛答云佛與衆生一時放却當處解脫又徵云以何義故四對八境得如此成就遂出所以云良由於一切處一切時念念常與本覺相應故梵云佛陀耶此云覺圭峰云我心元與佛心齊曠劫沉淪只為迷梵云菩提此云覺覺心寂照是菩提其實與佛一同但覺與不覺耳永嘉云自從頓悟了無生於諸榮辱何憂喜四明聰講師曰覺成就此指果人妙覺所證既極觀一切世間之法無能無所無縛無脫當知菩薩指因人菩薩雖居因地亦解心虗通亦見一切法本源無染無淨無縛無脫亦不厭生死亦不愛涅槃蓋此菩薩雖未得度先欲度人佛頂云自未得度先欲度人菩薩發心也生死涅槃猶如昨夢如昨夢故持戒毀禁初覺久習不起憎愛文殊般若云清淨行者不入涅槃犯重比丘不入地獄何以故一切覺故此言因人果人諸法平等無修無證譬如眼光曉了前境其光圓滿得無憎愛覺性圓明照了諸境正如眼光曉了面前之境蓋其光明圓滿具足故得豁然盡見無所憎愛何以故光體無二無憎愛故眼光覺光同一空體兼無憎愛故可比喻西蜀復菴暉禪師曰上文舉法此是舉喻眼是現量只如以眼洞達照了前面淨穢高低一切境界而眼光豈有憎穢愛淨憎下愛高乎以何義故得如此蓋眼之光體本無二故所以無憎無愛也眼光喻於本覺平等無自他相四明聰講師曰此且取眼光照前境時光但直視其物未分憎愛蓋憎愛從人心生今取光照物時不分憎愛若分憎愛於我愛者則照之於我憎者則昧之光既憎愛物亦二之今以光喻菩薩心平等於一切法上圓滿無缺無剩不重不輕不毀不讚彌勒云一鉢千家飯孤身萬里遊人無青白眼問路白雲頭善男子此菩薩及末世衆生修習此心得成就者於此無修亦無成就修習圓覺既已成就方知本無所修亦無所得也圓覺普照圓覺光明遍照法界寂滅無二寂則無念滅則無相清淨本源湛然常一於中百千萬億阿僧祇藏經曰阿者無也僧祇者數也合而言之乃無數也不可說恆河沙諸佛世界恆河沙者恆河中所有沙也金剛經曰恆河尚多無數何況其沙蓋喻圓覺性中有如此無數佛土猶如空華亂起亂滅諸佛世界本無住處如空中華隨起隨滅不即不離所現世界起滅無常者初不即近圓覺亦不遠離圓覺皆在大圓覺中不可以離即論也無縛無脫本無所縛於解何有始知衆生本來成佛修證至此已成佛果方知衆生本來之性見成是佛生死涅槃猶如昨夢既知本性見成是佛方知迷時之生死悟後之涅槃皆如夢中事爾西蜀復菴暉禪師曰上明用心同佛此明見境同佛上之用心者即能觀無分別之智非唯智與佛同然所觀境上亦與佛同修習此心者指前觀行及八境無修無成者恐更向頭上安頭屋下架屋若實有修成則有兩個圓覺是總指寂滅乃圓覺之體普照乃圓覺之用等覺照寂妙覺寂照到此用即體體即用無二無二分無別無斷故如空合空似水投水了無痕迹問何故此文不先言寂滅而先言普照耶答蓋欲顯行人在觀中頓問佛故盡等覺與佛是同若妙覺者便是佛位何同之有故先言普照於中者於圓覺普照寂滅之中或百千萬億此皆是此方小數與大數阿僧祇此云無數劫不可說恆河沙此西域之數恆河方四十里其沙細如麵將一顆沙數一個諸佛世界如是許多世界於圓覺中猶如空中之華相似在空中亂起亂滅然而不作即圓覺會亦不作離圓覺會何故如是由不離故覺性奪之以成空華由不即故世界不妨有起滅此無縛無脫故楞嚴云根塵同源縛脫無二識性虗妄猶如空華到此境界方知三界四生九類本來是佛到此始知諸佛衆生其猶影像涅槃生死俱是強名所以禪宗云人人盡握靈蛇之珠個個皆抱荊山之璞無缺無餘更不假修證然後却來觀世間凡夫生死之法與出世間聖人涅槃之法一似夜來見夢中事還曾是實有乎此之夢字今依大智度論說其五義故一熱氣夢二冷氣夢三風氣多夢四見聞多夢五天神與夢今此夢乃是見聞多夢又此一段文配三種世間及三覺世者即器世間衆生者即有情世間佛即智即正覺世間此觀行成就能融三種世間為一味法又始知者即始覺本來即本覺成佛即究竟覺約教者始知即頓教本來成佛即圓教若五教各有成佛且愚教說悉達太子一生成佛始教說三大阿僧劫修行成佛終教說相盡性顯成佛頓教說一念成佛圓教說本來成佛謂初發心時便是佛也不可說者圭峯注云乃是華嚴大數也後經云修菩薩行無數無量無邊無等不可數不可稱不可思不可量不可說今當第九數也四明聰講師曰此明菩薩功成道辨所證之法所成就法離性絶非見性本元達性法界不從心生不從外入所以非修非證不即不離不縛不脫雖佛有出世沒世如石火電光雖具有梵音語言如金針玉線諸佛世界亂起亂滅如空中華生死涅槃並如昨夢可謂佛是衆生衆生是佛豈非始知本來是佛善男子如昨夢故當知生死及與涅槃無起無滅無來無去生死涅槃既如昨夢則起滅來云之相亦何有哉其所證者無得無失無取無捨所證圓覺本是自性既不可而得亦不可得而失既不可得而取亦不可得而捨其能證者無作無止無任無滅能證圓覺者無作用心無止息心無任彼自然心無畢竟寂滅心有此四心即為四病於此證中無能無所無能證之智無所證之相畢竟無證亦無證者本無可證之法亦無證之人一切法性平等不壞修證圓覺至於人法兩忘則一切根塵諸法之性亦皆平等無二永不變壞矣西蜀復菴暉禪師曰此稱實同也謂於能觀之智所觀之境稱其真實之理此文有四段一總標稱實二別指能所三雙拂能所四總結稱實如昨夢故一句躡前猶如夢故也當知生死及與涅槃無起無滅無來無去此是總標稱實謂迷生死時如空花起悟涅槃時如空花滅既知一切法如夢之後豈有生死之起涅槃之滅乎非唯無起無滅亦無聖法新來凡法滅去其所證無分別理境上無得真無失妄非唯無得真無失妄亦無取妙捨粗之事所證理上既然如是能證無分別智亦無作止任滅之病此是別指能所也於此能證所證之中無能無所畢竟無所證之境與能證之智此是第三雙拂能所下總結稱實問如何得無上來能證所證一切諸病耶答良由行人入觀於一切處一切時頓同諸佛用心頓悟一切或凡或聖或染或淨或性或相或本或末種種諸法之性本來平等無壞無成老氏云大成不缺楞嚴云歇即菩提聖淨明心不從人得古人云本來具足無缺無餘皆斯義也若爾則本是淨潔人枉來泥裏污四明聰講師曰瞿曇畢竟老婆心切將自己所證之法換衆生所逆之心大似在夢中與人交易將黃金換彼頑䥫換時雖知貴賤覺來物之與人貴之與賤皆是夢事當知生死涅槃取亦得不取亦得為在夢中非實起滅去來亦復如是其所證者亦如夢中得點䥫成金之術果向夢中已成夢事夢事非實得失取舍皆不可得雖不可得夢事宛然其能證者即是觀慧非奢摩他圓覺妙觀安能證之點金之術非易可得及覺來時還在夢中全夢是空其夢亦宛然也到此有亦得不作亦得止亦可不止亦可任之與滅亦復如是復結云於此證中無能無所畢竟無證既無我人亦無證者今問證者是誰誰是證者夢中說夢非虗非實圓覺如夢夢即是覺覺即是夢夢覺即空空無空相永嘉云夢裏冥冥有六趣覺來空空無大千斯之謂矣善男子彼諸菩薩如是修行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶西蜀復菴暉禪師曰此結牒問辭前普眼設七段問後此結答但依世尊教示令汝等先入定持戒修二空觀兼倣修三重法界觀如是用心修行如是漸次如是方便如是開悟若能如是入觀用心即不迷悶便能悟入圓覺境界同佛知見矣四明聰講師曰結上所問思惟住持皆是正修行路修時不無圓覺覺後圓覺亦無證時說有衆生諸佛證了生佛皆空覺比空華空華亦是於覺如是修行定不迷悶也爾時世尊欲重宣此義而說偈言普眼汝當知一切諸衆生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者如是漸修行一切悉清淨不動遍法界無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無來去初發心菩薩及末世衆生欲求入佛道應如是修習西蜀復菴暉禪師曰偈中一切悉清淨與不動二字皆頌真空觀遍法界三字頌理事無礙觀與事事無礙觀也無作止下頌頓同佛境等也四明聰講師曰此偈實以無說示說無和合中求和合故有四大六塵聖凡之合雖然皆夢中幻事唐圭峯定慧禪師宗密頌普眼菩薩章曰普眼圓融因果相身心影像休隨妄先了二空清淨門次修三觀圓頓行能所兼妄凡聖情愛憎寧復論差當曾知本有摩尼珠五色青黃焉可狀普眼菩薩章終三
