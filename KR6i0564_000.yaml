front:
  text: 光嚴住持是謂衆生清淨覺地這一假話直指後學路頭十分徑捷蓋不入大光明藏不得清淨覺地未到清淨覺地不為大圓滿此圓則明明則覺之本旨也矧大疏略疏大鈔少鈔總而計之奚翅數萬言橫説竪説總在圓覺圈裏要人各自識破或者字字鑽刺不尋的當隨前人腳後跟已落第二誼是終日圓覺而未嘗圓覺久況依幻而説覺者乎琪夙耽是經遍閲諸疏偶因糟粕忽悟醇醲敬以孝宗皇帝御注及衆大知識講義頌偈章分類附用鋟諸梓願與諸高德共之如大海水隨意斟酌無不清涼如恆河沙隨意取捨無不具足讀卷未終便即感悟固自有頓機者若曰捨筌而得魚則是猶幻翳妄見空華必欲刻舟而求劒則有照有覺俱名障礙今日對面説破輪轉生死故曰無明若無輪轉方始是覺休將螢火燒須彌要得針芒湊芥子時淳祐六年丙午﨟月辛丑旦日丙戌覺如周琪序十二章來意文殊章頓悟本有圓覺妙心本無無明生死方名信解成發起因普賢章以悟修之理難明故須徵釋令解用心普眼章開示身心無性二空理顯根塵諸法普淨普遍見境同佛金剛藏章令深悟輪回分別邪正故乃徵釋彌勒章窮展轉根元推差別種性令斷貪愛清淨慧章已知圓覺染淨無殊辨隨順修證威德自在章衆生根性不同煩惱厚薄不等立三觀門隨根趣入辨音章就前三觀示觀網交羅隨宜各契淨諸業障章約計深淺分我四相若除我執便是圓覺普覺章由前除障修習用意依善知識免溺四病及諸細惑圓覺章道場克期加功用行以求證入上中下根普歸圓覺賢善首章正宗之法法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮一部諸章大旨如是閲者預明可知始末
