body:
  text: 威德自在菩薩章西蜀復庵暉禪師曰第一文殊一章通為上中下三根之人開解第二普賢一章通為上中下三根之人開行第三普眼一章依文殊之解及普賢之行入二空觀兼倣修法界觀既入觀方有疑故有第四剛藏一章發起三疑請問於佛既有疑必推究輪回根本故有第五彌勒一章請問斷除輪回根本佛令斷貪愛之心既斷貪愛之後行人到此行解具足必有所證故有第六清淨慧一章安排凡賢聖果地位階降掇送行人從凡入聖所以道因解起行因行入觀因觀起疑因疑有斷因斷有證問云行人於普眼章入二空觀證入圓覺成佛否答成佛又難云既入二空觀已成佛了何故更有剛藏之疑情彌勒之貪愛清淨慧章之地位耶答能所分故謂普眼一章即行人能觀之智剛藏與彌勒二章皆是行人觀中所斷之惑清淨慧一章亦是行人觀中所證之地位是知此三章經文皆是觀中所除之節病病盡只就觀中成佛離觀之外更無別有經文也又難云既是觀中去節病之經何故卻於觀後宣說耶答此謂之言不併出文不纍書理不頓顯所以在後今威德章者由世尊廣開方便說法度人或有一類上根之人於前六章經文中聞佛開示二空觀行相并斷貪愛輪回根本及示證入地位階級莫不一時踴躍歡喜悟明心地證入圓覺譬如出厩良駒才見鞭影而行也其間更有一類中根之人亦於六章經文中聞佛如是開解如是開示觀門如是遣疑惑如是證入差別但以根劣執粗不能入二空等觀譬如大寶埋在塵土之中於是威德自在菩薩傷迷救誤接下垂方以此之故遂起請問世尊作何方便救度中根之人故有此章經文又云別明觀行者此別之一字乃對前通明觀行得名此有二義一則由一類上根之人已依前二空觀門證入畢更不假修三觀諸輪故稱別二則此三觀諸輪各各自別只如三觀或是一人具修三觀或只修一觀或修二觀或單復交絡遂成二十五輪被二十五種人故稱別也於中前二章經三觀修行後二章經兩重除障今威德章即正明三觀行相也四明聰講師曰實相體寂因元靜乃稱止本覺虗照因常明故曰觀妄風俄動假妙奢摩他而止之心珠久昏須毗婆舍那而觀矣故聖人設教非秪一端或止或觀或云諦境或云止觀病既多端藥亦隨轉威德隨順覺性承佛圓音啓三觀之雄規導四門之正路故有義也於是威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰言威德者此有二義一約事說二約理說且事說者譬如有人有威故令下畏之有德故令下慕之且理說者威字如道如德蓋威即圓覺體德即圓覺用何以知之如華嚴法界觀序云甚矣衆生之迷也身反在於心中若大海之一漚耳而不自知有廣大之威神而不能用又如道德經云民不畏威則大威至解云小威者死生也大威者道體也由此門三觀成就功用猛利邪魔不能撓妄惑不能侵故表菩薩於圓覺體用中得大自在故曰威德大悲世尊廣為我等分別如是隨順覺性菩薩讚佛於前章善說凡夫菩薩如來等隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利聞佛宣說心即開悟不待修行先獲利益圓音佛音一震四衆普聞也西蜀復庵禪師曰廣為我等分別如是隨順覺性者此是領前章依凡賢聖果地位漸證之經文也令諸菩薩覺心光明承佛圓音不因修習而得善利者此領前章居一切時不起妄念等忘心頓證之經文也覺心光明者謂前聞佛說漸證頓證法門使一切菩薩了達本覺真心之體於此體上起大光明遍照法界之妙用此之覺心光明顯發者有類楞嚴經云如我按指海印發光若就事說即佛手指上有紋印也若理說則表能入之智海印者即表所入之定即體也發光者表於體上起大妙用也承佛圓音者承受也圓音者於一音之中具一切音謂之圓者此是佛說圓頓之音也不因修習而得善利者謂聞此法門尚更不假三大阿僧祇修行而使克獲成就圓覺勝善利益何況勤而行之者也此謂之不歷化城便躋寶所楞嚴云狂法頓歇歇即菩提勝淨妙明不從人得何藉劬勞肯綮修證世尊譬如大城諭圓覺性外有四門諭諸行門隨方來者非止一路東西南北之人各由一門而入豈止一路而已蓋喻悟入圓覺者非止一法也一切菩薩莊嚴佛國及成菩提非一方便莊嚴佛地及成圓覺方便法門非一而已唯願世尊廣為我等宣說一切方便漸次請佛宣說一切行門并修行人總有幾種又請佛說諸修行者令此會菩薩及末世衆生求大乘者速得開悟游戲如來大寂滅海涅槃之道廣大深妙故以海喻作是語已五體投地如是三請終而復始西蜀復庵暉禪師曰此中先立理也唯願下乃正請也譬如大城至非止一路此先舉喻也一切菩薩至非一方便此次舉法也大城者喻圓覺也四門者喻行門也何謂之行門即信解行證也只如有一大城欲東門入者當示之以東路欲西門入者當示之以西路南北亦然今一切菩薩亦復如是於三界之中度脫一切衆生掇送直至無上正等正覺莊嚴諸佛國土豈是一方便而能了得此大事因緣然欲從信門入者當示之以信法欲從解門入者當示之以解法行證亦然良由病有千門藥生多品投機隨器不得一同宗鏡云根機莫等樂欲匪同然四門入處雖殊在一真見時無別如獲鳥者羅之一目不可以一目為羅似理國者功在一人不可以一人為國此之謂也教中說凡度得一人成佛曰莊嚴者由佛果本具藉因飾成也四明聰講師曰實相是一法佛說種種名今言四者且略而言之四門者空門有門亦空亦有門非空非有門佛世有四外道云供養佛得福生天我只要生天不要證阿羅漢一人先去供養佛了便要去佛云諸行無常此人掩耳而走第二人亦如是欲去佛云是生滅法掩耳而走第三人亦如然臨去佛云生滅滅已掩耳而走第四人亦如是供養了便欲去佛云寂滅為樂又急掩耳而走四人去後共在一處聚問你見佛如何一人云佛說諸行無常一人云是生滅法一人云生滅滅已一人云寂滅為樂四人共聞一偈俱證阿羅漢一偈是圓覺四句是四門隨汝一句而入云方便者即漸次聖人設方便非止一端證有漸次根性既殊所修差別所證淺深階降不同大寂滅海如搗萬種香為丸燒一丸具足衆氣衆流入海同一鹹味即圓覺海會爾時世尊告威德自在菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是方便汝今諦聽當為汝說時威德自在菩薩奉教歡喜及諸大衆默然而聽善男子無上妙覺遍諸十方出生如來無上妙覺之性大包太虗故曰遍諸十方衆生悟此妙性方證佛身故曰出生如來與一切法同體平等既證佛身則無染無淨無凡無聖也於諸修行實無有二諸修行者實無二法西蜀復菴暉禪師曰稱性標本也無上妙覺在東則全東西則全西南北上下亦然所謂六通四闢糠粃瓦礫小大精粗其運無乎不在所以華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得且一切諸佛果上得號為如來者蓋因地莫不同修此妙覺同證此妙覺皆從此妙覺而出也非唯一切如來從此而出乃至五蘊十二處十八界外及山河大地色空明暗一多大小凡聖染淨心境種種諸法亦盡從此妙覺而出也何以知之且如一切衆生於十二時中大開眼見時且道天為誰高地為誰厚山為誰青水為誰碧以至春為誰暖夏為誰熱秋為誰凉冬為誰冷莊子云孰主張是孰維持是孰居無事而行樂是以此推之一切法盡從自己一段光明中發現稱自己之性與如來之性同一真體平等無二無分無別無斷故一切菩薩若於此中起行修行更無兩條路皆是修前二空觀門於此觀中莫不破疑斷愛根塵普淨悲智雙行離境離心無能無所前佛後佛皆如是修行豈有二法乎方便隨順其數無量隨順修習方便甚多圓攝所歸循性差別當有三種周圓收攝歸於一性隨性差別則有奢摩他三摩鉢提禪那也西蜀復庵暉禪師曰此約隨機之行以舉數也若據佛說一代時教法門皆是用方法便宜對機治病其數自有無量無邊卒難窮盡今且圓融收攝循隨此中根衆生之性差別不同者當有三種也良為衆生根性利鈍不同煩惱厚薄沉掉不等隨其機性設教多端若不如此則難為趣入故楞伽云所說非所應於彼為非說彼彼諸病人良醫為處方今此中根衆生其性雖有萬差而靜幻寂三門一時收盡也四明聰講師曰無上者衆生無上佛是也妙覺證之極也亦可云覺者照也照即是觀即今之所示三觀也妙者空即假中假即空中中即空假三觀互融故為之妙如楞嚴妙奢摩他亦如此解今向下正明三觀必其然也遍諸十方者覺性亦名實相亦名真如亦名空如來藏三世十方諸佛皆依此三出生出生即修證依大圓覺妙理修之證之不依妙覺真如理觀修之即我見等無明業識命根不斷行法云十方諸佛從方等生不獨是修之得成佛亦依此迷之而入生死生佛雖殊妙理平等但有迷悟之殊非佛性有悟迷乃佛生自有悟迷也生佛一如故曰無二若迷圓覺循性差別何止百端今且言修圓頓三觀者故云圓攝所歸的分三種善男子若諸菩薩悟淨圓覺西蜀復庵暉禪師曰此下正宗三觀初泯相澄神觀中初標本也此乃於前經開解謂若欲入此觀者當須先且了悟自己分上本有靈明圓覺也以淨覺心取淨為行既悟圓覺本來清淨則當以此心專取寂靜以為法行由澄諸念覺識煩動因以寂靜澄諸念慮故清淨之識顯矣西蜀復庵暉禪師曰此正釋起行也上悟淨圓覺者屬解此以淨覺心取靜為行者屬行有解無行如有目無足有行無解如有足無目單輪隻翼不能飛運既了悟覺性此是行本必須依解而修方為妙行譬如膏明相賴目足更資意謂用了悟清淨本覺真心為本於十二時一向取靜悄悄地為所行之行禪云一念萬年去古廟香爐去寒灰枯木去一條白練去所以達磨云外息諸緣內心無喘心如墻壁可以入道又寶藏論云夫入道之徑內虗外靜如水澄凝萬象光映其意不沉其心不浮不出不入湛然自如此乃還家捷徑治病神方前來十二時中一向用動底心此之𨔝心是識所以不見識今因澄故息種種攀緣妄念心中才靜靜即是智以此之故方始覺知無量劫來分別業識前念續後念後念續前念如此煩𨔝元不曾少住也靜慧發生因靜生慧故云靜慧昔昧今顯故云發生身心客塵從此永滅非性所有故曰客塵永無此相故曰永滅便能內發寂靜輕安內發者非自外得也寂靜輕安者至寂至靜無纍無惱也西蜀復庵暉禪師曰此功成也前因澄息諸妄念方始覺知分別識心煩亂躁𨔝不停由是覺來覺去識心才靜即到極靜之境界靜才極便自然妙慧發生既妙慧發生則勘破六根六塵六識之妄法故云靜極光通達寂照含虗空卻來觀世間猶如夢中事此之十八界非是主人公譬如行客出入無定若是主人無攸往塵以坌污為義今既靜慧發生則一時捉敗故云永滅滅者無也如明來暗謝智起惑忘便能內發寂靜清虗輕安調暢此是於靜中得箇悟門如乾卦剛健中正可以辟邪降魔圓覺寂照輕安可以存心入道良不虗矣由寂靜故十方世界諸如來心於中顯現如鏡中像因寂靜故空性湛然十方佛心悉皆如是故假云於中顯現如鏡中像也蓋謂鏡淨則像現心淨則佛現故也西蜀復庵暉禪師曰此感應也良由寂靜之故遂得妙慧發生所以感應便見十方三世諸佛之心在行人心中顯現歷歷可見如鏡照像了了分明故云鏡明則像像歷然智顯則心心交徹永嘉又云心鏡明鑒無礙廓然瑩徹遍周法界問行人入此觀悟明心地之後當知唯是一心心外更無境界今何却言十方如來之心來行人心中顯現耶答孟子云說詩者不以言害辭不以辭害志以意逆志為得之矣今此非謂有十方如來心來行人觀中現但是行人才明悟心地之後便知十方如來同信此心同解此心同修此心同悟此心即是於中顯現古云不煩問師匠心王應自知老氏云不出戶知天下不窺牖見天道同意問鏡中真箇有像否答云鏡中豈有像乎又問既云鏡中無像今何故見有耶答云雖然見有而脫體是空久已知矣又問何故現耶既有像須有來處豈不見晦堂云鏡像若是有攬之不盈手鏡像或謂無分明儼然圓今何有義如此耶答云今約慈恩宗法相家說者謂鏡之光明瑩淨孤潔不受外之光明然眼之光明亦瑩淨孤潔不受外之光明我將眼光去照彼明却被彼之光明倒射回我眼光却自照見我面一似在鏡中然鏡本無像水中亦爾若無光明之物無所現之像即及是說矣此方便者名奢摩他圓覺疏曰此翻云止寂靜義也又云泯相澄神觀西蜀復庵暉禪師曰此結觀名也梵語奢摩他此云止止即定謂止絶一切妄想境界觀法性諸空所以起信云若修止者住於靜處端坐正意不依氣息不依形色不依於空不依地水火風見聞覺知一切想念皆除亦遣除想當知唯心之外別無境界也四明聰講師曰善男子若諸菩薩至於中顯現者奢摩他涅槃經名為能滅滅煩惱故又云能調調諸極惡不善法故又曰寂靜又云遠離天台云對觀名境對止為諦天台影望三觀立止名一奢摩他體真止凝心安其理謂之畢竟空以三觀解之奢摩他空觀也破一切法又云一念無相謂之空二乘以此空破見思惑證真諦理大乘亦空一切相破無明惑今論大乘空義也修圓覺者普眼章中所謂宴坐靜室然後凝心止息攀緣取靜為行因澄念故用心太功覺識煩動於中客塵銷落佛頂云猶如行客不得久住若實主人畢竟不去粗垢既去覺心輕安澄之久久靜慧虗明大圓鏡中十方世界諸如來心於中顯現此非論聖人果地且在凡夫見前須歸自心一念虗妄浮心荊溪云見思王數此是破塵合覺所在處所不可不知今之經意且先用妙止安妄心此亦與楞嚴同但彼文云返流全一六用不行十方國土皎然清淨如琉璃內懸明月乃至一切如來密圓淨妙皆現其中意無殊此如鏡中像此方便者名奢摩他境觀者如人咽喉之病今正明用妙止止其衆生散心此用粗心造次不得末世修圓覺者須是依師友以軟善心調治若只將聖人聖寶言下尋之於道轉遠聖人說方依之自服則取效矣今引鏡像乃喻觀成若依若正並無妨礙依即正正即依依是十方世界依報也諸如來心正報也觀成之後依正自融本只為迷情強融分依分正若觀成情遣塵去鑑淨現像非關磨者則鏡無現像之功像無涉鏡之德終自炳然無有罣礙六祖云菩提本無樹明鏡亦非臺本來無一物自不惹塵埃結云此方便者名奢摩他妙止也今圓家論境觀須知境觀互融本無有二今就偏宜用止或用止之不悟即此止便是觀但止屬止散觀屬朗心雖止而不散亂如枯木無用縱三條椽下數載春風兀兀然雖年深而無益更須抖擻精神用觀朗之見一念覺性昏時當再朗之朗處如暗室遇燈即明要朗之時不得將心攀緣用思惟心測度以無思惟銷滅諸暗如澄水法但不動此念水自合理只為水體元清衆生自濁今還本體恐有人不用意鋟削故以苦口言之當須聽信善男子若諸菩薩悟淨圓覺以淨覺心知覺心性及與根塵皆因幻化心既開悟則知能覺之心所覺性之及眼耳鼻舌身意六根色聲香味觸法六塵皆因妄幻化現而有也即起諸幻以除幻者起諸幻智方便修習滅彼身心等幻變化諸幻而開幻衆隨機化現種種幻法開示衆生也大涅槃經曰瞿曇譬如幻師幻作王身沙門等身或說無常或說有常者是也西蜀復庵暉禪師曰此下第二起幻消塵觀今初標本起行也以淨覺心至而開幻衆者即起行也知覺者即覺悟之智心性者即六識也根即六根塵即六塵諸幻即幻智除幻即幻法謂修此幻觀之時亦且了悟圓覺之性然後用淨清覺悟之心常常知覺此六識六根六塵皆因幻化不實之法假合在此由一切衆生迷本圓明是生虗妄性自無體非有所依即便發起幻智之心除去十八界有漏幻法既除去有漏幻法須與大悲行利他行隨機赴感千變萬化種種譬喻種種假說無量諸幻法門開法引導教亦四生六道一切如夢如幻之衆生若就法說者謂變起差別幻智遍觀八萬四千塵勞之衆一一稱真清淨非障非蔽即是開幻衆所以禪宗云鬧處刺頭穩處下腳又云蹤跡處莫藏身藏身處勿蹤跡是修此觀之意由起幻故便能內發大悲輕安因起幻智開示幻衆但生悲濟之心別無煩惱之念西蜀復庵暉禪師曰此功成也因起幻智照破幻法以此之故便得自他不二彼我無差故能內發同體大悲所以禪宗云一向目視雲霄壁立千仞則辜負諸聖一向拖泥帶水灰頭土面則埋沒自己到此須要自利利人方得話圓此大悲之心乃是從性空起非是凡夫愛見故得輕安暢適此是閙處有箇悟門也一切菩薩從此起行漸次增進從此觀門起諸法行漸漸增修至於佛果西蜀復庵暉禪師曰此結通也此明菩薩莫不皆從此幻觀門方能起於悲智乃至佛果也彼觀幻者非同幻故慧目清淨觀見諸幻者非與諸幻同體故也非同幻觀皆是幻故所觀之智不與幻同者亦皆是幻不可執著西蜀復庵暉禪師曰彼觀幻者即幻法非同幻觀即幻智此一段文恐有相濫故今揀之前文云即起諸幻以除幻者尚未知幻智與真覺相去如何今揀云設使入此觀觀彼六根六塵六識皆是幻法此能觀之智不同前來幻法只此說不同底心又是虗幻故楞嚴云將欲復真已非真真如性非真求復宛成非相直須和此智幻之心一時拂去幻相永離是諸菩薩所圓妙行於諸幻相永不染著是名菩薩所成妙行如土長苗菩薩圓此妙行如土之長苗也苗日增長必致結實妙行增進必致成佛故偈曰如幻三摩提如苗漸增長也西蜀復庵暉禪師曰此總結也種喻覺心土喻幻法苗喻幻智謂此菩薩所以圓融修此觀妙行者乃是依妄報智妄智入覺所以道太平本是將軍建不許將軍見太平譬如依土長苗棄苗收子法喻晈然也此方便者名三摩鉢提圓覺疏曰此云等至蓋謂凡聖一等至於勝定也又名起幻銷塵觀西蜀復庵暉禪師曰此結觀名也此即幻觀亦云三摩鉢底此云等至等謂齊等離沉棹故至謂至到到勝定故沉者乃是坐禪之時昏沉瞌睡也掉者乃是醒來舉心紛飛妄想也若於坐處不瞌睡者即離昏沉若於行處不紛飛攀緣逐物者即離掉舉既離昏沉掉舉方到得此觀勝妙之定處且前靜觀即門內做工夫此幻觀即門外千差萬別處做工夫何以知之起信云若修觀者當觀一切世間有為之法無得久停須臾須臾變壞一切心行念念生滅應觀過去所念諸法恍惚如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如空雲欻爾而起應觀世間一切有身悉皆不淨種種穢污無一可樂如是當念一切衆生從無始來皆因無明所熏習故念念生滅已受一切身心大苦現在即有無量逼迫苦未來所苦亦無量難捨難離而不覺知衆生如是甚為可愍作是思惟即應勇猛發大誓願願令我心離分別故遍於十方修行一切諸善功德盡未來際以無量方便救一切苦惱衆生令得涅槃第一義樂此謂之修幻觀所以禪宗到此云雖然鼻孔遼天也要腳跟點地四明聰講師曰善男子若諸菩薩至所圓妙行者涅槃名毗婆舍那此經名三摩鉢提名正見又名了見又名能見曰遍見名次第見名別相見是名慧慧即觀即假觀也天台云方便隨緣止也止名為定體屬慧法修圓覺菩薩用假慧出假化物登住聖人出假有十六門先證圓覺涅槃空從此空出建立假度生故悟淨圓覺既證淨心如鑒照物六根六塵一一體之皆是幻化雖知根塵是幻以何法滅此虗幻光明云心如幻化馳騁六情欲滅此幻還依幻心復起幻觀始覺也觀此根塵之幻故云即起諸幻以除幻者雖用幻觀滅於幻化出假自有十六門被機既多幻豈只用於一病變藥變如人四百四病豈以一藥治之故云變化諸幻而開幻衆如昔有人到五臺山一僧附書託尋薩苛與之及抵京遍尋皆無有也後見街路趕猪人呌薩苛遂問之答云內一大者名薩苛群衆中著渠一箇不縱橫遂度書與之起立看書便乃立化皆是菩薩出沒合變應機化物由此善用其心幻智漸增幻機漸度此謂之破塵沙惑故云內發輕安舍利弗出假行六度外道乞眼珠取珠與之外道棄地身內嗔心起退落五道凡夫非大忍辱力孰能為之故云漸次增進彼觀幻者是且指菩薩度生非同幻故者無機可度蓋衆生本性空寂也非同幻觀即始覺之智用此智攝也衆生性空我性亦空亦是境觀俱空亦機應雙亡幻境幻觀俱泯機緣感應無差既亡能所則幻相永離楞嚴云入流亡所所入既寂動靜二相了然不生所圓妙行亦復如是如土長苗此方便者名三摩鉢提者假觀屬有也立一切法亦數法故云三摩三乃數也森羅萬象皆依圓覺妙心一切幻化從覺心生如土長苗若無覺心幻不能生若無幻覺覺幻不滅滅幻之覺如苗幻滅覺圓如苗歸土皆是聖人方便門名三摩鉢提也善男子若諸菩薩悟淨圓覺以淨覺心不取幻化及諸靜相不取幻化及諸靜相者謂不取三摩鉢提之幻覺及不取奢摩他之靜觀也了知身心皆為罣礙既離幻靜二觀了知幻身幻心在覺性中皆是罣礙無知覺明無智覺者非頑然如木石也但圓覺淨性不起一切知覺心爾明明不昧如鏡之淨故曰無知覺明不依諸礙不依者無所染著諸礙者身心等幻永得超過礙無礙境既離諸礙則有礙無礙之境一時超過受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙世界身心等相雖在塵域然覺性圓通不為煩惱涅槃之所礙譬如器之中空者金鐵為簧聲達于外不為器之所隔也鍠字說文音皇西蜀復庵暉禪師曰此下第三絶待靈心觀也先標本起行也既了悟覺性次當起行謂了悟清淨本覺之心不取著第二三摩鉢提及不取著第一奢摩他何故如是謂此之寂觀離前二觀處乎中道到此境界便了達知覺四大妄身與緣影妄心並不是無為寂照虗遍之理皆是能所障礙之境以了知是能身心是所才有能所便有真妄並是障礙之法也無知覺者心緣曰知身觸曰覺既了知能所皆是罣礙之法若入此觀中境界便無能知所覺既無所能唯是一心此之一心明明不昧了了常知盡未來際常住不滅所以道心月自孤明乾坤都一照此明之一字正顯靈妙絶待之體然此靈體之上上無頂下無底傍無邊中無在既無當中有何東西南北上下四維乎欲言空寂不似太虗欲言相用不同緣起欲言知見異於分別欲言質礙異於木石欲言其覺不同醒悟之初欲言其明不同日月之類肇云夫菩提之道高而無上廣不可極淵而無下深不可測大包天地細入無間故謂之道上引諸說只顯靈心絶待今此入觀恐知字引惹分別之心故本覺但云明不依諸礙即身心能所今不依者謂入此觀時更不依倚身心及能所直造靈明本覺禪宗謂之單刀直入獨步丹霄又如金翅鳥擘海直取龍吞寒山云男兒大丈夫作事莫莽鹵徑捷鐵石心直取菩提路邪道不須行行之轉辛苦永得超過礙無礙境者永得乃究竟之辭超過者逈殊對待礙即前幻觀此觀涉於煩惱無礙境者即前靜同於涅槃謂修此觀證入之時便永得超過前幻觀與靜觀之境界非唯超過前二觀和自己資緣所受用之物并國土世界一時超出既然一時超出之後又不可一向打淨潔毬子抱不哭孩兒一時空空去落在無事界中黑山下坐死木裏淹須知宛然依舊還他身有地水火風四大宛然還他心有見聞覺知此之六根六塵六識之相宛然只在塵域之中而此之靈明覺性出乎陰陽造化形名度數之外如金器中大鍾之聲若一擊著則其聲鍠鍠出乎其外若到此境界之時且凡夫煩惱生死之法與聖人涅槃出世之法皆不能留滯障礙然此之涅槃為理故云留煩惱屬事故云礙今先明鍠字初以唐韻未修故圭峯疏中唯切韻訓樂不是器中聲今取其聲勢不取訓字此應是金石等器中聲相今且現聞擊鐘聲之聲其聲鍠鍠然即知鍠字是聲之相狀譯人回潤稍拙應云如金器聲鍠鍠出外故詩云鐘鼓鍠鍠其義可見也次取大鐘乃器中之大者其聲遠聞今見行廣韻再經修定故於注下添云大鐘也與疏正同意今文中正取大鐘而兼用聲相也後正釋喻旨以鍠喻世界身心聲喻於靈明觀智謂從器聲出器不能拘故聲聞四遠器局本處以喻觀智約身心修得身心所不能拘觀智廓爾無邊身心不離舊處但以法喻相當不必局喻所依物也便能內發寂滅輕安覺性圓通一切無礙則自心寂滅無纍煩惱妙覺隨順寂滅境界妙覺之性隨順本來寂滅境界不起一切生滅念也自他身心所不能及自之身心即我相也他之身心即人相也蓋妙覺隨順寂滅境界非我相人相所能至也衆生壽命皆為浮想我相人相尚未能及佛境界如衆生相壽命相非虗浮妄想而何西蜀復菴暉禪師曰到此功成也功成之後不取靜相靜相即寂不取幻相幻相即滅便能內發離前二觀輕安得箇悟門才方悟入便與佛寂滅一心境界一般故云妙覺隨順此是在觀時同佛所以初地菩薩在觀同諸佛出觀同凡夫寂滅境界者即一心也故楞伽云寂滅者名為一心非是息動之寂滅也自他身心所不能及者謂依體起智曰自根塵發識曰他若到此境不可以智知不可以識識故曰自他身心所不能及衆生壽命皆為浮想者回觀一切衆生所執我相人相衆生相壽者相皆是虗妄浮想之所執持其實本無實體故華嚴云一切衆生但想所持其猶空雲雲是空之浮氣了虗空者即知浮雲畢竟非空喻如衆生壽命是真上之浮想了真寂者即知衆生畢竟非真也此方便者名為禪那圓覺疏曰此云靜慮又名絶待靈心觀西蜀復庵暉禪師曰梵語禪那此云靜慮蓋靜是靜觀慮是幻觀若修此寂觀不即前二觀亦不離前二觀謂正當靜時不見有靜悄悄底相便如閙浩浩處然亦不妨全在靜處正當閙時不見有閙浩浩底相便如靜悄悄處然亦不妨全在閙處如是則在靜不見有靜靜只是渠謂之動靜一源往復無間何以知之疏云即慮而靜故無散動即當定義即靜而慮故非無記即當慧義定慧平故曰禪那然此三觀若約所配亦有多說初觀即體次觀即用後觀即相若約悲智初觀即智次觀即悲後觀即悲智雙運若約定慧初即定次即慧後即定慧平等若約三諦初即真諦次即俗諦後即真俗不二第一義諦若約所照初照空次照有後照不空不有也若天台教初即空觀次即假觀後即中觀若天台教約義理則同若約意趣則別此三觀明行人用心方便彼三觀則推窮諸法相又此多約心成行故不立所觀之境彼多約義生解故對所觀三諦也若約修初小乘次菩薩後佛若約對治初即對治凡夫著相次即對治小乘不發大悲後雙治凡夫小乘也又如弄珠吟云正當弄時其珠不住空不落地不在手既不在三處方不住一處不住空中即喻不住空觀不落地上即喻不住假觀不在手裏即喻不住中觀既不住三亦不成一則非一非三而三而一斯為妙矣若約禪家譬如猫兒捉鼠相似若於穴前瞌睡之時則鼠出不知若於穴前呌喚之時則鼠亦不出唯是於穴前不睡不呌為得之矣穴前睡者即入靜觀而昏沉不得悟道穴前呌者即入幻觀而散亂亦不能悟道穴前不睡不呌者即入後觀中非唯不昏沉亦不掉舉斯為得之矣此約前二不得意者形對而云若各得入處即成三觀耳四明聰講師曰善男子若諸菩薩至相在塵域者天台云禪那息二邊分別止亦云止觀平等前奢摩他以寂靜為相三摩鉢提以幻化為相禪那俱離寂靜幻化二相若三觀言之即空即假即中禪那乃即空假歸中亦可空有俱中三觀互融亦可無空無假而不中天台出時楞嚴圓覺未傳中國天台於止觀中云此三止名雖未見經論今影望三觀隨義立名其相云何體無明顛倒即是實相之真名體真止如此實相遍一切處隨緣歷境妄心不動名隨緣方便止生死涅槃靜散休息名息二邊分別止孤山云楞嚴阿難雖請於止以即一而三故止觀亦即平等三一互融是以稱妙以由妙故方曰楞嚴大定也今云悟淨覺者且言菩薩從聞圓覺至思修修而證破虗妄已發其真明未說極證且說初住一分真明故云悟淨圓覺此真淨乃空假即中之淨復以此淨心知覺心性即知四大妄身假和合畢竟無體次云及與根塵方知六塵緣影虗妄浮心亦是幻化此之幻化若不消落仍是生死菩薩後於幻心起於幻智幻智始覺以此始覺寂照照於根塵十八界等消落幻化故云以除幻者以者用也用幻智除幻妄幻者是誰誰是幻者騎牛覔牛斯之謂矣今言悟淨圓覺者此菩薩從聞思修以證覺性無明氷消心淨如水故云淨圓覺以此淨慧照了法相不屬有無故云不取幻化假觀屬有法及亦不取靜相靜是止亦是不取空假二觀即空假歸中氷化為水唯一無二故云不取靜相云靜相者相本是境亦是空觀今要見空即是假故云靜相用中道禪那正觀觀之了知身心身心是色質可是罣礙今了知皆是空華自然心無罣礙既無礙遠離顛倒夢想到此不眼界無意識界無無明乃至無老死無苦集滅道無智亦無得今云無知覺者知屬心明屬見知見俱泯游心法界諸心若寂如日依空復不住空既絶根塵不依諸礙求得超過礙無礙境能觀之智亦乃不留若留智還為障還為礙境此境名為覺相亦不可留境觀雙融百尺竿頭坐底人雖然得進未為真百尺竿頭進一步十方世界現全身受用世界依報也及與身心正報也相是世間相不離塵勞具諸佛法故云相在塵域不局在一身一心色心依正剎剎塵塵一一皆不離自性故謂之域也如器中鍠聲出于外者鍠音皇此喻中觀即空是中即假是中空即無假即有要知有無不相留礙器中鍠衆說不同有云鐘磬之聲韻為皇有云聲是色器亦是色二色不相妨礙今觀中道即二邊為中世俗之鼓中間以鐵器為皇在鼓之內及鳴鼓時鍠聲于外今此觀成了生死涅槃色心依正畢竟無二一一皆歸正性明顯寂滅極處內發輕安心輕故遍一切法皆是佛法身遮那遍一切處煩惱涅槃至名為禪那者煩惱即生死涅槃不生滅也生死即涅槃二具不留礙又煩惱即俗諦也涅槃即真諦也真即是俗俗即是真二亦無留礙煩惱如氷涅槃如水氷即水水即氷亦二無二不相留礙真性自通通即不相留礙既煩惱融為法性法性即空慧發明內自寂滅為樂若身若心自然輕安輕安即神通也此非究竟佛謂之妙覺初住聖人隨順寂滅境界指所證寂滅為妙自他身心所不能反此指自他所證之極自覺聖智真如獨存不屬他身心自身心亦所不及蓋圓覺無身心相自他身心所不能及四見又何由可生四見即我見人見衆生見壽者見今具二見衆生壽者壽者衆生已包人我二見皆為浮想以中道種智觀一切法是為浮想何況自他身心衆生壽命我人之見爭得不為浮乎結云此方便者名為禪那是佛方便假名禪那平等性中佛尚不愛作況種種假名於我如浮雲善男子此三法門皆是圓覺親近隨順三法門者奢摩他三摩鉢提禪那也始依圓覺而起觀行終因觀行以證圓覺始終不離故云親近隨順十方如來因此成佛因此者因修此三法門也十方菩薩種種方便一切同異皆依如是三種事業修習雖有異同究竟不離三法若得圓證即成圓覺三法圓修即證圓覺西蜀復庵暉禪師曰此顯圓修也法門者指前三觀圓覺是一心之法門是三觀乃為圓覺之門尸蓋門有出入義悟此法即入此門迷此法即出此門然此三法門皆是依倚悟淨圓覺而起觀行行行皆趣入圓覺始終不相捨離故云親近隨順然佛及菩薩同修此三觀同證此圓覺也然隨機隨事行相各異或多人同修一門或一人具修多行若三四五若千百種同之與異隨類難准然必皆依此三種事業也圓證者三觀齊修方得圓證若但修一者為偏矣四明聰講師曰此三法門即空假中三觀也此三觀三只是一一即是三破則俱破三觀悉彰破相假中亦然立則俱立妙則俱妙成一切法立一切法空一切法只為圓覺之性具一切性親近隨順者則成佛菩薩成佛菩薩出假化物成就衆生未嘗不由此也故云皆依三種事業圓證者若非圓心此覺不圓圓心者一念三千百界千如三千世間乃指南之法妙極於此依此修證者即頓成佛道善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃隨順修習成就百千萬億小乘之果不如暫修圓覺無礙法門西蜀復庵暉禪師曰此較量顯勝也梵語阿羅漢此有三義一無賊二應供三不生此乃第四果也梵語辟支迦此云獨覺亦謂之緣覺此是小乘中利根之人是二小乘所作已辦梵行已立不受後有永出三界具足六通八解且如勸得一人二人持於五戒十戒據諸經說福已甚多何況令爾許億人成就辟支羅漢之果此福與前之福譬如海形牛跡又不可以比較雖如是都不如有人暫得聞此十方諸佛廣大靈明圓覺大自在無障礙一心法門於剎那極促頃刻之間用不背心於聞思修三慧熏修習學圓覺之功德何故如是以此法門能令行人不歷三祇便登佛位如法華說龍女獻珠一生成佛也四明聰講師曰聲聞辟支乃小聖只修四諦十二因緣觀緣入道此如一滴水今修圓覺者如大海水破一切相具一切相等法界修等法界證起信云離念相者等虗空界無所不遍法界一相只是如來常住法身亦是一切衆生本具性德龍女一歷耳根便往南方成佛故云隨順修習也如上威德所問借蝦為眼牟尼廣示亦是憑虗作響而不知如如之理本乎一性而已得之為悟失之為迷一理而已迷之而為凡悟之而為聖迷者自隔理不隔也失者自失理不失也三觀之作所辨異同而究聖性使群生正性而順理者也正性順理所以覺路不紆解脫之門至矣不知此法門則學何所入功何所施智何所發梁氏云去聖久遠賢人不出庸昏之徒含識而已致使魔邪詭惑諸黨並熾空有云云為坑為穽有膠於文句不敢動者有流於漭蕩而不能住者有太遠而心不至者有太近而我身即是者有枯木而稱為定者有竅號而稱慧者有奔走非道而言權者有假鬼神而言通者有放心而為廣者有罕言而為密者有齒舌潛傳為口訣者凡此之類自立為祖繼祖為家反經非聖味者不覺仲尼有云道之不明也我知之矣由物纍也梁氏之言可謂救世辨惑之要聞之者得不自鏡其或未然吾未如之何也矣爾時世尊欲重宣此義而說偈言威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類寂靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃唐圭峰定慧禪師宗密頌威德自在菩薩章曰威德請開三種觀中根始此分章段四門開處任方來三類修時非雜亂靜鏡圓明全顯彰幻苗增長無涯畔器中鍠可喻禪那三法能超生死岸威德自在菩薩章終七
