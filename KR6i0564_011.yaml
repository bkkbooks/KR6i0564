body:
  text: 西蜀復菴暉禪師曰圓覺菩薩章通前綸貫於此一部經文大意血脈者蓋第一文殊一章經文通上中下三根之人開解第二普賢經文通為上中下三根之人開行為文殊是能證之智普賢是所起之行遍周法界若唯有解而無行者一似沙井而無潤若有行而無解者似空有雲而無雨唯是解行相應方可進修入道譬如結網而終是取魚褁糧而必須前進故有普賢開行其次第三普眼一章經文依文殊之解及普賢之行修我法二空觀兼倣修華嚴三重法界觀既入觀門恐有疑情故有第四剛藏菩薩起三疑請問第一疑云衆生本來成佛何故復有一切無明莫是從真起妄否第二疑云衆生無明本有何因緣故復説本來成佛莫是説妄為真否第三疑云十方異生本成佛道後起無明一切如來何時復生一切煩惱莫是先真後妄否故牒而縱之責無窮過也既剛藏有此三疑而世尊遂將空華一喻通答三疑以金礦一喻別答第三疑然剛藏有此疑情者皆由無始輪回根本未曾斷也故有第五彌勒菩薩請問云何當斷輪回根本未審如何是輪回根本世尊遂告云輪回根本莫不皆由貪愛二字使令斷去貪愛貪愛既斷即便有證入既證入必有差別不同故有第六清淨慧菩薩請問一切衆生及諸菩薩如來世尊所證所得云何差別世尊遂告之以凡賢聖果四位階降當時會中有一類上根之人聞佛如是廣開方便種種法門便能如是信如是解如是行如是證一時超夢幻出輪回直趣無上佛果菩提所謂良馬見鞭影而行其次在座更有一類中根之人雖於前六章經文中聞佛如是開解了但以根劣故不能證入二空之觀於是有第七威德菩薩請問於佛譬如大城外有四門隨方來者非止一路且如上根之人已證入二空及法身觀而中根之人未審有何方便而得證入世尊遂示之以奢摩他三摩鉢提禪那靜幻寂三觀行相既知此三觀行相之後而尚未知一人具修三觀三人各修三觀為復有次第故有第八辨音菩薩請問云此諸方便於圓覺門云何修習世尊遂告之以單修復修圓修共有二十五輪被二十五種機行人既入三觀諸輪必有所悟既有所悟便犯我相人相衆生相壽者相故有第九淨諸業障菩薩一章經文特為行人除去四相四相既除方可用心修習而用心之處覺由未普復有是非若不依相指教即墮四病故有第十普覺一章經文為行人除去作止任滅四病四相既除四病亦遣其覺方普當時於佛會中在座有一類中根之人聞佛開示如是四章經文便能依如是信如是解如是行如是證入圓覺其次在座更有一類下根之人雖已於初六章經文中聞佛説二空等觀并其次四章經文中三觀諸輪於觀中斷障遣惑除病破疑種種法門悉皆開解但障重習深不能證入由此經者若只接得上根之人接中根之人不得時不得謂之圓覺若接得上根及中根之人不能接得下根之人亦不謂之圓覺唯是上中下三根之人一時普被是覺方圓故曰圓覺故有第十一圓覺菩薩為下根之人請問佛云我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺世尊遂告之以上中下三期道場於道場中加功練行䇿發進修不過亦是修前靜幻寂三觀也當時在座有一類下根之人聞佛宣示道場加行法門依如是信如是解如是行如是證入所以云一法巧被三根經云譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿方謂之圓覺也然大科云初四問答通明觀行上根修證次四問答別明觀行中根修證後一問答道場加行下根修證也四明聰講禪師曰諸佛出世為度生故度生須説法法即教謂之修多羅教教法詮理詮理以辨性見性以成佛所以種種經論開人眼目教眼開即解心通解心雖通無行則孤故須依解以立行解行相資如膏助明目足並進清涼到已今圓覺菩薩聞前開士一一立義各伸其問各陳其説故吾佛拈華摘葉開明覺性圓覺大士擇所未聞假設權宜請問建立道場安居處所若用三觀何種為首末世衆生進道儀式一經旨趣總括於斯於是圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰此當後一問答道場加行下根修證疏云然此正宗中諸菩薩等與佛問答發揚本意欲顯圓覺但緣節節過患未盡義意未圓收機未普故表法菩薩未標圓覺之名今此有其三意得名圓覺一前雖病盡理圓仍恐下根難入此又曲開方便三期道場即上中下根普得圓覺二由前節級行解已圓至此名為證極證極之境更無別體唯是圓覺三最初標指圓覺為陀羅尼門者此乃是從本起末也今顯法義已圓還標圓覺者此乃攝末歸本也表此三意故當此菩薩請問也大悲世尊為我等輩廣説淨覺種種方便令末世衆生有大增益此指前二空觀及三觀諸輪種種方便法門也世尊我等今者已得開悟此讚佛善説修證圓覺之法令彼開悟也若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界請説將來衆生如何安住修證此法此圓覺中三種淨觀以何為首請説初修奢摩他之靜觀三摩鉢提之幻觀禪那之寂觀云何起行惟願大悲為諸大衆及末世衆生施大饒益作是語已五體投地如是三請終而復始西蜀復菴暉禪師曰此有二問初問道場經云未得悟者云何安居修此圓覺次問加行經云此圓覺中三種淨觀以何為首是也四明聰講師曰一問安居習大乘修圓覺行先選住處或阿蘭若闃寂處或處伽藍避喧求寂遠離闠閙今云安居且就伽藍內有三種安居前安居中安居後安居佛在世九旬安居亦云禁足亦云護生蓋西竺分三際以辨寒暑三際已釋文殊章故佛以熱際護生熱際蜎飛蠕動咸出於穴佛意慈念諸比丘出入蹂踐物命結業增冤是以制禁九旬不出九旬安居始於四月十五日十六日結夏終乎七月十五日十六日夏休為自恣毗尼母云比丘安居若無緣事出界不宿則犯制僧家以結夏為歲臘不序年齒臘者接也交接之義今通塗問修圓覺行安居未必問僧家九旬安居也二問三種淨觀以何為首奢摩他三摩鉢提禪那此三即空假中之三也此三種者為先用空為先用假為先用中於空利者已達法性不須修假中於假利者不須修空中於中利者不須修空假若此三中各於一觀不利者則兼修如二十五定輪互修是也茲為具學大乘圓行者故問之也爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生汝今諦聽當為汝説時圓覺菩薩奉教歡喜及諸大乘默然而聽善男子一切衆生若佛住世若佛滅後若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒衆具大乘性者具足佛之根性也伽藍者藏經曰此云衆園蓋今之僧舍也有緣事故隨分思察如我已説既為緣事所拘當隨己分量修習可也西蜀復庵暉禪師曰先答道場也若法末世者即末法一萬年具大乘性者即宿有聞熏種也緣事者即利他之事也隨分思察如我已説者此指前普眼法門及三觀諸輪所説謂圓機菩薩不滯空間種種施為作諸利益廣度羣品備學法門隨其間暇無事時分之中則便思察三觀故云隨分非是見解未圓為隨分也若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十日佛謂日久則凡心易厭日促則妙行未圓故立三期以為中制安置淨居安置道場當於清淨之地西蜀復菴暉禪師曰此即道場期限也無有他事因緣謂菩薩之人但是逢著有益於人之事即便為之遇著善緣即赴之也今無此二事故曰無有他事既無利他之事當入三期剋志加功以期聖果為自行邊事此三期者若太過則行人情生疲倦若少則行人功行未圓所謂敏則傷於太過鈍則愧乎不及故量尅三期亦無別義然約三根配之其有二意一約障盡難易者長期乃下根中期乃中根下期乃上根二約精進解怠者即反於此蓋根有利鈍期有遠近對病設藥斯所謂歟安置淨居者此欲內外清淨身心潔白事理稱可也四明聰講師曰爾時世尊至默然而聽者安居修觀即是方便應屬言教悉是如來善權方便善男子至安置淨居者若立期限必制日辰制期者役意修真尅時破障一大藏教立種三昧皆有期限如法華三七日為期光明彌陀一七日為期不先立期則如猿猴心散野馬奔逸道業難成故修圓覺須依伽藍此翻衆園園是種殖之所種殖道芽增長或云梵剎或云招提或云浮屠隋時改天下寺院為道場或云靈廟為寺為院為蓮社為精舍有多種名皆修心練行之所也經制修行有常坐有常行有半行半坐有非行非坐唯非行非坐此云隨自意此三昧行坐俱修得若上三種三昧具身開遮口説默意止觀第四三昧於四威儀中意起即覺永嘉云行亦禪坐亦禪或有緣事故隨分思察亦是隨自意三昧中諸經行法且不局限念起即覺意起時思惟觀察亦與修多羅合如我已説者如上已説二十五輪三種觀法如無他事因緣即立期限建並道場天台云道場者清淨境界治五住粳顯實相米據此雖立三期不專常行常坐半行半坐細觀經意乃隨自意中諸經行法中收此三昧中有善性惡性無記性第四諸經行法非善惡無記即是諸經所修行法此收一切經亦以身開遮口説默意止觀但為根有利鈍故分三期亦不專定滿日數若利根者一七日中發明若鈍根者百二十日中下亦然不以期限為制也如昔六祖聞誦金剛經至應無所住而生其心忽然開悟圭峯讀圓覺至既無我人誰受輪轉而悟大抵不入規矩不成方圓況楞嚴有云理則頓悟乘悟併銷事非頓除因次第盡豈新學捨範模而能入道哉進學解云業精于勤荒于嬉行成于思毀於隨是以道若未成必藉思修而入今云隨分思察者則成于思毀於隨之謂也若佛現在當正思惟若佛住世之時當正心思惟絶諸妄想可也般若經中亦謂斷除妄想為正思惟若佛滅後施設形像心存目想生正憶念還同如來常住之日生正憶念者無念之謂也蓋謂雖對佛像亦當如佛現在不可起妄念也懸諸幡華經三七日幡華供養經二十一日也稽首十方諸佛名字求哀懺悔至心稽首稱揚佛號求佛哀憫懺悔三業遇善境界得心輕安念佛懺悔之後或見佛像或見光明及一切善境即得自心輕安暢適西蜀復菴暉禪師曰此明道場行相然行相之中又有二意一隨相用心二離相用心今乃是隨相用心若佛現在當正思惟者只如此經十萬之人皆是佛現在之時當機之者既有此機又遇在世親聞佛所説法即正念思惟一切諸法不離一心當知唯心之內則無境界若佛滅後施設形像者此明如來世尊已入涅槃不覩真儀但設以形像諦觀引心入法相即無相即見如來亦可想佛真身常住不滅也此是約事説若約理説者行人若觀行無間斷名為佛現在若觀行間斷之時名為佛滅後也斷後復作觀者名為施設形像也所以大珠和尚云身口意悉清淨是名佛出世身口意不清淨是名佛滅度今既為下根之人設教且從初事相釋也懸諸幡華者即禮懺之儀式也經三七日者此但是云其久近無別所表方等經説極少七日矣稽首者謂以頭稽留於地少時方起故曰稽首懺即梵語懺摩悔即唐言悔過懺則陳露先罪悔則改往修來若離垢慧菩薩所問禮佛法僧中説總有八重一供養二贊佛三禮佛四懺悔五勸請六隨喜七回向八發願今略唯有其二者即禮佛懺悔也然文雖略法中亦具也遇善境界得心輕安者此感應也若見佛像或覩光明不作聖心名善境界若作聖解即受群邪故下文云非彼所聞一切境界終不可取也若天台之意只許與信解行證相應名善境界如楞嚴云又以此心成就清淨淨心初極忽見大地十方山河皆成佛國具足七寶光明遍滿又有恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受群邪四明聰講師曰若佛見在至諸佛名字者此明行三昧時入道場設心用意若佛在世丈六金身三十二相八十種好紫金剛體當正思惟未必止思佛容貌相好且如十六觀經韋提希問佛教我思惟佛教修三種淨業孝養父母行世仁慈受持三歸具足衆戒此是答思惟後以十六妙觀答正受即三昧今之思惟又須身口意三業清淨三業清淨有二種一身三口四意三三業清淨二身沐浴意絶攀緣三口齊疏更慈悲行方便攝心靜慮並是入道正方便故曰當正思惟若佛滅後施設形像心在目想生正憶念還同如來常住之日懸諸幡華者楞嚴云欲坐道場先持比丘清淨禁戒要當選擇戒清淨者結界建立道場或道或俗心滅貧淫持佛淨戒合佛清淨軌則四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形相又於當陽張盧舍那諸大變化佛菩薩等初七日中頂禮十六如來六時誦呪行道第二七中一向專心發願第三七中一向持呪至七七日十方如來一時出現鏡交光處此乃楞嚴建立道場儀法如是此云懸諸幡華意同於彼唯莊嚴之儀略爾若依現行修懺法修之經三七日邀期稽首諸佛名字如楞嚴三七日中頂禮發願也又如世人服藥言三七日中已能感應稽首者只禮懺法禮佛時想念云能禮所禮性空寂感應道交難思議我今道場如帝珠釋迦牟尼影現中我身影現如來前頭面接足歸命禮禮佛禮法亦應如是想念求哀懺悔遇善境界得心輕安者求哀懺悔者如行法經云我今云何但見釋迦牟尼佛不見多寶佛塔恆在不滅我濁惡眼是故不見作是語已復更懺悔過七日已多寶佛塔從地涌出以是知道業未成必有三障之阻礙應須發露己身先所作惡業懺悔以自己懺悔之力更衆佛加被之力魔障不起獲善境界得心輕安梵語懺摩此翻悔過西國人云忍義大似惱人他人怒意云請恕願勿嗔天台云懺者首也悔者伏也如人得罪於王伏欵求恕又懺名白法悔名黑法黑法悔而不作白法企而尚之取捨合論又懺名改往悔名修來又懺名慚悔名愧慚是慚天愧是愧人人見顯天見冥天台立三種懺一者作法懺二者取相懺三者無生懺作法懺成滅身口意三業罪此依戒門取相懺成滅性罪此依定門無生懺成妄想罪滅此依慧門作法懺如建道場十科行儀精進一一不失餘罪雖滅大論云如比丘斬草害命二罪不滅取相懺如梵網經見光見花手中有罪滅字聞空中聲或感夢無生懺如行法經一切業障海皆從妄想生端坐念實相衆罪如霜露此三種懺隨修一種滅罪雖然得少輕安亦如楞嚴云皆是方便暫得如是不作聖心名善境界若作聖解即受群邪若無生懺成便登初住分身百世界作佛何止輕安而已三懺悉是善境界皆可顯圓覺也過三七日一向攝念越二十一日之後更不念佛懺悔一向收攝正念不令放逸也西蜀復菴暉禪師曰此明離相用心攝念者起信云若修止者住於靜處端坐正意乃至心若馳散即當攝來住於正念正念者當知唯心無外境界也四明聰講師曰三七日中燒香禮佛求哀懺悔皆屬造作動而未靜如濁水撓之愈濁今言攝念澄心歸一或專觀空或專觀假或專觀中或專念實相或數息氣出入或一念法界境觀如如攝心既久忽不見身不見心如雲如影如琉璃舍於寶月無明妄心自消圓覺妙心自顯若經夏首三月安居當為清淨菩薩止住若遇夏初即當結夏安居觀室三月不出是名清淨菩薩止住之觀心離聲聞不假徒衆傳心法要曰因聲教而悟者名聲聞今既安居淨觀何待聲教也故曰心離聲聞既是心離聲聞何假徒衆之助至安居日即於佛前作如是言安居淨觀之日即對佛作此誓也西蜀復菴暉禪師曰為清淨菩薩止住者此指大乘菩薩也聲聞即小乘也徒衆即六和之衆也六和衆者一身和二口和三意和四戒和五利和六見和身和共住非所勿去諸上善人同會一處口和無諍非禮勿聽同氣相求同聲相應意和同知勿愛便宜不善厭作心不可欺戒和同修慎勿貪求防非止惡莫結冤讎利和同均平等最親你分八兩我得半斤見和同作莫生輕薄不恃己長大家安樂今則依大乘而修不假須此徒衆也我比丘比丘尼優婆塞優婆夷比丘者圓覺疏曰一名怖魔二名乞士三名淨戒比丘尼者女比丘也優婆塞者行者也優婆夷者尼童也某甲踞菩薩乘修寂滅行自謂按菩薩大乘之法修習妙行也同入清淨實相住持悉皆悟入無相之相住持無失以大圓覺為我伽藍伽藍者衆園也今曰以圓覺為伽藍者盡明我衆不依倚別法也身心安居平等性智身心安處於大圓覺中性與智慧泯然一等涅槃自性無繫屬故寂滅本性廓然自在無所繫縛亦無所統屬故也今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆不依倚聲聞小乘之法至心敬請諸佛菩薩三月安居修此廣大圓覺法門又豈在乎徒衆也西蜀復菴暉禪師曰梵語比丘此含三義謂一怖魔二乞士三淨戒比丘尼即尼師也尼者女也優婆塞此云近事男即行者學法之人也優婆夷此云近事女即學法女人然小乘局於二衆大乘道俗俱霑也某甲則各稱其名踞者居也菩薩乘者揀羊鹿車也修寂滅行者揀四諦也實相住持者非事相住持也伽藍此云衆園園是衆所居之處故圓覺為萬德之所依此一段文據圭峰疏意云乃轉八識為四智也問何謂之八識耶答眼耳鼻舌身即前五識也第六意識第七末那識第八阿賴耶識也然前五識屬外即用也後三識屬內即體也又前五識屬後得智後三識屬根本智也何謂四智答一成所作智二妙觀察智三平等性智四大圓鏡智也今轉者謂菩薩之人才登初地方轉得第六意識成妙觀察智此智善達諸法也然此第六識中具善性不善性無記性為三性乃分別一切法也其次入二地至十地方轉得第七末那識成平等性智此智乃是番因得名蓋因執我不平等故須番之也然末那此云染污根謂此識內執我癡我慢我愛我見外執有凡有聖有高有下有彼有此不能平等也然上二識乃是菩薩之人因地於十地之中轉也其次於等妙二覺果位上方轉得第八阿賴耶識成大圓鏡智此智乃是從喻得名然此第八識執內身外境山河大地根身器界種子也今則譬如大圓鏡光明圓滿也如第十七祖一日遇一童子手持一鑑祖問曰汝手中以何所表童子曰諸佛大圓鏡內外無瑕翳兩人同得見心眼皆相似此是果上轉也第八識成大圓鏡智而前五識只就果上一道轉成成所作智此智作諸佛事也所以祖師云大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無實性若非轉處不留情繁興永處那伽定雖云六七因中轉五八果上圓但轉其名不轉其體也今經身安即成所作智也心安即妙觀智也此以四惑相應妄計阿賴耶為自內我於平等理中起不平等見今既所緣性寂能緣七識自如如性皆同故成平等性智也以大圓覺者此即大圓鏡智也豈不見乎普融示衆云德山入門便棒此豈不是成所作智玄沙與天龍遊山見虎此豈不是平等性智臨濟示衆云有一無位真人在汝等面門出入未證據者看看此豈不是妙觀智雪峯示衆云我這裏似一面古鏡相似胡來胡現漢來漢現此豈不是大圓鏡智意謂用一圓覺為我一箇住處既以圓覺為所住之處則一切識性盡成圓覺之智即是十方諸佛不死本涅槃自性此之涅槃自性以順理故六通四闢大小精粗其運無乎不在更無方所可繫者不似小乘繫著方所也大菩薩者地上大乘菩薩也大因緣者不拘小節之謂也四明聰講師曰若經夏首三月安居者上問安居則是修圓覺人別卜闃寂置道場處所今言安居是佛方便修圓覺之人如遇夏首僧家禁足九旬不出入檀越送供各自修真修圓覺或別安道場用歸衆結夏有結期不歸恐妨結夏歸又妨懺期入觀遇此境界或恐疑慮其進修佛別出其聖制使不妨正修故云若經夏首三月安居當為清淨菩薩止住至不假徒衆者此明大乘修圓頓行不比小乘聲聞緣覺用心不同菩薩以法界為心絶待為念觀法界衆生是我父母眷屬梵網云一切男子是我父一切女人是我母我生生無不從彼受生一切地水是我先身一切火風是我本體地水尚猶自身觀之何況草木江河大地皆我自身境界何況有情蠢動含靈而不度脫菩薩如此用心與二乘頓別聲聞自調自度匆匆取證怕怖生死如鬼虎蛇只要出離不顧衆生若望大乘霄壤懸殊今云菩薩止住修圓覺者專用寂照用觀深切盡虗空遍法界含褁十方無一衆生不在圓覺心內依正二報皆是常寂光若身若心皆是毗盧如此身心安可以時限制之不限制結一念中度盡衆生一念中要取正覺豈局九十制夏制結夏者依律小乘制身心自行非存大忘心離聲聞不假徒象者大有意哉宜自詳悉至安居日即於佛前作如是言我比丘至不繫徒衆者此意別於靜處立圓覺道場不入小乘千二百五十人祇園結制之限自於圓覺修心或經夏首只就道場自結制期所以云不繫徒衆若小乘聲聞結制之日仍於佛前對首作法曰我某甲今依甚處僧伽藍大界內前三月夏安居房舍破修治故是今時僧與佛世結夏言詞一般今立大乘菩薩道場既無徒衆對佛自制身心自立言詞不與小乘語同故至安居日即於佛前作如是言比丘男僧比丘尼女僧西竺以男稱那以女稱尼比丘翻乞士以乞為活不求邪食不立常住優婆塞清信男亦云塢婆斯迦優婆夷清信女亦云塢婆索迦亦云族姓男族姓女亦云諦信男諦信女則今時受三歸五戒善男善女也此謂之四衆凡道俗依制結夏修圓覺者對佛白云我某甲踞菩薩乘修寂滅行菩薩云大道心成就衆生寂滅不生不滅為寂滅不是小乘生滅之滅同入清淨覺相者是諸法實相不生死相不涅槃相不生死非凡夫也不涅槃非二乘也今云實相是佛性見常住真心是性淨明體是空如來藏是佛知是佛見是圓覺性海是第一義諦是實相理地依此安住是住毗盧藏是住戒藏是住因果藏是我等見前一念虗妄心不須他覔空盡妄心即空如來藏若色若心依正因果凡一切諸法皆是實相依此住持以法界為心地安住一切衆生於此即成佛道不依實相為住持如何度生如何得顯圓覺故云以大圓覺為我伽藍為我二字指我自身心伽藍即道場是我練心修圓覺處所圓覺即法界法界絶待為義包色心依正十法界天堂地獄無不在乎其間菩薩為若此也此之身心即平等性無有一法不稱性智是大圓覺智一切種智無一法不現其中若小乘涅槃則繫屬有限量今是大乘涅槃無繫屬故不局一法界故云我今敬請不依聲聞當與十方如來及大菩薩三月安居安居護生之意如上釋竟若大乘菩薩安居一切衆生隨所住處安樂一切不局制內制外所以放生施食乃長生符不死藥故立戒以不殺為首善男子此名菩薩示現安居前説三月安居者乃菩薩示現安居之相過三期日隨往無礙長期百二十日中期百日下期八十日安居修行者過此三期日數欲往他處亦無妨礙西蜀復菴暉禪師曰道明三期已滿小乘夏限未終以本非小乘安居故不妨隨往無礙也四明聰講師曰明大乘結夏滿足謂之自恣小乘作法立二五德對首出罪懺悔云衆僧今日自恣我比丘某甲亦自恣若有見聞疑罪大德長老哀憫故語我我若見罪當如法懺悔為之解夏自恣此後出界遊山無妨今頓教圓修亦滿三月安居期滿隨往無礙此非對五德之人出罪懺悔為自恣懺罪辭但云隨往無礙善男子若彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取正在禪定中忽然別有他念起時當以智慧觀察非上所聞三期正行之外若善若惡一切境界皆名邪見並不可取著後皆倣此西蜀復菴暉禪師曰此總標於加行境所證境中誡勸不得取著邪謬境界故般若經云魔能入一切衆生心令歸依魔黨如漆斷手截臂不以為難魔力之故人皆信伏又法華云深著虗妄法堅受不可捨此皆非是觀中所聞所見若夫信解行證雖然階級不同而所信所解所行所證之法始終無別若不是最初根本了悟覺性三重因地之法不應取著也謂解則解其所信修則修其所解證則證其所修也下文方列三觀謂靜幻寂也四明聰講師曰此聖人要制欲一念遍含法界三世如來十方菩薩法界衆生一念中度脫衆生一念安樂衆生一念心中修菩薩乘者未成就使即成就一念心中觀十方如來在我心中成就正覺在我心中安置諸子在我心中住祕密藏法華云安置諸子祕密藏中吾亦不久自住其中其斯謂歟若非如此境界者善用其心非此心地終不可取善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺修奢摩他之靜觀則先斷思念靜力既極自然開悟如是初靜從於一身至一世界初習靜觀始則一身內外了無動念漸覺靜性遍滿於一世界中矣覺亦如是靜極而覺則亦先悟身相不空漸覺法身遍滿於一世界中矣西蜀復菴暉禪師曰此靜觀也不見有身曰靜便覺者此即慧也以靜是體是定覺是慧是用行人入此觀初成之時不見自身之相名一身靜以我身靜時當體是覺名一身覺若不見有山河大地世界之時即此慧亦遍一世界中故云如是善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是我覺性與虗空同體而衆生者皆在我覺性中故所起念無不知者西蜀復菴暉禪師曰衆生念者世界既全成覺而衆生全在覺中故所起之念無不了達如影入鏡鏡照無遺如像入壺壺應無惑四明聰講師曰此三觀明文圓覺未到此土時涅槃亦出三觀奢摩他者是也又出瓔珞經明次第三觀謂之空假中至下卷云佛頂髮放一切光復集十方百億佛土諸菩薩衆即於衆中告文殊普賢法慧功德林金剛幢金剛藏善財童子汝見是衆中敬首菩薩問三觀法界諸佛自性清淨道一切菩薩所修三觀法門否汝等各領百萬大衆皆應修學又大論云因緣所生法我説即是空亦名為假名亦名中道義此皆一心三觀所出之明文今云奢摩他曰空觀也空者以至靜為義靜則如濁水澄之則靜靜則清淨淨則何處不清何物不淨楞嚴云淨極光通達寂照含虗空却來觀世間猶如夢中事若取空義即破一切法無法不破破者蕩也蕩壞煩惱結使愛纏色心幻化假立虗偽若無空破之則執之為有受於輪回若空治則四大五蘊我人衆生壽者皆不著相況衆生無明業識顛倒非空藥治之則生死不了先取至靜不起思念者此用三止中體真止只謂我心含一切法具一切法一切法皆我心我今以此虗空復息虗妄止即息攀緣止散心即為寂心心寂即靜極靜極處萬法清淨一心念如明月臨於萬象故云從於一身至一世界無非圓覺如此淨心遍滿法界一世界中有一衆生起一念心以圓覺心了之以大圓鏡智照之盡百千世界衆生皆悉能知之先用空觀此觀先鋒將逢山開路遇水疊橋破一切惡莫若於空散即用體真止之昏則用空朗之空一切法先用空觀即奢摩他也非彼所聞一切境界終不可取西蜀復菴暉禪師曰此誡取邪境也天台教云凡在定中若見善相者當以三法驗之一以定研磨二依本修治三以智慧觀察譬如世上之人欲知真金以三法試之一燒二打三磨也如楞嚴鈔中説昔有禪師在山中坐禪忽見一孝子擎一死尸來向師前著便哭云如何殺我阿母師知是魔思之此是魔境我將斧斫却可不解脫便於柱上取斧遂斫一斧孝子走去後覺股上濕便看之乃見血出不期自斫也又有一禪師坐禪時見有一豬來在面前師謂是魔則捉擎豬鼻唱呌把火來小師來看乃見和尚自把其鼻唱呌斯乃皆是正坐禪時心中起見遂感外魔來入也所以楞嚴經中於五陰説有五十種魔者良由此也四明聰講師曰此言邪黨教人説邪空偏小妄心偏指清淨真如及頑空析空幻化空凡夫不識學此邪方要治心病其病轉深邪師過謬又有一種為衣食故忍受諸苦學於邪術心勞力疲縱學成就身心俱苦又有一種附法外學以自胸中狂解邪見附佛法所説妄引經論證自己惡知惡覺以淫怒癡無妨般若以煩惱不礙菩提行禪坐禪不須習定錯認名言疑該後昆原始迫以口給濫竊佛法貪圖施利豈知殃及來報致此寧不寒心諸佛設教非此境界終不可取我師哀愍其何以行之哉善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧修三摩鉢提之幻觀則先須思想諸佛菩薩使心不亂然後依諸法門漸修正定廣發大願自薰成種廣發至大之願以自熏習成佛之種性也西蜀復菴暉禪師曰此幻觀也前至靜觀不假外緣今於幻觀門中須憑聖境前威德章幻觀即約大悲化生今道場之內且自尅修故約大智求佛也發願者謂䇿勵運意為發希求樂欲為願謂衆生無始以來念念希求樂欲悲智六度等境熏心成習也四明聰講師曰此觀以幻化為相取觀義假觀立一切法莫過乎假此假從本性空中具一切法十界百界千如森羅萬象天堂地獄皆本來性具謂之假此性具法不損一法法法宛然假也者立於一切法不造作立之本來具也以止言之如上一切諸法即是實相遍相一切隨緣歷境安心不動故名隨緣方便止智度論云一切禪定攝心皆名三摩鉢提秦言正心行處若菩薩以度生出假化物衆生種種諸病如塵若沙菩薩法藥治塵沙病慈悲忍勞出沒合變種種現形如觀音馬郎婦彌勒傅大士之儔然肯綮修證為法忘勞分身散影本瓶和尚花瓶浴懶瓚糞火黃獨文殊普賢寒山拾得皆是出假化人故云一切菩薩依種種門漸次修行勤苦三昧若自凡至聖則可以自熏成種若也憶念在懷十方如來未嘗不度生而成佛發四弘誓願利益有情當修三觀非彼所聞一切境界終不可取已解在前西蜀復菴暉禪師曰此誡取邪境也善男子若諸衆生修於禪那先取數門修禪那之寂觀先須自知種種妄念之分劑頭數故曰數門圓覺疏亦曰所知生滅心念便是數門心中了知生住滅念分劑頭數妙明心中了然自知生住異滅四種念頭也生者初起之念住者現在之念異者差別之念滅者寂滅之念經中無異字者取其成句故略之爾圓覺疏中亦如是説如是周遍四威儀中分別念數無不了知行住坐臥四威儀中種種念數無不了知也西蜀復菴暉禪師曰此寂觀也數門者數字上聲呼此即數息觀也謂調和氣息令不澀不滑若數則從一至十想心在數不令馳散也良由數息之故息調心淨遂乃了達知覺心中生住異滅四相粗細妄念本末分劑頭緒數量無有不知者何也為心靜則覺動也今經無異字者即脫略也以論中所説十信凡夫覺滅相三賢覺異相十地覺住相位滿覺生相也生相者動念都盡唯是一心也上文則坐時覺知非唯坐時覺知是妄抑乃於行住坐臥四威儀中四相之念粗細本末頭緒數量一時知之知則無患譬如妖魅所欲著人若知其名自然消滅所謂知賊是賊賊無能為此數門者乃五停心中之門也何謂五一多貪衆生佛令入不淨觀二多瞋衆生佛令入慈悲觀三多散亂衆生佛令入數息觀四多癡衆生佛令入因緣觀五多障衆生佛令入念佛觀漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物行住坐臥念念是覺則覺力漸進體無不周故諸世界中有一滴雨亦如親見也西蜀復菴暉禪師曰謂淨心是圓覺自體而世界本在其中觀行成就全合根源知雨滴數固宜本分非唯雨滴萬物皆然舉一例諸且標雨滴也然凡夫之類迷此真心隨念所知故失其用也荀子尚云君子養一之微處一之危危微之機君子能知之尚書云人心惟危道心惟微惟精惟一允執厥中華嚴經説龍王行雨摩醯首羅尚知滴數況行人觀乎若究竟者直到佛位方知之今約觀中妙慧發生故許所見同佛耳非彼所聞一切境界終不可取已解在前是名三觀初首方便奢摩他之取靜三摩鉢提之憶念禪那之數門及三觀最初起首之法西蜀復菴暉禪師曰是名三觀初首方便者前圓覺菩薩問云三種淨觀以何為首故此結答云單修靜幻寂為初首方便也四明聰講師曰非彼所聞一切境界終不可取者出假化物涉世最難雖分身百億內心不動如妙莊嚴王多逢聲色終被聲色所動又佛世有貧人雙生二男一名雙福一名雙德方生四五十日間因父去犁田母出採薪二子在臥內語話父忽先歸見聞彼云生在貧賤之家父母勤苦情何可堪父驚異之以告其妻妻未之信也後夫妻又出妻先歸密伺之二子如先説無異妻云恐是精靈鬼魅欲積薪活燒夫婦各抱一子至田野處佛眼遙觀急來救之佛問其夫妻云二子抱去欲何為夫妻説如上事今欲活燒佛云是迦葉佛時兩位菩薩將入聖階忽邪心起退墮至此不可燒也佛為摩頂説法二子皆證聖果父母亦證須陀洹果古人為見寸心難降誡云非彼境界謂非真三摩鉢提隨緣方便止皆不可取若取邪證自生瘡疣為害非淺善男子若諸衆生修於禪那至終不可取者此中道觀亦名息二邊分別止即不一不異為之中也即俱離寂靜幻化二相既離二相故名中妙一切法也今先取數門者此云六妙門門即涅槃為妙門為能六法次第相通能至真妙泥洹故云妙門也一數息門二隨息門三止門四觀門五還門六淨門修禪者先攝心在息從一至十為數行者為修無漏真法先須調心入定欲界粗散難攝非數不能治之故須善調身息從一至十則粗亂靜息心神停住是為入定之要術故云先取數門二隨息門細心依息知出知入故名為隨三止門息心靜慮名為止修禪者若凝心寂慮心無波動則諸禪定自然開發四觀門分別推析之心為觀五還門轉心返照名為還六淨門妄波不興名為淨今用數息為門者是為定定即止智者云息二邊分別止定寂慧察能發真明出離生死以此止通後五門其心清淨則萬邪滅矣縱不滅邪亦了知生住滅念分劑頭數斷三界結使不了知結使種種諸法頭數亦能行住坐臥四威儀中分別自己出息入息念數無不了知亦自己身中三百六十骨節八萬四千戶蟲四大六根衆毛孔中息出息入無不觀察分明亦能知百千世界一雨滴數有如目擊故云猶如目覩所受用物非止定之功孰能如是今中觀是名息二邊以止為體只由心淨極如軒轅鏡則森羅萬象難逃影迹凡夫修此觀成理顯造境即中如駕大白牛車直到清涼豈小因緣哉非此境界斷不可取是名三觀初首方便者方便者如舟抵岸始名到家未渡迷津須假智楫今云三觀初首方便者隨根量利於何種宜於先修如宜空則先修空假中亦然是佛第一方便宜善思之若諸衆生遍修三種勤行精進即名如來出現于世圓覺三觀精進無怠如此衆生無異出世之佛也西蜀復菴暉禪師曰此即遍修也何謂遍修乃圓修靜幻寂三種觀也良由三觀既備萬行已圓故就此行人分上便是諸佛出世也又即此人本覺離念名為佛出佛即覺義圭峰云我心元與佛心齊曠劫沉淪只為迷菩提乃梵語也唐言覺覺心寂照即菩提也四明聰講師曰三種遍修者即總修三觀也中即空假空即假中假即空中三法一體不一不異破一切法用總空觀立一切法用總假觀妙一切法用總中觀此三觀如水與波水者空也波者假也波即是水氷即是波中觀也波水同體假空亦然又如用刀斷物用鑽透竅雖利用不同鐵則一也法亦如是以此三觀破一切惑證一切智如來出世亦只如然若後末世鈍根衆生心欲求道不得成就由昔業障根性頑鈍學道不成者皆由宿業所障故也西蜀復菴暉禪師曰此下互修也互修即復修也今初明鈍根之人修觀未成也當勤懺悔常起希望勤懺已往之業常起成佛之心先斷憎愛嫉妬諂曲求勝上心斷諸惡念發無上心西蜀復菴暉禪師曰此重發誓願決心欲證加功勵志懺業斷惑也三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證三種淨觀者即奢摩他之靜覩三摩鉢提之幻觀禪那之寂觀也隨學者心精習一觀不可兼學他觀也此精習心若不放逸漸漸增進可證圓覺西蜀復菴暉禪師曰此正明互修也序云別遍互習也指此及上文也疏云有人被色相所礙空靜之觀難成先觀色幻幻即全空靜觀方成復有執定實色礙於心識難修幻觀先知其體本無而不妨覩相方成假幻復有修中難成絶待先知假全空而無假空全假而無空空假俱無絶於對待方成寂滅其中又有人直見心源方知諸法即性故空不壞相故假或但從性現故假無別所現故今意若修靜觀不得者却許修幻觀若修幻觀不得者却許修靜靚二觀皆修不提者却許修寂觀也只如天台教云破一切惑莫甚乎空建一切法莫甚乎假究竟一切性莫甚乎中故一空一切空無假無中無不空一假一切假無空無中無不假一中一切中無假無空無不中反意可類四明聰講師曰若後末世鈍根衆生心欲求道不得成就者此言障重不得成就加磨鏡加藥加功道心堅固亦可得之古云人一次學能之己百次學之人十次學能之己千次學之果懷此志也雖愚者必明雖柔者必強故下明力不遂心令懺除惑業而起希慕也由昔業障當勤懺悔至求勝上心者有障重如增上心勇猛精進深加觀力更助五悔五悔如灰皂用清水浣濯障自去五悔者見行修法華等懺皆有五悔嫉妬諂曲不得不先除也三種淨觀隨學一事至漸次求證者如世醫師治病此藥不痊復投別藥病若變藥亦轉豈可以一藥理百病耶衆生習業非止一種諸佛以一方便門設百千種藥方醫之服者皆得病除故楞伽云如醫療衆疾無有若干論以病差別故故説種種法爾時世尊欲重宣此義而説偈言圓覺汝當知一切諸衆生欲求無上道先當結三期懺悔無始業經於三七日然後正思惟非彼所聞境畢竟不可取奢摩他至靜三摩正憶持禪那明數門是名三淨觀若能勤修習是名佛出世鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前西蜀復菴暉禪師曰於此十一章經文並屬正宗分竟其頓漸悟修者蓋此經文殊一章是頓解悟普眼觀成是頓證悟三觀諸輪是漸證悟圓覺一章道場加行是漸修悟也嘗考禪家有二句義一者最初句二者末後句初句即初發明之謂也須得末後句始到牢關今經亦然初文殊章頓解悟即最初句也普眼觀成頓證悟即末後句也如善財初見文殊與末再見文殊其意一同第二流通分謂正宗分中法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮故有此分而來若都無人傳是不流流則不住不滯或傳之遇其障難是不通通則不壅不塞如水之流無礙也梁朝傅大士三觀頌曰獨自精其實離聲名三觀一心融萬品荊棘叢中何處生獨自作問我心中何所著推檢四運并無生千思萬慮何能縛唐圭峯定慧禪師宗密頌圓覺菩薩章曰圓覺道場圓證悟下根於是開真路三期限量可隨宜四衆安居絶緣故以大圓覺為伽藍踞菩薩乘行願度曾知證入總該前諸佛共依如是住圓覺菩薩章終十一
