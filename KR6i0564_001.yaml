body:
  text: 御注大方廣者無量無邊之廣也蓋圓覺性體周遍法界如大方之廣故也圓者圓照具足覺者虗明靈照修多羅者按諸注疏乃總括諸經之辭了義經者讚此一經是究竟了達之義西蜀復菴暉禪師類解講義曰經題十有一字以八義釋之一約體用二法義三能所四名義五立名六取捨七問難八總收第一體用者於中又有從體起用及攝用歸體謂大字一字屬體方廣二字屬用此從體起用也其次圓覺二字屬體上大方廣三字屬用此攝用歸體也第二法義者欲釋諸經論必須明釋法義依法解義義即分明以義照法法即顯著今經題中圓覺二字屬其法大方廣三字屬其義謂當體虗明廣大常住本覺法上有此之大義方義廣義其次經之一字屬其教法上修多羅了義五字是嘆教法勝能之義也第三能所者謂修多羅了義經六字屬能詮之文大方廣圓覺五字屬所詮之義又有總別修多囉三字屬總謂指一代時教了義經三字屬別謂別歎此圓覺經謂此經乃是一代時教中諸部宣説勝諦決了究竟之義非是宣説世俗因果不了之義所以云修多羅總指諸部了義者別嘆斯文也第四名義者又分為二初唐後梵謂大方廣圓覺了義經八字即此方唐言也修多羅三字即西域梵語也大以當體得名常遍為義當體覺性無邊強名為大常則竪通三際遍則橫遍十方方以就法為名軌持為義軌則軌生物解使衆生悟入佛之知見持則任持自性於生死海中而此性不曾生滅廣則從用得名包博為義包則無外博則普遍圓以不偏得名滿足周備為義覺以不昏得名虗明靈照為義此皆就唐言釋名義也其次修多羅此翻契經契與契合合機合理也經者有貫串義有攝持義謂貫穿諸佛所説之法攝持一切衆生之類故稱大方廣圓覺修多羅了義經也第五立名者且諸經得名或佛自立或結集人立或兼斯二者立今經題目據下賢首章中有其五名一名大方廣圓覺陀羅尼二名修多羅了義三名祕密王三昧四名如來決定境界五名如來藏自性差別以此推之是知此經之名乃佛自立也第六取捨者經中雖有五名首題唯取其二者良以宗本體用是法義之宏綱詮指功能乃言像之皎鏡事周義盡須建五名以要標題且存兩號遂存前二略去後三此譯人巧意也第七問難者又分為二初難本題後難別題難本題云修多羅與經但唐梵之文有異今雙置題目豈非重疊耶答上則總指諸部此則唯目當經對總歎別故非重也次難別題中又分為二初難法義後難三大難法義云且大方廣佛華嚴經彼經題目以大方廣三字為法佛華嚴三字為人今經何故却以大方廣三字為義耶答彼經對人故稱法此經對法故稱義也難三大云華嚴經説三大起信論説三大與今經説三大是同是別耶答配屬三大約法則同釋義隨宗則別起信論就凡上建立三大為宗華嚴經就玄上及事上建立三大為宗凡一字皆具十義今經就本覺體上建立三大為宗故不同也所以起信約凡以為心圓覺約佛以標名華嚴不逐機宜直顯一真法界也又起信大分約因位説圓覺與華嚴大分約果位説第八總收者意謂此二十八紙能詮之文乃是吾佛大聖人於一代時教諸部中特為頓機之者宣説決了究竟真實常住之義欲使後代順佛法修行之人誦此能詮之文解此所詮之理如説修行於一切處決疣潰癰挑痾去毒遣障除疑證自己廣大靈明真實常住圓覺之體於此體上發起如是大義如是方義如是廣義從此超凡入聖一得永常盡未來際自利利他受用無盡也四明聰講師心鏡曰大方廣圓覺者此經乃窮理盡性之書潔淨精微之教部雖屬於方等教味唯歸一圓瞿曇示因地之良規妙德啓修行之正路故褒之以大方廣實之以修多羅今言圓即大也曰規覺即方也曰矩蓋聖人用此模範衆生能成十方諸佛軌則名善法行也又圓是圓融覺是覺性真覺之性圓融之道如大海水澄湛圓融楞嚴云覺海性澄圓圓澄覺元妙又圓則寂也覺則照也照而常寂故曰圓寂而常照故曰覺覺取照義圓取寂義照而寂寂而照寂照同源故曰圓澄覺元妙此非獨取廣大無邊之義為圓覺須知衆生旅泊三界生死結根無明業識非圓覺寂照之功幻翳空華孰能銷殞故圓覺之義義盡於斯修多羅者此翻契經契理契機故曰契經了義者法華以前圓覺之外皆不了義蓋權實未融故也今既聞開顯同法華之圓並為了義所以事理圓融因果頓足佛法之妙豈復有過於此經者徑也經由聖人心口故得萬古同遵百世不易準佛地論解則能貫能攝此方儒書則訓法訓常餘如常釋不復繁引罽賓國三藏法師佛陀多羅奉詔譯西蜀復庵暉禪師曰譯師也梵語佛陀多羅此云覺救罽賓者即北印度也由西域有五印度此覺救三藏乃是北印度罽賓人也初於東都白馬寺譯此經不載年月譯之一字乃是度語之稱又譯者易也大抵變易以成華言鄭氏注曰王制五方之民言語不通嗜欲不同達其志通其欲因是命通言語之官曰象胥蓋象胥有才智者也又説東方官曰寄南方官曰象胥西方官曰狄鞮北方官曰譯今據經多從西來今用北方之官名者但漢時多與北狄交通然北方譯官兼善西方之語佛法初自西來乃用北方之官翻之自此佛經咸稱譯也唐圭峯定慧禪師宗密述疏鈔科節疏主也圭峯即終南之別山定慧禪師即唐宣宗追諡之號此經前後造疏解者有京報國寺惟慤法師先天寺悟實禪師薦福寺堅志禪師北京道詮法師今圭峰定慧禪師皆曾備討各有所長慤邈經文簡而可覽實述理性顯而有宗詮多專於他詞志可利於群俗然圓頓經宗未見開拓性相諸論迢然不干故圭峯之疏俱不依也大凡佛説一代時教皆有三分一序分二正宗三流通分今經從如是我聞至平等法會名序分自文殊至圓覺共一十一章經文並是正宗分最後賢善首章經文屬流通分今先序分科者科含半義乃是包括酌量一部經文大意故曰科也四明聰講師心鏡曰沙門或云桑門肇云出家都名阿含經云捨離恩愛出家修道攝御諸根不染外欲故號沙門郊祀志云沙門漢言息心削髮出家絶情洗欲而歸於無為也瑞應云息心達本源故號為沙門梵語佛陀多羅者唐言覺救北印度罽賓人也於東都白馬寺譯圓覺一部不載歲月譯者易也以彼方言易成華語也如是我聞御注曰阿難謂如是經教親從佛聞以後依此於正經之下注寫者並是御注一時佛説此經之時婆伽婆藏經曰佛之異稱西蜀復庵暉禪師曰經首必具六種成就若六緣不具教法不興謂一信成就二聞成就三時成就四主成就五處成就六衆成就今此一段文具前四也如是者乃信成就佛法大海信為能入若信則言是事如是若不信言是事不如是又信則所言之理順順則師資之道成是知信之一字乃信順之辭如人有手取物則得華嚴經曰信是道源功德母長養一切諸善根斷除疑網出愛河開示人天涅槃路我聞者乃聞成就我有四種一凡夫實我二外道神我三菩薩假我四佛之真我今當假我也聞從耳根發識既是耳聞今何稱我廢耳之別從我之總故曰我也又唯識家解如是二字作指定之辭謂指定下來所説之教法阿難二十年中為佛侍者親從佛聞所以云如是玄義我親得聞親光菩薩將此六種成就謂之經前五事信散在聞時主處衆中也一時者乃時成就謂此時不定俱是師資會合聽説之時也婆伽婆者乃主成就此具六種義一自在二熾盛三端嚴四名稱五吉祥六尊貴如是六種義差別應當總名婆伽婆大抵教家有五不翻一祕密不翻即神呪等二多含不翻即羅漢須菩提等三此方無故不翻如閻浮提樹苾芻等四順古不翻如阿耨多羅等五生善故不翻如佛般若菩薩等若云覺此方人輕薄不生善故今婆伽婆於五不翻中當多含故不翻也然婆伽婆即是佛若出其體乃是圓覺也四明聰講師曰如是者理無不如之謂是事無不是之謂如亦是信順之詞文如理是也我聞者阿難稱我者非人我之我謂萬法皆備於我之我本是耳聞蓋我是耳之主宰故也一時者一者多之所宗謂之一又一之所起謂之時天上人間長短不同天竺國不分春夏秋冬只云三際正月十六日至五月十五日為熱際五月十六日至九月十五日名雨際九月十六日至正月十五日名寒際今言一時者已包四季故也婆伽婆者説經教主即佛也亦曰婆伽婆亦曰薄伽梵佛頂云十方薄伽梵一路涅槃門具足六義自在熾盛端嚴名稱吉祥尊貴如是六德義圓滿應當總號薄伽梵諸經多稱為佛蓋譯師取與不同非有他也今定説經定是何身所説佛有法身報身應身法身有二種理體法身用中法身報身亦有二種有自報他報應身亦有二種有勝應有劣應今定用中法身亦曰他報亦曰勝應三身一體也亦云即生身為尊特身佛蓋釋迦來此南閻浮提八十返親近父母生身五十年説法三百會談經只此丈六四八之相華嚴云父名淨飯母名摩耶吾名悉達但大小乘機見不同大乘住地菩薩用業識見之即此丈六即尊特身即用中法身龍女所讚微妙淨法身具相三十二也二乘凡夫只用六識見是父母生身三十二相説小乘法同一座席二見不同但此尊特身有二種一者示現尊特如光明法華圓光一尋能照無量凡窮一相皆不可得如應持不窮其頂目連莫究其聲外道欲量佛身南山斫丈六竹量之佛頭在丈六竹上古云斫盡南山竹仍舊長丈六二者現起尊特如十蓮華藏海微塵相好又十六觀經真法身高六十萬億眼如四大海水眉間白毫如五須彌山皆是現起尊特也不思議德豈容凡夫以有思惟心之所測度也入於神通大光明藏佛入大定中神通光明無窮無盡故名曰藏三昧正受三昧者正受中自得之妙正受者不受諸受名曰正受西蜀復庵暉禪師曰乃處成就謂佛入法性源現無邊無礙剎土亦不定分自他受用故曰依真所以大疏云經宗既詮實境教主須明真身居受用土為諸大士説圓覺經然此經説處及説教之主與別經不同金剛經處即是舍衛國給孤獨園説主乃是丈六化身今此經則不然説處即定中乃是依真實之境説主即法身與報身不分乃是真身説也神則妙用難測通則自在無壅大光明藏有三義故一揀濫二破名三顯理何謂之揀濫謂一代時教中佛所説有如來藏有自性清淨藏有法身藏有法界藏恐濫彼故今謂此是大光明實性神通之藏何謂之破名佛恐後人不知法體本來平等於平等中強生分別以謂十方諸佛如來大光明藏大包天地光明烜赫無所不照無所不包無所不攝無所不容有如此之名相若作如此見解遂作兩箇故破有執心即相無相故無大字名相無光字名相無明字名相無藏字名相也何謂顯理此一義妄盡覺明大開眼於一切處圓陀陀淨裸裸赤灑灑頭頭是物物全盡十方世界無不融通如大日輪升空天下洞明此所謂顯理雖然如是更須親行一步始得話圓所以論云心性不起即是大智慧遍照也三昧者梵語此云正受即唐梵雙舉此即入定正受者不受諸受故曰正受正以揀邪義受以領納義若眼領納色耳領納聲鼻香舌味身觸意法以至一切時領納愛喜樂捨等者此名邪受唯是入定之時於所緣境審正思察眼不領納色乃至身意法以至一切時愛喜樂捨等法然後不妨眼熾然見色耳熾然聞聲乃至鼻舌身意熾然等所以賢首云雖空空絶迹不妨義天之星像燦然湛湛亡言豈礙教海之波瀾浩瀚只如上至十方諸佛下及六道衆生皆有此大光明藏三昧正受且如何得入但向十二時中息諸妄想攀緣顛倒分別之心智與理冥境與神會便入得此大光明藏三昧正受脫或不然只知門外走寧識在其中一切如來金剛經曰如來者無所從來亦無所去故名如來光嚴住持光嚴者光明莊嚴也住者常住不住持者受持無失西蜀復庵暉禪師曰一切者普該之言如來者其義有四一約法身者謂無所從來亦無所去也二約報身者謂過去修因來成佛果也三約化身者謂乘如實道來成正覺也四約理智如謂本覺來謂始覺因本覺而有不覺因不覺而有始覺本始不二故曰如來又十方諸佛悟此真如之理故曰如來六道四生迷此真如之理故曰如去不得稱來今如來者即指化身也光嚴者重重交光照耀炳著妙相之上安住任持永絶攀緣不曾遺失所以序云具足圓覺住持圓覺者如來也是諸衆生清淨覺地佛與衆生本同一性故諸佛光嚴住持處即衆生淨覺心地西蜀復庵暉禪師曰上文明聖同此文明凡同是字乃指定之辭諸則不一之義衆生者以色受想行識五蘊衆緣和合而生故曰衆生又云有多生死故曰衆生清淨者離煩惱障離所知障垢不能染妄不能變故曰清淨覺是法地是喻此謂之法喻雙舉謂一切衆生迷真失湛徇相執名妄見衆生然妄體元空全是本覺此之本覺體上能出生一切河沙功德喻如大地能生一切物等問衆生分上何不稱住持耶答諸佛證此境故得稱住持衆生不證此境但具佛性故不得稱住持二字但指其分上有此清淨本覺之地所以序云終日圓覺而未嘗圓覺者凡夫也首楞云雖終日行而不自覺枉入諸趣在禪家謂之終日焚香不知身是道場在周易謂之百姓日用而不知在孟子謂之終身由之而不知其道者衆也在老子謂之不善身之所保亦同意也又法燈和尚云無根兮得活離地兮不倒日用尚不知更向何處討身心寂滅平等本際既證寂滅聖凡體同方見本來真際了無差等圓滿十方覺性圓滿遍法界故不二隨順雖順諸緣覺性常一西蜀復庵暉禪師曰身心寂滅平等本際圓滿十方者身即所執之妄身心即所執之妄心寂滅是畢竟空義圓則不遍滿則具足謂上文舉一切如來光嚴住持又舉是諸衆生清淨覺地乃是立宗蓋此經以心境空寂凡聖平等為宗忘情等佛觀行速成為趣恐行人不知覺性本來平等生分別之心以謂凡是凡聖是聖若如此解何時了悟故云有心分別一切皆邪無意攀緣萬途自正又云心異則千差競起心乎則法界坦然此之執心能作諸佛能為衆生能作天宮能為地獄是知著其相則凡聖有霄壤之隔故不平等若以性觀之則凡聖染淨之相而諸法當體悉皆空寂便見圓覺本際之性本來平等本來無欠少非唯無四聖之高亦無六凡之下人人具足箇箇圓成心佛及衆生是三無差別所以道如瓶已滿更不再添佛佛道齊法法平等此之覺性在東全東南西北方亦復如是包於天地充塞六虗遍滿法界六通四闢大小精粗無乎不在此謂竺土大仙心東西密相付莊子齊物篇亦云其形若稿木其心若死灰忘物忌智則萬物一府死生同狀又云自其異者視之肝膽楚越也自其同者視之萬物皆一也不二隨順者隨則不乖順則相應且説有二二是兩箇不二是一箇二即是凡夫順生死二乘趣涅槃凡夫迷圓覺之體失圓覺之用起惑造業輪轉大苦海中方死方生方生方死頭出頭沒無有解脫此時被妄法之所染著不能趣於涅槃無量劫中只在生死此岸所以望於二乘涅槃彼岸為二其二乘之人見三界無安猶如火宅希求出離如救頭然如獐獨跳不顧後群雖然得出生死脫離三界又一向灰身滅智沈空滯寂隨解脫坑臥涅槃城有其三義一者心狹劣二者怖三界三者缺大悲只解如是去不解如是來又被空之所留滯在空裏望凡夫生死此雖為二是二人大過不及皆不處乎中道唯吾佛大聖人證無住處大涅槃以大悲故常在生死而不住涅槃以大智故而不住生死常在涅槃在此岸不妨常在彼岸在彼岸不妨常在此岸此是佛之用處謂之不二隨順若學者説時即於十二時中妄想攀緣念念無明生死根本不是執凡便是執聖不是執真便是執妄不是執有便是執無與他凡夫二乘一般唯是一切處一切時不著凡聖真妄有無然後在真全真在妄全妄打成一片方合得他隨順不二於不二境現諸淨土佛一性中名不二境以無著無染之法接化衆生西蜀復庵暉禪師曰於者依也教家謂之境聲就境上得此於字之聲不二境者即上文説中道隨順不二之境諸者隨類普應曰諸淨土者乃對穢土之稱然此土有四一法性土法身所居二受用土於中又分為二一自受用土唯佛自見二他受用土唯地上菩薩見地前小乘不見三變化土丈六化身所居今經統唯二種謂淨土及穢土佛説此經之時地前大衆見佛化身居於娑婆世界瓦礫荊棘坑坎堆阜穢土之中説圓覺經地上大衆見佛他受用報身居於瓊林玉樹寶殿金臺淨土之中為其説圓覺經所聞之法則一所見之人各別豈非吾佛於中道不二境中隨順普應乎注云地前大衆得佛加被方見報身不蒙加被即不見又前所説凡聖一體者此是從自受用土入法性土今此應諸菩薩現諸淨土者此即從法性土現他受用土故次文云與大菩薩等是也四明聰講師曰入於神通大光明藏至現諸淨土者神者名天心通者名慧性大者即法身德光者即般若德明者即解脫德此之三德會無量三諦法歸祕密藏包一切善法曰藏三昧翻調直定正受者即正心行處也三昧梵語正受華言今華梵雙舉其實一切聖賢皆用三昧正受為出入之門以無分別智緣無相理故曰正心行處光嚴者即了因智慧也住持者即緣因福德也一切如來皆用緣了二因莊嚴本有正因而成佛也是諸衆生者諸之一字不一之辭該一法界皆云衆生佛亦謂之無上衆生性淨之理故曰覺地在佛曰果在衆生曰因今將佛果對衆生因地並具圓覺妙明之性無身心相故曰寂滅亦無差別相故曰平等經中凡言十方即是十法界也今言十界界界融通入妙圓覺故曰圓滿只一本覺真如佛性隨染淨緣故曰不二隨順於不二境正明現土即穢為淨即娑婆穢為寂光淨行法云釋迦牟尼名毗盧遮那遍一切處其佛住處名常寂光常波羅蜜所攝成處我波羅蜜所安立處樂波羅蜜滅受想處淨波羅蜜不住身心相處不見有無諸法相處又十六觀經佛與韋提希夫人現諸淨土或有國土純是蓮華或有國土如玻𭹳鏡或有國土如自在天宮豈非即此靈山便是報國無上報事不須壞此靈山突出寂照恐人狐疑不免諄復曉之以後開列諸菩薩名位注解詳説之與大菩薩摩訶薩十萬人俱其名曰梵語菩提薩埵秦人好略略去提埵二字只云菩薩翻大道心成就衆生亦可云菩提翻道又翻覺此十萬衆皆鄰真亞聖地住聖賢或權或實或顯或晦同入寂光啓揚圓覺此經不入二乘之手不列聲聞緣覺衆也最後流通却列凡夫衆須彌山王并吉槃荼火首金剛等以知同在靈山但凡聖所見有異也文殊師利菩薩文殊久成正覺即龍種上尊王佛降尊就卑佐輔牟尼又翻妙德又曰妙首昔因女人而發道心又昔為妙光菩薩化八王子次第而成最後第八王子乃然燈佛彼時釋迦為儒童買五莖蓮華供養然燈并布髮掩泥然燈與之授記曰汝將來於五濁世為佛號釋迦牟尼以然燈往望妙光九代祖師瞿曇乃玄孫也普賢菩薩曲濟無遺曰普鄰極亞聖曰賢乃東方寶威德上王佛國菩薩也聞靈山説法華經法會將終方至駕白象王入我娑婆即法華經勸發品也普眼菩薩遍觀為義普觀法界衆生皆具入圓覺性金剛藏菩薩金取銛利為義剛則剛健喻般若之慧能斷衆惑包覆因果善惡曰藏彌勒菩薩翻慈氏姓也阿逸多字也昔為國王駕白象遊城外其象見野象而欲性狂發王幾失命乃懲治調象之人象人答曰其象本自可調為見野象欲心發生不然請王令調之象至王前燒紅鐵彈丸曰汝於王得罪令吞鐵丸令象開口吞之丸從後出跪而伏調王見是事發慈悲心故以姓號慈氏也王曰汝既能調如何令之有失曰臣能調象身不能調象心其象心非臣之所能調王曰世間孰有善調心者乎曰唯有佛善能調心王往問佛佛曰世間調心各有方法調象調牛馬若干諸類欲調之無遏所欲隨其所好而漸調之如禽畜烏鳶螻蟻之屬皆可調之淨名云先以欲鈎牽後令入佛智其難調者唯世人心爾古云高可射深可釣唯有人心咫尺間只尺人心難可料所以須菩提首問淨心此經示二十五定輪三種妙觀正是調心之術人心散即用止止之止則息攀緣之心也昏即用觀觀之其昏即朗止觀乃明靜之法明靜即寂照散即止寂也昏即觀照也以此為藥無明之病不遠而復也清淨慧菩薩澄心如月虗己若潭月晈潭清神清慧朗斯之謂歟威德自在菩薩圭峯云三藏成就功用猛利邪魔不能擾妄惑不能侵故也今云人之動靜莫過四威儀行住坐臥道在乎動靜之間此之聖流行如象王威如師子進退以禮折旋俯仰威儀詳序以模範後賢故斯名不朽也辨音菩薩此菩薩善能辨別隨類圓音故曰辨音淨諸業障菩薩一切業障盡依四相而生此菩薩身口意三業如珠玉無瑕疵泯絶諸惡奉行衆善普覺菩薩自覺亦能覺他念起即覺是也覺非也覺覺是覺非所以針艾隨身膏肓之鬼自懼圓覺菩薩理無不圓事無不覺故曰圓覺賢善首菩薩等近聖曰賢順理曰善故曰賢善首一會法衆十方人俱故曰等而為上首與諸眷屬皆入三昧同住如來平等法會西蜀復庵暉禪師曰上文皆處成就此即衆成就與者并也大者揀小義即指登地大菩薩菩薩是不全梵語全云菩提此云覺薩埵此云有情謂此人既能自覺亦復覺他有情衆生但行二利之人總可謂菩薩摩訶即大也謂此有情信大法解大義發大心趣大果修大行證大道之人皆是指諸上菩薩也皆入三昧者謂佛既入大光明藏三昧正受而十二菩薩與諸眷屬亦皆入定同止住釋迦如來凡聖平等因果不二法性之會今將正宗分中十一章問答束之為二謂初一問答令信解真正成本起因後十問答令依解修行隨根證入也今先綸貫一經塗轍初一問答令信解真正成本起因者蓋文殊表解普賢表行夫欲運心修行先須信解真正解若不正所修一切皆邪縱使精勤徒為勞苦也又若是愚教始教終教多先且修行後方頓悟若華嚴與此經儀式則不然先且頓同佛解然後修行蓋先要了悟自心所以華嚴云若不了自心云何知正道由彼顛倒慧增長一切惡是知有信須得解有解須得信何以知之華嚴三聖觀云有信無解增長無明有解無信增長邪見信解圓通方為行本如今有一般人雖有信心無正解乃是中無主既然是中無主一被邪魔外道頑朋敗友相誘將去到底只染得外道知見增得一切無明種子又一般人有邪解悟事事會得却無信心一向撥無因果增長邪見是知信解二字如車兩輪如鳥兩翼此不可闕今此第一文殊章通為上中下三根之人開解第二普賢章通為上中下三根之人開行第三普眼章依文殊之解普賢之行教示上根之人運心入二空觀兼倣修法界觀行人入觀方有疑念故有第四金剛藏一章起疑既是有疑必推究輪回根本故有第五彌勒一章既知輪回根本必須斷之既斷輪回根本方證入圓覺才證入便自然有階差地位安排故有第六清淨慧一章安排地位從凡入聖如是六章經文中二空觀只了得上根之人其次更有一類中根之人雖聞佛説開悟已竟只是根劣於二空觀不能證入於是故有威德菩薩為中根之人請問三觀雖蒙佛開示三觀行相未知有幾種修習故有辨音菩薩請問蒙佛開示二十五輪被二十五種機行人既入三觀諸輪方犯著四相故有淨諸業障菩薩請問斷除四相既除四相四病未亡故有普覺菩薩請問令依師離作止任滅四病四相既除四病已去如是一類中根之人一時悟道更有一類下根之人根劣障重又於三觀諸輪不能證入於是故有圓覺菩薩請問蒙佛開示道場加行三期修練被及下根所謂一法巧被三根也問華嚴經科云舉果勸樂生信分此經科云初一問答令信解真正成本起因何故彼經就果上發信此經就解上發信耶答彼經以事事無礙為宗故就事上發信此經以理為宗故就體上發信不同也聰講師曰十二開士皆唱導之師故曰上首與諸眷屬者則十萬人俱是也後嘆德云皆入三昧即大光明藏也謂法界圓融真如清淨因人果人同住一處故曰同住平等法會於是文殊師利菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言大悲世尊願為此會諸來法衆説於如來本起清淨因地法行本起者佛從凡夫時最初所起之心因地者佛之初地法行者佛之妙行西蜀復庵暉禪師曰此乃伸請也於是者蓋指平等法會之處運前起後之辭梵語文殊此云妙吉祥從座而起者乃是從法座而起悲濟之用悲愍衆生起教之故頂禮佛足者以至貴至尊之頂禮世尊至卑之足此敬之至右繞者表順佛法之理不背三匝者表歸依三寶斷三毒等長跪者表安危不易叉手者表人境交參又從座而起至三匝此表洗身業長跪叉手表洗意業而白佛言已下並表口業也此一段文皆是結集人綴緝也大悲世尊方是文殊讚佛也大以揀小為義慈能與樂悲能救苦問何故不云大智大悲耶答蓋文殊請問意為末代衆生行利他之行不是自利故贊云大悲且如小乘之人有智無悲大乘之人悲智雙運唯佛全行利他之行得稱大悲譬如有人落水若小乘之人見之便不肯救由小乘人已知無量劫來輪轉生死海中受大苦惱自一脫離三界之後更不敢再入所以不救若菩薩人見之便先自著腳然後救之乃自利利他也若佛見之即便入水令速出離到安隱處故謂之大慧也世尊者具上九號為世所尊故曰世尊願為此會諸來法衆者願以希求樂欲為義法衆即十萬大衆也文殊白佛者告佛慈悲方便宣説當初未成佛時創初根本本起清淨因地法行也大凡圓頓之教修行儀式必先發三重因地何謂三重因地一了悟覺性二發菩提心三修菩薩行謂先頓悟自己分上本有靈明廣大真實圓覺之性頓信本無無明頓信本無生死此謂之大悟覺性然後方發菩提心梵語菩提此云覺既了悟覺性却於行住坐臥折旋俯仰起居問訊動容笑語一切處一切時常起覺悟之心此之悟心要得念念與最初所悟本覺相應所以本生和尚云只這動轉施為還合得本來主人公也無若也合得十二時中無虗棄底道理若合不得喫茶説話往往作茶話會若得契合此謂之發菩提心此心便是大智之心其次方修菩薩行者謂於一切處念念慈念念悲利樂有情饒益群品教化成熟不捨攝受一切衆生修菩薩行如華嚴經中善財童子先是文殊了悟覺性遂乃南遊一百十城參見五十三人善知識凡見一善知識皆先自云我已先發菩提心而未知菩薩修何等法行何等行云何發心又如起信論云了二覺發三心修五行亦同今來經文謂問我佛世尊於無量劫中未曾成等正覺之時創初根本因地如何發起一念修習心地法門如何行清淨離相稱性法行何故文殊始初發問便問此事却為最初發心修行一著最為要緊切宜子細尋得真正路然後方行所謂見道方修道不見復何修若還不辨邪正忽被朋友引去薰得邪見無明種子才到眼光落地之時淪入地獄百劫千生無由解脫如人種瓜須是預先子細尋取好種若錯用苦種之時縱是得瓜還成苦味何以知之圭峯云夫欲求果者必先觀於因因若不真果還是妄又楞嚴云因地不直果招迂曲所以華嚴云不能了自心云何知正道由彼顛倒慧增長一切惡宗門中謂之打底不遇作家到老番成骨董縱饒精進勤苦一時錯了所謂不省這箇意修行徒苦辛以此推之是知文殊大智首先問佛最初發心修行一著開示利益後代衆生豈小補哉及説菩薩於大乘中發清淨心遠離諸病諸病者諸幻也能使未來末世衆生求大乘者不墮邪見西蜀復庵暉禪師曰謂非唯説世尊最初根本因修心地稱性法行更告佛説一切菩薩於大乘覺悟心中發清淨菩提之心大以揀小乘以運載能運載一切衆生離生死此岸度煩惱中流到涅槃彼岸妄不能變垢不能染離煩惱障離所知障故曰清淨遠離諸病者謂著有著無見妄見真分能分所并四相四病但是離心之外皆是病也上初一段文正是教示行人了悟覺性此發心離病一段文當第二發菩提心第三修菩薩行即下普眼章也意令能使末世求於大乘之人依此開悟依此修行於本始覺中不墮落邪見如何謂之邪見但本心之外見妄見真皆是邪見由唯此一事實餘二即非真倘乖清淨之心必墮偏邪之見也四明聰講師曰於是文殊師利菩薩至求大乘者不墮邪見者一問如來本起清淨因地法行此問觀法故云法行增深觀如來本起因地有二種一本門因地如法華本門壽量如五百千萬億三千大千世界抹為微塵一塵為一劫我成佛來復過於此此非凡力所及也二迹門因地遠推自大通前覆講及遇阿私仙捨身為牀座採薪汲水為求妙法及中間遇然燈買五莖蓮華供養布髮掩泥蒙記為釋迦牟尼捨身求偈剜燈問法飼虎代鴿如是足迹可尋今云本起因地是乃迹中因地此等皆以慈修身非穢濁之行故曰清淨法行者是深觀也法句經云吾博學無厭奉法不懈精進持戒心不放逸緣是得道自致泥洹此非深觀忍力修心安能解黏去縛而成佛道故得妙德發揚意在規凡入聖也二問菩薩於大乘中發清淨心遠離諸病菩薩發心如善財南求見五十三善知識皆云我已先發阿耨多羅三藐三菩提心又如常啼東請求般若波羅蜜賣身割肉供養曇無竭聞法證無生忍菩陀波崙打骨取髓以求般若此等皆是菩薩為法亡軀遠離諸病行法經中阿難亦發三問一問如來滅後云何衆生起菩薩心修行何等經典正念思惟一實境界二問云何不失無上菩提之心三問云何復當不斷煩惱不離五欲得淨諸根滅除諸罪父母所生清淨常眼不斷五欲而能得見諸障外事此三問略爾廣如彼文同是發清淨心遠離諸病三問能使未來末世衆生求大乘者不墮邪見法華云此經佛在世時猶多怨嫉況佛滅後去聖逾遠聖賢隱伏附佛法外道增熾多學邪空訶佛毀教不存土木毀滅緣生引不吉人恣行非法謂淫怒癡盡是菩提豈知一慢尊容長淪暗道一輕聖典永墜邪林自墜見坑復引盲者當此之際孰能開正故文殊不憤特啓激揚為末世衆生針此見病故設此問也作是語已五體投地如是三請終而復始五體者頭與四肢也三請者禮之至也爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩咨詢如來因地法行及為末世一切衆生求大乘者得正住持不墮邪見汝今諦聽當為汝説時文殊師利菩薩奉教歡喜及諸大乘默然而聽西蜀復庵暉禪師曰此乃展誠許聽也默然者謂潔己虗心收視反聽如渴思水如病思藥也此等科段下文例然更不重釋善男子無上法王佛之尊稱也佛悟最上乘法為萬法之主更無在其上者故也有大陀羅尼門名為圓覺陀羅尼門者藏經曰總持門也今圓覺為大陀羅尼門者總攝八萬四千陀羅尼門故也西蜀復庵暉禪師曰此顯真宗本體也善則順理男子則剛斷為義此即指對告文殊菩薩為善順剛斷之男子也無上法王者法以軌則為義無明煩惱一切不淨垢濁當用無上真空軌則之法洗去王者自在為義無上者謂世間之法莫能先之故曰無上且例如鐵輪王之法但於一天下而得自在銅輪王之法但於二天下而得自在銀輪王之法但於三天下而得自在金輪王之法但於四天下而得自在以至梵王帝釋之法但三界內而得自在出三界之外便不得自在唯佛之法王不但三界內三界外以至剎剎塵塵無數世界而得自在故曰無上法王此即指佛也大之一字乃絶對待之大非揀小之大梵語陀羅尼此云總持門以出入無擁為義圓覺者謂衆生十二時中雖具有此圓字只是不覺何以知之序云終日圓覺而未嘗圓覺者凡夫也菩薩念念證此覺字又不圓何以知之序云欲證圓覺而未極圓覺者菩薩也唯是菩佛聖人有圓有覺以有圓故則德無不周以有覺故則靈源不昧何以知之序云具足圓覺而住持圓覺者如來也然此圓覺上至四聖下及六凡無有一衆生不具但以凡夫塵經未出寶藏猶埋既不自知枉受貧苦惟十方諸佛證此全得其用故今但標無上法王有大圓覺也四明聰講師曰善男子無上法王有大陀羅尼門名為圓覺世之為王君臣朝會統攝萬光宅天下法王啓運寂默以證真捨金輪而馭大千耀玉毫而制法界涅槃云法無上者涅槃是衆生無上者佛是陀羅尼者天台云三昧與陀羅尼乃相成之法相成乃互具也法華云普現色身三昧與陀羅尼猶是解一切衆生語言陀羅尼三昧者又名三摩提翻正心行處亦云調直定蓋無始以來常曲不端得此三昧故云正心行處陀羅尼翻能持集聚種種善法持令不散不失又云遮持能遮一切惡不善根令不起故又翻總持若名若義行地功德皆悉任持故號總持但三昧專論持善陀羅尼兼遮惡義或相應或不相應分二名義行法云心純是法與法相應又此陀羅尼三昧唯佛菩薩所行之法行持此法門得成佛道所以不共二乘也門者未必專取出入為義自凡修因得入聖果以立門義有云方便門解脫門普門婆羅門等豈專一義今取遮惡持善如世兵甲之器外遮鎗刀內固名利衣甲即今之圓覺也遮其外惡持其內善但此覺性俱攝百界千如善惡性相故得遮六凡之惡持四聖之善究論善惡乃全性之善惡諸佛所以不斷佛若斷此之惡普現色身從何而立當知圓融覺性運一切善遮一切惡心佛衆生三無差別也名為圓覺者既陀羅尼名為圓覺圓覺亦可為陀羅尼但詮名有異其體本同如火名熱亦名為燒陀羅尼遮惡義圓者如珠走盤圓無際故覺者乃相義如十鏡環繞中燃一燈燈體交參東西莫辨須知圓覺以百界千如為體緣生性具各各自圓但迷之為無明悟之為法性故云三千在理同名無明三千果成咸稱常樂三千無改無明即明三千並常俱體俱用又須知照用同時衆生無始無明業識非圓照覺相以何遣迷以何破障故裴相國云統衆德而大備爍群昏而獨照故曰圓覺流出一切清淨真如真空妙性如如不動者是也裴休亦曰不妄不變故曰真如菩提此翻覺也六祖曰前念著境即煩惱後念離境即菩提非覺而何涅槃此翻寂滅及波羅蜜此云到彼岸亦云事究竟教授菩薩佛指教傳授諸菩薩故西蜀復庵暉禪師曰此顯圓覺之德用也流出者覺性本無出入去來動靜非有別法從圓覺中流出於外但是依此圓覺之性顯發示現諸門功德無有窮盡應用無有疲厭名為流出一切者普該之言此正是總標清淨者必竟空義謂離煩惱障離所知障妄不能變垢不能染非諸有漏之法故曰清淨所以大般若經始自色心終至無上菩提八十餘科皆談清淨此謂小乘怖空故曰清淨此二字又總下文真如涅槃波羅蜜真如者真謂真實顯非虗妄如謂如常表無變易謂一真之理也此之真字非是對偽之真如者似也若將此真字頓在佛界盡十方世界都似佛若將此真字頓在菩薩界盡十方世界都似菩薩若將此真字頓在聲聞緣覺界盡十方世界都似聲聞緣覺若將此真字頓在天人地獄餓鬼畜生修羅界者則此真字便以天人地獄餓鬼畜生修羅等何也為此真理之上具二義故一者隨緣義二者不變梵語菩提此云覺乃是本覺及始覺此之覺上本無無明本無生死梵語涅槃此云圓寂謂覺性既圓無法不寂又曰涅者不生槃者不滅不生不滅故曰涅槃菩提即果上之智涅槃即果上之理理即體智即用梵語波羅此云彼岸蜜多此云到若要回文順此方俗應云到彼岸此波羅蜜有十種何謂之十一布施二持戒三忍辱四精進五禪定六智慧七方便八願九力十智問此十度其義如何謂己施人曰施防非止惡曰戒堪受諸法逆順忘懷曰忍鍊心於法為精精心務達為進虗心寂靜為禪推求揀擇為慧方法便宜為方便希求樂欲為願不可屈伏為力如實決斷為智然吾佛聖人始以六度對治六蔽為慳貪故説布施為毀禁故説持戒為嗔恚故説忍辱為懈怠故説精進為散亂故説禪定為愚癡故説智慧若據華嚴經中開此六度為十度對治十地十種障亦只就六度中智慧一度中開出方便度願度力度智度良由第六智度具根本智與後得智故開出後得智也謂吾佛聖人有大圓覺於中流出一切清淨真如清淨菩提清淨涅槃清淨波羅蜜真如菩提涅槃皆屬果十度波羅蜜屬因因果不同故云及字非唯流出因亦及流出果教示付授欲使後代順佛法修行菩薩斷障遣疑從因至果反妄歸真然菩薩是所教之人上因果皆是能教之法也嘗考諸經所談門之一字有四謂教理行果何以知之如法華經云以佛教門出三界苦此是教門楞嚴經云十方薄伽梵一路涅槃門此是理門又云我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入此屬行門又華嚴行願經云若欲成就此功德門者應修十種廣大行願一者禮敬諸佛二者稱贊如來此屬果門謂吾佛聖人有一法門總持教理行果四法教示付授與一切菩薩所以佛性和尚云包凡育聖攝巨含識為一總持號大自在四明聰講師云圓覺妙心具足十界百界千如三千世間生佛依正色心染淨諸法故曰一切以由圓覺無自性故遇染則情生十界俱染在理則性淨十界俱淨亦非研究而然乃本來淨也今從淨緣修起不改不變故曰清淨真如菩提翻道涅言不生槃言不滅大道無形不生不滅波羅蜜翻到彼岸已攝六度一一度皆到彼岸真如法身德也菩提般若德也涅槃解脫德也此之三德皆從圓覺生故云流出菩薩以此為軌則故曰教授衆生性具此三德故一念能感佛證此故無謀而應神通用此故化化而窮父子得此故天性相關知之者可以脫生死度含靈此圓覺之大略耳一切如來本起因地皆依圓照清淨覺相皆依者皆因也圓照者圓明寂照清淨者一切無染覺相者無相之相傅大士曰有身非覺體無相乃真形者是也永斷無明方成佛道西蜀復庵暉禪師曰此一經安布有類華嚴先本後末只如華嚴經首先便云爾時世尊於菩提場處師子座一切法上成等正覺智入三世悉皆平等其身充滿一切世間其音普順十方國土普見一切衆生悉皆成佛此之謂一口吞盡十方世界更無凡聖其間衆生根劣障重承當不得遂放開一線曲為今時故説十信十行十回向十地等覺妙覺此正是漸該枝末今經亦爾於此段經文亦一口吞盡十方世界恐無人承當下遂便與開解開行為上根人説二空觀為中根人説三觀諸輪為下根人説道場加行此是漸該枝末皆依圓照者此簡二乘及菩薩遍局之照若了得圓照便是佛佛是圓照者於十二時中條絲不挂廓爾無依念念常光現前念念常在裏許依倚圓照未無間斷所謂以無緣境上起無緣智以無緣智上起無緣境如鏡照像像非外緣如珠發光光還自然照見內心外境山河大地色空明暗所照之處莫不盡是十方諸佛廣大無漏無染清淨妙覺之相十方諸佛三世諸佛等創始因地修行莫不皆依倚此圓照永斷無明而成正覺所以肇論云內有獨鑒之明外有萬法之實圓照是能照之用覺相是所照之體問圓體上本無能所今何却言覺相是所圓照是能耶答但以初悟之時似有能所到悟之後即無能所此正如華嚴會上第六十一卷經中善財童子初於福城東際大塔廟前見文殊文殊遂指善財南遊歷一百一十城見五十三善知識最後於莊嚴藏樓閣中參見彌勒受彌勒之教再欲求見文殊却不能得見其身是時文殊遂伸右手過一百一十城摩善財頂此意與今經説初分能所悟後無能所一同且初見文殊者表信智再見文殊者表證智證智絶能所故所以不見文殊能所既絶盡十方世界只是自己一顆明珠是大解脫法門到此豈有無明不斷豈有煩惱不除豈有佛道不成就如是則只用此一段經文已答文殊前問了悟覺性發菩提心修菩薩行三重因地皆畢四明聰講師曰一切如來本起因地皆依圓照清淨覺相者三世十方故云一切成如實道來成正覺故曰如來圓照者照之一字即三觀也空觀破一切法假觀立一切法中觀妙一切法此三觀名三而體一也故云圓照圓融圓妙三只是一一即是三此三立則俱立破則俱破亦云始覺楞嚴云妙奢摩他空一切法也覺相者即真諦俗諦中諦三諦也此三諦亦一體異名全本覺而起謂之不思議境也此之境智境如砧智如槌砧槌爐韛發躍中間無明業識謂之淳朴安能不變無明即明煩惱為菩提苦道即法身不得此妙境智無明不斷佛道如何得成今人擔簦負笈隻笠腰包行盡無限之山水坐消數歲之春風達磨到梁常以四卷楞伽為標準故得十方諸佛三世如來莫不皆依圓照清淨覺相是知經教不可偏廢也今恐多有不曉境觀錯用身心一生空過再出境智為入道之要莫嫌多事然此境智人皆知之所解終成二物相合蓋以不曉境智之體故也欲知境體須簡頑境及偏小妄心假立真如此境安能與智不二今依馬鳴立境體者所謂本覺其智體者所謂始覺故起信論云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來常住法身依此法身説名本覺此覺是性全性起修名為始覺論云始覺者即同本覺既云離念豈有思議既等虗空無所不遍豈有一時一塵一心而非本覺及始覺耶是故得云三世十方生佛依正為所觀境三世十方生佛依正為能觀智境智名別其體不殊是故能所二非二也此不思議境智一切如來皆依圓照清淨覺相成於佛道到此不可不苦口也永斷無明方成佛道者無明因何得斷因圓照覺相也圓照即三觀覺相即三諦三諦真俗中道第一義也三觀空假中也向下二十五定輪亦只三觀也如世藥方治一切衆生種種諸病衆生生死結根無明妄識非此為藥治之無明安得永斷故諸如來以如如智照如如境境智融融妄識無逃避處只得轉為法性但妄識只是我見前一念虗妄浮心也此虗妄雖本是佛天然之性爭奈逐迷如演若達多晨朝以鏡照面頭在身上放下鏡了不見自頭只一向問人討頭佛云此人虗妄顛倒心狂其狂若歇歇即菩提今此妄心若歇則無達多之狂要破此迷始由觀力專假因緣性欲為因師教為緣因緣成觀達本三障無明業識即轉為明名菩提燈若非感應因緣之力豈得無明永斷故知成佛全假因緣也云何無明衆生妄想迷失明悟真覺之性故曰無明西蜀復庵暉禪師曰此乃欲推窮妄宰故此一句徵問謂之連前起後之辭佛恐後代修行之人聞説永斷無明便謂實有無明可斷然此無明以癡為體雖有本覺光明而無始覺照了故曰無明除却無字只此一明字便是靈靈不昧了了常知之明才一念不覺面前不明只是黑地裏走便是無明大涅槃經云若與煩惱諸結俱者名為無明若與一切善法俱者名之為明華嚴經云第一義諦不了故名無明此之無明畢竟自何處起當如起信論説三細六粗從細至粗而起三細者一業相二轉相三現相六粗者一智相二相續相三計名字相四執取相五起業相六業繫苦相謂才於本覺上一念動心不覺謂之業相才有所見謂之轉相境界現謂之現相此三細也起分別心謂之智相念念相續不斷謂之相續相此上五相皆為法執也於分別中此是名此是利此是善此是惡此是親此是疏此是青黃赤白等謂之計名字相好之則喜惡之則嗔隨所好處而生執著之心謂之執取相此上二相即我執也既執物為我相就五蘊之上或嗔喜或打罵或更相殺害互為冤讎造種種惡謂之起業相既造惡業業果成就似鏡照像如影隨形便被業縛隨業受報於六道四生大苦海中無由解脫謂之業繫苦相也今經從云何無明已下經文直至輪轉生死三細六粗一時具足良由一念不覺便是無明此謂之獨頭無明橫從空起如天或雲如鏡忽塵更不假觸境遇緣也善男子一切衆生從無始來種種顛倒猶如迷人四方易處衆生自無始劫來以妄為真正如迷路之人東西南北不知定處西蜀復庵暉禪師曰此即按定其非也衆生者乃色受想行識五蘊衆緣和合而生蘊者以積聚為義或稱陰者以蓋覆為義且色以質礙為義受以領納為義想以收像為義行以遷流造作為義識以了別為義此衆生除去了悟覺性之人其餘一時收在裏許無始者以西天外道六師執一切法皆從冥諦出以為有始楞嚴中吾佛聖人為對治彼故説無始顛倒者此從喻得名顛即是首向上曰正向下曰倒此以喻説若以法説者心識狂亂曰顛背覺合塵曰倒倒有所執顛但荒狂莊子謂之倒置之民種種者非是一也若通説則不過是執我執法故曰種種若就今經則迷身迷心有四對何謂四對且四大非我執為我法身真我而不信此是第一對其次四大如幻本無而見有法身真實本有而見無此是第二對其次緣念生滅為真心真心了然而不自識此是第三對其次緣念如殊中黑色全空而執有真心如珠中明相實有而見無此是第四對第一第三對乃屬我執第二第四對乃屬法執既四對不同故曰種種又人之倒執其相非一楞嚴中謂執悟中迷號性顛倒皆同其義猶如迷人四方易處者上文先舉法次是舉喻四方者即東西南北易者轉也改也處者所也上文徵起云何衆生無明此便按定其非云一切四生九類衆生只緣自從無始曠大劫來與天地同生與日月並明與諸佛同體與萬象同源所以諸佛已成正覺而衆生輪轉者良由於十二時中心識狂亂徇小懷私背義合塵離根失本種種取捨種種攀緣種種顛倒於一切時一切處無過是執我執法如人入川原之中忽然迷失道路將東作西以南為北是時東西不辨南北不分殊不知正迷之時方所只在舊處不曾移動也四明聰講師曰云何無明善男子一切衆生從無始來種種顛倒一切衆生括十法界從無始來迷真逐妄為風火識動此一念無明業識入父母胎攬父母遺棄為此色身於此顛倒行事如教中文殊問淨名曰善不善以何為本以身為本又問身孰為本曰欲貪為本曰欲貪孰為本曰虗妄分別為本曰虗妄分別孰為本曰顛倒想為本曰顛倒想孰為本曰無明為本曰無明孰為本曰無住為本文殊師利從無住本立一切法無住即無明無明即法性如冰與水水即是冰氷水無二也四大三毒為身心之病而常情不覺今佛反從無住本逆推從無住生顛倒從顛倒生虗妄分別從虗妄生欲貪從欲貪生身身造善惡皆生死本究其元由即無明為本永斷無明無明破即轉為法性法性即佛道也猶如迷人四方易處者喻上無始以來種種顛倒東西南北本來定位遊人自迷不識定方遂認南為北指東作西非方位之相易乃迷者之惑過在迷人不在方位此一節經意皆因妄動其風火識馳我入胎攬其遺棄之時此時不識本來面目故生下文妄認妄認四大為自身相地水火風假合而成幻體衆生顛倒認為自身實相六塵緣影為自心相色聲香味觸法六種塵緣之影衆生顛倒認為自心實相西蜀復庵暉禪師曰此即正釋其相也妄認者虗妄執認四大者地水火風六塵者色聲香味觸法緣影即是六識此是於六塵境上起能攀緣之妄心非是直心但是攬塵成體如身中之影如鏡中之像如水上之泡脫體是空前文云種種顛倒猶如迷人四方易處此是按定四生六道一切衆生定不是了譬如世人捉得一人已定是賊次當出其罪犯今此經亦然上文既按定其罪尚未明過咎行相今云不合妄執地水火風百骸九竅不實之法作自己清淨無漏法身又不合妄執色聲香味觸法虗幻不實顛倒之境并中間所起分別攀緣不實妄心作自己廣大清淨無漏真心只此便是四生六道一切衆生所迷行相殊不知殼漏子因過去於本覺上一念不覺迷真逐妄撞入父母胞胎是時便就天地中假借地水火風和合在此譬如世人欠債相似莫教一旦被主人索債之時一化而為臭腐再化而為塵垢雖一指一爪一毛一髮欲存不得是時方知平生念念保惜四大皆是錯用其心喚作見礦不識金入礦方知錯雖悔之何益於事所以吾佛聖人慈悲之故於此章經首痛警末代一切衆生然佛金口宣説真語實語如語不誑語不異語可不信乎所以裴相云嗚呼後之學者當取信於佛無取信於人當取信於本法無取信於末習也四明聰講師曰妄認四大為自身相六塵緣影為自心相此文正明生法二空境妄認四大四大性各自起滅不同業因緣故名曰緣生認之為身風火摶識入胎攬赤白二滴水大也生髮毛爪齒皮肉地大也認此為身生我所相名色陰也領納遺棄即受陰也內生苦樂名想陰也隨業造作名行陰也識住其中名識陰也此五陰亦名五蘊至此且論在胎受身謂之生空境色受想行識衆共而生故曰生空亦曰人空相者即境也既認為身相豈非生空境也以上未涉根塵識也至六塵緣影方具根塵識三根即六根塵即六塵識即六識也此根塵識方涉外塵逆起五欲境界主此為法空境六根六塵六識三六十八為十八界謂之諸法空相既云為自心相相即境也此是法空境相若能覺此四大五陰皆空根塵識三皆無我相可謂四病出體小乘悟此成阿羅漢大乘菩薩造境即中破無明證三德成初住佛法華三周授記作佛即初住佛也譬彼病目見空中華及第二月妄認身相心相譬如翳者妄見空華揑目者妄見兩月四明聰講師曰譬彼病目見空中華者無明為病目全空作華故曰空華若觀上四大五陰本性空寂一一皆是圓覺實性則無是身相故曰生空觀四大五陰不滅不破則水受輪回楞嚴云見聞如幻翳三界如空華觀成則身滅三界可出也及第二月者此法空觀只謂妄認六塵緣影為實身心體眼緣色影耳緣聲影嗅香嘗味覺觸乃至心緣法塵此緣塵心皆是虗妄如捏目人見第二月錯認月外之月乃真月之影為月非真月也阿難認聽法之心為心佛咄叱為非心此乃法塵分別影事是以楞嚴七處徵心八還辨見今認六塵緣影為自心相如認第二月影為真月二影無差皆是虗妄若能了緣塵二月本如來藏見圓覺性是則名為法空觀也如前四大五陰六根六塵其體皆是無明業識虗妄病源並是眼病雖分二空如藥治病但求虗妄病消今總歸一科共釋病源不出無明病眼空花二月也善男子空實無花病者妄執諸幻本空衆生妄認為有如空華本無翳者妄執為有也西蜀復庵暉禪師曰此乃就喻釋也虗空喻真身空華喻四大妄身第一月喻真心第二月喻緣影妄心此喻如世間之人心疑生暗鬼眼病見空華不知空本無華但是眼中病翳而妄見有華古人云一翳在眼千華亂空天唯一月本無第二但因揑目而見有之喻如一切衆生於廣大清淨真身中本無四大妄身又真心中本無妄心但是因起分別執心而妄見有所以道真性本有衆生迷而為無妄法本空衆生執而為實若全其經者更加一句云天唯一月揑者妄見也由妄執故非唯惑此虗空自性亦復迷彼實華生處衆生因妄執之故不唯迷惑自己虗空之性亦且不知他之翳目實是空華生處也西蜀復庵暉禪師曰此乃展轉倒見也由者因也故字出所以謂妄執見空中有華所以之故蓋眼無二用只見空中有華却失了廣大虗空之性非唯惑此虗空自性亦復迷彼實華生處者非者不也唯者獨也不獨是迷惑虗空廣大之性又却迷彼實華生處要知實華生處者只在眼翳上而生此喻説若法説之時因妄執四大幻身所以之故便失了廣大靈明真空之性不獨是失了自己真空之性又且不知四大幻身來處要知四大幻身來處者只在一念不覺無明妄心之上也然此一段經文之意法喻未全今分開此段經文為二本喻後補喻本喻中又二一空華喻顯二四大法合一空華喻顯者良由妄執空華所以之故不獨是失了廣大虗空之性又且不知實華生處未審實華自何而生只在眼翳上生何以知之豈不見道眼病見空華二四大法合者良由妄執四大幻身所以之故不獨是失了自己無漏無為清淨法身又且不知四大幻身來處未審四大為身自何而來只在一念不覺後補喻中又二一第二月喻顯二緣影法合一第二月喻顯者良由妄執第二月所以之故不獨是失第一月又且不知第二月生處未審第二月自何而生只在揑目上生何以知之豈不見道天唯一月揑者妄見二緣影法合者良由妄執六塵緣影所以之故不獨是失了自己常住真心又且不知六塵緣影來處未審六塵緣影自何而來只在一念不覺執心上起如此方見經文法喻俱全也四明聰講師曰善男子空實無華病者妄執至實華生處如人不識真金認鍮為金又不識瓜認瓠為瓜金鍮不辨瓜瓠不分不識真空認華為空以由迷真起妄執妄為真此猶衆生不知自己是佛迷為衆生造種種業輪回生死若達無明業性本空則無是生死輪回病者是無明只知無明業識不知是自己真空故以翳目見是空華若知華從翳生則知空不生華翳不知翳目生華故以惑此虗空自性若知華從翳有則不迷實華生處只緣是一著不到處滿盤空用心由此妄有輪轉生死故名無明因此種種顛倒遂妄有輪轉生死也本無輪轉生死故曰妄有西蜀復庵暉禪師曰此乃出其過患以結之也輪以摧碾為義良由因此妄執之故所以落在三界輪回生死海中頭出頭沒變形易質改頭換面為人為鬼為畜為獸其間或眉橫或鼻直或傳翼或戴角或分牙或布爪或仰飛或伏走人間八苦天上五衰如汲井輪互為高下種種摧碾百雜千碎至今主人公不知下落處古云或受焰口針喉之體經劫而飢火焚燒或作披毛戴角之身觸目而綱羅縈絆或墮無間獄抱極苦而常處火輪或生修羅中起鬪爭而常雨刀劒或暫居人界剎那而八苦交煎或偶處天宮倐忽而五衰陷墜長沈三障不出四魔故名無明乃結歸妄原也四明聰講師曰四大五陰本如來藏只緣自己主宰不守自性妄生愛欲攬四緣生為己色身因是輪回生死不息今推妄因業起極其所起業性體是無明無明無體體是法性如氷如水二無二也若不達性生死不了如飛蛾赴明燭不能自止故曰無明善男子此無明者非實有體無明因妄而起非實有體相也西蜀復庵暉禪師曰此乃顯性本空先標定也此因前云永斷無明方成佛道恐謂真箇有無明可斷不知無明本空以此遂告云只這無明脫體是虗妄無明既無實體皆是本來圓覺妙心故楞嚴云汝身汝心外及山河虗空大地咸是精真妙明中所現物四明聰講師曰無明無體以法性為體無明轉為明如清濁水濁為本有又推法性亦無自體以無明為體氷以水為體水以氷為體各各自性遇緣成就也又須知悟了即無明為法性迷時即法性為無明其名雖轉其體不轉也總是衆生一念妄心若也離念則鐵床非苦變易非遷故吾佛圓明之體即是衆生凡夫本具性德故云毗盧身土不逾下凡之一念阿鼻依正同處極聖之自心如夢中人夢時非無及至於醒了無所得此諭衆生迷時深以無明為實若覺悟之後方知無明是幻如衆空華滅於虗空不可説言有定滅處何以故無生處故無明之滅如空華之滅不可指説滅處者蓋無明本無生處故也西蜀復庵暉禪師曰此喻釋也由前説種種過患皆歸無明今又云無體道理難見言語路絶故此約喻以釋教家以四夢判夢一曰無明熏習二曰舊識巡遊三曰四大偏增四曰善惡先兆又如列子曰神遇為夢形接為事只如夜間陰氣盛則夢涉水陽氣盛則夢涉火陰陽氣俱壯則夢生殺虗疾夢飛空實疾夢溺水飽則夢與飢則夢取種種恐懼怕怖如此之時恰似真有説無不得及至覺時一切皆無故龍牙云在夢那知夢是虗覺來方覺夢中無迷時恰似夢中事悟後還同睡起夫又永嘉云夢裏明明有六趣覺後空空無大千然一切衆生但是迷時見有四大幻身六塵緣影悟後即無四大幻身六塵身緣影雖然如是正當迷時向他説無亦不得也問前説無明既無實體如夢中事醒時了不可得未審從何滅去答曰如衆空華滅於空時不可説言有定滅處又問若無滅處即當還在以何因由所以之故却言一時空無答曰此華當初本無生處故也四明聰講師曰如夢中人夢時非無及至於醒了無所得者須明無知有二義一體空義二成事義云夢時非無乃成事義也因無明心發善惡之事成及至於醒了無所得此體空義也醒時尚記夢中所作之事則事事無實可見體空者雖曰無明無體人人未免全夢作醒同醒作夢故云人人盡道此身如夢何曾夢裏知身如衆空華滅於虗空不可説言有定滅處何以故無生處故者此言真妄同源如衆空華妄也滅於虗空真也空本不曾生華今何用論滅言有滅者已知是妄既知是妄滅無生處妄動而生妄滅即滅本圓覺性誰生誰滅衆生未滅妄見生滅諸佛已滅寂滅為樂一切衆生於無生中妄見生滅是故説名輪轉生死衆生妄見幻身有生滅相故佛説名輪轉生死説名者非實有也西蜀復庵暉禪師曰此斷疑也前就橫見故説是有此就實論故説本無不合於無生死真性之上妄計橫見有生有死是故指前文説名生死所以壽禪師云向不遷境上虗受輪回於無縛法中自生繫縛上文皆是頓信本無生死頓信本無無明且文殊一章經文之意大分不出於此四段其四段者一標示真宗二推究妄宰三釋成因地四結牒問詞且標示真宗者以頓宗之法先且就圓覺體上上至四聖下至六凡具有此之覺性此之覺性上無菩提可求下無衆生可度中無萬行可修心佛與衆生是三無差別然後方説迷真逐妄遂推究妄宰之源返妄歸真悟此圓覺之性其次釋成因地者方答文殊請問世尊昔日創初起一念如何修清淨心地法門之文答意既同故內結緤所問之詞也四明聰講師曰一切衆生本來是佛佛自生迷迷生為佛佛若不迷生即是佛生若是佛即無輪回真隨妄佛即是生是故説名輪轉生死善男子如來因地修圓覺者知是空華即無輪轉初修圓覺者知生滅相如彼空華生滅頓空即無輪轉亦無身心受彼生死既無輪轉身心亦空身心既空生死安寄非作故無本性無故非作為然後無性本清淨無故西蜀復庵暉禪師曰顯示此即依真悟妄頓出生死也修圓覺者牒前所標即依真也知是空華者此悟妄也即無輪轉者此無生死之法也亦無身心受彼生死者此無生死之人也此上皆頓出生死前文殊請問如來本起因地法門如何修證此下方牒答云十方諸佛創初根本發起一念因修心地圓覺者莫不皆如上文宣説依真悟妄頓出生死謂悟知五蘊十二處十八界一切諸法皆如空華陽焰夢幻泡影非真實有便免得生死輪轉何也丸丹一粒點鐵成金至理一言轉凡成聖到此境界非唯無生死之法抑亦無生死之人所以疏云外遺世界內脫身心不計身故身同虗空不計心故心同法界也非作故無本性無故者世尊到此所謂一等為人須為徹又恐一切衆生疑情以謂十方如來於無量劫中入觀修六度萬行方得無生死且凡夫不曾入觀修行如何便説得無生死故告之曰不是諸佛入觀造作而後方得無生死自是本性之上從本已來無欠無餘無修無證無生無死所以道莫將間學解埋沒祖師心懶瓚云妙性及靈臺何曾受薰鍊圭峯昔在遂州任灌家讀到此處忽然大悟何以知之大鈔云讀到一二紙忽然大悟其一二紙正當此也四明聰講師曰善男子如來因地至本性無故者如來因地為凡夫入山採樵遇弗沙佛修火光三昧於岩穴間以一偈七晝七夜讚佛云天上天下無如佛十方世界亦無比一切世間我盡見世間無有如佛者因此精進功超彌勒九劫今知之一字即上文圓照覺相也圓照即觀也覺相即境也以斯觀照斯境此無明業識不得不轉為明即此空華全無明作觀此無明即空華相全性為華全華為性亦無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得證此境界即無輪轉也觀四大五陰皆空故曰亦無身也觀六塵緣影亦空即無心也既無身心誰受生死既無生死此生死無作故無為不作故無須知凡夫性德真常本無生死五陰既空不容主宰所住既不住生死亦不住涅槃亦不住聖亦不居凡當知此説以性奪修成無作行生死涅槃猶如作夢故云非作故無本性無故也彼知覺者猶如虗空覺上起知所覺亦妄如彼虗空了非佛性知虗空者即空華相心執頑空還歸色相亦不可説無知覺性不起斷滅之相有無俱遣是則名為淨覺隨順有知無知一無所著故曰有無俱遣淨覺隨順者覺性清淨不立我相故能隨順一切無所迷執如孔之絶四是也西蜀復庵暉禪師曰此因上文知是空華一句又恐修行之人錯會坐在有知有覺之中遂於此處展轉拂去其能執蹤迹文有四重一拂覺妄之智二又泯其能拂之心三遮斷滅之見四總結離過依此四重拂迹離過用心方是真正創初根本因地如文云彼知覺者猶如虗空此第一重也知虗空者即空華相此第二重也亦不可説無知覺性此第三重也有無俱遣此第四重也意謂彼知是空華之人雖然悟知得地水火風四大虗幻之法皆當體即空如大虗空中都無有物雖然覺知妄法皆無只這能知如虗空之心亦不是真實便與前不覺空華一般由前不覺之心是於覺性上添得一箇濃色空華此覺知之智又是於覺性上添得一箇淡色空華濃淡雖異而空華即同謂之泰山雖去微塵猶存又謂之前念是凡後念是聖前念是病後念是藥病已雖除藥豈存之樂天云未悟病時須去病已知空後莫依空如僧問趙州云沈沈絶照時如何州云墮坑落塹了也晦堂云妄病若忘真藥盡洞然明白舊時人古云藥是病病是藥到頭兩事俱拈却到此又不可説是我分上一時無靈靈真知覺性若作此解何異外道斷見然則於十二時中畢竟如何用心但將前不覺妄執四大之心并次知覺執無之心一時拂去情盡見除面前依然露堂堂活鱍鱍回避不及底道理便是本來面目圓覺之性可以隨順勿背逆可以保護勿遺失可以承當勿蹉過如是則興運心行扣寂課虗合掌低頭聚沙畫地莫不皆以成佛道如斯修習豈非正因所以修山主云是柱不見柱非柱不見柱是非已去了是非裏薦取四明聰講師曰彼知覺者知者智也覺者照也此之智照亦云始覺全本覺起即是凡夫見前一念無明業識修三昧者以此為境以此為觀為生為住為滅又此妄覺別無有體以無明為體此無明亦本無體故云猶如虗空又須知知虗空者即始覺也此始覺復覺虗空即空華相此謂之智照於境境復照智智照於境曰空華相境照於智曰猶如虗空所以凡修行者不可廢此境智若不用此境智則無始以來無明業識如何消殞故云亦不可説無知覺性也以此知覺性雖從不覺而起以全本覺起於修覺有破惑之功是不可廢也業惑若盡如湯消水能所俱亡有無雙遣唯真如智獨存良由修圓覺者觀性德苦藥而興與拔以即理毒害為所消伏修性德三因名性德行報應二身即名法身蓋以性而泯於修苦則無拔相毒則消無消形行乃則修無修佛乃即證無證故得有無俱遣方名淨覺隨順也何以故虗空性故常不動故蓋由性如虗空常不動念之故如來藏中無起滅故無知見故如來藏中即淨覺性中也淨覺性中本無生滅相本不立知見故也如法界性圓覺性體如法界之廣故曰如法界性也究竟圓滿遍十方故衆德具足無有邊際西蜀復庵暉禪師曰此徵起拂迹之所以釋歸圓實也謂以何義故前妄認四大此念是幻則可言拂今彼知覺者此念是智與覺性相應何故亦拂云耶遂出所以云虗空性故常不動故虗空説不動約寂説大凡佛書故字在句末者乃是出所以今有二故字是也譬如虗空之中山河大地草木叢林種種之物有盛有衰有興有廢有生有死而此虗空之性寂然不動本無生滅本無去來心於一心本無變易本無動靜非已去非未來非現在所以道諸法從本來寂滅無所動楞嚴云佛告阿難汝觀世間可作之法皆從變滅然終不聞爛壞虗空此上虗空性故常不動故二句乃諸法不動之義下文並是顯上亦復如是如來藏者在纏謂之如來藏出纏號大法身及在有情數中曰如來藏在無情數中曰法界性其理則一藏有隱覆義含攝義謂一切衆生皆有此如來之性被貪嗔癡無明煩惱之所隱覆不能發現雖然如是而此藏中常含攝一切河沙功德又如來藏是總下無起滅故無知見故是別此是空如來藏如法界性究竟圓滿遍十方故此亦是別此是不空如來藏然脫離一切煩惱謂之空如來藏具過河沙不思議佛法謂之不空如來藏且空如來藏即是離過不空如來藏即是具德又如來藏即是因中之果何謂因中之果謂因地中便能含攝果地中一切功德以如來是果藏是衆生煩惱所覆曰藏為此藏中有如來故名如來藏此六釋之中當有財釋何謂之有財釋恐相濫大凡作釋有濫方作釋無則不必作此有財釋者恐謂藏便是如來而藏不是如來為藏中有如來故曰如來藏如匱不是金緣匱中有金故曰金匱無起滅者此釋前妄認四大為自身相等文此是起能執迷心見有生有死無知見者此釋前彼知覺者猶如處空等文此是起能覺悟之智達無生死謂見生死起時即云執情達生死滅時即云知覺今如來藏中迷時生死不曾起此乃無迷悟時生死不曾滅此乃無悟無迷故無起滅無悟故無知見所謂實際理地不受一塵更無一法可當情如法界性者此下乃不空如來藏法界性與如來藏其體則同其義則別別有二意在有情數中名如來藏在無情數中名法界性究則初也竟則終也從初至終堅窮三際始終常然圓則周遍虗空滿則衆德具足意謂此不空如來藏竪窮三際橫遍十方從本已來自性滿足一切功德所謂自體有智慧光明義遍照法界義真實識知義自性清淨義常樂我淨義清涼不變義具足如是過於恆河不離不斷不思議佛法無有欠少更不須減舊添新滅惑生智所以古德云汝等諸人但先覓取一箇悟門若悟之後所有世間工巧伎藝書數算計文章道德種種奇特之事一時具足但令心得應真神通相好不求自至更不須苦志勞形役心去學便與黃面老子若符合節以是離過具德合於本覺將此為本修行始得名為正因四明聰講師曰此節經意謂前有無俱遣淨覺隨順明觀成相不動即今剎那之念而能盡未來際作三千化事此之剎那即法界故有何窮盡故云虗空性故微塵本含法界芥子常納須彌因果互融色心不二故曰不動藏者即或藏定藏因果藏佛性常住藏祕密藏總取包含為義此言如來藏性也藏性即第一義諦不生不滅無去無來通三際亘十方豈容有起有滅有起滅者非如來藏即四大五陰根塵識此則有起滅也若如來藏無生死無涅槃無凡無聖非如非異非染非淨故諸佛之所師衆生之體性經云法華經藏深固幽遠無知見者無身心相如法界性者法界即十界法六凡四聖也大圓覺性廓十法界界界互融出生無盡自行則淨穢亡泯無不空中化他則帝網交羅三千皆假故曰究竟圓滿遍十方即數上十界也是則名為因地法行菩薩因此於大乘中發清淨心末世衆生依此修行不墮邪見西蜀復庵暉禪師曰此結牒問詞蓋初文殊諸問了悟覺性及發菩提心并為末代衆生世尊到此結答云如我上來所説此無明者非實有體知是空華即無輪轉乃至有無俱遣如來藏無迷無悟只此便是發心只此便是末代衆生修行之要路除此之外餘皆落邪見四明聰講師曰已上文殊發此三問世尊一一答三問以物來斯現鏡像分明其間被未曉者老婆心切重説偈言爾時世尊次重宣此義而説偈言文殊汝當知一切諸如來從於本因地皆以智慧覺了達於無明知彼如空華即能免流轉又如夢中人醒時不可得覺者如虗空平等不動轉覺遍十方界即得成佛道衆幻滅無處成道亦無得本性圓滿故菩薩於此中能發菩提心末世諸衆生修此免邪見西蜀復庵暉禪師曰大凡偈有四種一曰數即西域以三十二字為一偈如云華嚴十萬偈等二曰諷頌即孤起不與長行相應者三曰應頌與長行相應故四曰集施以少言攝多義故今即第三梵云秪夜此云應頌頌長行故或為鈍根重説或為後來之徒或為增明前説今先以長行及偈諷相望有五對謂長有偈無長廣偈略長離偈合長先偈後長隱偈顯亦可反是言之只如此偈中云能發菩提心一句皆是長隱偈顯長行只云發清淨心是也其他以偈詞照長行則文義可見後諸偈中皆例此矣四明聰講師曰如來説一代時教大小乘有九部十二部此經具有之即此長行為之散華一部重説偈為之貫華亦一部佛世時人以華來供佛前風飄去後以線貫之故曰貫華也唐圭峯定慧禪師宗密頌文殊菩薩章曰妙德初徵本起因曾知離病可修真陀羅尼門周法界大圓覺海絶涯津無明夢裏迷緣影翳眼花中妄執身忽然夢醒翳花滅何曾動著本來人文殊菩薩章終一
