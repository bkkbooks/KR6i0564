body:
  text: 經起普賢菩薩章西蜀復庵暉禪師曰解行綸貫先舉類以顯大疏云此經人法儀式懸符華嚴且說人儀式同者華嚴經首先是文殊起請次是普賢其次諸菩薩今此經亦然首先亦是文殊請問次普賢又次普眼諸菩薩此謂之人儀式與華嚴同法儀式與華嚴同者且華嚴八十卷經不出是信解行證第一菩提場說經六品十一卷舉如來依正之果勸一切衆生欣樂生信此屬信經第二普光明殿說經六品四卷第三叨利天宮說經六品三卷第四夜摩天宮說經四品三卷第五兜率天宮說經三品十二卷第六他化自在天宮說經一品六卷第七重會普光明殿說經十一品十三卷共四十一卷經乃修因契果令人生解此屬解經第八三會普光明殿說經一品七卷乃托法進修令人成行此屬行經第九逝多林說經一品二十一卷乃依人證入法界成佛之德此屬證經今此經亦然第一文殊章經文通為上中下三根開發信解第二普賢一章經文通屬上中下三根開行然後次第分三根證入且上根人二空觀法界觀證入中根人三觀諸輪證入下根人道場加行證入此之儀式與華嚴同約教相配二菩薩者先問云如華嚴九會之中文殊則出會諸問普賢只在會中更不動何也請普賢表理文殊表智由智有回轉之義能和會頓教終教始教愚教歸於一衆別教也今文殊一章是頓解悟普眼一章二空觀是頓證悟三觀諸輪是漸證悟且如先悟後修者如日出後生先修後悟者如眼藥病痊先悟後修者譬如欲往他方必先遙見所在然後裹糧而行先修後悟者如先行然後忽到切見今人多有將解悟作證悟只是解到諸佛解處行全未有一旦忽遇逆順境界無明煩惱則生滅之心依前尚在與凡夫何異要敵生死不得要須依解起行方得證入此經正對治此等禪病也四明聰講師曰諸經中多先列文殊普賢者蓋二聖來此土佐輔釋迦凡說經處無不居其左右如觀音勢至輔弼彌陀二聖乃淨土中良伴文殊已成正覺號龍種上尊王佛觀世音號正法明王如來普賢勢至未詳所聞也凡此聖流皆下喬木入幽谷降尊就卑共成一同慈薰衆生發明圓覺今第二章普賢菩薩啓請其意有三大科分四不異前章更不重列於是普賢菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言大悲世尊願為此會諸菩薩衆及為末世一切衆生修大乘者聞此圓清淨境界云何修行西蜀復庵暉禪師曰此徵修行也言普賢者此有三釋一約自體謂體性周遍曰普隨緣成德曰賢二約諸經曲濟不遺曰普鄰極亞聖曰賢三約當經德無不周曰普調柔善順曰賢然學道之人缺文殊普賢不得須得智慧眼睛於一切處一切時覷破一切障礙境界故云毗盧遮那如來以金剛王寶劒授與文殊文殊常用此劒揮斫此是文殊大智也其次要得堅固道力克荷如來付屬之重擔使後五百歲中佛種不斷又云普賢行願遍滿虗空此是大行普賢今此門中依圓覺妙心徵幻法而明正行故當此菩薩請問大乘者大以簡小乘以運載大乘以本始二覺為體願者希求樂欲聞此圓覺清淨境界者指在文殊章中聞佛宣說廣大靈明圓覺境界也修行者譬如道路久被損壞當修整令平坦使一切人長行此道今此亦然無量劫來熏習無明生滅種子分彼分此憎愛我慢種種損壞今當除去令此心地坦平然後十二時中常行此道問未審此平坦心道其行相如何答華嚴經云佛子於一切時當慈念衆生故饒益衆生故安樂衆生故憐愍衆生故攝受衆生故不捨衆生故成熟衆生故調伏衆生故教化衆生故覺悟衆生故清淨衆生故四明聰講師曰於是普賢菩薩至而白佛言者普賢者伏道之頂其因周遍曰普斷道之後鄰于極聖曰賢又翻遍吉從座而起請問世尊儀式並如前釋大悲世尊至云何修行者遍吉因聞前章知是空華即無身心受彼生死動宿疑情啓揚三門世尊若彼衆生知如幻者身心亦幻云何以幻還修於幻既知一切如幻則身心亦是幻也何故復以幻身幻心修彼幻法西蜀復庵暉禪師曰此問幻幻何修也若彼衆生者指前當根之人知如幻者身心亦幻者此領文殊章知是空華之解云何以幻還修於幻者此問起行以幻者即幻智於幻者即妄幻意謂於文殊章中聞佛宣說知是空華即無輪轉既知妄身及妄心皆如幻師作幻術故以巾結為兔馬並皆不實只此能知之智亦是不實我今云何以智幻却遣其妄幻普賢意謂若以真遣妄則合其理何故以妄遣妄耶然理則頓悟乘悟併消事非頓除因次第盡普賢設此一問特為後代撥無因果不肯修行之人除執故也四明聰講師曰太虗水月並喻體生兔角龜毛皆況名假因動背定比舟行而岸移由妄迷真譬雲駛而月運故經云心如幻化馳騁六情既知是幻此幻如何滅之答意還以幻智滅此幻心普賢方且興難云既以幻智滅於幻心必竟以幻修幻幻幻何窮若諸幻性一切盡滅則無有心誰為修行云何復說修行如幻若滅諸幻性則冥然無心亦無修行之人矣其性既不可滅則修行非幻也何故復謂修行如幻此菩薩設問之意西蜀復庵暉禪師曰此第二問斷滅誰修也諸幻即上文說妄幻與智幻若以前妄執身相妄幻之心與彼知覺之智幻心都拂盡之時我則無有起修行之智心如此之時都成斷滅外道解遣誰修行若此所見何得成佛若要成佛須假起智之心修行既要起智修行世尊又却如何重說起智之心亦是妄耶四明聰講師曰既用幻智滅自心幻心智俱滅幻觀幻境俱遣復誰作主宰云何復說修行如幻如古德云弟子問師如何是佛師云佛在眼前儞自不見曰如何不見曰為汝有我在是故不見曰如和尚無我還能見否曰才分儞我轉加不見曰無儞無我人還能見否曰既無儞又無我教誰能見今之幻心亦復如是以聲止聲如谷答響若諸衆生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫若謂本來不須修習則常在幻中不明幻境令彼妄心何由解脫西蜀復庵暉禪師曰三遮不修之失也此恐惑者云一切如幻無不是覺覺性無生本來清淨但知便了安用修行故此遮云若謂一切衆生本性之上本來清淨圓滿無修無證之時爭奈一切衆生見今輪回生死大苦海中受種種形耽著五蘊十二處十八界幻化不實顛倒境界謂此是我此是彼乃至田園屋宅盡將作真實之事曾無一人了達覺悟知是虗妄不實之境譬如幻師結成兔馬等曰幻化者無而忽有謂之幻有而忽無謂之化只是幻師以術之故將手巾作兔馬此是無而忽有才到解術之從兔馬依前只是手巾此是有而忽無此約喻說之苦法說之時一切衆生未入父母胞胎亦無此身既一念不覺入胎之後便有百骸四大五蘊九竅此如將手巾結成兔馬也才到一口氣不來一化而為臭腐再化而為塵垢雖一指一爪一毛一髮欲存之而不可得此是幻師解術兔馬還空也既然不覺不悟耽著虗妄顛倒之境認為實有於一切處一切時前念續後念後念續前念盡是塵勞妄想情狀萬態顛倒分別計度之心如此之時如何得悟理見性棄背生死解脫於涅槃所以圭峯云從來不達事妄想不解脫令還不了知如何得解脫四明聰講師曰古德云要免心中閙應須看古教若不看古教不免心中閙三世十方諸佛莫不依教修行出塵若不依教退失者多如頭藍弗得非非想定居山為飛禽所惱居水邊為魚龍皇惑念欲殺是禽魚後退墮作飛狸形如大鵬一飛何啻九萬兩翅收録衆生如夜蝙蝠拾於蚊蚋善星比丘往昔為菩薩子今生近佛一向毀謗生身陷入地獄此等並無師教為緣縱任妄心以受輪轉此虗妄心不依圓照觀力破此業識則永沈生死故啓三問殷勤發明願為末世一切衆生作何方便漸次修習令諸衆生永離諸幻作是語已五體投地如是三請終而復始爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生修習菩薩如幻三昧方便漸次令諸衆生得離諸幻汝今諦聽當為汝說時普賢菩薩奉教歡喜及諸大衆默然而聽西蜀復庵暉禪師曰誠請許聽也言如幻三昧者如幻不實前喻中釋三昧此云正受疏云不受諸受故曰正受受以領納為義如明鏡當臺而鏡中本無青黃赤白長短大小闊狹之相此雖不受而不礙青黃赤白長短大小闊狹之相發輝菩薩修如幻三昧亦然於平等覺性之內上無菩提可求下無衆生可度中無萬行可修雖無可未可度可修亦不礙饒益有情利樂群品廣修萬行只要如夢如幻相似且如見有一蟻落水之時若不救之便落小乘見解若菩薩之人不妨即便救之正當救時不見有能救之人所救之物此謂之修如幻三昧也又如學道之人於十二時中行時不得作行會住時不得作住會乃至坐臥看經禮拜慈悲方便並不得作一𮈔毫情見執有然後不妨行住坐臥等所以道修習空花萬行宴坐水月道場降伏鏡裏魔軍成就夢中佛事四明聰講師曰願為來世一切衆生作何方便漸次修習令諸衆生永離諸幻真歇科為第四問今謂此因發上三問如尋病根今此願為如請藥方若能依此法印無明心識氷冸雲消故作結上三問也今請世尊處方合藥治病故云願為末世方便漸次修習作是語已五體投地如是三請終而復始者三請為禮誠至意切爾時世尊至如幻三三昧者焰幻之名通於偏圓今從圓說一心三幻楞伽云如工幻師依草木瓦石作種種幻起一切衆生若干形色起種種妄想今之如幻三昧乃依了義大乘圓頓全性起修如水月精神本自無體雖然無體水月宛然昔猿猴見月在池底云今夜月死在池內我等救之一猿攀樹枝次第相綰直至池底樹枝忽斷衆猿墮水而亡皆由衆生愚癡探於水月不識方便如幻三昧至以生死不息也方便漸次至默然而聽者若非諸佛方便點示如幻三昧究其體性幻實幻虗滅幻法門則我等未受輪轉故誡之諦聽善男子一切衆生種種幻化皆生如來圓覺妙心西蜀復庵暉禪師曰答文有四今一標幻從覺生以為義本也言衆生六凡也種種幻化即五蘊十二處十八界皆是有漏之法如來即佛也圓者離相不偏覺者空而不空妙者染而不染心者梵云乾栗䭾此云堅實心不同緣慮集起之心此心之一字今約五教明之若愚教假說一心謂小乘人不知心外無法執心外有境故若始教以第八阿賴識為一心謂心外無境故若終教以如來藏為一心理事無二故若頓教以泯絶染淨但是一心破諸數故若圓教以總該萬有即是一心謂理事本末無別異故今此心乃是泯絶染淨但是一心之心也謂此頓宗呵教勸離毀相泯心生心即妄不生即佛更不依倚地位漸次意謂一切衆生五蘊十二處十八界內之一身外之萬物一切有漏之法並從十方諸佛廣大靈明妙心之上起此是妄從真起此中便是起信三細六粗也問此之圓覺妙心凡聖平等令經何故不云衆生妙心耶答諸佛已證故衆生性具故所以獨標佛也四明聰講師曰一言幻者蓋三種幻一者四性無生幻二者一理隨緣幻三者以性奪修幻前二種屬偏前行門之幻為權實未融故也今之幻者乃以性奪修之幻此幻乃圓具諸法偏發由熏以性奪修法法無作亦謂之性德行一塵應色無非法身自他依正不逾祕藏方為色香中道起對法界此非虗幻之幻乃依圓覺妙心而起此幻為之有本之幻不同無本之幻也一切衆生者十法界之衆生即四聖六凡也衆生諸佛所有依正色心四大五蘊六根六塵謂之種種幻化此種種幻全本覺妙明真心而生故云皆生如來圓覺妙心如地界餓鬼刀山劒樹鑊湯爐炭全是圓覺妙心大用發生觀經云地獄猛火化作清涼風調達地獄種性法華授記為天王如來龍女畜類中身即往南方成佛此等經論若非理毒害性德行皆以性奪修如何銷釋只謂衆生無始無明強生隔礙以至生佛體殊色心不泯若也順性圓修覺觀寂照之功始覺有力體用顯現成就自性本具圓覺然後迷悟體用不二波水濕性無殊其或不然精義必無二至當止歸於一也猶如空華從空而有幻華雖滅空性不壞妙心未明諸幻競起譬如空華從空而有及至幻滅妙心獨存譬如華滅空性無損西蜀復庵暉禪師曰此下二明幻盡覺滿以釋前疑三中一舉喻釋也前說種種幻化皆生如來圓覺妙心似人緣眼病之故所以妄見空中有花故曰一翳在眼千花亂空一妄在心河沙生滅眼翳若除空花即滅而此廣大虗空之性本無損壞所謂翳瘥花亡衆生即佛故起信論云一切境界唯依妄念而有差別若離妄念則無一切境界之相華嚴云了達三界依心有十二因緣亦復然生死皆由心所造心若滅時生死盡四明聰講師曰猶如空華從空而有者此喻圓覺妙心中本無衆生亦無諸佛只為真如不守自性無明熏發本覺妙明轉作無明故有生死今於生死中具有菩提種性遇佛出世及善知識教修圓覺寂照復觀生死結根知是空葉此生死空華亦復從何而有此全本覺大圓覺性而生非別有生處水從水結妄從覺生猶如空華者空華是妄從空而有者且指覺性但此覺性亦是妄覺未可認為真覺亦是圓外之月其實名為始覺又如空華從眼翳生此翳無根體是無明此無明又從法性而生故云從空而有暫指為真雖為真性亦是全妄之真此真名為始覺有破妄之功緣被眼翳之纍真還成妄若始本一合時無明法性俱遣境觀雙亡無復差別幻華雖滅空性不壞者幻翳若滅幻華亦隨滅病除也空性不壞者此空性名為始覺畢竟不壞且存藥方故云不壞修顯極時復本妙明始本一合有無俱遣境智雙融金剛云法尚應捨何況非法衆生幻心還依幻滅彼幻心者因幻而起復因幻智方得除滅諸幻盡滅覺心不動諸幻悉滅圓覺本性元不曾動西蜀復庵暉禪師曰此第二法合本義幻心即妄幻也幻滅即智幻也謂衆生既起妄執四大六塵緣影之幻心如何除去須是依倚彼知覺者幻智之心而滅去也此謂之明來暗謝智起惑亡如稱兩頭低昂不等雖然滅前妄幻之心尚存能覺幻智之心未妄更須妄幻與智幻都拂却到諸幻盡處方始見本來圓覺妙心無去無來寂然不動其猶波因水起波滅水存幻從覺生幻滅覺滿方是行到水窮處坐看雲起時到這般田地方許移身轉步十方縱橫萬化千變而無窮極此一段文蓋普賢前問幻幻何修今答云不妨以幻修幻正如以屑出屑因聲止聲也四明聰講師曰衆生幻心還依幻滅者幻心境也即一念陰心是此幻陰心亦起作幻智還照幻境亦一念也謂之境照於境智照於智如燃火杖亦復自燃智起為幻滅幻為智滅幻之智非智不滅故云衆生幻心還依幻滅滅幻之智智即是幻如湯消冰如木生火斯之謂歟諸幻盡滅覺心不動者諸幻指衆生四大五陰色心依正種種諸法皆名為幻故云諸幻也盡滅者諸幻從覺生覺生即幻滅滅幻之覺猶如虗空故云不動須知諸幻本從翳生翳滅幻滅翳幻本一體翳幻從覺起覺還滅幻翳本是一家人心生故分二既是心中病還將心藥醫如以水洗水以湛合湛以屑出屑佛頂經云舜若多性可銷亡爍迦羅心無動轉與今文會如上答以幻修幻竟依幻說覺亦名為幻離幻說覺尚在幻中依幻而言故宜為幻若說有覺猶未離幻說無覺者亦復如是本來覺性不屬有無若說有無皆未離幻是故幻滅名為不動幻滅之後覺性如如西蜀復庵暉禪師曰此第三兼拂問幻之覺拂有三重第一若謂對妄幻說有覺悟之心者此是對待之法只此能覺之心亦是幻也第二若謂前來之覺乃是對幻之覺今不對幻說覺自別有一真覺者若起此心又未離幻與前依幻說覺一般前是犯著粗病此是犯著細病第三若更謂前說自別有一覺乃是著有今和此有覺一切皆無只這說無底心亦是幻也何故若謂自己分上有此一段殊勝奇特之事充塞六虗遍滿法界此是於圓覺性上分外著一箇有遂成兩箇若謂只這奇特殊勝之事都無又是於圓覺性上分外著一箇無亦是兩箇所以道捨一取一終無了日將心用心轉見病深又云葉有著空病亦然還如避溺而投火雲門道光不透脫有兩般病一切不明面前有物是一也透得一切空隱隱地似有箇物亦是光不透脫是二也是與麼也不得不與麼也不得然則畢竟如何用心但將前對幻說覺之心與不對幻說覺之心及說無覺之心諸幻一時拂去之後方是不染二邊清淨無去無來不生不滅之覺性也故金剛云如如不動又云有無俱去處特地好乾坤四明聰講師曰依幻說覺至亦復如是者此答第二問問云若諸幻性一切盡滅則無有心誰為修行偈中亦有三句初句云幻從諸覺生覺只是一何云諸覺推其問中云若諸幻性緣上幻性有種種曰諸今以幻智滅於諸幻故覺亦有諸故云諸覺依幻說覺覺亦名幻故云猶未離幻此覺妄覺也亦云始覺屬修也今若以性泯之以性奪之故修與覺並皆為幻此覽既從妄而生還能滅妄破惑有功立名始覺妄既滅了此覺亦須自滅如獵犬相似獵既盡已其犬自烹妄既盡已覺不容住四大既空我神無主但能塵銷覺圓不須復問誰作主宰修行也說無覺者亦復如是上文云亦不可說無知覺性若無覺妄之智如渡無船安能到岸須用此妄覺如火燃木無此覺智舊病仍生衆生長受生死但今文若說有覺者有覺亦妄是妄皆除到此聖凡情盡若羚羊掛角靈龜曳尾絶蹤絶跡方見圓覺是故幻滅名為不動者上問中云諸幻盡滅則無有心將誰修行今意但除其幻了其生死何慮無修行人偈云幻滅覺圓滿覺心不動故舟乃自行岸實不動如上答第二問竟善男子一切菩薩及末世衆生應當遠離一切幻化虗妄境界由堅執持遠離心故遠離一切幻境者本由堅固執持求無一切幻心心如幻者亦復遠離我之靈心如幻化者亦當遠離不可執著遠離為幻亦復遠離遠離諸幻之心亦是一幻亦當遠離離遠離幻亦復遠離欲遣遠離之心亦是一幻亦當遠離西蜀復庵暉禪師曰此下三展轉離幻顯覺其文有四重一離妄二離覺三遣離四遣遣前二是我執後二是法執從善男子至虗妄境界此第一離妄也謂世尊召普賢及一切衆生修行之者合當如我所說勸誡於十二時中遠離五蘊十二處十八界幻化虗妄不實之境界所謂出乎陰陽造化形器度數之外用心是也由堅執持至亦復遠離此是第二重離覺也雖然妄法皆捨猶尚堅執能覺之心確然不捨只此能覺之心又是虗幻不真實心亦當離却遠離為幻亦復遠離此是第三重遣離也雖然離得能覺之心尚有能離之心未忘此猶是細病只此能離之心亦當再遣也離遠離幻亦復遠離者此是第四重遣遣也雖然遣得能離之心尚有微細能遣之心未妄只此能遣之心亦當更遣遣之又遣以至於無遣譬如遇著冤家但莫與他共住即得無患大凡學道之人於十二時中常以觀慧念念不斷如雞抱卵須是暖氣相接始得又須知有細病若坐在情執中棄捨不得之時喚作礙鷹之物所以藥山告李翱曰太守欲得保任此事直須向高高峯頂立深深海底行關閉中物捨不得俱為參漏所以道學道先須細識心細中之細最難尋可中尋到無尋處方信凡心是佛心得無所離即除諸幻盡離一切幻心則幻無所容矣西蜀復庵暉禪師曰後密顯真覺也言密顯則經中無覺字故上之四重虗幻之法一時遣盡之後又却依前面前活鱍鱍地動地放光在在處處回避不得此方是本來真覺之性全體獨露無一絲毫是外物到此境界諸天捧花無路外道潛不見圭峯云靈靈自覺元無物擾擾他緣盡是空白樂天云前後際斷處一念不生時才更生心動念即乖法體失正念故四明聰講師曰善男子至虗妄境界者此第三問上文云若諸衆生本不修行於生死中常居幻化令妄想心云何解脫今乃勸云應當遠離應當即勸修也衆生若不依教修觀無明業識如何解脫則輪回無際也若依師教以教照心則遠離一切幻化生死況生死結根如銅墻鐵壁非幻智如何得出故說云應當遠離一切幻化虗妄境界境界者即是我等現前六根六塵故心經云無眼界乃至無意識界根塵既淨覺圓滿故即上文淨覺隨順也由堅執持至即除諸幻者以上四離四幻皆是徵釋幻心執情執情不遣幻妄復生此之幻智展轉微細眼伏藏識最為難遣以為四離離之諸家解釋不同今用天台解法華經知法常無性用龍樹大論緣生四句解知法常無性云無自生性相無他生性相無共生性相亦無無因生性相無相亦無故曰實相實相即今圓覺妙心也今觀此四離四幻即龍樹四句性計也一者遠離一切幻化虗妄境界即論中云無自性也既遠離幻化境界即我一念根塵境界虗妄浮心若執之不遠離即計自性也今既以性奪修即自性計根塵一一無作六根清淨也即自性離計也由執堅持遠離心故者遠離心即始覺也亦即從妄中起此覺也即妄覺之智此遠離心智雖從性起大似從外而有似有能覺即論中計他生性也既非他生故云亦復遠離也遠離為幻亦復遠離者此論中共性計也遠離屬他為幻屬自自他共成執計破云離時既無共時安有既非共生計執自亡故云亦復遠離離遠離幻亦復遠離者此論云無因性計計其無因而生即非有非無不因有無而有此謂之無因故此謂之計自然執也破云此非無因不生有因緣故亦可得生即今文遠離是觀是智離幻一句是妄是境既遠離則無觀智既云離幻則無有妄心若執境智計之為執今復遠離故云無無因性亦復遠離也故大論云諸法不自生亦不從他生不共不無因是故說無生如上四離四幻皆計四性自他共離四離各有四計四四十六四幻各有四計亦有十六四幻四離共三十二今推此三十二一一無根皆從圓覺妙心而有今反觀圓覺妙心從我心有今觀我心自空罪福無主又觀心無心注不住法不住結使不離使海雖體煩惱不離煩惱四病出體心華發明故云得無所離即除諸幻譬如鑽火兩木相因火出木盡灰飛烟滅西蜀復庵暉禪師曰喻顯也木喻妄火喻覺灰喻離烟喻遣合是烟滅然後灰飛此譯人之倒謂前文四重離妄離覺遣離遣遣之意喻如大地生木兩木相因熱性才發則火出燒却木橛然既燒了雖然有灰也被風吹去烟亦滅了而大地不曾動著却將大地喻圓覺性元無起滅龍牙云學道如鑽火逢暖且莫休直待金星現歸家始到頭四明聰講師曰以木鑽木而火生以幻修幻而幻滅今云二木相因所因之木譬妄執心而為之境也能因之木喻觀即幻智即能觀觀也能所相即境與觀合境觀相研中間無明陰妄方盡又中二木可喻砧槌所因之木曰砧即境也能因之木曰槌即觀也砧槌自分能所中間無明虗妄即物也爐鞴既發砧槌現前中間之妄心無逃避處不得不消妄心消處真覺妙明顯發也二木相因一木是遠離即能觀觀也一木是所觀陰境故云一切幻化虗妄境界陰消也此等自分一重能所也火出木盡者火喻空觀能壞一切法能空一切相經云由堅執持遠離心故遠離心即上能空觀若更執此能空觀藥還成病故須遠離即二重能所也灰飛者喻空觀本是藥能治病病去藥亡又復執此藥藥還成病藥病之執如灰亦云執空之病既空一切相復執於空此為之空病圭峯云本烟在前灰在後謂譯師之倒今謂不然正是灰前烟後何謂也此是藥病灰尚有形相喻遠離為幻此幻尚粗故以喻灰非譯師之倒此藥上之病亦須遠離此第三重能所砧槌也烟滅者喻上藥病更合新藥治舊藥病此是新藥病空上空病故云離遠離幻有兩箇離字者便見藥上之病空上空病祖云智還成障亦此經菩薩為解礙也可謂大聰明人前果有三尺暗故云亦復遠離此四離四幻但分粗細此四離等如鐵銅銀金為鎖雖分貴賤鎖義為一並須去除若於此四外更起計著又如之何亦須斷除今且云四者事不過三以幻修幻亦復如是諸幻雖盡不入斷滅以木鑽火木為火焚木火俱盡獨有地存如以幻心復修幻法諸幻盡滅覺性常在西蜀復庵暉禪師曰此合喻也以幻者即前文殊章第二番智幻修幻者即前文殊第一番妄幻意謂用智幻修習妄幻之時亦如母人鑽火相因兩木火出木燒灰飛烟滅雖然用智遣得妄幻尚有智幻存更將智幻一時盡遣然後遣不去處方不虗豁不同斷滅外道空無之見古云妄起即覺妄滅覺滅覺妄俱滅即是真如問一切盡滅則心心佛答諸幻雖盡不入斷滅善男子知幻即離不作方便心知是幻即當遠離何假方便離幻即覺亦無漸次盡離諸幻即是真覺頓悟本心更無漸次一切菩薩及末世衆生依此修行如是乃能永離諸幻西蜀復菴暉禪師曰此第四辨幻覺不俱結酬其請也此普賢前問作何方便漸次修習令諸衆生永離諸幻今答云但照見五蘊十二處十八界一切有漏之法是幻妄非實即是離幻更不必方便譬如世人夢見身瘡百計千般求藥療治才睡覺之後此瘡本無更求何藥學道之人但離得幻法即幻便是真覺更無地位漸次階級所以云一念頓悟便是觀音彈指回心立為妙德但得雪消去自然春到來更勸囑云一切菩薩及末世頓機衆生但依我教法修行便可永超夢幻出離輪回真趨無上佛果菩提也四明聰講師曰以幻修幻至亦無漸次者以幻修幻合兩木相因也諸幻雖離不入斷滅合上火出木盡知幻即離不作方便合灰飛離幻即覺亦無漸次合烟滅也一切菩薩至求離諸幻者此總結普賢三問若能依此四離四幻修行故得永離諸幻也爾時世尊欲重宣此義而說偈言普賢汝當知一切諸衆生無始幻無明皆從諸如來圓覺心建立猶如虗空華依空而有相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故若彼諸菩薩及末世衆生常應遠離幻諸幻悉皆離如木中生火木盡火還滅覺即無漸次方便亦如是唐圭峯定慧禪師頌普賢章曰普賢次問漸修真通為三根審行門幻匪覺心心外物花非空性性中存覺心不動妄華寂妄境無生智孰論幻盡覺圓真體現灰飛烟滅火無因普賢菩薩章終二
