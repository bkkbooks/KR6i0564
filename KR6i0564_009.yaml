body:
  text: 淨諸業障菩薩章四明聰講師曰觀夫聖賢垂訓以身者是稟父母之遺體誠不可毀傷但凡夫無知執之為實生我所相地持經云世間受生皆由著我若離我著則無世間受生身處大論云一切世間中莫過名與色若欲如實觀但當觀名色名是心色是質是故淨業障雖已自度亦欲度人於無迷悶處起生迷悶問於如來釋迦老子又於鬼門貼挂好肉剜瘡窮四見源故有此章來意也於是淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復庵暉禪師曰謂行人入前三觀諸輪才有證便執著四相四相者一我相二人相三衆生相四壽命相謂證心不忘曰我相悟心不忘曰人相了證了悟了心不忘曰衆生相前三相俱盡唯是一味覺昭現前覺心不忘曰壽命相然一切業障皆由四相而生今此問答除去諸業自然清淨故當此請問也大悲世尊為我等輩廣説如是不思議事謂前所説二十五輪皆是不可思惟不可擬議事一切如來因地行相二十五輪即諸佛初地觀行之相令諸大衆得未曾有大衆聞所未聞故云得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰大衆自見曠劫修行功用如在一念間西蜀復菴暉禪師前總明觀行一向稱理而修猶可領解今於一味之中廣張諸輪屈曲差別雖然差別不乖一味之法尤為難見故曰不可心思言議也因地行相者此指文殊章問本起清淨因地法行也夫果德稱真約理可照因地治染體解是難今蒙佛開示觀門有所悟入其昔所修因地勤苦境界一念之中備知炳然齊現如琉璃瓶盛多芥子故深慶慰然楞嚴經説衆生洞視不過方寸阿那律見閻浮提如掌中果菩薩見百千世界十方如來窮盡微塵清淨國土今既入觀以觀智之力所以徹見如來因地恆沙劫中修行之事也問此之調御未審十號之中當第幾號耶答云當第七號也然十號者一如來者髣同先迹號二應供堪為福田號三正遍知者達偽通真號四明行足者果從因得號五善逝者妙往菩提號六世間解者窮盡法界號七無上士調御丈夫者降生成道號八天人師者應機説法號九佛者三覺圓明號十世尊者出世獨尊號以此證之是知調御二字當十號中第七號也謂能調伏一切衆生心猿意馬也四明聰講師曰不思議事只是如來因地行相歷恆沙劫勤苦求索古云無自然釋迦也世尊若此覺心本性清淨因何染污使諸衆生迷悶不入西蜀復菴暉禪師曰此中問意不説本來都迷意明已知覺性圓明諸法清淨何得凡心宛在所作所為情猶憎愛未審有何之法染污令我用心異於諸佛迷則不悟悶則不證入本覺也四明聰講師曰此問圭峰慈室兩家都言不是全不知都迷意明已知覺性圓明但疑凡心宛在不合覺源令謂正為凡夫迷於圓覺未有修入之路何關聖人已知若已知何復問佛果佛已證因人自迷經有云使諸衆生迷悶不入使諸衆生豈是聖者乎惟願如來廣為我等開悟法性迷惑之時總攝本性開悟之後方名法性令此大衆及末世衆生作將來眼現未衆生聞佛開示盡未來際永無迷惑説是語已五體投地如是三請終而復始惟是遮盡一切法為義願以希求樂欲為義法性者乃諸法之性若直談本體則名覺性若推窮差別之法皆同自體同於一性即名法性今此章推破四相豁融諸法皆同覺性故云開悟法性從前經文但云覺性此段云法性意在茲矣四明聰講師曰圭峰云若直談本體則名覺性若推窮差別之法皆無自體同於一性即名法性今謂覺性法性一體無二但説果人所修所顯名覺性因人所迷中修所顯者名法性法性通一切法也爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便汝今諦聽當為汝説時淨諸業障菩薩奉教歡喜及諸大衆默然而聽善男子一切衆生從無始來妄想執有我人衆生及與壽命衆生從無始劫來妄想執著以為有我相人相衆生相壽命相也認四顛倒為實我體妄認四相為實我體不知此四顛倒本來自無西蜀復庵暉禪師曰此中説四相有二義一總敘過由二別釋其相今且先總敘其執四相之過由謂四生六道二乘菩薩一切衆生自從無始曠大劫來用妄想顛倒攀緣分別之心執認有我相人相衆生相壽命相不過是真我本有迷之為無妄我本空執之為實橫計此四是真實我之身體所以楞嚴經云一切衆生無始已來迷己為物失於本心為物所轉輪轉苦海喪本受輪皆由此也然此四相有二説一凡夫迷識境四相二菩薩迷智境四相且識境四相者謂執取自體為我相此妄認四大云是我也計我轉趣於餘趣是為人相此謂我若作善得生人天若作惡得生三塗也計我盛衰苦樂種種變異為衆生相此謂我一身生在世上百歲之中或少壯或衰敗苦樂得失種種相續之事也計我一報命根不斷而住為壽者相謂我捨此一報之身死後便生張三李四之家常住不斷滅也此乃金剛經中説四相也今此亦可總收在內下文別釋四相方是菩薩迷智境四相至文可見四明聰講師曰爾時世尊至默然而聽者一大藏教百千三昧無量行門皆是佛之方便開甘露門若究本源生佛平等一切諸法皆是佛法佛法即實相實相即諸法只為衆生在迷聖人布路作筏度人謂之方便也善男子一切衆生至為實我體者天台云神我本不可得而未見道者迷於心色四大五陰根塵識等法中妄計有我我所計我之心歷緣甚多今略辨四見出法界次第今云一切衆生從無始來但世間所作之法皆有創始如起屋起宅皆有始也唯此一念識心無始初時只云輪轉生死如今身現在要知父母未生已前我在何處將何為始故云從無始來今且從風火搏我識神入於母胎攬二滴為身即此謂之妄想此滴本非我有父母遺棄妄認之為己有為妄計色受想行識此五和合如草頭露暫聚少時又如五指成一拳相五陰為身亦復如是況凡夫不了執此假名而為我等經云我者於五陰四大根塵識中若即若離計我我所之實是名我見人者亦於五陰等法妄計我是行人妄計自身相貌為人見荊溪云我以計內人以計外衆生者亦於五陰色等諸法共成此身計有我生是謂之衆生見壽者亦於陰入界中計一期有壽若長若短如人願年百二十歲此皆壽者見荊溪云衆生以續前為義壽者以趣後為能凡夫既執我認四顛倒為實我體佛欲破衆生妄執與二乘人説無我法二乘離我成阿羅漢由此便生憎愛二境由執四相為我體故所以順我則愛違我則憎於虗妄體重執虗妄四大幻體已是虗妄更執四相妄上增妄也二妄相依生妄業道二妄者即四大并四相也二者因作業受報故曰生妄業道有妄業故妄見流轉既有妄業即受輪回本無輪回故曰妄見厭流轉者妄見涅槃厭彼輪回欲證涅槃本無涅槃故無妄見西蜀復菴暉禪師曰謂因執四相為實我體所以於自憎愛妄生執箸順我者即愛之違我者即憎之所以道同我者為是異我者為非如是憎愛是非不同者皆因不合執我也既有憎愛之心未免於虗妄身上又生一重妄想何故如是為這箇四大五蘊百骸九竅乃是於過去本覺之上一念不覺背湛迷真之復錯撞入父母胞胎被色受想行識衆緣假合在此喚作托異物以成體借他家而權住只此一身已是虗妄了那堪今生又於此身之上執著我人四相即是兩重虗妄所以楞嚴云汝等皆是迷中倍人既不知是兩重虗妄未免就此二妄之中不過是憎是愛於憎愛上或毀或謗更相殺害互為冤讐於愛上被形體壞男根為地獄種作無間業生起造作種種無邊之業牽入苦樂之趣譬如道路能引入至地頭故曰道既妄業成就即受生死流轉此謂之一念受染地獄門開瞥起瞋心刀鋒聳立化書云至淫者化為婦人至暴者化為猛虎楞嚴云多淫之人化為火聚此上皆是四生六道因執我故輪轉生死苦海之中不能解脫也其次二乘之人厭三界無安猶如火宅希求出離如救頭燃息緣斷惑如獐獨跳不顧後羣才出三界後一向趣寂耽定灰身滅智妄見涅槃寂靜之理可證殊不知此正是化城本至寶所大鈔云趣寂纏定化城非寶寶藏云譬如困魚止濼病鳥栖蘆其二者不識於大海不識於叢林二乘之人趣于小道亦然以小安而自安不以大安而安矣禪家到此謂之縱饒脫得髑髏前未免墮在黑山下一向黑霧定這箇喚作焦芽敗種子永不發生此一段文總有十句初四句由迷起惑次二句造業次二句受報後二句雖出三途却墮二乘之境然此十句經文總當二乘宗中生滅四諦法門謂初由此便生愛憎二境至二妄相依生妄業道者此當集諦有妄業故妄見流轉者此當苦諦厭流轉者此當道諦妄見涅槃者此當滅諦初二諦乃世間之因果後二諦乃是出世間之因果也由此不能入清淨覺非覺遠拒諸能入者因彼妄見所障不能悟入淨覺非是淨覺障拒入者有諸能入非覺入故衆生能悟入於覺爾非覺來入衆生性中也孔子謂人能弘道非道弘人者是也西蜀復庵暉禪師曰由此不能入清淨覺者此正是結答前問云若此覺心本性清淨因何染污使諸衆生迷悶不入今答云只應不合執認四相展轉生過縱離六道復墮二乘皆是執我故不能證入圓覺也非覺違拒諸能入者諸能入即信解行證前問云因何使諸衆生迷悶不入今答云不是本覺違背拒敵使令不得證入自是一切衆生因執我之故所以不入譬如夜間夢見別有一身或往或來或於種種之事然此夢身既然未忘畢竟不能合於本身亦非是本身違背拒敵使之不合但是夢未醒也所以僧問龍牙云佛祖還解瞞人否牙云你道江湖還有礙人心否又云江湖雖無礙人之心為時人過不得佛祖雖無瞞人之意為時人透不得所以道自是不歸歸便得五湖煙浪有誰爭此則形無妨而人自妨之物無滯而人自滯之悲夫有諸能入非覺入故者意謂若悟入圓覺之時自是因信解行證之故所以得證入而圓覺本無出入與不出入初不干本覺之事只如參禪之人或十年二十年處衆不悟明心地者此不干主人公事自是你不肯做工夫一旦忽然悟道之時此亦不干主人公事自是你因夜以繼日坐以待旦䇿發進修加功練行做工夫而悟若是與麼人何愁與麼事不是與麼人莫怨與麼事此之謂也是故動念及與息念皆歸迷悶諸念動時固不能覺縱使止念亦無入處西蜀復庵暉禪師曰動念即前苦集二諦息念即前滅道二諦謂以是上來所説道理因由所以之故動念是凡夫苦集二諦之法息念又是二乘滅道二諦之法縱捨凡夫境界又墮二乘境界所以皆歸迷悶不悟圓覺不入圓覺也四明聰講師曰因上妄執計有我身是名身見身見既起見愛即起違我者憎順我者愛如是愛憎皆由執我故曰由此二境即憎與愛憎屬見即見惑五利使邪心觀理情迷顛倒愛者貪染之心名之為愛若於男女色身情迷隨心逐物染者纏綿通名為愛愛屬煩惱即屬思惑五鈍使也因虗妄故錯認遺棄四大五陰根塵為身已是虗妄於上復生憎之與愛謂重執虗妄二妄相依如氷與水生妄業道輪轉三界入於火宅業道即六道也因茲妄業有輕有重善惡二業亦分輕重善業重生人天中輕則阿修羅惡業重則入地獄次則畜生餓鬼故曰妄見流轉或於人道中厭流轉者修四諦十二因緣法證聲聞緣覺小乘涅槃有為之法此人少悟空法達四大五陰本性空寂不立我人知見得小乘道滅二諦猶止宿草庵入於化城非究竟滅謂之妄見涅槃由此不能入清淨覺者以大斥小小乘之智有如螢火豈可比大乘之智杲日麗天覺是圓覺不入圓覺者又覺照也即清淨覺相非是覺相違拒不是圓覺不容汝入只為汝能入者是小乘之智自隔自礙非覺礙汝故云有諸能入非覺入故大圓覺智破一切暗滅螢光之小智揭金粟之高明動念即凡夫也息念二乘涅槃也凡夫二乘皆歸迷悶至此薰蕕同器不得不辨也何以故由有無始本起無明為己主宰動靜皆迷悶者由無始劫來無明妄想為我之主故也西蜀復庵暉禪師曰此徵云重念皆是背覺息念即合契真今以何義故俱稱迷悶即答云良由動念是我動息念是我息我相既在動息俱迷所以不能證入此皆是無始世來於最初根本所起獨頭無明此之無明不待對境自然於無事平常中而起如天忽雲如鏡忽塵以此無明作自己主宰耽著我相主是無明之體宰是無明之用有運判宰之義也一切衆生生無慧目有生以來不見自性故曰生無慧目身心等性皆是無明既無慧目則四大五蘊一切幻性皆是無明執著之心譬如有人不自斷命衆生妄執無明不肯除滅譬如世人不肯自殺西蜀復庵暉禪師曰此一段文却轉釋前文良由四生六道一切衆生有無始本起獨頭無明為己主宰之故不能悟入圓覺類如世上有一般人若十歲二十歲之後盲却其眼雖眼不見物説之則能了知若在胎中便自無目生出來便盲之時則對色之時種種為説終無所益如涅槃云如盲不識乳色便問他言乳色何似答曰色如白貝盲人復問是乳色者如貝䩕耶答曰不也復問貝色復何似耶答猶如稻米末又問乳色柔軟如稻米末耶稻米末者復何所似答曰猶如雨雪復言彼稻米末冷如雨雪雨雪復何所似答曰猶如鵠是生盲人間説如是四種譬喻終不能得識乳真色所以寒山詩云因緣都未詳盲人問乳色如是則盲人問乳跛者訪路與此同意身心等性皆是無明者前文殊章得本起因地則所修之法皆是佛因今用本起無明則所修一切法皆是魔業又前以覺圓明故根塵普淨所以經云一切是覺今以無明為本故云皆是無明前如以金為千器千器皆金此如以土為器千器皆瓦也譬如有人不自斷命者此之認我之相不覺不知不能自斷有似世間卑賤之人假饒卑陋六根不具衣不蓋形食不充口曾肯自斷著性命否終是不肯此一喻又可喻於後段愛我之言及養無明之語後段血脈連環故此喻通前後文也四明聰講師曰何以故由有無始至皆是無明者起信云無明為因生三細境界為緣生六粗今言無始者即是根本不覺熏習真如生三種相業相轉相現相故云本起無明既是根本無明內惑為因也四大地水火風此四圍空汝之無明妄識於中假作主宰若論不能降伏者亦被他人所惱不能忍辱者二義不成亦不成主宰今論四大和合心在五根之初名之為主遺教云此五根者心為其主成此色身於中立我且云為己主宰若心無慧眼不能分別色心四大五蘊根塵識等皆是幻化空華則身心等性皆是無明生滅之法不離虗妄譬如有人不自斷命者此喻愛欲也前文愛欲為因愛命為果亦是無明為因無明為果大論云老死有果所謂無明無明有因乃指老死是故生滅皆從無明今明上説無明為己主宰生滅我愛愛己色身誰肯斷命既云愛欲為因愛命為果因果皆愛性不捨任運不自斷命若肯斷命應是捨愛既不捨愛三界不出是故當知有愛我者我與隨順彼有愛我者我亦隨順彼境而生愛心非隨順者便生憎怨非隨順彼境而生愛心則往往怒其違己起憎怨心為憎愛心養無明故相續求道皆不成就種種憎愛增長我見念念不斷成道愈難西蜀復庵暉禪師曰此一道總結前經文從無始來至此皆是障道之所以有愛我者我與隨順者此對順境生愛心以明有我非隨順者便生憎怨者此對違境以起憎心以明有我也用上來憎愛二心長養無明種子及現行種子所謂種子熏現行現行熏種子不過是見不超色聽不出聲境起心隨攀緣不息以至念念憎愛念念取捨念念相續以此之心求悟圓覺成就佛道者無有是處縱令勤苦經劫種種行門但轉助得無明所謂鑽氷覔火握地尋天緣木求魚蒸沙作飯抂用功夫修不能成此上經文皆是總敘過由下文方別釋四相也四明聰講師曰愛者即是見愛煩惱只為衆生迷煩惱故煩以喧煩為義惱以逼亂為義惱亂身心致使真明不發今言愛者即貪染之心染著纏縛通名為愛此愛順我者則愛之逆我者則憎之此之憎愛皆我在虗妄浮心內此虗妄心體是根本不覺現行無明業識未起善惡時本自無事但於名色陰界入等法中起憎愛心妄計我能養育於他故亦計我從生已來為父母養育故名為養育今以憎愛養育無明於內心中忽遇逆順境界便生憎愛此是十六我人知見中第六養育見出法界次第若以憎愛存心憎則怨愛則喜怨恨見愛總是情想以此求道去道轉遠故云皆不成就善男子云何我相謂諸衆生心所證者衆生之心無所取證則不著我相才有所取證即執此心以為自己故曰我相也西蜀復菴暉禪師曰此下文乃別釋菩薩迷智境四相今且徵云如何是菩薩犯著我相耶答云謂之一字乃評量之詞評量菩薩大心衆生才入初地用第七識心證第八識然第七末那識是能證第八阿賴識為所證假令修道捨妄證真只此能證之心不忘便謂之我相然第七識屬見分第八識屬相分也蓋梵語末那此云染污根四惑者我癡我慢我愛我見也四明聰講師曰圭峰意謂所證者此指羅漢證者尚有我相今謂未然我是十六見中第一名我見只為名色陰界不了妄計有我我所之實吾佛恐人不識此見此見潛在內心難識其相故云心所證者雖云心所證所證何相貌下有喻曉之善男子譬如有人百骸調適忽忘我身此喻衆生無所取證時不知有我相也四肢絃緩攝養乖方微加針艾則知有我此喻衆生才有所取證方知有我相也是故證取方現我體證是我證取是我取故證取時我體發現西蜀復庵暉禪師曰絃即緊急緩即是慢此皆係肢體不調手足失度之狀方法也針艾譬逆順境界經云諸有智者以譬喻得解如世上之人百骸不調手足失度並不知緊慢何故如是謂只緣調攝保養乖角失其方法好寒却熱宜熱却寒所謂暖者假衣於春暘凍者反冷乎冬風緣此失度其保養之故便不覺有其四大一朝醫師至或以針針之或以艾灸之此時方呌喚燒我痛也今學道之人亦然或燕居靜室或隱處深山雖物遺人頽然於吉凶之外心絶經營境無違順習間成性暫得忘情不覺自他便謂我得道已無我相了也這般人假使世間高名厚利榮華富貴酒色財氣皆動此人不得但以讚嘆其所得之法所悟之法即便歡喜若毀謗其所得之法即便嗔恨只此喜心怒心便是我相也以自謂捨妄證真一時無我了才被人以逆順之境來取之我相依前在也四明聰講師曰如人平常無病痛癢俱無忽少不安加之針艾針艾臨體方云有疼有痛既知疼痛始覺有我故云心所證者且就衆生顯我不是羅漢經云謂諸衆生若是衆生用加針艾故云證取方現也善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相我心未斷雖能入佛涅槃亦皆是我相爾西蜀復庵暉禪師曰上文並是粗相此結指細相也其心乃至證於者此屬能也如來畢竟了知者此屬所也所中又如來畢竟了知是能清淨涅槃是所意謂非但了知二乘涅槃為我相設若了知如來涅槃亦是我相也然如來涅槃但是虗無圓照無為覺體非別可證今既證得涅槃不忘能所即皆是我相所以古德云縱饒窮到底猶是涉風波四明聰講師曰此例我相不獨凡夫衆生有之至佛亦有之故云其心證於如來者此是分真佛不是究竟妙覺佛也佛亦稱我者無法之我此具我者非凡夫情我之我未證無生忍地刀割火塗皆是痛苦聖人遇難如割水吹光何難之有為凡夫未破無明其病全在若知佛地了知我證涅槃所了知心亦是我也直至妙覺四十二品無明破盡百非洞顯萬惑咸亡如十五夜月到此田地無爾無我無此無彼無凡無聖無善無惡天堂地獄淨穢國打成一片故云佛身充滿於法界普現一切羣生中善男子云何人相謂諸衆生心悟證者人相者悟我是空能不執著也心悟證者悟所證之我相為非故也善男子悟有我者不復認我所悟非我悟亦如是雖悟我相為非不復執著我相然所悟者既是非我則其能悟者亦非我矣非我之相即人相也悟已超過一切證者悉為人相使此悟心勝彼一切證我相者亦皆是人相爾西蜀復菴暉禪師曰心悟證者此覺悟前證心不是也者之一字正名人相意謂此之入地衆生到此又悟知前來證心是我相既知證心是我相更不肯再作證底道理解會故謂之不復認我今來所悟之心更無我相了殊不知只這底心悟所依前只是人相之我與前我相一般前證心是粗底識此悟心是細底識假饒謂之此悟心超出過越前來一切證心未免皆屬人相何也尚有能絶能除之心存焉四明聰講師曰智者法界次第云人相者於名色陰界入等法中妄計我是行人異於非行之人故名為人亦計我生人道異於餘道故名為人慈室云復知後三相皆依我相從根本而立荊溪云人以計外為人相大論云但於五衆取相故計有人相而生我心以我心故生我所我所心生故有利益我者生貪欲違逆我者生嗔恚此結使不從智生從誑惑生是名為癡三毒為一切煩惱之根本今言衆生心悟證者恐人誤作悟道之悟證道之證故言非也意云以我若比異類我是人者計是人相貌尊貴利益違逆等相我人道勝其實專自己身立人相也悟是悟彼人證是證我相貌富貴故云悟已超過一切證者意云我已過一切人皆不如我我能他不能我會他不會如是皆是超過即不是證聖人境界名為超過故云悉為人相善男子其心乃至圓悟菩薩俱是我者心存少悟備殫證理皆名人相雖能圓悟自性涅槃備極一切取證之理然尚有一毫悟心亦是人相爾西蜀復庵暉禪師曰不取能所故曰圓悟無非不盡故曰備殫意謂此之衆生用第七識心不取能所之相而前能所之相俱是有我直饒圓悟涅槃備盡得前證心之理不取能所者此尚有少能悟之心不忘故曰人相何也為少悟之智不是差別之心故曰少也四明聰講師曰其心者此指一切衆生之心龍女是畜生心調達是地獄心妙莊嚴王是邪見心十法界皆云其心除究竟佛非心既存有心有心生天有心為人有心為佛乃至有心證涅槃故云俱是我者心存少悟悟我為人非悟成佛殫者盡也盡其理言之錯認己身強立主宰故名人相善男子云何衆生相謂諸衆生心自證悟所不及者衆生別發一心自謂前所證之我相所悟之人相未能及此不知此心乃衆生相也西蜀復庵暉禪師曰此又徵云如何是衆生相謂覺前能悟悟是所覺悟既成所覺又名能展轉無窮皆成能所能所及處皆是相待了此無定故離前非計所不及謂免諸過不覺此計又是衆生衆生者不定執一之謂也謂前證心不及此心前悟心亦不及此心者之一字便是了心不忘善男子譬如有人作如是言我是衆生則知彼人説衆生者非我非彼此假借人言以諭己為衆生相則非我相人相也云何非我我是衆生則非是我云何非彼我是衆生非彼我故曰非我者蓋乃是衆生則非是我也曰非彼者蓋己是衆生則非是人也非彼我者非彼人之我也西蜀復菴暉禪師曰此舉喻釋通此一段文但借世人語詞以為義勢以顯衆生相不妨義理至淺近而文且幽隱今為子細分柝于茲世尊召淨業云善男子要知衆生相者譬如世上有一人口中自作如是之説問説道如何説道云我此一身不是張三亦非李四若我是張三則便有彼之李四為對待若我是李四則便有彼之張三為對待今我自是色受想行識衆緣和合而生也則知彼人説衆生者此卻是佛説也謂彼人既道我這一身自是衆緣而和合生之時而世尊便知彼説衆生之人已無自我了非唯無自我亦無彼我也既不執是我即無彼我對待之法上文徵釋已自可見了世尊又恐後代衆生不會再來將非我非彼一句分開為兩段徵釋使其易曉今先徵起非我二字云上文説非我如何是非我答云彼人適來自道我這一身自是衆緣和合而生既道我是衆生即使無自我了又徵起非彼二字云上文説非彼如何是非彼答云彼人適來自道我這一身自是衆緣和合而生既道我是衆生即便無彼我了雖然於自我彼我都無了尚不合有執衆生之心也無自我者即無初證心無我相也無彼我者即無第二悟心無人相也尚有衆生者即此能了之心不忘也大凡佛書有文易意難者文難意易者有文意俱難者文意俱易者此乃文難意易也善男子但諸衆生了證了悟皆為我人了知前所證者為我相前所悟者為人相也而我人相所不及者了知己之所見勝彼我人二相存有所了名衆生相了心未忘故名此相西蜀復庵暉禪師曰此合喻對辨也意謂但是地上衆生雖然了達得第一證心是我相又了達得第二悟心是人相而了心不忘便是衆生相也疏云了證者空則我不及了悟者空則人不及不及之處存有一箇所了之心豈非衆生相乎此謂之靈龜曳尾拂迹迹生也四明聰講師曰善男子云何衆生至名衆生相天台云於名色陰入界等法和合中妄計有我生故名衆生相今謂初受胎時攬父母遺棄為有五事一色二受三想四行五識此五者皆攬四大共成其體彼時便有四大和合五陰和合假名色身立我所相衆緣者衆共而生故衆生者五陰和合而生如五指頭束成一拳此五成拳故有拳名五陰成身假名衆生亦云衆生見亦云人見於母胎中便有此名皆是妄計非實有體心自證悟所不及者此因我人知見自高自大我是衆生彼非衆生此是我自起高心慢彼非我故此有兩不及一者他不及我二者我不及他下者一字兼於自它故下立譬云我是衆生則知彼人説衆生者非我非彼下再自釋云云何非我我是衆生則非是我此是我既非他是衆生他亦非我為衆生則非我者他非於我也云何非彼我是衆生者我既非他他亦非我我是衆生總結云非彼我故並非彼非我是我而非彼如彼亦非我但衆生妄情執有分彼分此有悟有證如此皆是我人而此我人所不及者存有所了立悟立證皆是我人妄想不離此五陰聚而為身名衆生相善男子云何壽命相謂諸衆生心照清淨覺所了者覺所了者覺前執衆生相時了心未泯也此覺心綿綿相續欲不斷滅故曰壽命相一切業智所不自見猶如命根一切覺心皆是清淨業智然此智幽微不能自見所以念念不斷如命根之不可斷也西蜀復庵暉禪師曰才有證心證心不忘便謂之我相才有悟心悟心不忘便謂之人相了得證心了得悟心了心不忘謂之衆生相若前三相俱盡唯是一味照覺現前覺心不忘謂之壽命相今且先徵起云如何是壽命相答謂等覺位大心衆生修行到此用即心之照此之即心之照全是自己光明裏許離煩惱障離所知障無一絲毫污染遂覺前來我相人相衆生相一切皆盡照徹真源一切處一切時全是此之一覺更無兩箇便擬將此作用之智修習一切無漏之業業即業用或自利或利他種種等行此之智照正是微細染識謂之細中之細一似人之作根常常相續不能自斷又不能自見之如楞嚴云阿難此湛非真如急流水望如恬靜流急不見非是無流禪宗謂之命根不斷不到牢關亦謂之智照現前猶是真常流注又云萬里不挂片雲虗空正好喫棒何故如是只為到此境界不合猶有依倚在猶涉簾纖在喚作著體華鬘嚴身纓絡又喚作百尺竿頭未能放步萬仞洪崖未能撒手尚有佛法存於胸中所以僧問古德云牛頭未見四祖時為什麼百鳥銜花答云聞時富貴又云見後為什麼不銜花答云見後貧窮今此壽命相正是牛頭未見四祖時底時節又僧問趙州云朗月當空時如何州云猶是階下漢僧云請師一接州云待月落了來相見只如古人有降龍伏虎諸天送供百鳥獻花者皆在此相中收也善男子若心照見一切覺者皆為塵垢心光發明見種種覺在淨性中悉為塵垢覺所覺者不離塵故照心覺心皆是塵念故也西蜀復菴暉禪師曰若以此法門智照照見前之三相一切覺者皆是塵勞垢污者只此能覺所覺之智依前不離塵勞妄想何也為更有能覺之智未忘所以與前病痛一般孟子所謂以五十步笑百步雖五十步未免是走爾如湯銷氷無別有氷知氷銷者存我覺我亦復如是存我則如水之為氷覺我則如湯之銷氷氷湯雖異同歸一水別無能知氷銷者所以存我覺我同歸一性別無能知我覺者西蜀復庵暉禪師曰如湯銷氷無別有氷知氷銷者此舉喻譬如世上之人用百沸湯潑氷相似湯至而氷即泮同成一水雖然氷銷去了尚有能知氷之人只如言盡便是不盡水喻真性冰喻四相湯喻智慧所以東坡云首斷更無能斷者氷銷那復更知氷存我覺我亦復如是者今存能覺之我覺前三相所覺之相雖然遣除前三相之我無那有我不合更存此能覺我盡者便是壽命相喻中知氷不合更存知冰銷者也若依教家約地位説此四相者第一我相即初地菩薩所犯第二第三人相與衆生相即二地至十地菩薩所犯最後壽命相即等覺位菩薩所犯此壽命相謂之貼肉汙衫最後方脫得此一相便入妙覺位即佛矣四明聰講師曰壽命者金剛經只云壽者不言命今言壽命者壽者是於色心五陰中妄計有長有短曰壽命者亦於色心陰法界計我命根成就連持不斷曰命其命壽只一也大論分為二計我命根連持不斷以執此故計有我身名為身見心照清淨者心便是命命只是出入息氣氣只是風大此息風若不清淨則結滯皆由此心知一切法知者智也智即照也照一切法曰覺所了者一切業智者此業即智此智即業以此無明業力知於諸佛法此智非一切種智之智此是業上生此智慧時人號靈臺此智所不見猶如命根世間知命者少此之謂也若心知命有長有短知是幻化空品云心如幻化故云若心照見一切覺者照即知也即知見了一切法皆是虗妄故云覺者下一者字兼能覺智能覺皆是塵垢垢是四大五陰根塵識皆為過患能覺所覺能知所知並皆塵垢能覺如湯所覺如氷故云如湯消氷知氷消者是誰能知所知並皆無體故云者字若存我能知之知覺我所覺境也亦如湯氷能銷所銷並皆無相故云亦復如是也善男子末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果不能了達我人衆生壽命之相雖經纍劫勤修亦不能證無為聖果是故名為正法末世圓覺疏曰正法之時修則皆證末世之時人多取相今既取相雖是正法亦同末世也西蜀復庵暉禪師曰此下皆是明存我失道謂既將此四相之心修行則行行皆帶能所此皆是有為生滅之法故不成聖果正同華嚴云多劫六度不名菩薩非唯不成聖果亦謂正宗佛法中末世何以故夫正法一千年像法一千年末法一萬年且正法之時人不取相修則皆證末世之時人多取相今既取著其證相之時雖是正法亦同末世若遇此頓教了達病源則雖末世還同正法莊子曰世喪道矣道喪世矣四明聰講師曰神我本是藏性性不自守隨薰和合於名色中妄計有我不了四相縱經塵劫修行終不成聖為未除我火性未斷故除我是入道要門大小乘若不除我終非聖人佛在世時亦有如是故云正法末世今後五百歲中法是正法奈弘持者多以邪法誤人呵佛罵祖皆正法末世其法雖正弘者曰邪謂之末世也何以故此一句徵起云前來修行之者劫數既多行又勤苦以何義故不證聖果耶認一切我為涅槃故有證有悟名成就故何故名為正法末世蓋由執著諸相為寂滅之道有所證悟及有成就之名故也西蜀復庵暉禪師曰此明認我為真答云謂只因不合認我以為涅槃有證有悟有了有覺故所以雖多劫勤苦終無所益譬如認夢身以為自己勤於家業種種疲勞終無一事益於資産四明聰講師曰今世間有一種學無生之術欲不生滅起此之心已落生滅反求之者去道逾遠我是羅漢我是無心我已到家以盲引盲盲盲無窮涅槃者何法謂之涅槃爾不識真理二乘三界小乘涅槃出分段生死有餘涅槃大乘破無明登圓初住證一分三德大乘涅槃佛是究竟涅槃豈有純是凡夫三毒不斷纖毫淫怒癡性全在何等涅槃可證若將得神通亦是涅槃魔魅亦有業報五通豈得為證涅槃又大教斥小乘聲聞緣覺亦謂之邪人迦葉自云未聞大涅槃前尚皆邪見何況錯認我人知見者此如認魚目如珠以為到家名悟名證亦云我已成就古有云是揀擇是明白若不擇良朋勝友別其見之邪正不獨自誤亦乃誤他其過可勝言哉譬如有人認賊為子其家財寶終不成就蓋諭取相修行終不成佛西蜀復菴暉禪師曰此舉喻以顯前文疏云賊若在外猶可隄防養之為兒如何撿獲又知賊是賊賊無能為認之為兒寧免破敗以喻六根取境猶可制禦藏識妄我難以辨明所以楞嚴云阿難汝今現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越壽禪師云認妄賊而為真子劫盡家珍收魚目以作驪珠空迷智眼又永嘉云損法財滅功德莫不由斯心意識學人不了用修行深成認賊將為子莊子云賊莫大於德有心而心有眼故聖人去之四明聰講師曰賊者即六塵之六賊也於色聲香味觸法之中自相劫奪家寶豈復就聚哉此正言賊者是無明業識此賊無始以來害我甚多只不自省此無明業識亦謂之父子天性本覺佛性流浪之後父子相失今日修圓覺會天性定父子無明法性一體父即子子即父賊即將將即賊若也錯認未免為他所害何以故西蜀復菴暉禪師曰前徵何以多劫不證答云由認我取證故此又徵云涅槃是萬法之真性即我體性亦是涅槃縱使認我取證以何因由所以之故便妨於道耶有我愛者亦愛涅槃伏我愛根為涅槃相愛我即愛涅槃究竟未離於愛但能降伏我之愛心使之不起爾不起之相似涅槃相其實非真涅槃也有憎我者亦憎生死既憎我相必憎生死憎心未忘終不解脫不知愛者真生死故本愛涅槃擬除生死不知愛心真生死根本也別憎生死名不解脫既起愛涅槃之心已為生死所縛別更起憎惡生死之念是名真不解脫西蜀復菴暉禪師曰疏云夫生死輪回本由憎愛欲求解脫須盡二源今憎生死亦是本憎棄苦欣樂雖殊憎愛元是本習帶之修道佛果豈成伏我愛根為涅槃相者由調伏之故愛根不起之處相似涅槃之相以似為真本愛涅槃擬除生死愛心既在即生死根愛根憎苗豈名解脫謂只此愛涅槃心便是生死之心又卻安用別生一箇憎生死之心只此一心在兩處用既用此心憎生死又用此心愛涅槃也云何當知法不解脫此等憎愛心在圓覺法中非解脫之見故也西蜀復庵暉禪師曰法之一字即涅槃因前云愛涅槃者名不解脫故此又徵起云若愛生死即是繫縛今悟涅槃是寂滅一心之法以何相狀得知云不解脫耶四明聰講師曰佛法不可以有心求不可以無心得須以有心作無心用今文云有我愛者愛心不斷求涅槃者愛心是無明無明不破若以愛心求無為去道遠矣伏我愛根者如木只去枝柯還復再生若斷木根則求無生理斷根證真涅槃暫伏愛根如石壓草遇緣再生即非究竟外道凡夫以伏為斷認為涅槃相雖用藥治病執藥為病病根愈深故云真生死故名不解脫不是法不妙不解脫生死自是汝用不得法故經云盲者不見非日月咎此法如人入陳中用武器善用者遊刃不傷不善用者揮戈刺吻非止傷手命亦難存善男子彼末世衆生習菩提者以己微證為自清淨由未能盡我相根本在己小有所證便為自心清淨蓋由未能忘我也西蜀復庵暉禪師曰以己微證為自清淨者佛法大海無量無窮其能入之者漸入漸深今彼衆生方且外知根塵假合內覺性體寂然殊未有大徹大悟之門而我相根本必不能盡除何以知之下文用境驗之即知也若復有人讚歎彼法即生歡喜便欲濟度若復誹謗彼所得者便生瞋恨則知我相堅固執持聞毀譽而生瞋喜者蓋由堅執我相潛伏藏識遊戲諸根曾不間斷執我之心潛伏於藏識而遊戲於六根念念不斷故也宗鏡曰識即是心不守自性隨染淨緣不合而合能含藏一切真俗境界故名藏識西蜀復庵暉禪師曰只如莊子云宋榮之為道也舉世而譽之而不加勸舉世而非之而不加阻今彼衆生未能臻乎此境遇贊則喜遇毀則嗔以此驗知我相猶在何也然世境違順粗重易明唯就法門最難覺察但言為法嗔彼愛此不知此心元是我相此之我相暫時潛伏藏在第八阿賴耶識中若觸著逆順境界依然於六根門頭熾然發現常常永不曾有間斷休歇古德云聊將柱杖輕輕撥燒卻三千與大千然藏識者屬第八識種子諸根者即屬眼識耳識鼻識舌識第六意識第七末那識現行種子熏現行現行熏種子常無間斷若約此中贊毀者乃屬八風稱利衰毀譽譏苦樂也四明聰講師曰末世中即後五百歲鬪諍堅固學菩提者道也今時學道者我見不除縱少知見便謂了證如此之人只緣不識真菩提路妄入異路邪鄉以為真道未證謂證未得謂得故云以己微證為自清淨佛在世時九十六種外道皆是邪見數中亦有通力者尚屬邪見何況今時唯以口業誑惑衆生世無青白眼隨順入邪鄉以盲引盲同入火坑佛憫此輩以苦切之辭拔濟邪見使歸正見故讚歎彼法即生歡喜便欲以邪化濟度其人受者自謂已得彼之真道可出生死豈知生死重積實乃迷中倍迷之人弟子與師俱從淪墜若明眼人善別淑慝出其惡指其妄此人便生瞋恨盡世之中便為怨結如是之人只為我相不除堅執我故體是無明第八識亦名梨耶識此我識至究竟佛方盡等覺菩薩尚未盡我此識微細故云執持潛伏內心八識田中既伏在內遊戲諸根即六根在眼曰見在耳曰聞六根門頭貪色聲等塵順則喜逆則怒總我執不斷所以我見居首者謂若是也善男子彼修道者不除我相是故不能入清淨覺不能斷除我相安能悟入淨覺西蜀復庵暉禪師曰此結前所説至是存我失道所以不能得悟入清淨圓覺也四明聰講師曰覺是圓覺此性淨之理如白圭不容少瑕或少瑕玼則不清淨瑕即我執也若留我執性不清淨如孤鶴不入雞羣也善男子若知我空無毀我者若知我體本空則知彼之毀我者亦無立處有我説法我未斷故才作我見演説諸法皆是我相未斷滅故衆生壽命亦復如是我相未除有此過患若執人相衆生相壽命相其患一同西蜀復庵暉禪師曰此下乃是説病為法此恐聞前佛説贊之則喜毀之則嗔嗔喜未忘便是我相今此便擬忍受不嗔用為無我以謂我今一身自是衆緣和合而成畢竟無我我已空了汝毀何人念汝無知之故今為汝種種説我空之法只此見有無毀之人便是未得我空只此為彼説法便是未斷我相然我人衆生壽者亦復如是疏云毀者是彼説者是我經文於毀者言無此是反明過也於説者言有此是順明過也四明聰講師曰若知我空此空是本來空非作為空亦謂性德之空此空空一切相具一切相非空之空非有之有此空有本來性中自具見喜不喜見瞋不瞋乃本有何瞋喜哉今我説者不到此田地因説故人雖毀我吾不生瞋雖不瞋他內念不息暫時捺伏唯不形於顏色念中仍存故云若知我空無毀我者永嘉有云身與空相應則刀割香塗何苦何樂心與空相應則譏毀讚譽何憂何喜然立我能説是以不瞋若起此念能所未亡有彼有我皆為我相未斷之故也如佛世中有二人竊人蓮華謀計云他人忽覺喚云誰盜我花應當效鴛鴦鳴令他不疑一人果入池中盜花主人云誰盜我花不效其鳴卻乃應云我是鴛鴦為主所獲元本我之一字畢竟未除誰人不為此我病之所害是以衆生壽命之見不斷故云亦復如是善男子末世衆生説病為法是故名為可憐愍者我相人相衆生相壽命相乃是四病衆生愚癡説此四病以為正法是誠可愍也雖勤精進增益諸病是故不能入清淨覺執相修行愈勤愈病何由悟入淨覺西蜀復菴暉禪師曰善男子至增益諸病者此結成存我失道所以不能悟入圓覺病者即四相也四相若存總名為病今彼衆生皆是以四相之病作十方諸佛一心圓覺之法門所謂認雞作鳳拾礫為玉誠可哀憐然雖勤苦精進轉增其病譬如將薪投火以水助氷是故不能入清淨覺者此結障道謂彼修道之人不合以上來所説之病為法故遂不能證入清淨圓覺也四明聰講師曰如人有病必服諸藥藥到病除藥亦應捨或有人以藥能治病故執而不捨藥反成病豈知疾病易醫藥病難愈精進修行能説之人悉名為病根本只為不識真性本空致以説藥為病雖勤求道精進不達我人性空還生虗妄學佛本為治病久之反藥為病徒勞苦行如佛世有一女子厭身燒身臨將入火時忽遇知識汝燒身厭身仍不脫苦其苦復苦不達性空縱燒千身亦不離苦譬如壞驢之車驢厭車壞了舊車舊車雖壞新車復來不達無我無人無衆生無壽者如鳥投網無可出處心雖念念欲出奈何無可出路要求出路古云遊心法界諸心寂如日依空不住空善男子末世衆生不了四相以如來解及所行處為自修行終不成就不能了達我相人相衆生相壽命相雖以佛之見解及佛所行之道為自己修行之法終亦不能成佛也西蜀復庵暉禪師曰此下文説將凡夫以濫聖人先抑聖同己疏云佛説了義稱理法門皆言心境本空惑業本淨凡聖不異因果皆圓就佛見之理實如此且衆生迷倒已久種習根深縱令信解法門現用元來隨念但以分別心識解他無礙言教謂佛意亦祇如此便乃歎天問地撥無因果不信有修有證若作如此見解者永嘉所謂豁達空撥因果莽莽蕩蕩招殃禍又譬如貧人數他財寶自無半錢分不能成就圓覺或有衆生未得謂得未證謂證未有所得自謂已得未有所證自謂已證如此妄語之人蓋由未斷我見西蜀復庵暉禪師曰上文抑聖同自己此乃是騁自己齊聖人或者不定之辭謂有一般騁己齊聖之人未曾得聖人所證之理己謂得了未曾證聖人所證之智己謂證了若未證而言證者根本戒中犯大妄語罪所以佛於楞嚴會上告阿難言我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如貧人妄號帝王自取誅滅況復法王如何妄竊因地不直果招迂曲莊子云是今日適越而昔至也見勝進者心生嫉妬由彼衆生未斷我愛是故不能入清淨覺見勝己而進道者便生忌心蓋由愛我之心念念不斷故也如此之人安能悟入淨覺西蜀復庵暉禪師曰見勝進者心生嫉妬者疏云夫聖人用心他己無二見他勝進或教法流行以念念歡喜必能隨順自驗內心如此或即證悟不虗何以故十方諸佛日夜常放毫光伺侯一切衆生斷惡修善若有一人發菩提心學佛法者十方諸佛則生無量歡喜若自覺己衰他盛則生嫉妬己盛他衰則生歡喜者縱令深解妙境但是心之所緣勿錯認之謂得證者也由彼衆生未斷我愛是故不能入清淨覺者此結成障道謂皆因前抑聖同己及騁己齊聖兩類衆生皆是未曾斷去我愛由我愛故所以不能悟入清淨圓覺此淨業菩薩前問若此覺心本性清淨因何染污使諸衆生迷悶不入今答云有三過咎一不合認我為真不能入清淨覺二不合説病為法不能入清淨覺三不合將凡監聖不能入清淨覺觀此之意是誰之過歟四明聰講師曰善男子末世衆生不了四相至入清淨覺者此四見本是真如佛性起妄計故為此色身已為實有又計我能解如來藏性即是我心及四三昧是入道門我是所行人妄計我所解者是上人法我所行者是如來行如此解行並是妄計無非我人於圓覺性終不成就為有我見作主宰故又有一種增上慢人未得為得未證為證詐稱善知識規圖利養如經云昔有貧窮人逃於它國詐號王子彼國不識以公主妻之此人遇飲食間常起嗔責後有本國人偶然見其公主説如上事此客曰教汝一偈他若起嗔時便念此偈其嗔自伏偈曰欠債逃它國詐稱為貴人粗食是常食何勞復作嗔此人嗔心果伏今增慢人詐云了證邀求名利嫉妬賢能造地獄因自不知覺故云由未斷我愛不能入清淨覺豈非詐也善男子末世衆生希望成道無令求悟惟益多聞增長我見望成佛果者不使求悟自性惟令廣學多聞則彼之我見轉加轉長矣西蜀復庵暉禪師曰此明趣果迷因也希望成道者此即趣果唯益多聞者此即迷因大凡頓教宗旨先須了悟覺性然後方可多聞廣其智慧不妨如龍得水似虎靠山序云醫方萬品宜選對治海寶千般先求如意然末世之人多迷此意唯宗名句一向徇文尋枝摘葉不務了心心既不了假饒記得河沙會盡塵墨於己何益楞嚴云欲漏不先除畜聞成過懼則所見所聞盡是增長一切諸惡論云多聞無智慧是不知實相譬如暗中有寶而無目諸教説聲聞人唯觀於果不觀於因如狗逐塊不逐於人又如列子説大道以多岐亡羊學者以多方喪生莊子亦云夫道不欲多多則雜雜則擾擾則憂憂則不救此皆責不先了心然後多聞列子説符篇云楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既返問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知其所之所以返也楊子戚然變容不言者移時不笑者竟日門人怪之請曰羊賤畜又非夫子之有而損言笑者何也楊子不答門人不獲所命弟子孟孫陽出以告心都子心都子他日與孟孫偕入而問曰昔有昆弟三人遊齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並合彼三術相反而同於儒孰是孰非耶楊子曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半不學泅不學溺而利害如此若以為孰非心都子默然而出孟孫陽讓之曰何吾子問之迂夫子答之僻吾惑愈甚心都子曰大道以多歧亡羊學者以多方喪志學非本不同非本不一而末異若是唯歸同反一為亡得喪子長先生門習先生之道而不達先生之説也哀哉芙蓉頌曰休將聞見學玄宗學得徒勞枉用工爭似無為間放曠廓然豁爾自圜通但當精勤降伏煩惱望成佛果者不必廣學多聞但須精勤禁制妄念起大勇猛未得令得未斷令斷當發廣大勇決之心佛果未得當令必得妄念未斷當令必斷貪瞋愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅佛説是人漸次成就若無此等妄心必可漸成佛果求善知識不墮邪見更須親近善人方得絶諸邪見西蜀復庵暉禪師曰此勸斷惑方成正因意謂世尊勸戒一切衆生欲成就十方諸佛廣大圓覺者但當如我所説降伏煩惱起大勇猛增勝之心若未得圓覺真實境中大智慧光明義遍照法界義真實識知義清淨不變義常樂我淨義一切妙用者當使令克獲成就得之若未斷去凡夫顛倒境中貪嗔愛慢諂曲嫉妬一切障礙虗妄之法者當使令斷除一切恩愛悉皆空寂則無上佛果自然成就更須求善知識以為證明導師不墮落邪見何也疏云商人入海須假導師學者修行必資善友所以禪宗云威音王已前無師自悟威音已後無師自悟者盡是天魔外道貪瞋愛慢者此即根本煩惱中生也愛無別性貪數所攝諂曲嫉妬即小隨煩惱也若於所求別生憎愛則不能入清淨覺海若於所求善知識處不能信受其法別生憎愛則不能成就圓覺廣大之果西蜀復庵暉禪師曰上文乃順釋此文乃反釋反明不生憎愛則得證入圓覺憎愛者於自生愛於他生憎所以道但莫憎愛洞然明白四明聰講師曰善男子末世衆生至清淨圓覺者求道者用心希望亦是我慢不滅若用心求悟亦是我人縱得一知半見復入我鄉真道不在多聞不在強記佛頂云阿難汝雖憶持諸佛如來十二部經清淨妙理如恆河沙不如一念修無漏業又云阿難縱強記不免落邪思欲漏不先除畜聞成過誤故經云惟益多聞增長我見若要修真道者須用圓覺寂照散時止之昏時朗之勇猛精進強軟降伏滅除煩惱發四弘誓願誓度生誓斷惑誓學法門誓成佛道觀心愈進則嗔愛諂曲對境不生復將所見之境一一皆是圓覺以覺照之所對之境如湯消氷忽有障重境界不退求善知識決擇明白庶不迷邪見所求之師別起愛憎則不能入清淨覺海爾時世尊欲重宣此義而説偈言淨業汝當知一切諸衆生皆由執我愛無始妄流轉未除四種相不得成菩提愛憎生於心諂曲存諸念是故多迷悶不能入覺城若能歸悟剎先去貪瞋癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見所求別生心究竟非成就西蜀復庵暉禪師曰覺城者以城喻覺即法喻雙舉也城有三義一防外敵二養人衆三開門引攝謂一了心性衆惑不入如防外敵二見恆沙功德萬行圓增如養人衆三道無不通自他引攝如開門引攝也若能歸悟剎者剎即梵語剎那此云世界此如率土之土無非王土行人既悟法法屬悟如云邪人説正法正法亦成邪正人見邪法邪法亦成正法愛者即涅槃也我身本不有者我身即憎愛之本欲除憎愛莫執妄身所依既空能依何立其由皮既不存毛將安附唐圭峰定慧禪師宗密頌淨諸業障菩薩章曰淨業斷除人我執俱緣四相妄迷習無明主宰為我根心存證者乃人立壽命業智潛續存衆生我人所不及由茲憎愛煩惱生覺城味此何能入淨諸業障菩薩章終九
