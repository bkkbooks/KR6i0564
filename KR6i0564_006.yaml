body:
  text: 起清淨慧菩薩章西蜀復菴暉禪師曰先倫貫文意之來者初從文殊章至普眼章乃是教示行人以悟解之力破所知障得慧解脫雖得慧解脫猶有無量劫來習氣業障未除心未清淨於是剛藏知幾為發三疑佛責分別流轉之見及未斷輪回之過使令覺了又乃勸云是故我説永斷無始輪回根本至彌勒問斷輪回根本佛令斷貪欲及除愛渴愛欲斷盡方是清淨之門行人到此二章經文方破煩惱障得心解脫然慧淨心淨方可從凡人聖故有清淨慧菩薩一章經文安排凡賢聖果無位之位也四明聰講師曰長安肇法師稱摩訶衍論云諸法不動去來處是以言常而不住稱其去而不遷也不遷故雖往而常靜不住故雖靜而常往故往而弗遷雖往而常靜故靜而弗留矣然莊生之所以藏山仲尼之所以臨川斯皆感往者難留豈曰排今而可往清淨慧問覺性圓滿本來不動云何修證者所得差別而有位次淺深之殊肇云不動者即諸法實相也而動者法華三草二木也又云雖動而不動言照而寂也又言雖靜而常往者即寂而常照也此章大意論靜中動故有位次階降於是清淨慧菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復菴暉禪師曰此表修證地位中因果之相而智慧不為行相之所染著又前己智圓覺淨性體上凡聖無殊縛脫不二但未辨隨順圓覺之心從凡入聖之差別故當此菩薩請問大悲世尊為我等輩廣説如是不思議事菩薩為佛前章所言皆是不可思惟不可擬議之事本所不見本所不聞佛所説不思議事菩薩等本來不曾得見本來不曾得聞我等今者蒙佛善誘身心泰然得大饒益承佛誘誨無諸疑惑善誘者即論語循循然善誘人之説西蜀復菴暉禪師曰此發文者也廣説如是不思議事此指彌勒章説輪回及五性不可以心思言議之事也謂名是言語道路法本無名故言議不及相是心之行處法本無相故心思不及所以云理圓言遍言生理喪法無相想思則亂生尋常佛説諸相法門有染有淨破相法門染淨俱絶此已親覩已親聞畢獨未曾見未曾聞宣説如是頓教大乘染淨二法融通法門也小乘破我空曰小饒益菩薩破二空曰大饒益也四明聰講師曰其間本所不見眼也本所不聞耳也菩薩慧眼不及佛眼故云本所不見等請法儀式具釋前章願為諸來一切法衆重宣法王圓滿覺性菩薩請佛重説圓覺法門也佛為萬法之主故曰法王圓覺妙性廣大圓滿故曰圓滿覺性一切衆生及諸菩薩如來世尊所證所得云何差別菩薩又請佛説衆生菩薩佛所證悟處差別不同之理令末世衆生聞此聖教隨順開悟漸次能入欲令衆生聞佛説此聖妙之教順而不違開悟本性漸次修行入於圓覺作是語已五體投地如是三請終而復始西蜀復菴暉禪師曰此請問也重宣法王者前文殊章已説無上法王等今重説也一切衆生者即凡位也諸菩薩者即三賢及十聖二位也如來世尊者即果位也此乃請問世尊凡賢聖果所證之法及所得涅槃中云何得有差別次第四明聰講師曰清淨慧本意問圓覺性性自圓滿不流不動不生不滅可謂滿而不溢及令末世修圓覺者亦依如來妙奢摩他妙觀修之本合一超直入如來地與佛相似何故證得之時有佛菩薩聲聞緣覺之殊大凡在迷者亦具圓覺性有天人阿修羅鬼畜地獄之異欲佛開顯迷悟生佛三乘五性所證所得階位高下淺深使諸末世至不疑之地爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為末世衆生請問如來漸次差別汝今諦聽當為汝説時清淨慧菩薩奉教歡喜及諸大衆默然而聽善男子圓覺自性佛謂圓滿覺性乃本來自性非從緣而有也非性性有前説五性皆非圓覺自性故曰非性諸非性中圓覺自性一一具足故曰非性性有循諸性起圓覺自性隨順諸緣故五性起時覺性亦起圓覺疏亦曰圓覺隨緣遍諸差別之性諸性起時覺性亦起無取無證圓覺妙性廓然清淨無可取者無可證者於實相中實無菩薩及諸衆生圓覺空性無一切相故曰實相此實相中一切無有豈有菩薩衆生之相西蜀復菴暉禪師曰此明圓覺體上無修無證之理圓覺自性非性者謂十方諸佛圓覺自性本體上本無五性及貪愛輪回差別之性也性有循諸性起者則前差別之性皆有圓覺既有圓覺然圓覺之性有隨緣義而圓覺不守自性能隨諸差別性起遇聲聞人則成聲聞性遇緣覺人則成緣覺性遇菩薩人則成菩薩性遇不定性人則成不定性遇外道則成外道性然此圓覺性中本無取輪回本無證涅槃又於圓覺真實相中亦本無四聖及六凡所以永嘉云了了見無一物亦無人亦無佛大千世界海中漚一切聖賢如電拂四明聰講師曰圓覺之性人所難知有二種性一者真性清淨真如是也此乃離無明外三教果佛所證如雲外月如水上油二者即染之性此性染時十界俱染淨時十界俱淨此性與無明同體無明即法性法性即無明雖分二名體即是一亦謂之理毒害亦謂之性惡法門此性顯時從凡夫地上修圓覺妙觀觀五陰境空達本性空寂到境觀雙絶處病去藥亡能所雙絶於雙絶之處融妙三千一時顯現豁然同皆真淨法法皆實故曰真皆非染礙故曰淨如是則一切衆生皆毗盧體一切國土悉常寂光又須知此圓覺之性非獨佛有凡法界衆生共之蓋性無定一之性乃三千之性也以佛具三千方攝心生衆生具三千故方融心佛我心具三千故豈隔生佛若心無佛性豈能攝佛佛無生性何能攝生故知性體無殊一切咸遍華嚴云心佛及衆生是三無差別今之覺性乃即染之性乃曰非性亦可云凡所有性皆是非性若見諸性非性非性乃真圓覺性此性既以九界為性驗知不是定一之性故曰非性性有者乃真性隨緣變為一切諸性故曰循諸性起此圓覺若寂然不動則無取無證於實相中無菩薩衆生差別亦由菩薩衆生未證實相未破無明但幻生幻滅非實性相即非圓覺境界故曰無取證者若真圓覺性即染是圓覺之性則能隨染淨緣染則十界俱染則無佛惟衆生若淨則十界俱淨即獨尊於佛此佛性隨淨緣則四聖起若隨染緣則六凡起雖隨染淨性不曾變故曰寂而常照感而遂通諸家不知性具染惡故惡時便作惡會淨時便作淨會先輩多把真如分為兩派錯會佛性也何以故菩薩衆生皆是幻化幻化滅故無取證者菩薩衆生所有身心非有真實不滅之相故曰皆是幻化幻化身心既已寂滅則一切取證之相悉皆無有西蜀復菴暉禪師曰此徵釋所以謂以何義故前文説無菩薩及諸衆生耶良由菩薩與衆生皆是對待之法得有其名亦名幻化不實之相但是約有垢故曰衆生約雖垢故曰菩薩到此菩薩與衆生一道拂去故曰幻化滅故既然幻化滅盡於中非唯無取輪回之衆生亦無取修證之菩薩所以道諸佛衆生其猶影像涅槃生死俱是強名又云凡名聖號皆是假稱殊相劣形並為幻化又云世間名字假稱呼隨順瓶盤與叉釧是知不用憎凡凡是妄立不用愛聖聖是假名若得聖凡情盡自然體露真常譬如眼根不自見眼衆生不見自性如人之眼根不自見其眼也性自平等無平等者一切法性本自平等初無凡聖之異亦無能平等之者西蜀復菴暉禪師曰此恐未曉前文法説故此舉喻前文説幻化滅故無取證者有似人之眼根而眼只能照見前種種差別之境不能照自家之眼如刀不自斫指不自觸鏡不自照也更將自家之眼見有一眼之時却成兩眼然而圓覺性上本來平等無二不可以加矣如瓶已滿更不再添佛佛道齊法法平等裏許全超獨脫離相絶名無四聖之高亦無六凡之下所謂是法平等無有高下若於平等性上別生分別之心更覔平等之性便是頭上安頭屋下架屋所以道親從宣德門前過更問行人覔汴州是也大凡儒釋道三教之書皆有舉法舉喻於舉喻中不過如周易中説近取諸身遠取諸物二義只如彼云近取諸身者以乾為首坤為腹以震為足以巽為股以坎為耳離為目艮為手以兌為口也遠取諸物者以乾為天坤為地以震為雷以巽為木坎為水離為火艮為山以兌為澤也又如道經云近取諸身者為腹不為目也遠取諸物者三十輻共一轂也又如莊子云天地一指此即近取諸身萬物一馬此即遠取諸物今釋書亦然只如第二普賢章云譬如鑽火兩木相因火出木盡灰飛煙滅者此遠取諸物為喻此譬如眼根不自見眼者此近取諸身為喻凡學聖人之書者不可不通此理也四明聰講師曰圭峰云眼能見一切物唯不能見自眼根又如眼光照矚物時境自萬差見只是一故云平等慈室亦云眼只是一誰為能觀誰為所見南嶽止觀云眼不自見水不自濕刀不自傷今言本來自平等鵠白烏黑天然之理鶴長鳧短亦天然理性自平等天然也非造作而有白黑長短也今言無平等者無人能平之然後等也鵠白非染就烏黑豈作成皆自而然豈可截鶴之長續鳧之短假使得成亦屬造作且人將物帛染為五色乃造作也今為圓覺之性性自天然非人能為之也故云無平等者衆生迷倒未能除滅一切幻化衆生迷惑顛倒未能除滅諸幻於滅未滅妄功用中便顯差別一切幻化欲滅未滅之間凡所修為皆是虗妄於此等功用中有頓有漸即顯出五種差別性也西蜀復菴暉禪師曰此明對機説證衆生若無迷惑自己顛倒逐物則無有差別之義此迷倒即三細六粗既迷倒之甚不知五蘊十二處十八界一切之法皆是幻化不實執為實有但覺前念為非不覺後念此是凡賢聖三位之人也妄功用中者此是聖位中第七地已前菩薩皆是夢中修道謂到此地之後方純作無相觀蓋圓明證悟始知煩惱本無則見能斷智慧功用已是虗幻譬如夢中以藥治病得差寤後病藥俱無故言妄功用中也若得如來寂滅隨順實無寂滅及寂滅者妄功用中若悟寂滅隨順之理寂然無念滅而無相隨順一切不執我見則實無寂滅之法亦無寂滅之人可謂人法兩忘也西蜀復菴暉禪師曰此果位若證得十方諸佛一心寂滅相應無乖之理非獨是不見有所證寂滅之法亦無能證寂滅之人到此謂之二邊不滯能所俱絶一切處瀟瀟灑灑一切處密密堂堂彌綸八極崢嶸大千無處不周無剎不現所以道出頭天外看誰是箇般人此上皆是總標凡賢聖果四位不異下文方是開四位一信位息滅相二賢位息異相三聖位息住相四果位息生相大分與起信四位同也四明聰講師曰衆生迷倒至及寂滅者未能除滅一切幻化者此言聲聞緣覺兩教二乘三教菩薩不獨五性差別亦聲聞緣覺等此等皆於滅未滅人也今依天台宗明小衍小者明四大實從無明生實從無明滅衍教明四大有三教不同通教四大體本自空故本不生滅由無明故見有生滅如幻化生如幻化滅別教四大體是佛性由無明故四大生滅性無生滅相有生滅圓教四大體亦佛性而往本具九界四大故九四大若生若滅皆是法界是故性相俱不生滅乃不思議論生滅也與法華經世間相常住其義宛然出四明法師之文於滅未滅正二乘聲聞雖斷見思觀四大五蘊空證不生滅止是三界裡分段之身不生滅故云於滅三界外無明塵沙有變易生滅故云未滅中間三教果頭佛三教菩薩都是妄功用但止化城未到寶所今有一種不師聖教人自立己見硬把身心制縛縱得一知半見皆是邪法如持雞大戒教人坐禪不識法度從朝至暮坐得焦枯轉加瞪夢梁氏云如破塊落空谷如飛蛾赴明燭斯言不謬令大覺預鑒末俗云衆生迷倒未能除滅一切幻化除圓佛修證極自覺聖智如圓鏡虗豁靈通真證不生不滅地此之生滅既歸性中即無生滅與不生滅如世間人鎖了自己屋宅失却匙鑰經多歲月遠遊他國在彼亦別造舍宅居止終非究竟後還歸本鄉拾得元來匙鑰開本己舍宅先所用物不動纖毫更不他求復本家業大聖修極復其本性元物不動無明即是明四諦十二緣本來不動謂之本來面目也人自不了自取生滅縱證小聖仍非家業故得妄功用中自生自滅吾佛斥非皆非正路寂滅隨順者則始本一合修性同源無修無性行法云觀心無心法不住法滅諦寂靜如上經意迷圓覺者有五性差別并聲聞緣覺諸小菩薩於妄功用中隨力所證不同故有淺深不明其粗豈辨其細以後明圓教純圓獨妙但圓頓本無位次借別教位次以明淺深今依台宗立六即位次隔量不爾恐凡夫以濫極聖此節經文唯四明慈室真解以明斯義但其間明義未圓今依經依祖分為六段一理即佛二名字即佛三觀行即佛四相似即佛五分真即佛從初住菩薩至等覺菩薩名分真即佛六究竟即佛妙覺佛即者是也亦云六是曰理即是也衆生即是佛故云六是善男子一切衆生從無始來由妄想我我體元無妄想為有及愛我者愛我者執著我相之心也曾不自知念念生滅衆生妄心執著我相不知此心念念之間旋生旋滅本無堅固不壞之相維摩詰經曰是身如電念念不住者是也故起憎愛耽著五欲圓覺疏曰由執我故順我則愛違我則憎故著五欲也五欲者一財二色三食四名五睡也西蜀復菴暉禪師曰此十信位於中有二初具足貪嗔癡凡夫後十信凡夫今初此一段文乃是未入信位所以有此文者若不約凡迷即無信位故先標云衆生者指四生九類也由妄想我者此是所執之體及愛我者此是能執之是謂一切衆生九類自從無始曠大劫來因一念不覺妄想錯入父母胞胎被父精母血包裹自己一靈之性三緣和合遂生得此身這箇是所執著底我而今又不知因起所由又於妄想一身之上又生起愛著之見謂這箇是我眼我耳我鼻謂此是我手我足我身我性我名一切處不得動著我爭人爭我並不曾有一箇於此自覺知十二時中前念續後念後念續前念念念生滅如燈之炎炎如水之涓涓塵勞妄想情狀萬態順我則愛違我則憎於一切處耽著色聲香味觸法之五欲也四明聰講師曰天台云若佛不出世衆生不知自有佛性若佛不説無能知者一理即佛者言圓覺遍一切處諸法無不明了雖五無間皆解脫相雖昏盲倒惑其理存焉斯理灼然世間常住有佛不能益無佛不能損得之不高失之不下故言衆生理即佛也四明云然若不知性染性惡所有染惡定須斷破如何可論全體即是邪全體是故免於退屈六分別故免於上慢六不離即即不妨六六即義成圓位可辨良由衆生性具染惡不可變異其性圓明名之為佛性染性惡全體起作修染修惡更無別體全修是性故得迷事無非理佛即以此理起惑造業輪回生死而全不知事全是理長劫用理長劫不知與今經同從無始來由妄想我及愛我者念念生滅故起憎愛耽著五欲妄受生死不知自己有佛失本妙明此謂之理即佛也若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮衆生因教悟性發明妄念起滅之理方知此生本有之性空自勞役思慮也若復有人勞慮永斷得法界淨永息思慮則一切處皆得清淨故曰得法界淨即彼淨解為自障礙以淨為淨是名淨解為彼解心障礙自性故於圓覺而不自在作意於覺故不自知此名凡夫隨順覺性衆生謂覺性本來清淨故起淨心隨順修習不知此心亦為障礙此乃凡夫之見非菩薩見也西蜀復菴暉禪師曰既知生滅之念有害於道遂上絶馳求造作之心因息妄心妄心不起處故得法界淨法界有二一理法界二事法界若理法界淨者於本性之上本來離相絶名無可分別并勞慮六塵之境並皆不生若事法界淨者於五蘊十二處十八界外及山河大地草木叢林諸法當體即空良由心淨則淨心穢則穢古云心虗境寂念起法生水濁波渾潭清月朗然粗念既除得少安淨於淨時心生愛著作淨見解便被淨解之相自穿了鼻孔非干外有塵境而來撓之故曰自所以於大圓覺無為寂照之中不得縱橫自在古云莫向白雲深處坐切忌寒灰煨殺人此乃是十信凡夫常與本覺之性相應不背之者也四明聰講師曰若遇善友至性自勞慮者此名字即佛無明長夜生死巨關無佛長鎖故佛出世開甘露門照世光明令知三寶十號是常住味此光此味乃從衆生心性流出還使衆生解此光味即本性佛須達聞名身毛皆竪昏夜大朗巨關自闢名字即佛也與今文同若遇善友即善知識教授之師從此起修開悟領解也亦由力熏知本具圓覺性發明起滅但未曾修未曾證猶如世人知有玉質木具火性不假雕琢擊發之也知而不為法體仍迷縱然求師真明未發徒自勞慮又如世人臨河羡魚百千計較若闕筌網終無獲理此名字即佛若復有人勞慮永斷至隨順覺性者此明觀行即佛此位已修圓觀觀三諦境境觀融融雖具煩惱性能知如來祕密藏理慧相應心觀明朗天台智者正居此位法華五品位也今云勞慮永斷者即永伏煩惱之性不起此人解心虗通故云得法界淨即彼淨解此之淨解如蟲蝕木偶為成字不知是字非字故云為自障礙但用圓覺之觀圓於自心未圓十界心未遍圓故云而不自在既未斷見愛無明貶之為凡夫到此覺性永無退失故云隨順覺性善男子一切菩薩見解為礙見前淨解為障礙故雖斷解礙猶住見覺淨解雖除不作障礙正在覺位復為覺礙覺礙為礙而不自在圓覺大疏曰所覺是礙故能覺亦礙由存此迹還礙覺心故不自在此名菩薩未入地者隨順覺性如此隨順本性乃菩薩未入佛地者之見也西蜀復菴暉禪師曰此十住十行十回向三十位三賢之人此謂之資糧位然三賢之人見解又高於十信之人遂覺十信之人所見之解是障礙之境於是便斷除著淨之解雖除得淨解猶有能見能覺之心遂住著能覺不知放捨只此能覺之心又是障礙故於圓覺無為寂照之中不得自在此謂之地前菩薩未入初地之人與覺性相應者也四明聰講師曰四相似即佛天台云似者二物相類如鍮似金若瓜比瓠猶見火先暖涉海初平水性至冷飲者可知渴不掘井聽説何為如法華六根清淨即是其相此位未入分真位如真金今居十信後心相似位如鍮比金令且是鍮更入一步鍮變為金本覺清涼其猶冷水似覺飲之知消煩熱見解為礙者此菩薩已斷見愛初信斷見二信至七信斷思八九十信斷塵沙雖用圓解斷見思仍住解慧故云見解為礙此解為智智反為障亦云為礙解礙解斷猶住見覺解礙未斷復用覺觀觀力既強解礙自破雖藥治病病去本藥隨亡猶執其藥藥反為病雖以空覺覺其解礙此覺復為礙故到此將登圓住踞涅槃山頂住虗湛覺觀之中未肯前進十六觀經佛現六十萬億之身似位見此殊相速進無生謂之增長念佛三昧住觀覺中謂之而不自在故結云此名菩薩未入地者隨順覺性未入地地借別十地名為圓十住此是別初地圓初住佛未究竟故云隨順也善男子有照有覺俱名障礙有照者即前之淨解心也有覺者即前之覺礙心也圓覺性中皆名障礙西蜀復菴暉禪師曰此十聖位也上菩薩有照者指前信位之人淨解有覺者指前賢位之人能見之覺是二皆是障礙之境此謂之悟前二位之人所見皆非只如達磨欲西反之際命弟子各呈己見時有道副出曰如我所見不執文字不離文字而為道用達磨曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見達磨曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得達磨曰汝得吾骨此三大士皆是有照有覺法執未除者也是故菩薩常覺不住湛然常覺不住於相金剛經所謂菩薩應生無所住心者也照與照者同時寂滅謂所照之境與能照之智悉皆寂滅此乃已入佛地者也西蜀復菴暉禪師曰常覺者常則常常不變之稱即無分別之智照者即能照之智與照者即所照之境寂滅者即空義謂此入地菩薩無分別智不住著能照之智及所照之境能所俱空二執並離所謂從本已來離心緣相離文字相離分別相離能所相此謂之以無緣智緣無緣境以無緣境起無緣智如水投水似空合空了無痕迹何以知之唯識云若時於所緣智都無所得爾時住唯識離二取相故所以盤山云光非照境境亦非存光境俱忘復是何物到此境界風吹不入水灑不著清寥寥白滴滴脫於是非之表本仁和尚謂清鏡云高山頂上無可與道者啖如二祖出禮拜了依位而立達磨曰汝得吾髓唯二祖是照與照者同時寂滅者也四明聰講師曰善男子有照有覺至同時寂滅五分真即佛四明依起信并華嚴明初住位此菩薩破一品無明證一分三德分身百世界作佛大千火起一唾能滅大千一空一吹便成頓修頓證初發心發本覺心也常用寂照寂而常照故云寂照雙融破一品惑證初住破十品證十住今論初住功用入此住心法雙亡境智俱泯寂照同源無能無所有照者觀也有覺者境也上文云清淨覺相覺相即境也若立境觀俱為障礙此人常覺不住覺常照也亦不住照照覺俱不住境智雙亡如日依空不住空常境無相常智無緣謂之同時寂滅雖百界度生無生可度金剛經云實無衆生可度真是菩薩譬如有人自斷其首首已斷故無能斷者則以礙心自滅諸礙礙已斷滅無滅礙者以淨覺心滅除諸礙諸礙已除覺心亦泯如彼世人自斷其首首已斷絶別無能斷之人也西蜀復菴暉禪師曰譬如有人自斷其首首已斷故無能斷者此舉喻喻如世人頭未斷之時頭為所也手為能也既自將劍斬斷之時頭為所斷手為能斷自家之頭既已斷了豈更分能斷之手所斷之頭乎決無是理故東坡先生云首斷故無能斷者冰消那復更知冰則以礙心自滅諸礙礙已斷滅無滅礙者此合也礙心者即能覺礙之覺諸礙者即所覺之礙謂既用能覺之礙心覺去所覺礙之覺心更將能覺之心一時拂去即無能滅礙之心亦是能所俱忘經文從常覺不住至此皆明地上菩薩不住著能證所證也四明聰講師曰此譬境智寂照不二而二二而不二境屬所斷智屬能斷境智一合無復分張誰為能斷誰為所斷以如如智照如如境境智既融色心依正同一覺體八相成道百界度生雖是藥病仍以藥治故云則以礙心自滅諸礙境智亡了唯有真智獨存故云無滅礙者修多羅教如標月指若復見月了知所標畢竟非月因指見月見月忘指因教詮心悟心忘教西蜀復菴暉禪師曰此下明不住教也今初標喻梵語修多羅此云契經總目一代時教也疏云夫設言象在於得意無言象而倒惑執言象而迷真故以標月之指喻於言教謂見月須藉指端悟心須依佛教因指見月見月忘指因教筌心悟心忘教存指則失真月執教則失本心肇云善言言者求言所不能言善迹迹者尋迹所不能迹祖云如來一切法除我一切心我無一切心何須一切法佛言我説三乘十二分教如空拳誑小兒如黃葉止啼相似何以知之龐居士云孩兒正啼哭母言來與金捻他黃葉把便是止啼音禪云見人須棄敲門物得路仍忘堠子名大凡未入地之人須假教法修行才入地見道之後登地證理更不假教也一切如來種種言説開示菩薩亦復如是諸佛開説法性正如以指標月西蜀復菴暉禪師曰此法合也謂十方諸佛種種方便種種言説種種譬喻開發教示一切菩薩一切衆生亦如標月之指良由一代時教皆是不得已為衆生方便之故演説詮顯本性若復見性之人了知一切言説畢竟非性自然不復執著文字語言泥著文言經云了法不在言又云拈得鼻孔失却口晦堂云五千文字唯標指用指因觀月在天月落指忘無別事醉眠醒坐但隨緣莊子云筌之所以在魚得魚忘筌罤之所以在兔得兔忘罤言之所以在意得意忘言經云但有言説都無實義不然則載空言以求道則去道之遠矣若將佛祖言教而為奇特者大似猛虎入檻靈鳳投籠有甚快活豈不見洞山云若是上流應不將祖佛言教貼在額頭若貼在額上者如龜負圖自取喪身之兆此名菩薩已入地者隨順覺性如此隨順本性乃菩薩已入佛地者之見也入地者入佛之地位者也西蜀復菴聰禪師曰此結前不住證及不住教此是入地菩薩與覺性相應如此四明聰講師曰修多羅至隨順覺性修多羅此翻契經詮理辨性莫不由茲法華云一百八十劫空過無有佛如何有經可以發明世雄垂慈設教模範衆生然後成佛且如孔子不立五經治世今時如何取士教如筌蹄可取魚兔也但不可執教教仍是病故云標月指未識月時假指指之因指見月見了月須忘指若執指為月尚猶不可何況月非指乎一大藏教皆是假施設金剛經云如我説法猶如筏喻法尚應捨何況非法古云一兔橫身當古路蒼鷹才見便來擒近來獵犬無靈性却向枯椿舊處尋蓋如來種種言説亦復如是已入地者通順覺性初住聖人入流亡所所入既寂動靜二相了然不生何止於隨順覺性善男子一切障礙即究竟覺菩薩初發心時名本始覺圓覺成就名究竟覺今見諸障礙即究竟覺者蓋已入佛地無一切差別心也得念失念無非解脫得念是無念失念是有念佛知諸念本空了無得失故皆得解脫成法破法皆名涅槃進修曰成毀謗為破佛知諸法本空了無成壞故皆名涅槃智慧愚癡通為般若智慧者已悟之性愚癡者未悟之性究其本源同一佛性故曰通為般若菩薩外道所成就法同是菩提菩薩外道所立之法雖有邪正之殊皆是菩提覺性無明真如無異境界真妄一體性本解脫諸戒定慧及淫怒癡俱是梵行戒定慧是淨淫怒癡是染佛於染淨無分別心故曰俱是梵行衆生國土同一法性涅槃經云我以佛眼遍觀三界有情無情一切人法悉皆究竟究竟者即法性也地獄天宮皆為淨土佛知善惡二報皆如空華故謂苦樂二境皆為淨土有性無性齊成佛道有性三乘也無性闡提也佛眼觀之悉皆是佛一切煩惱畢竟解脫佛謂煩惱本空故云畢竟解脫西蜀復菴暉禪師曰此當等覺妙覺果位也前則十聖之人但只換骨洗腸純清絶點一向與麼去不解與麼來所謂出得魔界入魔界不得喚作離物遺人頽然吉凶之外打淨潔毬子抱得不哭孩兒才到果位非唯解與麼去亦解與麼來非唯出得魔界抑亦入得魔界到此天堂地獄虎穴魔宮月下風前淫坊酒肆刀山劒樹盡是安身立命之處所以禪宗云翻身魔界轉腳邪途又淨名云不離煩惱而得涅槃天女云不出魔界而入佛界此一段經文共有十對一識智對二成破對三愚智對四邪正對五真妄對六染淨對七依正對八苦樂對九有無對十縛脫對一切障礙即究竟覺者此二句是總標下十對之別謂到佛位智冥圓覺血無勝劣分別之心所以下十對之法皆同真實一性又若見有障可斷斷已名為覺者此覺非究竟不見有障可斷障礙即覺方名究竟矣得念者即智也謂十二時中正念現前之時則前五識遂成成所作智第六意識成妙觀察智第七識成平等性智第八阿賴耶識成大圓鏡智失念者若失正念則四智番成八識今明念本自空非是無念故皆解脫此謂識智一對也成法者即修行精進也破法者即不修進毀於律儀也又曰衆生緣會曰成緣離曰破緣無自性成破一如此謂之成破一對也智慧者即智也愚癡者即愚也大寶積云癡猶分別生分別亦非有癡性與佛性平等無差別此謂之愚智一對也外道即邪也菩薩即正也思益經云住正道者不分別是邪是正古云一念心不生六根總無過此謂之邪正一對也無明即妄法也真如即真法也古云迷則真如是妄想悟則妄想是真如此謂之真妄一對也戒定慧無漏三學即淨法也淫怒癡三妄即染法也謂三毒本空俱是淨行諸法無行經云貪欲即是道恚癡亦復然如是三事中有無量佛法此謂之染淨一對也衆生即正報也國土即依報也涅槃經云我以佛眼遍觀三界有情一切人法悉皆究竟究竟者即法性也此謂之以性融相融相皆性即依正一對也地獄即苦也天宮即樂也若造極惡業就之時身雖處天宮即是地獄也若造極善業就之時身雖處地獄即是天宮也二業之念由心地獄天宮豈實故云心能作諸佛心能作衆生心能作天堂心能作地獄心異則千差競起心平則法界坦然心凡則三毒縈纏心聖則六通自在如谷應聲語雄而響厲似鏡鑒像形曲而影凹故知萬行由心一切在我善因終感善緣惡行難逃惡境使一心不生萬法無咎此謂苦樂一對也有性即有三乘性也無性即未曾聞熏教法闡提性也以正眼觀來非唯他日回心現今已齊成佛道此謂有無一對也煩惱即縛法也解脫即脫法也然煩惱但是依識性上起識性既當體即空煩惱何縛之有智度論云若有人言我當得一切種智是為戲論我當斷一切煩惱是為戲論亦可縛之一字屬六凡脫之一字屬四聖故楞嚴經云根塵同源縛脫無二識性虗妄猶如空華與此同意此縛脫一對也已上十對名相之境雖異其意不殊何也但以佛證圓覺之心此心更無勝劣取捨由此之故故得一切諸法普同圓妙一一稱性普融無礙所以華嚴到此説事事無礙法界清涼云諸佛與衆生交徹淨土與穢土融通法法皆彼此該收塵塵悉包含世界相即相入無礙圓融具十玄門重重無盡四明聰講師曰善男子一切障礙即究竟覺者即究竟覺即者是也要見究竟佛但於一切障礙處見之障礙即無明業識煩惱重障是要見得用佛眼見用佛智知佛頂云如我按指海印發光汝暫舉心塵勞先起此明究竟佛亦云妙覺天台云道窮妙覺位極於茶音乍唯佛與佛乃能究盡諸法實相四明云始覺道窮本覺理極本始既泯無以名焉強稱妙覺妙明既乃極證證一切諸法盡十法界依正色心因果善惡淨穢生佛地獄天堂魔界佛界盡入圓覺性海亦謂之融通諸法亦謂之入惡入魔一如無二如也得念失念無非解脫者大抵世間事凡在乎有念則為病若無念者當時無念而得今亦無念中失既無念而得得之何喜既無念而失失之何憂既乃無念何喜何憂既無其念得失何有哉但解脫者即絶思慮之心既絶思慮得失豈非解脫乎成法破法皆名涅槃者成法生也破法滅也涅言不生槃言不滅一切諸法皆因緣而生亦因緣而滅非有緣則不生非有因則不滅緣生而生緣滅而滅須到寂滅為樂處則不生不滅矣智慧愚癡通為般若者通為者愚癡濁水也般若清水也清濁雖異濕性元同般若之濕性通愚癡之濕性老子亦云大辨若訥大巧若拙菩薩外道所成就法同是菩提者菩薩翻道外亦云道此二道字但邪正之異菩薩之道正正即是邪外道之道雖是邪邪即是正佛之與魔相去幾何邪之與正有何欠剩同是者邪正歸一也無明真如無異境界者演若達多晨朝以鏡照面若放下鏡不見其面問一切人覔頭云你見我頭在處問人人謂此人狂矣佛云此狂才歇歇則菩提無明者狂性也真如者菩提也無明若歇歇即真如境界即指目前境界無非真如無非無明無異境界也諸戒定慧及淫怒癡俱是梵行者戒定慧淨也淫怒癡穢也文殊云我是貪欲師利以理用事無非梵行以情用事善惡不可同日而語衆生國土同一法性者依正也衆生正報人之身也國土人之所依山河屋宅等也究竟到家依即是正正即是依依正不相妨色心無罣礙華嚴破一微塵出大千經卷又云於一毫端現寶王剎坐微塵裡轉大法輪斯之謂也地獄天宮皆為淨土者天宮地獄以事相論之霄壤之殊究理言之不出人一念造古云天堂地獄門相對只在人心一念中淨土亦只人一念心也心淨則佛土淨荊溪云阿鼻依正全處極聖之自心毗盧身土不逾下凡之一念有性無性齊成佛道者有性者有情應蠢動之物皆有情性無性者無情如草木瓦礫之類皆無情也成佛了有情無情總名為佛一切煩惱畢竟解脫者煩惱即是菩提在因地時煩惱成佛後變為菩提衆生將煩惱作煩惱用佛將煩惱作菩提用有時亦將煩惱只作煩惱用若能轉物即同如來也法界海慧照了諸相猶如虗空此名如來隨順覺性法界海慧者佛之智慧如法界之廣如大海之深故也其慧光照了諸相如太虗空廓然無礙方為佛之隨順覺性此之隨順如孔子之無可無不可是也西蜀復菴暉禪師曰上文十對皆明所證之境即無差別之理此則明能觀之心即無分別之智法界即妙覺之用其體用深廣如海故稱海此法喻雙舉問十對境上何故得事事無礙今答云良由用離念深廣法界海慧照徹了達前之十對諸境之相皆如夢如幻如泡如影如鏡像如水月如龜毛如兔角如乾城如陰晴如黑白脫體皆空所以心不礙心心境融通理事一致豈不見壽禪師云截瓊枝而寸寸是玉折栴檀而片片皆香又云末後一句始到牢關也此明十方如來入妙覺果位常與覺性相應也上來凡賢聖果四位深淺各各不同對文可見禪教同歸今時學者彼此迷源修心者以經論為別宗稱説者以禪門為別法聞談因果修證便推屬經論之家不知修證正是禪門之本事聞説即心即佛便推屬胸臆之禪不知心佛正是經論之本意以參學為戶牖各自開張以禪教為干戈互相攻擊情隨函矢而遷變法逐人我以高低是非紛拏莫之能辨譬如一父而生兩子其一子愛其父右足若左足之子出則其右足之子遂以利刃刺其父左足若右足之子出則其左足之子亦然是二子不知左右之足皆其父之一體也今佛之弟子亦然不知禪是佛心教是佛語然諸佛心語必不相違脫會參禪者必不謗佛會學教者必不毀禪豈不見蘇子由撰龍并記云禪而不知教是杜所入之門斆而不知禪是不識家也辨才法師於教得禪口説如瀾翻而不失道根心湛如止水德風輒燦然何也只如禪家云禪和子汝未出行腳之時見山只是山見水只是水見柱杖只是柱杖洎乎擺脫塵緣擔簦負笈撥草瞻風見善知識行腳之後忽然得箇悟門是時見山不是山見水不是水見柱杖不是柱杖盍饒到這般田地方是小歇場打淨潔毬子花不哭孩兒頽然於吉凶之外未解竿頭放步懸崖撒手要得依前似未行腳時相似見山依前是山見水依前是水見柱杖依前是柱杖是法位住其相常住不得移易一絲毫許方是七縱八橫得大自在無障無礙安樂解脫大歇場也所以禪宗云莫謂胡鬚赤更有赤鬚胡今此經亦有這箇消息只如第一文殊章文云妄認四大為自身相六塵緣影為自心相者此正是禪和子未行腳之時見山是山見水是水見柱杖是柱杖也其次普眼章文云宴坐靜室恆作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地乃至幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅者此是行腳之後悟道捉敗內之一身外之萬物一時百雜碎都盧是自己本來面目恁時見山不是山見水不是水見柱杖不是柱杖也最後經文到此云一切障礙即究竟覺等乃是依前見山是山見水是水見柱杖是柱杖也又如佛印四牛圖表行住坐臥者亦與此經之意符合且第一牛全黑第二牛半白半黑第三牛全白第四牛又成黑頌第一牛曰初學看牛曰牛兒盡力爭愛從荒草去不向坦途行轉鼻繩難拽加鞭眼轉生勿教犯苗稼由要及時耕頌第二牛曰驀地轉頭來胸腰黑漸開出欄羌笛引歸晚野歌催見鬪情猶憤逢群目尚擡良由鞭索在心地漸成灰頌第三牛曰且喜全軀白安眠露地中身心如土木聞見若盲聾一朵雲生谷成團雪墮空皓然無異色不與衆牛同頌第四牛曰已白仍回黑還君舊曰牛亂山間放縱千古更無憂渴飲逢飢噉和光亦混流迢迢凡聖外誰敢向前收然此四牛只如妄認四大為自身相等此即黑牛其次普眼章初入我空觀者即半白半黑牛其次證得二空之理見六根清淨六塵清淨乃至四大依報正報世出世間法八萬四千陀羅尼門悉皆清淨此露地白牛到此十對之境混融一致此即最後黑牛是知一心之法窮本極末禪教無異始終一同但以暗證禪人徇文學士自以為肝膽楚越爾嗚呼是説足以息爭不然則轉增後人之病何利益之有哉足宜察焉四明聰講師曰法界海慧照了諸相猶如虗空者佛惠如海無涯能映照一切森羅萬象雖照了諸相皆為色相如水底樹影故云猶如虗空此名如來隨順覺性者如上明六即佛至究竟即妙覺極聖無過之者但圓覺寂照之性隨六即轉在凡在聖並皆具之覺性無淺深隨證有淺深耳今至極證亦云隨順者此且約六而言之若論即字則是也一切諸法無非是者有甚隨與不隨善男子但諸菩薩及末世衆生居一切時不起妄念不起妄念者不起一切念也於諸妄心亦不息滅妄心即是真心不必求其息滅住妄想境不加了知於此妄想境界不起了知之心於無了知不辨真實知心既寂即是真實何必更起辨別之念西蜀復菴暉禪師曰此忘心頓證也謂前説凡賢聖果地位階降漸次乃就機説有淺深不同又恐後人隨語生執執實有地位定存漸次若如此者則悟入無期故又示之以安心隨順也令人速證圓覺所以永嘉云直截根源佛所印摘葉尋枝我不能也文三初妄心入覺內一指示妄心文有四節言居一切時不起妄念此第一節於諸妄心亦不息滅此第二節住妄想境不加了知此第三節於無了知不辨真實此第四節世尊到此復告清淨惠菩薩云善男子但諸菩薩及末世衆生居處一切行住坐臥之時不得起妄想之念行時不得起行時念住時不得起住時念坐時不得起坐時念臥時不得起臥時念一念不生前後際斷然後於諸妄心亦不得息滅何也既知是妄即全妄為真以至舉足下足鳥道無殊坐臥經行莫非玄路譬如波外無水前若不止息無量劫來顛倒攀緣分別妄想生死之心者即是著常見此則若更止息真心者又落斷見所以云我師説法常依二諦定有著常定無著斷是故智者不著斷常所以禪宗云死蛇拈得作獰龍糞土握來成至寶也住妄想境不加了知者謂此行住坐臥著衣喫飯妄想境界全是圓覺妙境更不可分別此是生滅畜生餓鬼地獄人天生死凡夫之境界也於無了知不辨真實者謂於無分別了知境界之中亦不辨別此是真實涅槃是諸聖人境界所以道衲僧行履要周旋坐臥經行觸處圓舉步直教千聖外擡眸常在月明前也蓋一則不起妄第二不滅真第三不作凡見第四不作聖解凡聖俱盡一念不生即是圓明妙覺之心此謂之忘心頓證也亦可一忘妄二忘滅三忘知四妄辨也問此忘心頓證未審就何處耶答只就前凡賢聖果四位之中忘矣若於地位中能忘其差別之相名頓證也亦可行人以此安心於一切法悉得般若現前也彼諸衆生聞是法門信解受持不生驚畏是則名為隨順覺性衆生修此無念法門不驚不畏者乃順其本來無念之性無所迷執故也西蜀復菴暉禪師曰二依法頓入也是法門即忘心頓證法門驚則初心怖則續心畏則決定心聞則聞惠信解則思惠受持則修惠以謂彼當根之衆若聞此方便法門心無疑惑體達領受任持則坦然合道與本覺相應也四明聰講師曰善男子但諸菩薩至隨順覺性但諸且言十二大士及末世衆生佛滅後後五百歲亦有修圓覺者常以寂照照此妄念但是覺性任運不起又此妄心本是圓覺不須息滅若息滅者即無圓覺去氷求水無益於求雖住此妄想此妄既是圓覺不屬思惟不屬造化不假修證本性具故若向思惟處見則是了知今云不加了知不在修之乃爾要須知妄想多則覺性大也水長船高故也上雖真妄同體又須於無了知中不辨真實若辨真實則存了知到此不存真如方見本來無也彼諸衆生末世之人佛在世時為真正導師則無疑誨去聖逾遠邪法熾盛龍蛇混雜恐聞此圓覺即成佛道之語或生驚畏所以叮嚀若是正信受持必不生驚畏何以故知本性具本不改變踏著故鄉田地穩更無南北與東西覺遍虗空覺遍法界自覺覺他覺行圓滿故云隨順覺性善男子汝等當知如是衆生已曾供養百千萬億恆河沙諸佛及大菩薩植衆德本衆生於過去劫中曾供養無數諸佛菩薩種諸善根方得聞此法門西蜀復菴暉禪師曰此驗果知因也如金剛經云非於一佛二佛三四五佛而種善根已於無量千萬億佛所種諸善根此謂以今生得聞得信得解之果驗過去曩劫種植善根之所以也佛説是人名為成就一切種智名為成就者性本圓成假名成就爾種者種性智者智慧西蜀復菴暉禪師曰此印成佛智然此智有三種一切智道種智一切種智且一切智者即自覺道種智覺他一切種智即覺滿然初即小乘次即菩薩後即佛也四明聰講師曰善男子汝等當知如是衆生至一切種智時人多有不知今生富貴前世種得一飲一根椽片瓦莫非修因況乎聞大乘圓覺又聞而修修而證者也此非供養諸佛今復親近耶阿難與佛同於空王佛時發心修行阿難樂多聞故未成聖證釋迦精進今先成佛如莊嚴王邪見五逆調達皆有緣種遇靈山得受記爾時世尊欲重宣此義而説偈言清淨惠當知圓覺菩提性無取亦無證無菩薩衆生覺與未覺時漸次有差別衆生為解礙菩薩未離覺入地永寂滅不住一切相大覺悉圓滿名為遍隨順末世諸衆生心不生虗妄佛説如是人現世即菩薩供養恆沙佛功德已圓滿雖有多方便皆名隨順智西蜀復菴暉禪師曰偈中初一偈圓覺無證次二偈就機説證後二偈頓悟圓滿貫前後章意者唐圭峯定惠禪師宗密頌清淨惠菩薩章曰淨惠倫排證悟人強分四位順天真凡賢聖果雖然異悟迷染淨與誰親先明依位循諸性次辨忘心頓證因一智了然超脫處有無情盡覺芽春清淨慧菩薩章終六
