body:
  text: 賢善首菩薩章四明聰講師曰肇論云以名求物物無當名之實以物求名名無得物之功物無當名之實非物也名無得物之功非名也賢善首因十一位大士各問深義雖釋尊開示圓覺廼談性具圓覺然未的指是故亦問立其名字所以問名者蓋有名物之功物有應名之得圓覺即名也陀羅尼即體體即物也此則名體相副故云陀羅尼門流出圓覺既存名體必須奉持奉即取也持即心也以取圓覺持之於心則眾生若身若心念念圓覺常以寂照止觀如護身符即心純是法與法相應裴相國云血氣之屬必有知凡有知者必同體一經旨意無出於斯於是賢善首菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言西蜀復菴暉禪師曰賢則亞聖謂地前三賢位次十聖位地上菩薩也善則順理首是頭首然欲使萬善齊興俱順真理成因正位亞次聖果者必藉經教流通經教流通是賢善之首故流通分中當此菩薩請問也大悲世尊廣為我等及末世眾生開悟如是不思議事讚佛於前十一章演說圓覺妙義開悟眾生皆是不可思惟不可擬議之事復菴暉禪師曰不思議事者近慶道場遠慶一部也謂一部經內世尊為上根人開示二空觀為中根人開示三觀諸輪為下根人開示道場加行如是種種法門離於精粗之域出於形質之外脫於言意之表故云不可思議之事而儒典尚云夫子之道上有出乎天之高下有入乎地之深瞻之在前忽然在後不可以形皃求不可以聰明得與此不思議同意也世尊此大乘教謂此圓覺大乘經教名字何等請問此等教法是何名字云何奉持請問眾生教法如何受持眾生脩習得何功德請問眾生修此教法獲何利益云何使我護持經人請問如何使我衛護受持此經之人流布此教至於何地請問此圓覺經教流轉分布至於何處作是語已五體投地如是三請終而復始西蜀復菴暉禪師曰然正宗分中但問所詮法義法義雖已圓備凡心難可任持聞時領會分明過後恐還遺忘事須持教貫穿文既不遺隨文解義依義起觀方成正修故此問經名字也云何奉持者前雖已說即持法也今此所問者即持教也謂自遵奉行為人持說也流布此教者此行十法行也謂若人一向於此了義經教供養寫施聽受讀誦說釋思修如是分布流傳末代未審此人智慧功德畢竟至於何地然地有菩薩地有佛地也四明聰講師曰名字雖是假名無名則物無定名如筌蹄之取魚兔非筌蹄則魚兔無所獲故欲魚必用筌欲兔必用蹄也猿鶴之類誰與安名麒麟鳳凰孰為作字耕田鑿井皆無名中立名劫初萬物無名無字皆聖人依真以立名如理能通聖人開疏為道如理能該羅依真以作網故伏犧畫八卦神農甞草藥后稷播百伯益鑿井貨狄造舡奚仲作車尤制五兵黃帝造冠冕以至倉頡制字𨽻首筭數蒙恬筆蔡倫紙如此之類皆聖賢軌真理造之濟萬民也一大藏教百千三昧皆立名目又如經卷不以首題何以區分故祖師云假名中具三千法門是故名有召物之功也名字既立奉持脩習神物護持至於流通他方世界脩之直至佛地如斯五問利益愽哉爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來如是經教功德名字汝今諦聽當為汝說時賢善首菩薩奉教歡喜及諸大眾默然而聽善男子是經百千萬億恒河沙諸佛所說佛謂此圓覺經教無數諸佛悉皆如是宣說三世如來之所守護佛謂過去現在未來三世諸佛悉皆守護此經十方菩薩之所歸依佛謂法界諸菩薩等無不敬信此經十二部經清淨眼目佛謂此經清淨明了為十二部經之眼目也十二部經者一名修多羅二名祇夜三名授記四名伽陀五名優陀那六名尼陀那七名阿波陀那八名伊帝目多伽九名闍陀伽十名毗佛略十一名阿浮陀達磨十二名優波提舍西蜀復菴暉禪師曰說此經佛既是真身真身無礙塵沙同體故一說即一切說三世一時說無說無不說如華嚴云我不見有佛國土不說此經若不知了義教者則隨方有說不說也三世如來之所守護者如華嚴云我等諸佛護持此法令未來世一切菩薩未曾聞者皆悉得聞十方菩薩之所歸依者謂因行之中無不從此法而成佛十二部經清淨眼目者良以推窮迷本照徹覺源是以理貫群經義無不盡於此若解則諸教煥然可見如指諸掌云眼目者如人有眼一切境界歷歷可見也十二部經者亦謂之十二分教一契經二應頌三授記四諷誦五因緣六自說七本事八本生九方廣十未曾有十一譬喻十二論議此謂之十二部經也今此經即屬契經及方廣二分所攝也前諸佛所說如來守護菩薩歸依者此印定圓覺之法也十二部經眼目者此印定為一切經之宗也所以序云以印定其法為一切經之宗也即指此文也問此經對三時五時之教否答頓教不論先後處所但遇頓機即說故不對三時五時之教也又難云既不對教者法華經云是法華經諸佛神力之所護此又何如分耶答法華諸佛神力守護者即屬正宗也此經諸佛守護者即屬流通分也若彼經守護在流通分者即許不可揀之彼既居正宗分是知不同也是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來夫定境界亦名如來藏自性差別汝當奉持佛謂此經有此五名汝等菩薩應當奉持西蜀復菴暉禪師曰前問此大乘教名字何等云何奉持此答之有五名也然此經題者乃佛自立也且諸經得名有其多種或以人為目或以法為名人有請說等殊法有法喻等別或體或用或果或因或能詮所詮或真或妄或境或智乍複乍單不因今經五名已含多種大者體也方廣者用也圓覺者果也祕密者因也王者喻也三昧者法也修多羅了義者是歎能詮也餘皆所詮如來是能證人也決定境界者即所證境也如來藏者即屬總乃在纏之名則真妄和合也又自性即空如來藏也差別即不空如來藏也斯則人法總彰法喻皆舉具體具用有果有因詮旨雙題真妄俱顯方諸經目莫備於斯了義之名昭然顯矣而世尊遂勑令依此名法而持謂已悟明心地者文字性離即是解脫不妨滿紙放光而持法也若未悟明心地者迷一切諸法真實之性向心外取法而起文字之見今還將文字對治示其本來之性如以聲止聲以楔出楔以機奪機以毒攻毒無離文字如說修行而持義也四明聰講師曰法華云一切治生產業皆與實相不相違背縱非今佛所說亦是過去諸佛曾說何況今之圓覺是如來藏性故云恒沙諸佛所說也金剛經所謂有佛性種子人感諸佛之所護念此圓覺本元是如來成佛真體佛體真實安得不能守護故云三世如來之所守護十二部經亦云十二分教教能詮理為義部者部類為義一修多羅此云契經直說法相即長行云散花也二祇夜此云重頌亦應頌即貫花也三和伽那此云授記即授記人天作佛也四伽陀此云孤起不重頌者名也亦曰諷頌五優陀那此云無問自說亦云無我六尼陀那此云因緣說一切因起事七阿波陀那此云譬喻用扇譬月也八伊帝目多伽此云本事此說他人之事九闇陀伽此云本生此說菩薩行因本所行事十毗佛略此云方廣談理無礙十一阿浮達摩此云未曾有佛現種種神通又云未有十二優婆提舍此云逐分別所說義又云論義法華經云我此九部法隨順眾生說小乘曰九部大乘十二部也其實大小相通此十二部經非獨為清淨眼目語其旨趣則四種悉檀理妙域中固非名號所及化擅繫表又非情智所尋致於遣累忘筌淘神盡照近超生死遠證涅槃播闡五乘接群機之深淺該明六道辨善惡之升沈敻林正反期出世而法無不週邇比王化而事無不盡能博能要不質不文自非天下之至慮孰能與於斯教哉清淨眼目理出於此經有五名一名大方廣圓覺陀羅尼大方廣即所立法也大方是體廣即用也此是空如來藏具不空如來藏之用又可常遍曰大執持曰方包博曰廣亦可配法身般若解脫亦如來藏之三德也圓即寂覺即照亦是止觀寂止也照觀也陀羅尼庶惡持善圓覺是從定立名楞嚴亦是大定二名修多羅了義翻契經圓融定慧非偏小所知了義究竟顯說指權歸實約開顯說一切諸法皆是實相亦有不了義經方圓不相入者今即權是實一念三千三名祕密王三昧如來祕要之藏定善慧之異名祕密王亦是能說之人楞嚴云妙蓮華王十方佛母以密王三昧為人即正心行處淨覺亦以蓮華王為人解四名如來決定境界即堅固為義大涅槃更無能過者即不變義也五名如來藏自性差別圓覺妙性性不自守隨緣作種種名或云常住真心或云性淨明體或云空如來藏或云涅槃妙心曰諸法實相曰王三昧曰真如曰法界曰第一義諦曰無生妙理此圓覺亦能入惡隨惡受名為性惡為性善為理毒害為諸阿顛迦為昏鈍性障為生老病死為成住壞空為钁湯爐炭皆是圓覺隨惡受稱其實圓覺非聖非凡非善非惡非生死非涅槃非色非心非天堂非地獄非佛非眾生則凡所有相皆是虗妄若見諸相非相即名圓覺如是則終日圓覺未嘗圓覺也汝當奉持者此五種名名雖差別其實是佛一路涅槃門過去諸佛悉已成就現在諸菩薩今皆入圓覺未來修學當依如是法此是如來藏無漏不思議法如人因事遠出未得還家今日明了歸家之路父子相見團圓寧不欣樂奉持耶善男子是經惟顯如來境界惟佛如來能盡宣說此經獨能顯示佛境惟佛宣說曲盡其妙西蜀復菴暉禪師曰前云是諸眾生清淨覺地又說無明貪愛四相四病今云唯顯如來境界者既云唯顯佛之妙覺不思議境界獨佛方能盡其所說其所說者何耶謂說眾生無明皆無所有止是佛境佛境若不顯現眾生豈得皆空生若不空豈徹覺地故華嚴信位即佛境皆是此意也然後代淺識劣解之人以謂佛法止此者請觀是說也四明聰講師曰此圓覺即如來藏妙明心元離一切相即一切相但世間眾生聲聞緣覺欲以所知心測度如來圓覺境界用世語言入佛知見猶如藕絲懸須彌山終不能舉此言果人所證之法深妙非小乘凡夫之所能及又此經非世間語言三昧亦非雕蟲篆刻之辭非是外道典籍非聲聞諸小乘偏圓權實之法此是圓頓圓覺妙心此法如火聚四邊不可取若能取者唯佛一人到究竟即佛如十五夜月蟾光桂影圓滿無虧出三惑破二死百千三昧無量行門一時顯現如百千燈光照一室其光圓無際故一切世間種種諸病惟佛能醫故云惟佛能盡宣說若諸菩薩及末世眾生依此修行漸次增進至於佛地若依此經修行漸漸增進心至佛之地位西蜀復菴暉禪師曰前問流布此教至於何地今答云良由此經惟顯佛境故修十法行之者必至佛地佛地即妙覺位也所謂不住化城便躋寶所在禪家謂之不動凡夫便登佛位四明聰講師曰今言菩薩乃因人凡夫末世依上所立法制用寂照止心寂念專一便不頓修亦可漸次只要道心堅固加功進行何患不成佛其間有聞而不修修而不證者此人有障更須禮佛懺悔終久至於佛地此非妙覺佛乃登圓初住菩薩名佛亦百世界作佛故云佛地善男子是經名為頓教大乘此經名為頓悟之教大乘之法頓機眾生從此開悟利根眾生有圓頓之機者皆因此經而得開悟亦攝漸修一切群品鈍根眾生須假漸脩而此經教無不圓攝西蜀復菴暉禪師曰賢首國師以一大藏教深淺之義判為五教五教者一小乘教即四阿含經是二大乘始教即八部般若是三大乘終教即楞嚴涅槃寶積等是四大乘頓教即圓覺楞伽等是五大乘圓教即華嚴是令經乃屬頓教獨被頓機眾生於頓機中又分為上中下三根也疏云宗門是頓教事具漸門既頓漸俱收則遲速皆益會與不會入與不入皆可留心所以脩山主云會得甚奇特不會也相許四明聰講師曰此大乘教本妙覺明與如來心不增不減無漸無頓今云頓漸者為修學人根有利鈍障有重輕雖精進而開悟有遲速立行有漸頓非教體有遲速迷悟有機緣名頓教漸脩楞嚴云佛告富樓那言譬如迷人於一聚落惑南為北此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊佛言十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空華無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡今此圓覺亦復如是本無頓漸但上機先悟漸機次悟若是圓覺之性本無利鈍漸頓今云亦攝漸脩者非小乘之漸今脩圓者同緣實相皆用止觀寂照之法機有利鈍悟有遲速為漸也譬如大海不讓小流大海者諭頓教大乘不讓小流者論能攝一切漸證乃至蚊蝱此諭漸脩眾生也及阿脩羅此諭頓機眾生也飲其水者皆得充滿此諭頓漸之徒脩此經教悉皆圓滿西蜀復菴暉禪師曰此舉諭也大海諭頓教小流諭漸教蚊䗈喻二乘阿脩羅喻菩薩飲其水等者諭三乘之人受持此經者皆得悟入疏云大海有無量之水而飲之者則量腹多少圓覺有無邊之法門而受持之者隨器頓漸四明聰講師曰阿脩羅此翻無酒初欲採四天下華釀海水為酒魚龍之業釀之不成誓不飲酒故云無酒用手掌遮月人間謂之月蝕有大力用飲海水不竭何況蚊蝱此大乘教亦攝小乘漸脩人善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義以至七寶布施者其福報有盡聞此經義而脩證者其智慧無窮西蜀復菴暉禪師曰此顯福也法會既終所談上中下三根及談因果法義復恐後代眾生不信脩如是因感如是果遂於此流通分中一道較量功德欲使後人生信忻樂也如金剛經中兩重因果三番較量之意梵語檀波羅蜜此云布施謂運心寬廣曰布輟己惠人曰施此布施一度眾行皆攝華嚴經說有十度一布施謂財法無畏無不皆捨二持戒謂防非止惡內外無瑕三忍辱謂違順不干諦察忍可四精進謂離身心相萬法增脩五禪定謂念慮皆忘安心理境六般若謂心無分別善達心空七方便謂涉有常空施為無礙八願度謂上求下化窮盡未來九力度謂思脩成功萬境不動十智度謂決斷無惑證法神今以布施一度以較量經福也一句義者此顯勝七寶也意謂雖以金銀琉璃赤珠等寶不為自己求安樂之故普施與一切眾生者是有為有漏之因感得人天果報譬如仰箭射虗空勢力盡箭還墜招得來生不如意今若聞此經一句合宜之義如說脩行斷障遣疑是無漏最上之因便能超夢幻出輪迴直趣無上佛果菩提所以此功德勝前七寶布施功德也疏曰世珍盈剎能為漏果之資妙法一言必獲菩提之報禪家亦云識得一句一生參學事畢在教家亦云教典千一心能貫之在書云詩三百一言以蔽之在記云通於一萬事畢在語云吾道一以貫之古詩云學雖不多可齊上聖如是則歸同反一一處既通千處萬處一時透脫所以道一葉落天下秋一塵起大地收一花開天下春一事寂萬法真與此一句義同意也四明聰講師曰七寶者金銀及琉璃玻瓈硨磲瑪瑙真珠三千大千可為眾多盡以布施比聞經一句福皆不及盖慧能趣菩提施福不趣菩提也善男子假使有人教百恒河沙眾生得阿漢果西蜀復菴暉禪師曰此顯劣智也梵語阿羅漢此有三義謂不生應供無賊也恒河者方四十里其沙細如麵假饒教得一百箇恒河中許多沙數之人剋獲成就小果聖人者其福非是究竟故乃劣也不如有人宣說此經分別半偈阿羅漢果蓋是小乘之法此經與偈乃是大乘之教西蜀復菴暉禪師曰上文舉劣此顯勝也意謂設使教百恒沙眾生得阿羅漢果所得功德不如有人代佛宣揚此經半偈之功德也疏云凡全偈者所謂四句句有二種一文句二義句若約文句即兩句為半偈若約義句即說一切法本來空寂是半偈也顯相空體不空是全偈也四明聰講師曰藥王菩薩為法焚身雪山童子捨全身求得半偈光明經云滿城盛火應從中過乃為法亡軀也波㖮打骨取髓為求法故世尊因地剜身作千盌燈求得半偈今云勝阿羅漢羅漢是小乘今是大乘頓機眾生可聞法一超入如來地如龍女一生便往南方成佛不比小乘時長行遠此如靈丹點銕可成金也善男子若復有人聞此經名信心不惑西蜀復菴暉禪師曰此明聞信也不惑即不疑惑也然大乘教法無量劫來難見難聞或時聞已不信不順不悟不入者有之矣所以論語云人而無信不知其可也夫圓覺深旨一心妙門非大智而不能觀非大根而不能信觀即舉佛智也信之即入圓覺但懇志無疑決取成辦也當知是人非於一佛二佛種諸福慧如是乃至盡恒河沙一切佛所種諸善根聞此經教聞此經名深信不疑者蓋曾於無數佛處種諸福慧及諸善根方得聞爾西蜀復菴暉禪師曰比驗宿因也如金剛經云當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者諸善根者不過是斷貪瞋癡三毒發聞思修三慧也然此經宗信者必是即解之信信該果海不是小緣故驗其宿因曾積信種四明聰講師曰起信論說未入正定聚眾生故說脩行信心一信樂念真如法故真如法諸佛所師眾行之源二信佛有無量功德常念親近供養發起善根求一切智故三信法有大利益常念脩行諸波羅蜜四信僧能正脩行自利利他常樂親近諸菩薩眾求學如實行故如高僧傳中高僧有十科世之難學雖有破群者無麤不擇細如韓昌黎始未信佛法時上論佛骨表因此貶潮參大顛顛云公雖過人世智辨聦是世間有之汝勝晉時佛圖澄否韓曰不及汝比姚秦時鳩摩羅什否曰不如汝尚不如此賢況佛是大聖天人之師又安可破之後於大顛有以發明張無盡初年時遊僧寺見佛書梵夾嚴整怫然怒曰吾孔聖人反不如胡人人所仰重欲造無佛論毀之在書院中思惟深夜不睡其妻云如何不睡張云欲造無佛論妻向氏云既是無佛何論之有當須著有佛論也無盡疑其言遂閣筆後因訪一同列見佛龕前有維摩詰經信手開卷見云此病非地大亦不離地大乃歎曰胡人之語亦能爾耶遂問有幾卷曰有三卷借歸看其妻問曰讀者何書曰維摩詰經向日熟讀此可造無佛論否無盡疎果其言於是歸心佛乘後參兜率悅大有發明此皆宿下緣種今日契悟起信云復有五門能成信心一施門二戒門三忍門四進門五止觀門彼文稍廣今錄止觀門止者謂止一切境界息諸外塵念以圓覺寂照照諸塵勞息諸攀緣故云止今之隨順奢摩他體真止也觀者謂分別因緣生滅相隨順毗婆舍那此云觀昏即觀之以此二義漸漸脩習不相捨離又云若脩止者端坐正意不依氣息不依形色不依空不依地水火風乃至見聞覺知一切諸想隨念皆除亦遣除想以一切法本來無想念念不生念念不滅亦不得隨心外念境界後以心除心心若馳散即當攝來住於正念是正念者當知惟心無外境界即復此心亦自無相念念不可得若四威儀中有所施作於一切時常念方便隨順觀察久習淳熟其心得住如此脩行聞經之人非於一佛二佛下種乃至恒河沙佛所以是無種不植此經又安得不聞汝善男子當護末世是脩行者佛令菩薩衛護將來如是信心脩行之人無令惡魔及諸外道惱其身心令生退屈障礙覺性之事皆為惡魔非其同志之人皆為外道今菩薩護持此脩行者不可令此二害惱彼身心使之退轉西蜀復菴暉禪師曰前問云何護持今答云但莫令惡魔外道惱其身心者即是護持也近有人撰其偈詞添入經中蓋不知此是流通分故閱者幸勿疑焉四明聰講師曰起信云莫令此心墮於邪網若眾生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相當念惟心境界則滅終不為惱龍樹云除諸法實相外餘皆魔事逢此境界當勤正念不取不著則能遠是諸業障應知外道所有三昧皆不離見愛我慢之心貪著世間名聞利養正脩行人善為分別此吾佛最後教誨至此流通意竟爾時世尊欲重宣此義而說偈言賢善首當知是經諸佛說如來等護持十二部眼目名為大方廣圓覺陀羅尼增進至佛地如海納百川飲者皆充滿假使施七寶積滿三千界不如聞此經若化河沙眾皆得阿羅漢不如聞半偈汝等於來世護是宣持者無令生退屈唐圭峯定慧禪師宗密頌賢善首菩薩章曰善首流通正法門五名於是為區分十二部經真了義百千諸佛共談論佛境佛地已開演頓教頓機令得聞儻解百川歸大海何妨一法備多根爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言世尊若後末世一切眾生有能持此決定大乘我當守護如護眼目此諸金剛欲守護受持此經之人也決定大乘者謂此大乘經教乃決定成佛之義乃至道場所修行處我等金剛自領徒眾晨夕守護令不退轉金剛又欲守護道場內修行此等大乘法處令修行者無退轉心其家乃至永無災障疫病銷滅金剛又欲守護其家令無災害財寶豐足常不乏少辦道資糧常令不闕西蜀復菴暉禪師曰此下稟命加衛外護流通也火首者此神頭有火焰手中執金剛杵也四明聰講師曰金剛梵語䟦闍羅波膩此云金剛手波膩翻手謂手執金杵以立名正法念經云昔有國王有二夫人一生千子欲試千子當來成佛次第故俱留孫探得第一籌釋迦第四籌乃至樓至第千籌第二夫人生二子一願為梵王請千兄轉法輪次願為密跡金剛神護千兄教法依經僧寺三門只合一身金剛一身梵王今為對故塑二金剛非也楞嚴云十恒河沙金剛密跡此八萬亦未為多火首摧碎等未詳所譯爾時大梵王圓覺疏曰即初禪天王也二十八天王欲界色界無色界共有二十八天每天各有一王其號曰四大天王忉利天王夜摩天王兜率天王化樂天王他化自在天王梵眾天王梵輔天王大梵天王少光天王無量光天王光音天王少淨天王無量淨天王徧淨天王福生天王福受天王廣果天王無想天王無煩天王無熱天王善見天王善現天王色究竟天王無邊空處天王無邊識處天王無所有處天王非非想處天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安隱心不退轉大梵王等皆欲守護受持此經之人西蜀復菴暉禪師曰大梵王者即初禪天王也二十八天王者即三界主也須彌山王者即帝釋也護國天王者即別指四天王也四明聰講師曰梵語迦夷此言淨身居色界禪天梵是西語此云離欲因中脩梵行不行婬穢也今為天主統娑婆三千大千世界皆屬號令有言語覺觀世間雖脩梵行者多唯加脩四無量心慈悲喜捨故得為天主也二十八天王者欲界六天色界十八天無色界四天總二十八天也護國天王等即護世四天王光明云護國四鎮即帝釋天神將常領八部鬼神護弘持人心不退轉爾時有大力鬼王名吉槃荼圓覺疏曰吉槃荼者亦云鳩槃荼食人之精血其疾如風變化稍多住於林野與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經人朝夕侍衛令不退屈諸鬼王等亦欲守護受持此經之人其人所居一由旬內藏經曰一由旬者四十里也若有鬼神侵其境界我當使其碎如微塵為護法故盡其威力西蜀復菴暉禪師曰吉槃荼者亦鳴槃荼此鬼食人精氣其疾如風管林野諸鬼眾一由旬者即四十里也四明聰講師曰鄭玄云聖人精氣謂之神賢人精氣謂之鬼又有云天神曰靈坤神曰祇人神曰鬼鬼者畏也虗祛多畏又有威能令人畏或云希求名餓鬼從人求食以活性命光明疏云神者能也大力者能移山填海劣者能隱顯變化肇云神受善惡雜報現形勝人劣於天其身輕微難見鬼類眾多不能盡釋今言吉槃荼亦名鳩槃荼亦名俱槃荼此翻甕形舊云冬瓜此神陰如冬瓜行至肩上坐便踞之即厭魅鬼也梵語烏蘇慢此云厭厭眠內不祥本只作厭字後人厭下加鬼圭峯云食人精血其疾如風變化稍多住林野間管諸鬼眾是號為王故云大力鬼王與十萬鬼王護持經人不令鬼神侵惱佛說此經已一切菩薩天龍鬼神八部眷屬八部者一天神二龍神三夜叉四乾闥婆五阿脩羅六迦樓羅七緊那羅八摩睺羅及諸天王梵王等一切大眾聞佛所說皆大歡喜信受奉行西蜀復菴暉禪師曰疏云良由文殊所問經說有三種義歡喜奉行一能說者清淨不取著名利所染故二所說法清淨以如實知法體故三得果清淨即說益也問經首信成就與此信是同是別耶答前信淺此信深何以知之大智論云如是我聞生信也信受奉行生智也信為能入智為能度又云信為入法之初機智為究竟之至要雖深淺之不同在智信一貫則無別也四明聰講師曰佛說經通該凡聖既聞圓覺妙心實相常住解圓即徧同服醍醐咸霑妙益是故歡喜奉行也此經後有加重說偈者非也圭峯不著諸家不留況世尊說經當機之人故有重頌今法會將散唯是天龍鬼神各言護持流通不須重說又重頌被晚來未至者至此時安有晚來也前住持靈隱禪寺癡絕老人跋大光明藏情與無情咸處其中無上法王世間出世悉歸所統一時薄伽婆無說而說十二大菩薩不聞而聞況此經不涉言詮諸講師如何註解略通線路隨世刊行據令而行合投諸火淳祐丙午佛成道日金陵玉山庵主道冲書徑山長老圓照老人䟦喚作圓虧缺了也道箇覺迷昧了也黃面瞿曇十二大士密說顯演已是註解其餘經師論師於注解下又添解注且正文畢竟在甚處恁麼問好與三十柱杖覺如居士倘能下手徑山甘受不辭淳祐丁未二月三日無準叟師範敬書靈隱長老石溪老人䟦知而無知是第二頭不知而知落第三首請居士不得動著還我圓覺覺如底第一籌來丁未仲春旦日石溪老僧心月書于靈鷲一峯慶元府雪竇長老偃溪老人䟦諸經各標時處惟圓覺一經不標時處何耶淳祐丁未夏覺如居士書來乞圓覺講義䟦是日千丈巖主方與湖海宿衲作安居佛事未暇也友上人歸日試問居士所集講義已到第幾菩薩千丈岩主廣聞書于叢竹小軒慶元府雪竇長老偃谿老人䟦鈔解疏疏解經經解什麼覺如居士窮諸家疏鈔掇而拾之且道此經從何而出忽若一語不玄謗斯經故四明千丈嵓主廣聞題
